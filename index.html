<style>
*{box-sizing:border-box;}

:root{
  --text:#5b4632;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#f3ecdf;
  color:var(--text);

/* ===== 首页舞台 ===== */
#home{
  position:relative;
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;

  height:fit-content;

  max-height:100vh;
}

#homeImage{
  display:block;
  max-width:100vw;
  max-height:100vh;
  width:auto;
  height:auto;
  user-select:none;
  -webkit-user-drag:none;
}

#seasonLayer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
  display:block;
}

/* ===== 右上角身份组件 ===== */
#topActions{
  position:absolute;
  right:7.35%;
  top:8%;

  display:none;
  justify-content:flex-end;
  pointer-events:none;

}

#topActions.show{

}

#topUserWrap{

  transform:scale(var(--topbar-scale));
  transform-origin:top right;

#topUserBar{

  background:rgba(255,248,239,.92);

  box-shadow:

#currentUserBadge{

}

#bellBtn{
  position:relative;
  min-width:28px;
  width:28px;
  padding:0;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;

}

#bellBtn:hover,

#logoutBtn{

#noticePanel{

<script>
const supabaseUrl = "https://tfevitwoqmxwaguvtyms.supabase.co";
const supabaseKey = "sb_publishable_0cFYhwx_9uEcrXnMJzzNMQ_cEng8xmI";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const homeImg = document.getElementById("homeImage");
const topActions = document.getElementById("topActions");
const currentUserBadge = document.getElementById("currentUserBadge");
const bellBtn = document.getElementById("bellBtn");
const noticePanel = document.getElementById("noticePanel");
const noticeList = document.getElementById("noticeList");
const noticeClearBtn = document.getElementById("noticeClearBtn");

const PENDING_REDIRECT_KEY = "room10_pending_redirect";
const NOTICE_ACK_KEY = "room10_notice_ack_v3";

let seasonEffectState = { rafId: 0, onResize: null };
let homeImageLoadBound = false;
let noticeState = {
  signature: "",
  items: []
};
let noticeCache = {
  at: 0,
  memberId: "",
  role: "",
  items: [],
  signature: ""
};

function getPendingRedirect(){
  return sessionStorage.getItem(PENDING_REDIRECT_KEY) || "";
}

function setPendingRedirect(page){
  const safePage = String(page || "").trim();
  if(!safePage) return;
  sessionStorage.setItem(PENDING_REDIRECT_KEY, safePage);
}

function clearPendingRedirect(){
  sessionStorage.removeItem(PENDING_REDIRECT_KEY);
}

function goRegisterFromIndex(){
  sessionStorage.setItem("room10RegisterReturn", "index.html");
  window.location.href = "register.html?from=index.html";
}

function updateHomeImageByTime(){
  const hour = new Date().getHours();
  const nextSrc = (hour >= 18 || hour < 6) ? "home-night.png" : "home-day.png";
  if(homeImg.getAttribute("src") !== nextSrc){
    homeImg.src = nextSrc;
  }
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

function mixColor(a, b, t){
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t)
  };
}

function colorToCss(c){
  return `rgb(${c.r}, ${c.g}, ${c.b})`;
}

function lighten(c, amt){
  return {
    r: clamp(c.r + amt, 0, 255),
    g: clamp(c.g + amt, 0, 255),
    b: clamp(c.b + amt, 0, 255)
  };
}

function saturate(c, factor){
  const avg = (c.r + c.g + c.b) / 3;
  return {
    r: clamp(Math.round(avg + (c.r - avg) * factor), 0, 255),
    g: clamp(Math.round(avg + (c.g - avg) * factor), 0, 255),
    b: clamp(Math.round(avg + (c.b - avg) * factor), 0, 255)
  };
}

function sampleRectAverage(ctx, x, y, w, h){
  const data = ctx.getImageData(x, y, w, h).data;
  let r = 0, g = 0, b = 0, count = 0;
  for(let i = 0; i < data.length; i += 4){
    const alpha = data[i + 3];
    if(alpha < 8) continue;
    r += data[i];
    g += data[i + 1];
    b += data[i + 2];
    count++;
  }
  if(count === 0){
    return { r:225, g:233, b:230 };
  }
  return {
    r: Math.round(r / count),
    g: Math.round(g / count),
    b: Math.round(b / count)
  };
}

function applyBetterHomeBackground(img){
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  if(!w || !h) return;

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0, w, h);

  const sideW = Math.max(12, Math.round(w * 0.08));
  const upperH = Math.max(12, Math.round(h * 0.42));
  const lowerH = Math.max(12, Math.round(h * 0.22));

  const leftSky = sampleRectAverage(ctx, 0, 0, sideW, upperH);
  const rightSky = sampleRectAverage(ctx, w - sideW, 0, sideW, upperH);
  const leftGround = sampleRectAverage(ctx, 0, h - lowerH, sideW, lowerH);
  const rightGround = sampleRectAverage(ctx, w - sideW, h - lowerH, sideW, lowerH);

  let skyColor = mixColor(leftSky, rightSky, 0.5);
  let groundColor = mixColor(leftGround, rightGround, 0.5);

  skyColor = saturate(lighten(skyColor, 12), 1.08);
  groundColor = saturate(lighten(groundColor, 8), 1.05);

  document.body.style.background = `
    linear-gradient(
      180deg,
      ${colorToCss(skyColor)} 0%,
      ${colorToCss(mixColor(skyColor, groundColor, 0.35))} 48%,
      ${colorToCss(groundColor)} 100%
    )
  `;
}

function applyCurrentHomeBackground(){
  if(homeImg.complete && homeImg.naturalWidth){
    try{
      applyBetterHomeBackground(homeImg);
    }catch(err){
      console.warn("背景采样失败：", err);
    }
  }
}

function bindHomeImageLoadOnce(){
  if(homeImageLoadBound) return;
  homeImageLoadBound = true;

  homeImg.addEventListener("load", () => {
    applyCurrentHomeBackground();
    initSeasonEffect();
  });
}

function isLoggedIn(){
  return localStorage.getItem("room10LoggedIn") === "true";
}

function getCurrentUser(){
  return {
    nickname: localStorage.getItem("room10User") || "",
    role: localStorage.getItem("room10Role") || "",
    memberId: localStorage.getItem("room10MemberId") || ""
  };
}

function getRoleLabel(role){
  const map = {
    owner: "维修工",
    admin: "管理员",
    member: "成员",
    applying: "申请中",
    visitor: "游客"
  };
  return map[String(role || "visitor").toLowerCase()] || "游客";
}

function updateIdentityDisplay(){
  const textEl = currentUserBadge?.querySelector(".identityText");
  if(!textEl) return;
  if(isLoggedIn()){
    const user = getCurrentUser();
    textEl.textContent = `${user.nickname || "未登录"} · ${getRoleLabel(user.role)}`;
  }else{
    textEl.textContent = "未登录 · 游客";
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function getAckSignature(){
  return localStorage.getItem(NOTICE_ACK_KEY) || "";
}

function setAckSignature(signature){
  localStorage.setItem(NOTICE_ACK_KEY, String(signature || ""));
}

function buildNoticeSignature(items){
  return items.map(item => `${item.main}__${item.sub}`).join("||");
}

function sortParts(parts){
  return [...parts].sort((a, b) => {
    const aOrder = Number(a.part_order || 0);
    const bOrder = Number(b.part_order || 0);
    if(aOrder !== bOrder) return aOrder - bOrder;
    return String(a.id || "").localeCompare(String(b.id || ""));
  });
}

function getReleaseSortValue(project){
  const raw = project?.release_date;
  if(!raw) return Number.POSITIVE_INFINITY;
  const time = new Date(raw).getTime();
  if(Number.isNaN(time)) return Number.POSITIVE_INFINITY;
  return time;
}

function sortProjectsByUrgency(projects){
  return [...projects].sort((a, b) => {
    const aHasDate = !!a.release_date;
    const bHasDate = !!b.release_date;

    if(aHasDate !== bHasDate){
      return aHasDate ? -1 : 1;
    }

    const aTime = getReleaseSortValue(a);
    const bTime = getReleaseSortValue(b);
    if(aTime !== bTime){
      return aTime - bTime;
    }

    const aCode = parseInt(String(a.task_code || a.project_code || "").match(/\d+/)?.[0] || "0", 10);
    const bCode = parseInt(String(b.task_code || b.project_code || "").match(/\d+/)?.[0] || "0", 10);
    if(aCode !== bCode){
      return aCode - bCode;
    }

    return String(a.task_name || a.project_name || "").localeCompare(String(b.task_name || b.project_name || ""));
  });
}

function getDisplayTaskName(project){
  return String(project?.task_name || project?.project_name || project?.task_code || project?.project_code || "未命名项目").trim();
}

function buildTitlePreview(names){
  const clean = names.filter(Boolean);
  if(clean.length <= 3){
    return clean.join("、");
  }
  return `${clean.slice(0, 3).join("、")} 等${clean.length}项`;
}

async function buildTaskNoticeItems(){
  const user = getCurrentUser();
  const memberId = String(user.memberId || "").trim();
  const role = String(user.role || "").trim().toLowerCase();

  if(!memberId) return { items: [], signature: "" };

  const now = Date.now();
  if(
    noticeCache.memberId === memberId &&
    noticeCache.role === role &&
    now - noticeCache.at < 15000
  ){
    return {
      items: noticeCache.items,
      signature: noticeCache.signature
    };
  }

  const [
    projectsResult,
    partsResult,
    singersResult
  ] = await Promise.all([
    client
      .from("projects")
      .select("id, task_code, task_name, project_code, project_name, release_date, lyrics_lottery_enabled"),
    client
      .from("project_parts")
      .select("id, project_id, part_order, original_name, assigned_member_id"),
    client
      .from("project_singers")
      .select("id, project_id, member_id")
  ]);

  if(projectsResult.error) throw projectsResult.error;
  if(partsResult.error) throw partsResult.error;
  if(singersResult.error) throw singersResult.error;

  const partMap = new Map();
  const singerMap = new Map();

  (partsResult.data || []).forEach(part => {
    const key = String(part.project_id || "");
    if(!partMap.has(key)) partMap.set(key, []);
    partMap.get(key).push({
      id: String(part.id || ""),
      part_order: part.part_order || 0,
      original_name: String(part.original_name || "").trim(),
      assigned_member_id: String(part.assigned_member_id || "").trim()
    });
  });

  (singersResult.data || []).forEach(singer => {
    const key = String(singer.project_id || "");
    if(!singerMap.has(key)) singerMap.set(key, []);
    singerMap.get(key).push({
      id: String(singer.id || ""),
      member_id: String(singer.member_id || "").trim()
    });
  });

  const lotteryProjects = [];

  (projectsResult.data || []).forEach(project => {
    const projectId = String(project.id || "");
    const parts = sortParts(partMap.get(projectId) || []);
    const singers = singerMap.get(projectId) || [];

    const isSingerInTask = singers.some(item => item.member_id === memberId)
      || parts.some(row => row.assigned_member_id === memberId);

    const assignedRowsForCurrentMember = parts.filter(row => row.assigned_member_id === memberId);
    const hasUnassignedRows = parts.some(row => !String(row.assigned_member_id || "").trim());

    const shouldDrawNow = !!project.lyrics_lottery_enabled
      && isSingerInTask
      && hasUnassignedRows
      && assignedRowsForCurrentMember.length === 0;

    if(shouldDrawNow){
      lotteryProjects.push(project);
    }
  });

  const sortedLottery = sortProjectsByUrgency(lotteryProjects);
  const lotteryNames = sortedLottery.map(getDisplayTaskName);

  const items = [];

  if(sortedLottery.length > 0){
    items.push({
      icon: "🎲",
      main: `抽签待处理：${sortedLottery.length} 项`,
      sub: `已开启抽签，等待你抽签：${buildTitlePreview(lotteryNames)}`
    });
  }

  const signature = buildNoticeSignature(items);

  noticeCache = {
    at: now,
    memberId,
    role,
    items,
    signature
  };

  return {
    items,
    signature
  };
}

async function renderNotices(){
  if(!isLoggedIn()){
    noticeState = { signature: "", items: [] };
    noticeList.innerHTML = `<div class="noticeEmpty">登录后可查看通知</div>`;
    bellBtn.classList.remove("has-notice");
    return;
  }

  try{
    const result = await buildTaskNoticeItems();
    const items = result.items || [];
    const signature = result.signature || "";
    noticeState = { signature, items };

    if(!items.length){
      noticeList.innerHTML = `<div class="noticeEmpty">暂时还没有新的通知</div>`;
      bellBtn.classList.remove("has-notice");
      return;
    }

    const ackSignature = getAckSignature();
    const hasUnread = signature && signature !== ackSignature;
    bellBtn.classList.toggle("has-notice", hasUnread);

    noticeList.innerHTML = items.map(item => `
      <div class="noticeItem">
        <div class="noticeIcon">${escapeHtml(item.icon || "🔔")}</div>
        <div class="noticeText">
          <div class="noticeMain">${escapeHtml(item.main || "")}</div>
          <div class="noticeSub">${escapeHtml(item.sub || "")}</div>
        </div>
      </div>
    `).join("");
  }catch(err){
    console.error("读取首页通知失败：", err);
    noticeState = { signature: "", items: [] };
    noticeList.innerHTML = `<div class="noticeEmpty">通知读取失败，请稍后再试</div>`;
    bellBtn.classList.remove("has-notice");
  }
}

function normalizeLoginInput(value){
  return String(value || "")
    .replace(/\u3000/g, " ")
    .trim();
}

async function login(){
  const nicknameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const msg = document.getElementById("loginMessage");

  const nickname = normalizeLoginInput(nicknameInput.value);
  const key = normalizeLoginInput(passwordInput.value);

  msg.innerText = "";
  msg.style.color = "#8b4a2d";

  if(!nickname || !key){
    msg.innerText = "还没填写完整呢";
    return;
  }

  try{
    const { data, error } = await client.rpc("verify_member_login", {
      input_nickname: nickname,
      input_code: key
    });

    if(error){
      console.error("KEY 登录失败：", error);
      msg.innerText = `登录检查失败：${error.message || "请稍后再试"}`;
      return;
    }

    if(!Array.isArray(data) || data.length === 0){
      msg.innerText = "没有找到你的记录哎";
      return;
    }

    const user = data[0] || {};

    localStorage.setItem("room10LoggedIn", "true");
    localStorage.setItem("room10User", user.nickname || nickname);
    localStorage.setItem("room10Role", user.role || "member");
    localStorage.setItem("room10MemberId", user.member_id || user.id || "");

    noticeCache.at = 0;

    let roleMessage = "登录成功";
    if(user.role === "owner"){
      roleMessage = "维修工已上线";
    }else if(user.role === "admin"){
      roleMessage = "管理员已上线";
    }else if(user.role === "member"){
      roleMessage = "成员已登录";
    }else if(user.role === "applying"){
      roleMessage = "当前身份为申请中";
    }

    msg.style.color = "#5f7d3a";
    msg.innerText = roleMessage;

    await safeSyncHomeUI();

    setTimeout(() => {
      const targetPage = getPendingRedirect();

      nicknameInput.value = "";
      passwordInput.value = "";
      closeLogin(true);

      if(targetPage){
        clearPendingRedirect();
        window.location.href = targetPage;
        return;
      }
    }, 700);
  }catch(e){
    console.error("login() 查询异常：", e);
    msg.style.color = "#8b4a2d";
    msg.innerText = `登录失败：${e?.message || "请稍后再试"}`;
  }
}

/* ===== 四季特效 ===== */
function getSeasonByMonth(){
  const month = new Date().getMonth() + 1;
  if(month >= 3 && month <= 5) return "spring";
  if(month >= 6 && month <= 8) return "summer";
  if(month >= 9 && month <= 11) return "autumn";
  return "winter";
}

function getSeasonConfig(season){
  const configs = {
    spring: {
      count: 24,
      driftX: 0.55,
      speedMin: 0.35,
      speedMax: 0.95,
      sizeMin: 5,
      sizeMax: 11,
      alphaMin: 0.45,
      alphaMax: 0.78
    },
    summer: {
      count: 18,
      driftX: 0.28,
      speedMin: 0.12,
      speedMax: 0.34,
      sizeMin: 2,
      sizeMax: 5,
      alphaMin: 0.2,
      alphaMax: 0.5
    },
    autumn: {
      count: 22,
      driftX: 0.72,
      speedMin: 0.45,
      speedMax: 1.15,
      sizeMin: 6,
      sizeMax: 12,
      alphaMin: 0.42,
      alphaMax: 0.82
    },
    winter: {
      count: 34,
      driftX: 0.25,
      speedMin: 0.28,
      speedMax: 0.82,
      sizeMin: 2,
      sizeMax: 6,
      alphaMin: 0.42,
      alphaMax: 0.82
    }
  };
  return configs[season] || configs.spring;
}

function createSeasonParticle(width, height, season){
  const cfg = getSeasonConfig(season);
  const size = cfg.sizeMin + Math.random() * (cfg.sizeMax - cfg.sizeMin);
  return {
    x: Math.random() * width,
    y: Math.random() * height,
    size,
    alpha: cfg.alphaMin + Math.random() * (cfg.alphaMax - cfg.alphaMin),
    speedY: cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin),
    speedX: (Math.random() - 0.5) * cfg.driftX,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.004 + Math.random() * 0.012,
    rotation: Math.random() * Math.PI * 2,
    rotationSpeed: (Math.random() - 0.5) * 0.03,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: 0.02 + Math.random() * 0.035
  };
}

function resetSeasonParticle(p, width, height, season, fromTop = true){
  const fresh = createSeasonParticle(width, height, season);
  Object.assign(p, fresh);
  p.x = Math.random() * width;
  p.y = fromTop ? (-20 - Math.random() * 80) : (Math.random() * height);
}

function drawSpringParticle(ctx, p){
  ctx.rotate(p.rotation);
  const s = p.size;
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = "rgba(255, 186, 210, 0.95)";
  ctx.beginPath();
  ctx.ellipse(-s * 0.35, -s * 0.1, s * 0.55, s * 0.36, -0.75, 0, Math.PI * 2);
  ctx.ellipse(s * 0.18, -s * 0.28, s * 0.52, s * 0.34, 0.15, 0, Math.PI * 2);
  ctx.ellipse(s * 0.28, s * 0.18, s * 0.5, s * 0.32, 0.85, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(255, 235, 170, 0.9)";
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSummerParticle(ctx, p){
  const glow = 0.55 + Math.sin(p.pulse) * 0.18;
  ctx.globalAlpha = p.alpha * glow;
  const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 4.2);
  gradient.addColorStop(0, "rgba(255, 245, 165, 0.95)");
  gradient.addColorStop(0.28, "rgba(255, 234, 125, 0.45)");
  gradient.addColorStop(1, "rgba(255, 234, 125, 0)");
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(0, 0, p.size * 4.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = Math.min(1, p.alpha + 0.18);
  ctx.fillStyle = "rgba(255, 251, 196, 0.96)";
  ctx.beginPath();
  ctx.arc(0, 0, p.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawAutumnParticle(ctx, p){
  ctx.rotate(p.rotation);
  const s = p.size;
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = "rgba(201, 117, 45, 0.92)";
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.95);
  ctx.bezierCurveTo(s * 0.95, -s * 0.55, s * 0.85, s * 0.45, 0, s * 0.92);
  ctx.bezierCurveTo(-s * 0.86, s * 0.45, -s * 0.95, -s * 0.55, 0, -s * 0.95);
  ctx.fill();

  ctx.strokeStyle = "rgba(128, 78, 30, 0.75)";
  ctx.lineWidth = Math.max(0.8, s * 0.12);
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.72);
  ctx.lineTo(0, s * 0.78);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawWinterParticle(ctx, p){
  ctx.rotate(p.rotation);
  const s = p.size;
  ctx.globalAlpha = p.alpha;
  ctx.strokeStyle = "rgba(255,255,255,0.92)";
  ctx.lineWidth = Math.max(0.8, s * 0.14);

  for(let i = 0; i < 3; i++){
    const angle = (Math.PI / 3) * i;
    const x = Math.cos(angle) * s * 1.5;
    const y = Math.sin(angle) * s * 1.5;
    ctx.beginPath();
    ctx.moveTo(-x, -y);
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  ctx.globalAlpha = p.alpha * 0.65;
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.38, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.fill();
  ctx.globalAlpha = 1;
}

function initSeasonEffect(){
  const canvas = document.getElementById("seasonLayer");
  const stage = document.getElementById("homeStage");
  if(!canvas || !stage) return;

  if(seasonEffectState.rafId){
    cancelAnimationFrame(seasonEffectState.rafId);
  }
  if(seasonEffectState.onResize){
    window.removeEventListener("resize", seasonEffectState.onResize);
  }

  const ctx = canvas.getContext("2d");
  if(!ctx) return;

  const season = getSeasonByMonth();
  const particles = [];
  let rafId = 0;

  function resizeSeasonCanvas(){
    const rect = stage.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    const drawWidth = rect.width;
    const drawHeight = rect.height;

    if(particles.length === 0){
      const cfg = getSeasonConfig(season);
      for(let i = 0; i < cfg.count; i++){
        particles.push(createSeasonParticle(drawWidth, drawHeight, season));
      }
    }else{
      particles.forEach(p => {
        p.x = Math.min(Math.max(p.x, 0), drawWidth);
        p.y = Math.min(Math.max(p.y, -40), drawHeight + 40);
      });
    }
  }

  function drawSeasonParticle(p){
    ctx.save();
    ctx.translate(p.x, p.y);

    if(season === "spring"){
      drawSpringParticle(ctx, p);
    }else if(season === "summer"){
      drawSummerParticle(ctx, p);
    }else if(season === "autumn"){
      drawAutumnParticle(ctx, p);
    }else{
      drawWinterParticle(ctx, p);
    }

    ctx.restore();
  }

  function stepSeason(){
    const rect = stage.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;

    ctx.clearRect(0, 0, width, height);

    if(season === "spring"){
      ctx.fillStyle = "rgba(255, 219, 233, 0.05)";
      ctx.fillRect(0, 0, width, height);
    }else if(season === "summer"){
      ctx.fillStyle = "rgba(255, 236, 166, 0.03)";
      ctx.fillRect(0, 0, width, height);
    }else if(season === "autumn"){
      ctx.fillStyle = "rgba(214, 154, 82, 0.04)";
      ctx.fillRect(0, 0, width, height);
    }else{
      ctx.fillStyle = "rgba(215, 235, 255, 0.035)";
      ctx.fillRect(0, 0, width, height);
    }

    for(const p of particles){
      p.sway += p.swaySpeed;
      p.pulse += p.pulseSpeed;
      p.rotation += p.rotationSpeed;

      if(season === "summer"){
        p.x += Math.sin(p.sway) * 0.18 + p.speedX * 0.2;
        p.y += p.speedY * 0.25;
        if(p.pulse > Math.PI * 2) p.pulse -= Math.PI * 2;
      }else if(season === "winter"){
        p.x += Math.sin(p.sway) * 0.35 + p.speedX * 0.28;
        p.y += p.speedY * 0.72;
      }else if(season === "autumn"){
        p.x += Math.sin(p.sway) * 0.7 + p.speedX;
        p.y += p.speedY;
      }else{
        p.x += Math.sin(p.sway) * 0.58 + p.speedX;
        p.y += p.speedY * 0.86;
      }

      if(p.y > height + 26 || p.x < -40 || p.x > width + 40){
        resetSeasonParticle(p, width, height, season, true);
      }

      drawSeasonParticle(p);
    }

    rafId = requestAnimationFrame(stepSeason);
    seasonEffectState.rafId = rafId;
  }

  const onResize = () => resizeSeasonCanvas();
  resizeSeasonCanvas();
  stepSeason();
  window.addEventListener("resize", onResize);
  seasonEffectState.onResize = onResize;
}

document.getElementById("username").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    login();
  }
});

document.getElementById("password").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    login();
  }
});

bindHomeImageLoadOnce();
updateHomeImageByTime();

if(homeImg.complete && homeImg.naturalWidth){
  applyCurrentHomeBackground();
  initSeasonEffect();
}

safeSyncHomeUI();
</script>
