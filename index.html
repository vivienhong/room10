<style>

  --muted:#8e7c68;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

/* ===== 首页舞台 ===== */
#home{

  height:100vh;
  height:100dvh;

  justify-content:center;

}

#homeImage{

  max-height:100vh;

  height:auto;

  -webkit-user-drag:none;

  justify-content:flex-end;

}

#topActions.show{

}

#topUserWrap{
  position:relative;

}

#topUserBar{

#bellBtn{

  padding:0;
  font-size:14px;

#bellBtn:hover,

#noticePanel{

<script>
const supabaseUrl = "https://tfevitwoqmxwaguvtyms.supabase.co";
const supabaseKey = "sb_publishable_0cFYhwx_9uEcrXnMJzzNMQ_cEng8xmI";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const homeImg = document.getElementById("homeImage");
const topActions = document.getElementById("topActions");
const currentUserBadge = document.getElementById("currentUserBadge");
const bellBtn = document.getElementById("bellBtn");
const noticePanel = document.getElementById("noticePanel");
const noticeList = document.getElementById("noticeList");
const noticeClearBtn = document.getElementById("noticeClearBtn");

const NOTICE_STORAGE_KEY = "room10_global_notices_v1";
const PENDING_REDIRECT_KEY = "room10_pending_redirect";


function getPendingRedirect(){
  return sessionStorage.getItem(PENDING_REDIRECT_KEY) || "";
}

function setPendingRedirect(page){
  const safePage = String(page || "").trim();
  if(!safePage) return;
  sessionStorage.setItem(PENDING_REDIRECT_KEY, safePage);
}

function clearPendingRedirect(){
  sessionStorage.removeItem(PENDING_REDIRECT_KEY);
}

function goRegisterFromIndex(){
  sessionStorage.setItem("room10RegisterReturn", "index.html");
  window.location.href = "register.html?from=index.html";
}

function updateHomeImageByTime(){
  const hour = new Date().getHours();
  const nextSrc = (hour >= 18 || hour < 6) ? "home-night.png" : "home-day.png";
  if(homeImg.getAttribute("src") !== nextSrc){
    homeImg.src = nextSrc;
  }
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}
function mixColor(a, b, t){
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t)
  };
}
function colorToCss(c){
  return `rgb(${c.r}, ${c.g}, ${c.b})`;
}
function lighten(c, amt){
  return {
    r: clamp(c.r + amt, 0, 255),
    g: clamp(c.g + amt, 0, 255),
    b: clamp(c.b + amt, 0, 255)
  };
}
function saturate(c, factor){
  const avg = (c.r + c.g + c.b) / 3;
  return {
    r: clamp(Math.round(avg + (c.r - avg) * factor), 0, 255),
    g: clamp(Math.round(avg + (c.g - avg) * factor), 0, 255),
    b: clamp(Math.round(avg + (c.b - avg) * factor), 0, 255)
  };
}
function sampleRectAverage(ctx, x, y, w, h){
  const data = ctx.getImageData(x, y, w, h).data;
  let r = 0, g = 0, b = 0, count = 0;
  for(let i = 0; i < data.length; i += 4){
    const alpha = data[i + 3];
    if(alpha < 8) continue;
    r += data[i];
    g += data[i + 1];
    b += data[i + 2];
    count++;
  }
  if(count === 0){
    return { r:225, g:233, b:230 };
  }
  return {
    r: Math.round(r / count),
    g: Math.round(g / count),
    b: Math.round(b / count)
  };
}
function applyBetterHomeBackground(img){
  const w = img.naturalWidth;
  const h = img.naturalHeight;
  if(!w || !h) return;

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0, w, h);

  const sideW = Math.max(12, Math.round(w * 0.08));
  const upperH = Math.max(12, Math.round(h * 0.42));
  const lowerH = Math.max(12, Math.round(h * 0.22));

  const leftSky = sampleRectAverage(ctx, 0, 0, sideW, upperH);
  const rightSky = sampleRectAverage(ctx, w - sideW, 0, sideW, upperH);
  const leftGround = sampleRectAverage(ctx, 0, h - lowerH, sideW, lowerH);
  const rightGround = sampleRectAverage(ctx, w - sideW, h - lowerH, sideW, lowerH);

  let skyColor = mixColor(leftSky, rightSky, 0.5);
  let groundColor = mixColor(leftGround, rightGround, 0.5);

  skyColor = saturate(lighten(skyColor, 12), 1.08);
  groundColor = saturate(lighten(groundColor, 8), 1.05);

  document.body.style.background = `
    linear-gradient(
      180deg,
      ${colorToCss(skyColor)} 0%,
      ${colorToCss(mixColor(skyColor, groundColor, 0.35))} 48%,
      ${colorToCss(groundColor)} 100%
    )
  `;
}
function applyCurrentHomeBackground(){
  if(homeImg.complete && homeImg.naturalWidth){
    try{
      applyBetterHomeBackground(homeImg);
    }catch(err){
      console.warn("背景采样失败：", err);
    }
  }else{
    homeImg.addEventListener("load", () => {
      try{
        applyBetterHomeBackground(homeImg);
      }catch(err){
        console.warn("背景采样失败：", err);
      }
    }, { once:true });
  }
}

function isLoggedIn(){
  return localStorage.getItem("room10LoggedIn") === "true";
}

function getCurrentUser(){
  return {
    nickname: localStorage.getItem("room10User") || "",
    role: localStorage.getItem("room10Role") || "",
    memberId: localStorage.getItem("room10MemberId") || ""
  };
}

function getRoleLabel(role){
  const map = {
    owner: "维修工",
    admin: "管理员",
    member: "成员",
    applying: "申请中",
    visitor: "游客"
  };
  return map[String(role || "visitor").toLowerCase()] || "游客";
}

function updateIdentityDisplay(){
  const textEl = currentUserBadge?.querySelector(".identityText");
  if(!textEl) return;
  if(isLoggedIn()){
    const user = getCurrentUser();
    textEl.textContent = `${user.nickname || "未登录"} · ${getRoleLabel(user.role)}`;
  }else{
    textEl.textContent = "未登录 · 游客";
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

/* ===== 全站通知：统一存储 ===== */
function normalizeNoticeItem(item){
  return {
    id: String(item?.id || `notice_${Date.now()}_${Math.random().toString(36).slice(2,8)}`),
    icon: String(item?.icon || "🔔"),
    main: String(item?.main || ""),
    sub: String(item?.sub || ""),
    time: Number(item?.time || Date.now()),
    read: Boolean(item?.read)
  };
}

function readStoredNotices(){
  try{
    const raw = localStorage.getItem(NOTICE_STORAGE_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return [];
    return parsed.map(normalizeNoticeItem).sort((a,b) => b.time - a.time);
  }catch(err){
    console.warn("读取通知失败：", err);
    return [];
  }
}

function writeStoredNotices(list){
  try{
    localStorage.setItem(NOTICE_STORAGE_KEY, JSON.stringify(list));
  }catch(err){
    console.warn("写入通知失败：", err);
  }
}

function ensureDefaultNotice(){
  if(!isLoggedIn()) return;

  const user = getCurrentUser();
  const current = readStoredNotices();

  const exists = current.some(item =>
    item.main === `欢迎回来，${user.nickname || "室友"}` &&
    item.sub === `当前身份：${getRoleLabel(user.role)}`
  );

  if(exists) return;

  const next = [
    normalizeNoticeItem({
      icon:"🏠",
      main:`欢迎回来，${user.nickname || "室友"}`,
      sub:`当前身份：${getRoleLabel(user.role)}`,
      time:Date.now(),
      read:false
    }),
    ...current
  ].slice(0, 50);

  writeStoredNotices(next);
}

function getNotices(){
  if(!isLoggedIn()) return [];
  return readStoredNotices();
}

function markAllNoticesRead(){
  const current = readStoredNotices();
  const next = current.map(item => ({ ...item, read:true }));
  writeStoredNotices(next);
  renderNotices();
}

function addGlobalNotice({icon="🔔", main="", sub="", read=false}){
  const current = readStoredNotices();
  const next = [
    normalizeNoticeItem({
      icon,
      main,
      sub,
      read,
      time:Date.now()
    }),
    ...current
  ].slice(0, 50);

  writeStoredNotices(next);
  renderNotices();
}

function renderNotices(){
  const notices = getNotices();

  if(!Array.isArray(notices) || notices.length === 0){
    noticeList.innerHTML = `<div class="noticeEmpty">暂时还没有新的通知</div>`;
    bellBtn.classList.remove("has-notice");
    return;
  }

  const hasUnread = notices.some(item => !item.read);
  bellBtn.classList.toggle("has-notice", hasUnread);

  noticeList.innerHTML = notices.map(item => `
    <div class="noticeItem">
      <div class="noticeIcon">${escapeHtml(item.icon || "🔔")}</div>
      <div class="noticeText">
        <div class="noticeMain">${escapeHtml(item.main || "")}</div>
        <div class="noticeSub">${escapeHtml(item.sub || "")}</div>
      </div>
    </div>
  `).join("");
}

function openNoticePanel(){
  noticePanel.classList.add("show");
  bellBtn.classList.add("active");
}

function closeNoticePanel(){
  noticePanel.classList.remove("show");
  bellBtn.classList.remove("active");
}

function toggleNoticePanel(){
  if(noticePanel.classList.contains("show")){
    closeNoticePanel();
  }else{
    openNoticePanel();
  }
}

function updateLogoutDisplay(){
  if(isLoggedIn()){
    topActions.classList.add("show");
    ensureDefaultNotice();
  }else{
    topActions.classList.remove("show");
    closeNoticePanel();
  }
  updateIdentityDisplay();
  renderNotices();
}

function safeSyncHomeUI(){
  try{
    updateLogoutDisplay();
    updateHomeImageByTime();
    applyCurrentHomeBackground();
  }catch(err){
    console.warn("safeSyncHomeUI 失败：", err);
    updateLogoutDisplay();
  }
}

window.addEventListener("pageshow", safeSyncHomeUI);
window.addEventListener("focus", safeSyncHomeUI);
document.addEventListener("visibilitychange", () => {
  if(!document.hidden){
    safeSyncHomeUI();
  }
});
window.addEventListener("storage", (e) => {
  if(
    e.key === "room10LoggedIn" ||
    e.key === "room10User" ||
    e.key === "room10Role" ||
    e.key === "room10MemberId" ||
    e.key === NOTICE_STORAGE_KEY
  ){
    safeSyncHomeUI();
  }
});

if(bellBtn){
  bellBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleNoticePanel();
  });
}

if(noticePanel){
  noticePanel.addEventListener("click", (e) => {
    e.stopPropagation();
  });
}

if(noticeClearBtn){
  noticeClearBtn.addEventListener("click", () => {
    markAllNoticesRead();
  });
}

document.addEventListener("click", (e) => {
  const wrap = document.getElementById("topUserWrap");
  if(!wrap) return;
  if(!wrap.contains(e.target)){
    closeNoticePanel();
  }
});

function handleLogout(){
  localStorage.removeItem("room10LoggedIn");
  localStorage.removeItem("room10User");
  localStorage.removeItem("room10Role");
  localStorage.removeItem("room10MemberId");
  localStorage.removeItem("room10ApplicantSession");
  localStorage.removeItem("room10ApplicationDraft");

  closeNoticePanel();
  safeSyncHomeUI();
  closeLogin();
  window.location.href = "index.html";
}

function handleLogoutHotspot(){
  handleLogout();
}

function handleDoorClick(){
  if(isLoggedIn()){
    return;
  }
  openLogin();
}

async function login(){
  const nicknameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const msg = document.getElementById("loginMessage");

  const nickname = nicknameInput.value.trim();
  const key = passwordInput.value.trim();

  msg.innerText = "";
  msg.style.color = "#8b4a2d";

  if(!nickname || !key){
    msg.innerText = "还没填写完整呢";
    return;
  }

  try{
    const { data, error } = await client.rpc("verify_member_login", {
      input_nickname: nickname,
      input_code: key
    });

    if(error){
      console.error("KEY 登录失败：", error);
      msg.innerText = "登录检查失败，请稍后再试";
      return;
    }

    if(!Array.isArray(data) || !data.length){
      msg.innerText = "没有找到你的记录哎";
      return;
    }

    const user = data[0];

    localStorage.setItem("room10LoggedIn", "true");
    localStorage.setItem("room10User", user.nickname || nickname);
    localStorage.setItem("room10Role", user.role || "member");
    localStorage.setItem("room10MemberId", user.member_id || "");

    let roleMessage = "欢迎回家";
    if(user.role === "owner"){
      roleMessage = "维修工已上线";
    }else if(user.role === "admin"){
      roleMessage = "宿管已上线";
    }else if(user.role === "member"){
      roleMessage = "欢迎室友回家";
    }else if(user.role === "applying"){
      roleMessage = "当前身份为申请中";
    }

    msg.style.color = "#5f7d3a";
    msg.innerText = roleMessage;

    addGlobalNotice({
      icon:"✨",
      main: roleMessage,
      sub:`欢迎你回来，${user.nickname || "室友"}`
    });

    safeSyncHomeUI();

    setTimeout(() => {
      const targetPage = getPendingRedirect();

      nicknameInput.value = "";
      passwordInput.value = "";
      closeLogin(true);

      if(targetPage){
        clearPendingRedirect();
        window.location.href = targetPage;
        return;
      }
    }, 700);
  }catch(e){
    console.error("login() 查询异常：", e);
    msg.style.color = "#8b4a2d";
    msg.innerText = "登录失败，请稍后再试";
  }
}

function openLogin(targetPage = ""){
  if(isLoggedIn()){
    if(targetPage){
      window.location.href = targetPage;
    }
    return;
  }

  if(targetPage){
    setPendingRedirect(targetPage);
  }

  document.getElementById("loginUI").classList.add("show");
  document.getElementById("loginMessage").innerText = "";
}

function closeLogin(keepRedirect = true){
  document.getElementById("loginUI").classList.remove("show");
  document.getElementById("loginMessage").innerText = "";

  if(!keepRedirect){
    clearPendingRedirect();
  }
}

function enterRoom(page, needLogin){
  if(needLogin && !isLoggedIn()){
    setPendingRedirect(page);
    openLogin(page);
    return;
  }

  if(page === "flower.html" || page === "pets.html"){
    if(!isLoggedIn()){
      window.location.href = page + "?mode=guest";
      return;
    }
  }

  clearPendingRedirect();
  window.location.href = page;
}

function togglePassword(){
  const p = document.getElementById("password");
  p.type = (p.type === "password") ? "text" : "password";
}

document.getElementById("username").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    login();
  }
});
document.getElementById("password").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    login();
  }
});

updateHomeImageByTime();
applyCurrentHomeBackground();
safeSyncHomeUI();
</script>
