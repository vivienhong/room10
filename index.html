<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Room10</title>

<style>

body{
    margin:0;
    background:#000;
}

/* 首页容器 */
#home{
    position:relative;
    width:100%;
    max-width:1400px;
    margin:auto;
}

/* 首页图片 */
#home img{
    width:100%;
    display:block;
}

/* 热区层 */
#map{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

</style>

</head>

<body>

<div id="home">

<img id="homeImage" src="home-day.png">

<svg id="map" viewBox="0 0 100 100" preserveAspectRatio="none">

<!-- 宿管室热区 -->
<a href="manager.html">

<rect
x="66"
y="62"
width="25"
height="26"
fill="transparent"
/>

</a>

</svg>

</div>

<script>

/* 日夜自动切换 */

const hour = new Date().getHours()
const img = document.getElementById("homeImage")

if(hour >= 18 || hour < 6){
    img.src = "home-night.png"
}else{
    img.src = "home-day.png"
}

</script>

</body>
</html>
