<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Room10 Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Room10 Studio 成员</h1>

<ul id="members"></ul>

<script>

const supabaseUrl = "https://tfevitwoqmxwaguvtyms.supabase.co"

const supabaseKey = "sb_publishable_0cFYhwx_9uEcrXnMJzzNMQ_cEng8xmI"

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function loadMembers() {

  const { data, error } = await client
    .from('members')
    .select('*')

  if(error){
    console.log(error)
  }

  const list = document.getElementById("members")

  data.forEach(member => {

    const li = document.createElement("li")

    li.textContent = member.name + " - " + member.role

    list.appendChild(li)

  })

}

loadMembers()

</script>

</body>
</html>
