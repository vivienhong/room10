<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room10</title>

<style>
  body{
    margin:0;
    background:#000;
  }

  #home{
    position:relative;
    width:100%;
    max-width:1400px;
    margin:0 auto;
  }

  #home img{
    width:100%;
    display:block;
  }

  #map{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:2;
  }

  #map a{
    cursor:pointer;
  }
</style>
</head>

<body>

<div id="home">
  <img id="homeImage" src="home-day.png" alt="Room10 首页">

  <svg id="map" viewBox="0 0 100 100" preserveAspectRatio="none">

    <!-- 宿管室热区：测试版，先显示红色方便确认 -->
    <a href="manager.html">
      <rect
        x="66"
        y="62"
        width="25"
        height="26"
        fill="rgba(255,0,0,0.25)"
      />
    </a>

  </svg>
</div>

<script>
  const hour = new Date().getHours();
  const img = document.getElementById("homeImage");

  if (hour >= 18 || hour < 6) {
    img.src = "home-night.png";
  } else {
    img.src = "home-day.png";
  }
</script>

</body>
</html>
