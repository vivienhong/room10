<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Room10 Studio</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f6f6f6;
    text-align:center;
}

/* 首页容器 */
#home{
    position:relative;
    max-width:1200px;
    margin:auto;
}

/* 首页背景图 */
#home img{
    width:100%;
    display:block;
}

/* 标题 */
.title{
    position:absolute;
    top:20px;
    left:0;
    right:0;
    font-size:36px;
    font-weight:bold;
    color:white;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

/* 登录按钮 */
.login-btn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#ffcc66;
    padding:12px 26px;
    border-radius:10px;
    font-size:18px;
    text-decoration:none;
    color:black;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

.login-btn:hover{
    background:#ffd98f;
}

</style>

</head>

<body>

<div id="home">

<div class="title">Room10 Studio</div>

<img id="homeImage" src="home-day.png">

<a class="login-btn" href="login.html">成员登录</a>

</div>

<script>

/* 自动判断时间切换日夜 */

const hour = new Date().getHours()
const img = document.getElementById("homeImage")

if(hour >= 18 || hour < 6){
    img.src = "home-night.png"
}else{
    img.src = "home-day.png"
}

</script>

</body>

</html>
