<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜项目委托</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *{box-sizing:border-box;}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(circle at top left, color-mix(in srgb, #e5ddd1 82%, white 18%) 0%, transparent 36%),
      radial-gradient(circle at top right, color-mix(in srgb, #e1d7ca 80%, white 20%) 0%, transparent 38%),
      linear-gradient(180deg,#e7dfd4 0%, #e2d8cb 52%, #ddd4c8 100%);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  #room{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:#e7dfd4;
  }

  #bgFrame{
    position:absolute;
    inset:0;
    z-index:0;
    overflow:hidden;
    background:none;
  }

  #bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    display:block;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
  }

  #overlay{
    position:absolute;
    inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
    --ui-scale:1;
    --overlay-ui-scale:var(--ui-scale);
    --project-panel-scale:var(--ui-scale);
    --project-radius-lg:calc(30px * var(--ui-scale));
    --project-radius-md:calc(20px * var(--ui-scale));
    --project-radius-sm:calc(14px * var(--ui-scale));
    --project-gap-xs:calc(5px * var(--ui-scale));
    --project-gap-sm:calc(8px * var(--ui-scale));
    --project-gap-md:calc(12px * var(--ui-scale));
    --project-gap-lg:calc(16px * var(--ui-scale));
    --project-pad-xs:calc(8px * var(--ui-scale));
    --project-pad-sm:calc(10px * var(--ui-scale));
    --project-pad-md:calc(12px * var(--ui-scale));
    --project-pad-lg:calc(14px * var(--ui-scale));
    --project-pad-xl:calc(18px * var(--ui-scale));
    --project-font-xs:calc(10px * var(--ui-scale));
    --project-font-sm:calc(11px * var(--ui-scale));
    --project-font-md:calc(12px * var(--ui-scale));
    --project-font-base:calc(13px * var(--ui-scale));
    --project-font-lg:calc(15px * var(--ui-scale));
    --project-font-xl:calc(18px * var(--ui-scale));
    --project-font-hero:calc(20px * var(--ui-scale));
    --project-btn-h:calc(40px * var(--ui-scale));
  }

  #overlay *{
    pointer-events:auto;
  }

  :root{
    --top-chip-bg: rgba(255,252,247,0.86);
    --top-chip-border: rgba(160,116,78,0.12);
    --top-chip-shadow:
      inset 0 1px 0 rgba(255,255,255,0.96),
      0 3px 10px rgba(110,84,58,0.08);
  }

#topBar{
    position:absolute;
    left:28.2%;
    top:8.2%;
    width:41.0%;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    z-index:40;
    overflow:visible;
  }

#navOuter{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
  }

#navScroll{
    width:100%;
    overflow:visible;
    overflow-y:visible;
    white-space:nowrap;
    scrollbar-width:none;
    -ms-overflow-style:none;
    padding:6px;
    margin:-6px;
  }

#navScroll::-webkit-scrollbar{
    display:none;
  }

#roomNav{
    display:inline-flex;
    align-items:center;
    gap:var(--nav-gap, 10px);
    min-width:max-content;
    max-width:none;
    transform-origin:left top;
    will-change:auto;
  }

/* =========================================================
   身份组件：恢复 todo 奶油半透明标准样式
========================================================= */
#logoutBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:34px;
    min-width:34px;
    flex:0 0 34px;
    height:auto;
    min-height:auto;
    padding:0;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#67401f;
    font-size:var(--identity-logout-font, 10px);
    font-weight:800;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    order:3;
    align-self:stretch;
    overflow:hidden;
    line-height:1;
  }

#logoutBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

#topBarUserAnchor{
    position:absolute;
    right:7.35%;
    left:auto;
    top:8%;
    width:clamp(158px, 12.6vw, 196px);
    height:clamp(31px, 4.5vh, 38px);
    z-index:65;
    pointer-events:none;
  }

#topBarUserArea{
    --identity-font:calc(23px * var(--bg-ui-scale, 1));
    --identity-icon-font:calc(22px * var(--bg-ui-scale, 1));
    --identity-logout-font:calc(18px * var(--bg-ui-scale, 1));

    position:absolute;
    right:0;
    left:auto;
    top:0;
    display:inline-flex;
    align-items:stretch;
    justify-content:flex-end;
    gap:5px;
    width:max-content;
    min-width:100%;
    max-width:calc(100vw - 18px);
    height:100%;
    min-height:0;
    max-height:none;
    padding:4px 5px;
    border-radius:13px;
    background:rgba(255,248,239,0.92);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    text-align:center;
    pointer-events:auto;
    box-sizing:border-box;
    overflow:visible;
    transform:none;
    white-space:nowrap;
  }

#currentUserBadge{
    order:1;
    flex:0 0 auto;
    width:auto;
    min-width:max-content;
    height:auto;
    min-height:auto;
    padding:0 8px;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#6c4523;
    font-size:var(--identity-font);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    white-space:nowrap;
    overflow:visible;
    box-sizing:border-box;
    align-self:stretch;
  }

#currentUserBadge .identityText{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
    text-overflow:clip;
    text-align:left;
    white-space:nowrap;
    line-height:1;
    font-size:inherit;
  }

#siteNoticeWrap{
    position:relative;
    width:28px;
    height:auto;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    order:2;
    align-self:stretch;
    overflow:visible;
    flex:0 0 28px;
  }

#siteNoticeBtn{
    position:relative;
    width:100%;
    min-width:0;
    height:100%;
    padding:0;
    border:none;
    cursor:pointer;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#6c4523;
    font-size:var(--identity-icon-font, 11px);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    overflow:visible;
    box-sizing:border-box;
  }

#siteNoticeBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

#siteNoticeIcon{
    display:block;
    line-height:1;
    filter:drop-shadow(0 1px 0 rgba(255,255,255,0.55));
  }

#siteNoticeText{
    display:none;
  }

#siteNoticeCount{
    position:absolute;
    right:-6px;
    top:-6px;
    min-width:20px;
    height:20px;
    padding:0 6px;
    border-radius:999px;
    background:#c98c4f;
    color:#fff9f1;
    font-size:10px;
    font-weight:900;
    line-height:1;
    display:none;
    align-items:center;
    justify-content:center;
    border:2px solid rgba(255,248,239,0.98);
    box-sizing:border-box;
    box-shadow:0 2px 8px rgba(116,86,54,0.16);
    z-index:3;
  }

#siteNoticeBtn.hasNotice #siteNoticeCount{
    display:flex;
  }

#siteNoticePanel{
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    width:min(360px, 72vw);
    max-height:540px;
    overflow:auto;
    padding:12px;
    border-radius:16px;
    background:rgba(255,249,241,0.98);
    border:1px solid rgba(203,167,123,0.28);
    box-shadow:0 16px 36px rgba(85,58,34,0.16);
    display:none;
    z-index:80;
    text-align:left;
  }

  #siteNoticePanel.show{display:block;}
  .siteNoticeTitle{color:#6f4726;font-size:13px;font-weight:900;margin-bottom:calc(10px * var(--ui-scale));}
  .siteNoticeEmpty{color:#8a6644;font-size:12px;line-height:1.6;padding:6px 2px 2px;}
  .siteNoticeList{display:flex;flex-direction:column;gap:8px;}
  .siteNoticeItem{padding:10px;border-radius:12px;background:rgba(255,252,247,0.82);box-shadow:inset 0 1px 0 rgba(255,255,255,0.92), 0 2px 8px rgba(120,92,63,0.05);}
  .siteNoticeItemTitle{color:#6f4726;font-size:12px;font-weight:800;line-height:1.5;margin-bottom:4px;}
  .siteNoticeItemDesc{color:#8a6644;font-size:11px;line-height:1.55;margin-bottom:calc(10px * var(--ui-scale));}
  .siteNoticeAction{appearance:none;border:none;cursor:pointer;min-height:calc(31px * var(--ui-scale));padding:0 12px;border-radius:10px;background:linear-gradient(180deg,#efd5ab 0%, #dfbd8a 100%);color:#6a4120;font-size:11px;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,247,230,0.95), 0 4px 12px rgba(112,83,52,0.10);}

  #taskPanel{
    --task-panel-left:9.2%;
    --task-panel-top:18%;
    --task-panel-right:22.4%;
    --task-panel-bottom:12%;

    position:absolute;
    left:var(--task-panel-left);
    right:var(--task-panel-right);
    top:var(--task-panel-top);
    bottom:var(--task-panel-bottom);
    transform:none;
    transform-origin:top left;
    width:auto;
    height:auto;
    min-width:0;
    min-height:0;
    border-radius:var(--project-radius-lg);
    background:rgba(255,255,255,0.34);
    border:1px solid rgba(255,255,255,0.52);
    box-shadow:
      0 16px 42px rgba(122,96,68,0.10),
      inset 0 1px 0 rgba(255,255,255,0.62),
      inset 0 -1px 0 rgba(255,255,255,0.20);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    overflow:visible;
  }

  @media (min-width:1600px){
    #taskPanel{
      --task-panel-left:9.1%;
    }
  }

  #taskPanel::before{
    content:"";
    position:absolute;
    inset:calc(10px * var(--ui-scale));
    border-radius:calc(22px * var(--ui-scale));
    border:1px solid rgba(255,255,255,0.22);
    pointer-events:none;
  }

  .panelView{
    position:absolute;
    inset:0;
    padding:0;
  }

  #signupView{
    position:absolute;
    inset:0;
    padding:0;
  }

  #signupPanelInner{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    display:block;
  }

  #signupDetailPane{
    padding:calc(18px * var(--ui-scale)) calc(20px * var(--ui-scale)) calc(16px * var(--ui-scale));
    width:100%;
    height:100%;
    min-width:0;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  #signupHeader{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  #signupTitle{
    color:#6f4726;
    font-size:var(--project-font-hero);
    font-weight:800;
    line-height:1.15;
  }

  #signupStatus{
    flex:0 0 auto;
    padding:5px 10px;
    border-radius:999px;
    background:rgba(255,252,247,0.52);
    color:#7a5231;
    font-size:var(--project-font-md);
    font-weight:700;
    white-space:nowrap;
  }

  #signupBody{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding-right:2px;
    scrollbar-width:thin;
    scrollbar-color:rgba(175,135,98,0.55) transparent;
  }

  #signupBody::-webkit-scrollbar{
    width:8px;
  }
  #signupBody::-webkit-scrollbar-track{
    background:transparent;
  }
  #signupBody::-webkit-scrollbar-thumb{
    background:rgba(175,135,98,0.55);
    border-radius:999px;
  }

  .signupSection{
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .signupSectionTitle{
    color:#744a28;
    font-size:var(--project-font-lg);
    font-weight:800;
    margin:0 0 calc(7px * var(--ui-scale));
  }

  .sectionTitleRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:0 0 calc(7px * var(--ui-scale));
  }

  .sectionTitleRow .signupSectionTitle{
    margin:0;
  }

  .sectionTitleActions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    flex-wrap:wrap;
  }

  .roleToolBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    min-width:88px;
    height:30px;
    padding:0 12px;
    border-radius:10px;
    background:rgba(255,252,247,0.72);
    color:#744b25;
    font-size:var(--project-font-sm);
    font-weight:800;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 2px 6px rgba(116,86,54,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease, color .18s ease;
    white-space:nowrap;
  }

  .roleToolBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .roleToolBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
  }

  .roleToolBtn[hidden],
  .lotteryHintText[hidden]{
    display:none !important;
  }

  .lotteryHintText{
    color:#8a6644;
    font-size:var(--project-font-sm);
    font-weight:700;
    line-height:1.35;
  }

  .rowGridFour{
    display:grid;
    grid-template-columns:0.85fr 1.7fr 0.9fr 0.9fr;
    gap:calc(10px * var(--ui-scale));
    align-items:start;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .producerReleaseRow{
    display:grid;
    grid-template-columns:1.45fr 0.9fr;
    gap:calc(10px * var(--ui-scale));
    align-items:start;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .colCard{
    padding:calc(9px * var(--ui-scale)) calc(12px * var(--ui-scale));
    border-radius:12px;
    background:rgba(255,252,247,0.34);
    border:1px solid rgba(255,255,255,0.34);
    min-height:calc(66px * var(--ui-scale));
  }

  .colLabel{
    color:#8a6644;
    font-size:var(--project-font-sm);
    font-weight:700;
    margin-bottom:calc(5px * var(--ui-scale));
  }

  .colValue{
    color:#5f3b1d;
    font-size:var(--project-font-lg);
    font-weight:800;
  }

  .signupInput,
  .signupNumber,
  .signupDate,
  .assignInput,
  .originalInput{
    width:100%;
    border:none;
    outline:none;
    border-radius:10px;
    padding:calc(9px * var(--ui-scale)) calc(12px * var(--ui-scale));
    background:rgba(255,252,247,0.68);
    color:#5f3b1d;
    font-size:var(--project-font-base);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
  }

  .signupNumber[readonly]{
    cursor:default;
    opacity:1;
  }

  .typeBtnGroup{
    display:grid;
    grid-template-columns:repeat(5,minmax(0,1fr));
    gap:6px;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .typeBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    height:calc(36px * var(--ui-scale));
    border-radius:10px;
    background:rgba(255,252,247,0.56);
    color:#744b25;
    font-size:var(--project-font-base);
    font-weight:700;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      0 2px 6px rgba(116,86,54,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
  }

  .typeBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .typeBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
  }

  .memberPickerWrap{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:calc(9px * var(--ui-scale)) calc(12px * var(--ui-scale));
    border-radius:12px;
    background:rgba(255,252,247,0.34);
    border:1px solid rgba(255,255,255,0.34);
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .memberPickerLabel{
    color:#7a5231;
    font-size:var(--project-font-sm);
    font-weight:700;
  }

  .memberGrid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .memberBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    min-width:56px;
    height:calc(31px * var(--ui-scale));
    padding:0 10px;
    border-radius:10px;
    background:rgba(255,252,247,0.62);
    color:#6a4120;
    font-size:var(--project-font-base);
    font-weight:700;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 2px 6px rgba(116,86,54,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
  }

  .memberBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .memberBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
  }

  .memberEmpty{
    color:#92745a;
    font-size:11px;
    line-height:1.5;
    padding:2px 0;
  }

  .originalRoleBoard{
    border-radius:14px;
    background:rgba(255,252,247,0.34);
    border:1px solid rgba(255,255,255,0.34);
    overflow:hidden;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .originalRoleHeader,
  .originalRoleRow{
    display:grid;
    grid-template-columns:1fr 1.15fr 64px;
    gap:8px;
    align-items:center;
    padding:calc(9px * var(--ui-scale)) calc(12px * var(--ui-scale));
  }

  .originalRoleHeader{
    background:rgba(255,248,240,0.5);
    border-bottom:1px solid rgba(255,255,255,0.34);
  }

  .originalRoleHeader .headerCell{
    color:#7b5735;
    font-size:11px;
    font-weight:800;
  }

  .originalRoleRow + .originalRoleRow{
    border-top:1px solid rgba(255,255,255,0.22);
  }

  .rowActionBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    height:calc(31px * var(--ui-scale));
    border-radius:9px;
    background:rgba(255,252,247,0.62);
    color:#744b25;
    font-size:var(--project-font-sm);
    font-weight:700;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 2px 6px rgba(116,86,54,0.06);
  }

  .rowActionBtn:hover{
    transform:translateY(-1px);
  }

  .rewardGrid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    margin-bottom:calc(10px * var(--ui-scale));
  }

  .rewardCard{
    padding:calc(9px * var(--ui-scale)) calc(12px * var(--ui-scale));
    border-radius:12px;
    background:rgba(255,252,247,0.34);
    border:1px solid rgba(255,255,255,0.34);
  }

  .rewardLabel{
    color:#8a6644;
    font-size:var(--project-font-sm);
    font-weight:700;
    margin-bottom:4px;
  }

  .rewardValue{
    color:#5f3b1d;
    font-size:var(--project-font-lg);
    font-weight:800;
    line-height:1.45;
  }

  .rewardHint{
    display:block;
    margin-top:2px;
    color:#8a6644;
    font-size:11px;
    font-weight:600;
    line-height:1.5;
  }

  #signupFooter{
    display:flex;
    align-items:center;
    justify-content:flex-end;

  function createRow(initial = {}) {
    return {
      id: initial.id || `r${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
      original: String(initial.original || ""),
      assignedSingerId: String(initial.assignedSingerId || ""),
      assignedSingerName: String(initial.assignedSingerName || "")
    };

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function showToast(title, message) {
    toastTitle.textContent = title || "提示";
    toastMessage.textContent = message || "";
    toastMask.classList.add("show");
    toastMask.setAttribute("aria-hidden", "false");
  }

    toastMask.classList.remove("show");
    toastMask.setAttribute("aria-hidden", "true");
  }

  toastCloseBtn.addEventListener("click", closeToast);
  toastMask.addEventListener("click", (e) => {
    if (e.target === toastMask) closeToast();
  });

  function splitGold(totalGold) {
    const total = Math.max(0, Math.floor(Number(totalGold) || 0));
    const submit = Math.floor(total * TASK_PAYOUT.onSubmitRatio);
    const publish = total - submit;
    return { total, submit, publish };
  }

  function normalizeSingerCount(value) {
    const num = Math.floor(Number(value) || 1);
    return Math.min(99, Math.max(1, num));
  }

  function getSingerQuota() {
    const normalized = normalizeSingerCount(singerQuotaInput.value);
    if (String(normalized) !== String(singerQuotaInput.value)) {
      singerQuotaInput.value = String(normalized);
    }
    return normalized;
  }

  function getSingerRewardByCount(singerCount) {
    const count = normalizeSingerCount(singerCount);

    if (SINGING_REWARD_TABLE[count] != null) {
      return SINGING_REWARD_TABLE[count];
    }

    return Math.max(12, Math.floor(17 - 0.5 * (count - 17)));
  }

  function getSingerReward(taskType, singerQuota) {
    return getSingerRewardByCount(singerQuota);
  }

  function getProducerReward(taskType, singerQuota) {
    const count = normalizeSingerCount(singerQuota);

    if (taskType === "游戏") return 0;

    return Math.min(48 + Math.min(count - 1, 12), 60);
  }

  function updateRewardPreview() {
    const singerTotal = getSingerReward(selectedType, getSingerQuota());
    const producerTotal = getProducerReward(selectedType, getSingerQuota());

    const singerSplit = splitGold(singerTotal);
    const producerSplit = splitGold(producerTotal);

    singerRewardValueEl.innerHTML = singerSplit.total > 0
      ? `${singerSplit.total} 金币<span class="rewardHint">交音 ${singerSplit.submit} / 发布 ${singerSplit.publish}</span>`

    producerRewardValueEl.innerHTML = producerSplit.total > 0
      ? `${producerSplit.total} 金币<span class="rewardHint">交音 ${producerSplit.submit} / 发布 ${producerSplit.publish}</span>`
      : `0 金币`;
  }

  function isLoggedIn() {
    return localStorage.getItem(STORAGE_KEYS.loggedIn) === "true";
  }

  function getCurrentRole() {
    const role = String(localStorage.getItem(STORAGE_KEYS.role) || "visitor").toLowerCase();
    return ["owner", "admin", "member", "visitor", "applying"].includes(role) ? role : "visitor";
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function clampValue(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

    return String(authState.nickname || localStorage.getItem(STORAGE_KEYS.user) || "").trim();

    if (role === "owner") return "维修工";
    if (role === "admin") return "管理员";
    if (role === "member") return "成员";
    if (role === "applying") return "申请中";
    return "游客";
  }

  function canAccessStudioSubmit(roleValue = authState.role) {
    return ALLOWED_STUDIO_SUBMIT_ROLES.has(String(roleValue || '').toLowerCase());
  }

  function updateTopBarIdentity() {
    if (!currentUserBadge) return;
    const nickname = getCurrentMemberName() || "未登录";
    const roleLabel = getCurrentRoleLabel();
    currentUserBadge.classList.remove("identityStacked");
    currentUserBadge.innerHTML = `
      <span class="identityText">
        <span class="identityName">${escapeHtml(nickname)}</span><span class="identitySep">｜</span><span class="identityRole">${escapeHtml(roleLabel)}</span>
      </span>
    `;
    requestAnimationFrame(fitTopBarIdentityContent);
  }

    return [];
  }

    if (!siteNoticeBtn || !siteNoticeBody || !siteNoticeText || !siteNoticeCount || !siteNoticePanel) return;

    siteNoticeBtn.classList.toggle("hasNotice", count > 0);

    siteNoticeCount.textContent = String(count);

  }

    if (!siteNoticePanel || !siteNoticeBtn) return;
    const shouldShow = typeof force === "boolean" ? force : !siteNoticePanel.classList.contains("show");
    siteNoticePanel.classList.toggle("show", shouldShow);
    siteNoticePanel.setAttribute("aria-hidden", shouldShow ? "false" : "true");
    siteNoticeBtn.setAttribute("aria-expanded", shouldShow ? "true" : "false");
  }

  async function ensureAuthState() {
    authState.loggedIn = isLoggedIn();
    authState.nickname = String(localStorage.getItem(STORAGE_KEYS.user) || "").trim();
    authState.role = getCurrentRole();
    authState.memberId = localStorage.getItem(STORAGE_KEYS.memberId) || null;

    if (!authState.loggedIn || !authState.nickname || !authState.memberId) {
      handleLogout();
      return false;
    }

    try {
      let verifiedMember = null;

      const directResult = await supabaseClient
        .from("members")
        .select("id, nickname, role")
        .eq("id", authState.memberId)
        .maybeSingle();

      if (!directResult.error && directResult.data) {
        verifiedMember = directResult.data;
      } else {
        const rpcResult = await supabaseClient.rpc("get_member_directory_for_app");
        if (!rpcResult.error && Array.isArray(rpcResult.data)) {
          verifiedMember = rpcResult.data.find(item => String(item.id || "") === String(authState.memberId || "")) || null;
        }
      }

      const verifiedNickname = String(verifiedMember?.nickname || "").trim();
      const verifiedRole = String(verifiedMember?.role || authState.role || "visitor").toLowerCase();

      if (!verifiedMember || !verifiedNickname || verifiedNickname !== authState.nickname) {
        handleLogout();
        return false;
      }

      authState.nickname = verifiedNickname;
      authState.role = ["owner", "admin", "member", "visitor", "applying"].includes(verifiedRole)
        ? verifiedRole
        : authState.role;
      authState.initialized = true;

      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      localStorage.setItem(STORAGE_KEYS.memberId, String(authState.memberId));

      updateTopBarIdentity();

      if (!canAccessStudioSubmit(authState.role)) {
        handleLogout();
        return false;
      }

      return true;
    } catch (err) {
      console.error("登录状态校验失败：", err);
      handleLogout();
      return false;
    }
  }

  async function loginWithKey(nickname, key) {
    const safeNickname = String(nickname || "").trim();
    const safeKey = String(key || "").trim();

    if (!safeNickname || !safeKey) {
      return { ok: false, message: "请输入昵称和KEY" };
    }

    try {
      const { data, error } = await supabaseClient.rpc("verify_member_login", {
        input_nickname: safeNickname,
        input_code: safeKey
      });

      if (error) {
        console.error("KEY 登录失败：", error);
        return { ok: false, message: error.message || "登录失败，请稍后再试" };
      }

      if (!Array.isArray(data) || !data.length) {
        return { ok: false, message: "昵称或KEY错误" };
      }

      const user = data[0];
      authState.loggedIn = true;
      authState.nickname = String(user.nickname || safeNickname).trim();
      authState.role = String(user.role || "member").toLowerCase();
      authState.memberId = String(user.member_id || "");
      authState.initialized = true;

      localStorage.setItem(STORAGE_KEYS.loggedIn, "true");
      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      localStorage.setItem(STORAGE_KEYS.memberId, authState.memberId);

      return { ok: true, user };
    } catch (err) {
      console.error("KEY 登录异常：", err);
      return { ok: false, message: err?.message || "登录失败，请稍后再试" };
    }
  }


  window.loginWithKey = loginWithKey;

  function handleLogout() {
    localStorage.removeItem(STORAGE_KEYS.loggedIn);
    localStorage.removeItem(STORAGE_KEYS.user);
    localStorage.removeItem(STORAGE_KEYS.role);
    localStorage.removeItem(STORAGE_KEYS.memberId);
    localStorage.removeItem(STORAGE_KEYS.memberCode);

  function extractNumberFromValue(value) {
    const str = String(value ?? "");
    const match = str.match(/\d+/);
    return match ? parseInt(match[0], 10) : Number.POSITIVE_INFINITY;
  }

  function getMemberOrderNumber(memberRaw) {
    const candidates = [
      memberRaw.display_order,
      memberRaw.member_order,
      memberRaw.order_no,
      memberRaw.member_no,
      memberRaw.member_number,
      memberRaw.no,
      memberRaw.code,
      memberRaw.member_code,
      memberRaw.invite_code,
      memberRaw.key_code,
      memberRaw.nickname,
      memberRaw.name
    ];

    for (const item of candidates) {
      const num = extractNumberFromValue(item);
      if (Number.isFinite(num)) return num;
    }
    return Number.POSITIVE_INFINITY;
  }

  function normalizeMemberName(memberRaw, index) {
    return memberRaw.nickname || memberRaw.name || `成员${index + 1}`;
  }

  function hasMixSkill(skills) {
    return typeof skills === "string" && skills.replace(/\s/g, "").includes("混音");
  }

  function normalizeMembers(data) {
    return (data || [])
      .map((item, index) => ({
        id: String(item.id ?? index),
        name: normalizeMemberName(item, index),
        nickname: item.nickname || item.name || "",
        skills: item.skills || "",
        orderNumber: getMemberOrderNumber(item)
      }))
      .sort((a, b) => {
        if (a.orderNumber !== b.orderNumber) return a.orderNumber - b.orderNumber;
        return a.name.localeCompare(b.name, "zh-CN");
      });
  }

  function getNextProjectCode() {
    if (!tasks.length) return "001";

    const numbers = tasks
      .map(project => String(project.project_code || "").match(/\d+/))
      .filter(Boolean)
      .map(match => parseInt(match[0], 10))
      .filter(num => Number.isFinite(num));

    const maxNo = numbers.length ? Math.max(...numbers) : 0;
    return String(maxNo + 1).padStart(3, "0");
  }

    if (error) {

  function getMemberById(memberId) {

  function syncOriginalAssignedNames() {
    originalRows = originalRows.map(row => {
      const member = getMemberById(row.assignedSingerId);
      return {
        ...row,
        assignedSingerName: member ? member.name : ""

  function getAssignableSingerMembers(rowId = "") {
    const usedSingerIds = new Set(getUsedSingerIds(rowId));
    return selectedSingerIds
      .map(memberId => getMemberById(memberId))
      .filter(member => member && (!usedSingerIds.has(member.id) || originalRows.some(row => row.id === rowId && row.assignedSingerId === member.id)));
  }

  function findSingerMemberByText(text, rowId = "") {
    const normalized = String(text || "").trim();
    if (!normalized) return null;
    const exactSelected = getAssignableSingerMembers(rowId).find(member => member.name === normalized || member.nickname === normalized);
    if (exactSelected) return exactSelected;
    return null;
  }

  function buildSingerDatalistOptions(rowId, selectedId) {
    return getAssignableSingerMembers(rowId)
      .map(member => `<option value="${escapeHtml(member.name)}"></option>`)
      .join("");
  }

  function getLyricsLotteryReadyState() {
    const quota = getSingerQuota();
    const rows = originalRows.slice(0, quota);
    const selectedSingerCount = selectedSingerIds.length;
    const allOriginalFilled = rows.length === quota && rows.every(row => String(row.original || "").trim());
    const singersFull = selectedSingerCount === quota;

    return {
      quota,
      selectedSingerCount,
      rowsCount: rows.length,
      singersFull,
      allOriginalFilled,
      ready: singersFull && allOriginalFilled
    };
  }

  function getCurrentSingerMember() {
    const currentMemberId = String(authState.memberId || "").trim();
    if (!currentMemberId) return null;
    if (!selectedSingerIds.includes(currentMemberId)) return null;
    return getMemberById(currentMemberId);
  }

  function getCurrentUserLotteryRow() {
    const currentMemberId = String(authState.memberId || "").trim();
    if (!currentMemberId) return null;
    return originalRows.find(row => String(row.assignedSingerId || "") === currentMemberId) || null;
  }

  function getPendingLotteryRows() {
    const quota = getSingerQuota();
    return originalRows
      .slice(0, quota)
      .filter(row => String(row.original || "").trim() && !String(row.assignedSingerId || "").trim());
  }

  function getLotteryEnabledHintText() {
    const drawnRow = getCurrentUserLotteryRow();
    if (drawnRow && String(drawnRow.original || "").trim()) {
      return `你抽到：${String(drawnRow.original || "").trim()}。提交后，请提醒其他演唱者去待处理页抽签。`;
    }
    return "提交后，请提醒其他演唱者去待处理页抽签。";
  }

  function syncLyricsLotteryButton() {
    if (!enableLyricsLotteryBtn) return;

    const state = getLyricsLotteryReadyState();

    if (!state.ready) {
      lyricsLotteryEnabled = false;
      enableLyricsLotteryBtn.hidden = true;
      enableLyricsLotteryBtn.classList.remove("active");
      enableLyricsLotteryBtn.textContent = "开启抽签";
      if (lyricsLotteryHint) {
        lyricsLotteryHint.hidden = true;
        lyricsLotteryHint.textContent = "";
      }
      return;
    }

    enableLyricsLotteryBtn.hidden = false;
    enableLyricsLotteryBtn.classList.toggle("active", lyricsLotteryEnabled);
    enableLyricsLotteryBtn.textContent = lyricsLotteryEnabled ? "已抽取" : "开启抽签";

    if (lyricsLotteryHint) {
      lyricsLotteryHint.hidden = !lyricsLotteryEnabled;
      lyricsLotteryHint.textContent = lyricsLotteryEnabled ? getLotteryEnabledHintText() : "";
    }
  }

  function handleEnableLyricsLotteryClick() {
    const state = getLyricsLotteryReadyState();

    if (!state.ready) {
      showToast("暂不能开启", "需要先选满演唱者，并补全所有原唱 / 部分名称。");
      syncLyricsLotteryButton();
      return;
    }

    const currentSinger = getCurrentSingerMember();
    if (!currentSinger) {
      showToast("暂不能开启", "开启抽签会先抽取填写人本人的部分。请先把当前登录成员加入演唱者，再开启抽签。");
      syncLyricsLotteryButton();
      return;
    }

    let drawnRow = getCurrentUserLotteryRow();

    if (!drawnRow) {
      const pendingRows = getPendingLotteryRows();
      if (!pendingRows.length) {
        showToast("暂不能开启", "当前没有可抽取的空原唱行，请先清空一个分配给本人抽取。");
        syncLyricsLotteryButton();
        return;
      }

      const pickedRow = pendingRows.length === 1
        ? pendingRows[0]
        : pendingRows[Math.floor(Math.random() * pendingRows.length)];

      originalRows = originalRows.map(row => (
        row.id === pickedRow.id
          ? { ...row, assignedSingerId: currentSinger.id, assignedSingerName: currentSinger.name }
          : row
      ));

      drawnRow = originalRows.find(row => row.id === pickedRow.id) || pickedRow;
      syncOriginalAssignedNames();
      renderOriginalRows();
    }

    lyricsLotteryEnabled = true;
    syncLyricsLotteryButton();

    const partName = String(drawnRow.original || "").trim();
    showToast(
      "已开启抽签",
      `你抽到：${partName || "未命名部分"}。
提交任务后，请提醒其他演唱者去待处理页自行抽签。`
    );
  }

  function getUsedSingerIds(excludeRowId = "") {
    return Array.from(new Set(
      originalRows
        .filter(row => !excludeRowId || row.id !== excludeRowId)
        .map(row => String(row.assignedSingerId || "").trim())
        .filter(Boolean)
    ));
  }

  function keepAtLeastOneRow() {
    if (!originalRows.length) {
      originalRows = [createRow()];
    }
  }

  function syncRowsToQuota() {
    const quota = getSingerQuota();

    if (originalRows.length > quota) {
      originalRows = originalRows.slice(0, quota);
    }

    while (originalRows.length < quota) {
      originalRows.push(createRow());
    }

    keepAtLeastOneRow();
  }

  function removeSingerFromLyricRows(memberId) {
    const nextRows = [];

    for (const row of originalRows) {
      if (row.assignedSingerId !== memberId) {
        nextRows.push(row);
        continue;
      }

      if (String(row.original || "").trim()) {
        nextRows.push({
          ...row,
          assignedSingerId: "",
          assignedSingerName: ""
        });
      }
    }

    originalRows = nextRows;
    keepAtLeastOneRow();
  }

  function trimRowsToQuota(quota) {
    if (originalRows.length > quota) {
      originalRows = originalRows.slice(0, quota);
    }
    keepAtLeastOneRow();
  }

  function applyQuotaConstraints(showLimitToast = false) {
    const quota = getSingerQuota();

    if (selectedSingerIds.length > quota) {
      const removedIds = selectedSingerIds.slice(quota);
      selectedSingerIds = selectedSingerIds.slice(0, quota);
      removedIds.forEach(memberId => removeSingerFromLyricRows(memberId));
      if (showLimitToast && removedIds.length) {
        showToast("已调整", "演唱人数减少后，已自动移除超出上限的演唱者。");
      }
    }

    trimRowsToQuota(quota);
    syncRowsToQuota();
    syncOriginalAssignedNames();
    renderSingerMembers();
    renderProducerMembers();
    renderOriginalRows();
    updateRewardPreview();
  }

  function handleSingerMemberToggle(memberId) {
    const exists = selectedSingerIds.includes(memberId);

    if (exists) {
      selectedSingerIds = selectedSingerIds.filter(id => id !== memberId);
      removeSingerFromLyricRows(memberId);
    } else {
      const quota = getSingerQuota();
      if (selectedSingerIds.length >= quota) {
        showToast("超过上限", "当前演唱者数量不能超过演唱人数。");
        return;
      }

      selectedSingerIds.push(memberId);
    }

    syncRowsToQuota();
    syncOriginalAssignedNames();
    renderSingerMembers();
    renderProducerMembers();
    renderOriginalRows();
    updateRewardPreview();
  }

  function validateSignupForm() {
    const taskName = String(songNameInput.value || "").trim();
    if (!taskName) {
      throw new Error("请先填写任务名称。");
    }

    const singerQuota = getSingerQuota();

    if (originalRows.length > singerQuota) {
      throw new Error("歌词分配行数不能超过演唱人数。");
    }

    if (selectedSingerIds.length > singerQuota) {
      throw new Error("演唱者数量不能超过演唱人数。");
    }

    const nonEmptyRows = originalRows.filter(row =>
      String(row.original || "").trim() || String(row.assignedSingerId || "").trim()
    );

    const lastFilledOriginalIndex = originalRows.reduce((lastIndex, row, index) => {
      return String(row.original || "").trim() ? index : lastIndex;
    }, -1);

    if (lastFilledOriginalIndex >= 0) {
      const hasOriginalGap = originalRows.slice(0, lastFilledOriginalIndex + 1).some(row =>
        !String(row.original || "").trim()
      );
      if (hasOriginalGap) {
        throw new Error("原唱空行未填写完全，请先补全原唱 / 部分。");
      }
    }

    const missingOriginalRow = nonEmptyRows.find(row =>
      String(row.assignedSingerId || "").trim() && !String(row.original || "").trim()
    );
    if (missingOriginalRow) {
      throw new Error("原唱空行未填写完全，请先补全原唱 / 部分。");
    }

    const invalidAssigned = nonEmptyRows.find(row =>
      String(row.assignedSingerId || "").trim() && !selectedSingerIds.includes(row.assignedSingerId)
    );
    if (invalidAssigned) {
      throw new Error("歌词分配中的成员必须来自已勾选的演唱者。");
    }

    const usedSingerIds = nonEmptyRows
      .map(row => String(row.assignedSingerId || "").trim())
      .filter(Boolean);

    if (new Set(usedSingerIds).size !== usedSingerIds.length) {
      throw new Error("同一个成员不能在歌词分配中被重复选择。");
    }

    if (lyricsLotteryEnabled && !getLyricsLotteryReadyState().ready) {
      throw new Error("开启抽签需要先选满演唱者，并补全所有原唱 / 部分名称。");
    }
  }

  async function submitSignup() {
    try {
      validateSignupForm();

      signupSubmitBtn.disabled = true;
      signupStatus.textContent = "提交中";

      const taskName = String(songNameInput.value || "").trim();
      const singerQuota = getSingerQuota();
      const taskCode = getNextProjectCode();
      const singerBonus = getSingerReward(selectedType, singerQuota);
      const producerBonus = getProducerReward(selectedType, singerQuota);

      const payload = {
        project_code: taskCode,
        project_name: taskName,
        project_type: selectedType,
        participant_count: singerQuota,
        singer_bonus: singerBonus,
        producer_bonus: producerBonus,
        producer_member_id: selectedProducerId || null,
        release_date: releaseDateInput.value || null,
        project_tone: String(projectToneInput.value || "").trim() || null,
        lyrics_lottery_enabled: lyricsLotteryEnabled && getLyricsLotteryReadyState().ready,
        created_by: authState.memberId || null,
        status: "待认领"
      };

      const { data: insertedProject, error: projectError } = await supabaseClient
        .from("projects")
        .insert(payload)
        .select("id, project_code, project_name")
        .single();

      if (projectError) throw projectError;

      const projectId = insertedProject.id;

      if (selectedSingerIds.length) {
        const singerRows = selectedSingerIds.map(memberId => ({
          project_id: projectId,
          member_id: memberId,
          is_submitted: false
        }));

        const { error: singerError } = await supabaseClient
          .from("project_singers")
          .insert(singerRows);

        if (singerError) throw singerError;
      }

      const validParts = originalRows
        .map((row, index) => ({
          project_id: projectId,
          part_order: index + 1,
          original_name: String(row.original || "").trim(),
          assigned_member_id: row.assignedSingerId || null
        }))
        .filter(row => row.original_name);

      if (validParts.length) {
        const { error: partError } = await supabaseClient
          .from("project_parts")
          .insert(validParts);

        if (partError) throw partError;
      }

      signupStatus.textContent = "已发布";
      const successMessage = lyricsLotteryEnabled
        ? `任务 ${insertedProject.project_code}.${insertedProject.project_name} 已写入数据库。
你已抽取本人的部分，请提醒其他演唱者去待处理页自行抽签。`
        : `任务 ${insertedProject.project_code}.${insertedProject.project_name} 已写入数据库。`;
      showToast("发布成功", successMessage);
      await loadProjectsFromSupabase();
      resetSignupForm();
    } catch (error) {
      console.error(error);
      showToast("发布失败", error.message || "数据库写入失败，请检查表结构、RLS 或字段名。");
      signupStatus.textContent = "填写中";
    } finally {
      signupSubmitBtn.disabled = false;
      if (signupStatus.textContent === "提交中") signupStatus.textContent = "填写中";
    }
  }

  function syncTopUiLayout() {
    if (!overlay || !topBar || !navOuter || !navScroll || !roomNav || !panelSwitch || !topBarUserAnchor || !topBarUserArea) return;

    ensureRoomNavNotes();

    const overlayRect = overlay.getBoundingClientRect();
    const scale = parseFloat(getComputedStyle(overlay).getPropertyValue("--bg-ui-scale")) || 1;
    const taskPanel = document.getElementById("taskPanel");

    /* 2440px 母版坐标：所有网页版组件都绑定在底图坐标上。 */
    const sideLeft = overlayRect.width * 0.8260;
    const sideRight = overlayRect.width * 0.9602;
    const sideWidth = Math.max(24 * scale, sideRight - sideLeft);

    let identityH = 60 * scale;
    let identityInnerScale = scale;

    let identityGap = 5.2 * identityInnerScale;
    let identityPadX = 5.8 * identityInnerScale;
    let identityPadY = 6.2 * identityInnerScale;
    let identityRadius = 18 * scale;
    let identityChipRadius = 12.5 * identityInnerScale;
    let identityBadgePx = 7.2 * identityInnerScale;
    let identityTextGap = 4.2 * identityInnerScale;
    let identityIconW = 34 * identityInnerScale;
    let identityLogoutW = 38 * identityInnerScale;
    let identityFont = 23 * identityInnerScale;
    let identityIconFont = 22 * identityInnerScale;
    let identityLogoutFont = 18 * identityInnerScale;

    if (overlayRect.width < 854) {
      /*
        854px 以下：外层宽度和位置不变；身份信息允许上下两行显示，
        因此不再硬压铃铛/登出按钮。右侧按钮保留可读宽度，名字和身份换行承接空间不足。
      */
      const smallRatio = clampValue(overlayRect.width / 854, 0.62, 1);
      const sideUnit = sideWidth / 100;

      /*
        两行身份信息需要比单行状态更高的外框。
        只在 854px 以下加高身份组件，不改变外层宽度和左右位置。
      */
      identityH = clampValue(sideWidth * 0.34, 30, 38);

      identityGap = clampValue(3.0 * smallRatio, 1.4, 3.0);
      identityPadX = clampValue(3.2 * smallRatio, 1.6, 3.2);
      identityPadY = clampValue(3.2 * smallRatio, 1.6, 3.2);
      identityRadius = Math.max(10 * smallRatio, 8);
      identityChipRadius = Math.max(8.5 * smallRatio, 6.5);
      identityBadgePx = clampValue(4.4 * smallRatio, 2.2, 4.4);
      identityTextGap = 0;

      identityIconW = clampValue(sideUnit * 20.5, 16, 24);
      identityLogoutW = clampValue(sideUnit * 25.5, 19, 30);
      identityFont = clampValue(sideUnit * 7.1, 5.8, 8.8);
      identityIconFont = clampValue(sideUnit * 8.8, 7.8, 11.2);
      identityLogoutFont = clampValue(sideUnit * 6.6, 5.8, 8.8);
    }
    /* 房间切换：位置和尺寸只按底图缩放，不再按断点重写。 */
    const taskLeftPct = overlayRect.width >= 1600 ? 9.1 : 9.2;
    const taskRightPct = 22.4;
    const taskWidthPct = 100 - taskLeftPct - taskRightPct;
    const navLeftPct = taskLeftPct + taskWidthPct * 0.265;
    const navRightPct = 69.99;
    const navLeft = overlayRect.width * (navLeftPct / 100);
    const navRight = overlayRect.width * (navRightPct / 100);
    const navWidth = Math.max(24 * scale, navRight - navLeft);

    topBar.style.left = `${navLeft.toFixed(2)}px`;
    topBar.style.top = `${(overlayRect.height * 0.103).toFixed(2)}px`;
    topBar.style.width = `${navWidth.toFixed(2)}px`;
    topBar.style.transform = "translateY(-50%)";
    topBar.style.overflow = "visible";

    overlay.style.setProperty("--nav-btn-height", `${(60 * scale).toFixed(2)}px`);
    overlay.style.setProperty("--nav-btn-px", `${(26 * scale).toFixed(2)}px`);
    overlay.style.setProperty("--nav-btn-radius", `${(17 * scale).toFixed(2)}px`);
    overlay.style.setProperty("--nav-btn-font", `${(23 * scale).toFixed(2)}px`);
    overlay.style.setProperty("--nav-gap", `${(12 * scale).toFixed(2)}px`);

    navScroll.scrollLeft = 0;
    navScroll.style.overflow = "visible";
    navOuter.style.overflow = "visible";
    roomNav.style.transform = "scale(1)";
    roomNav.style.transformOrigin = "left center";

    requestAnimationFrame(() => {
      const availableWidth = Math.max(1, topBar.getBoundingClientRect().width);
      const requiredWidth = Math.max(1, roomNav.scrollWidth || 1);
      const fit = Math.min(1, availableWidth / requiredWidth);
      roomNav.style.transform = fit < 1 ? `scale(${fit.toFixed(5)})` : "scale(1)";
      const scaledNavRect = roomNav.getBoundingClientRect();
      navOuter.style.height = `${Math.ceil(scaledNavRect.height)}px`;

      const firstNavBtn = roomNav.querySelector(".navBtn");
      let identityTop = overlayRect.height * 0.08;
      if (firstNavBtn) {
        const navBtnRect = firstNavBtn.getBoundingClientRect();
        identityTop = (navBtnRect.top + navBtnRect.height / 2) - overlayRect.top - identityH / 2;
      }

      overlay.style.setProperty("--identity-left", `${sideLeft.toFixed(2)}px`);
      overlay.style.setProperty("--identity-top", `${identityTop.toFixed(2)}px`);
      overlay.style.setProperty("--identity-w", `${sideWidth.toFixed(2)}px`);
      overlay.style.setProperty("--identity-h", `${identityH.toFixed(2)}px`);
      overlay.style.setProperty("--identity-gap", `${identityGap.toFixed(2)}px`);
      overlay.style.setProperty("--identity-pad-x", `${identityPadX.toFixed(2)}px`);
      overlay.style.setProperty("--identity-pad-y", `${identityPadY.toFixed(2)}px`);
      overlay.style.setProperty("--identity-radius", `${identityRadius.toFixed(2)}px`);
      overlay.style.setProperty("--identity-chip-radius", `${identityChipRadius.toFixed(2)}px`);
      overlay.style.setProperty("--identity-badge-px", `${identityBadgePx.toFixed(2)}px`);
      overlay.style.setProperty("--identity-text-gap", `${identityTextGap.toFixed(2)}px`);
      overlay.style.setProperty("--identity-icon-w", `${identityIconW.toFixed(2)}px`);
      overlay.style.setProperty("--identity-logout-w", `${identityLogoutW.toFixed(2)}px`);
      overlay.style.setProperty("--identity-font", `${identityFont.toFixed(2)}px`);
      overlay.style.setProperty("--identity-icon-font", `${identityIconFont.toFixed(2)}px`);
      overlay.style.setProperty("--identity-logout-font", `${identityLogoutFont.toFixed(2)}px`);
      overlay.style.setProperty("--identity-icon-shift", `${(0.5 * scale).toFixed(2)}px`);

      /* 页面切换和身份组件共用右侧竖线，仍绑定在主面板右侧。 */
      if (taskPanel) {
        const taskPanelRect = taskPanel.getBoundingClientRect();
        const panelLeft = sideLeft - (taskPanelRect.left - overlayRect.left);
        panelSwitch.style.left = `${panelLeft.toFixed(2)}px`;
      }
      overlay.style.setProperty("--panel-switch-left", panelSwitch.style.left || `${(overlayRect.width * 0.70).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-top", `${(overlayRect.height * 0.109).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-w", `${sideWidth.toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-h", `${(overlayRect.height * 0.19).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-pad-y", `${(10 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-pad-x", `${(14 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-radius", `${(22 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--panel-switch-gap", `${(8 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--switch-btn-h", `${(44 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--switch-btn-pad-y", `${(0 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--switch-btn-pad-x", `${(14 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--switch-btn-radius", `${(15 * scale).toFixed(2)}px`);
      overlay.style.setProperty("--switch-font", `${(25 * scale).toFixed(2)}px`);

      overlay.style.setProperty("--task-panel-left-bound", overlayRect.width >= 1600 ? "9.1%" : "9.2%");
      overlay.style.setProperty("--task-panel-right-bound", "22.4%");
      overlay.style.setProperty("--task-panel-top-bound", "18%");
      overlay.style.setProperty("--task-panel-bottom-bound", "12%");

      requestAnimationFrame(fitTopBarIdentityContent);
    });
  }

  function syncOverlayToImage() {
    const roomRect = room.getBoundingClientRect();
    const roomW = roomRect.width;
    const roomH = roomRect.height;
    const naturalW = bg.naturalWidth || 1600;
    const naturalH = bg.naturalHeight || 900;
    const imgRatio = naturalW / naturalH;
    const roomRatio = roomW / roomH;
    let drawW, drawH, drawLeft, drawTop;
    if (roomRatio > imgRatio) {
      drawH = roomH;
      drawW = drawH * imgRatio;
      drawLeft = (roomW - drawW) / 2;
      drawTop = 0;
    } else {
      drawW = roomW;
      drawH = drawW / imgRatio;
      drawLeft = 0;
      drawTop = (roomH - drawH) / 2;
    }
    overlay.style.left = drawLeft + "px";
    overlay.style.top = drawTop + "px";
    overlay.style.width = drawW + "px";
    overlay.style.height = drawH + "px";
    const DESIGN_W = 2440;
    const rawScale = drawW / DESIGN_W;
    const minWebScale = drawW >= 541 ? 0.42 : rawScale;
    const bgScale = Math.min(Math.max(rawScale, minWebScale), 1.24);
    overlay.style.setProperty("--bg-ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--overlay-ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--project-panel-scale", bgScale.toFixed(5));
    requestAnimationFrame(syncTopUiLayout);
  }

  typeBtnGroup.addEventListener("click", (e) => {
    const btn = e.target.closest(".typeBtn");
    if (!btn) return;
    selectedType = btn.dataset.type || "披4";
    document.querySelectorAll(".typeBtn").forEach(item => item.classList.toggle("active", item === btn));
    updateRewardPreview();
  });

  singerMemberGrid.addEventListener("click", (e) => {
    const btn = e.target.closest(".memberBtn[data-member-id]");
    if (!btn) return;
    handleSingerMemberToggle(btn.dataset.memberId);
  });

  producerMemberGrid.addEventListener("click", (e) => {
    const btn = e.target.closest(".memberBtn[data-member-id]");
    if (!btn) return;
    handleProducerMemberToggle(btn.dataset.memberId);
  });

  singerQuotaInput.addEventListener("input", () => {
    applyQuotaConstraints(true);
  });

  singerQuotaInput.addEventListener("blur", () => {
    singerQuotaInput.value = String(getSingerQuota());
    applyQuotaConstraints(false);
  });

  originalRoleList.addEventListener("input", (e) => {
    const rowEl = e.target.closest(".originalRoleRow");
    if (!rowEl) return;
    const rowId = rowEl.dataset.rowId;
    const field = e.target.dataset.field;

    if (field === "original") {
      originalRows = originalRows.map(row => (
        row.id === rowId ? { ...row, original: e.target.value } : row
      ));
      syncLyricsLotteryButton();
      return;
    }

    if (field === "assignedSingerName") {
      originalRows = originalRows.map(row => {
        if (row.id !== rowId) return row;
        const matched = findSingerMemberByText(e.target.value, rowId);
        return {
          ...row,
          assignedSingerId: matched ? matched.id : "",
          assignedSingerName: e.target.value
        };
      });
      syncLyricsLotteryButton();
    }
  });

  originalRoleList.addEventListener("keydown", (e) => {
    const input = e.target.closest(".originalInput");
    if (!input) return;

    if (e.key === "Enter" && input.dataset.field === "original") {
      e.preventDefault();
      const currentIndex = Number(input.dataset.rowIndex || "-1");
      if (!Number.isFinite(currentIndex) || currentIndex < 0) return;
      const nextInput = originalRoleList.querySelector(`.originalInput[data-field="original"][data-row-index="${currentIndex + 1}"]`);
      if (nextInput) {
        nextInput.focus();
        nextInput.select();
      }
      return;
    }

    if (e.key !== "Tab") return;

    const inputs = [...originalRoleList.querySelectorAll('.originalInput')];
    const currentIndex = inputs.indexOf(input);
    if (currentIndex < 0) return;

    e.preventDefault();
    const nextIndex = e.shiftKey ? currentIndex - 1 : currentIndex + 1;
    const target = inputs[nextIndex];
    if (target) {
      target.focus();
      if (typeof target.select === 'function') target.select();
    }
  });

  originalRoleList.addEventListener("change", (e) => {
    const rowEl = e.target.closest(".originalRoleRow");
    if (!rowEl) return;
    const rowId = rowEl.dataset.rowId;
    const field = e.target.dataset.field;
    if (field !== "assignedSingerName") return;

    const row = originalRows.find(item => item.id === rowId);
    if (!row) return;

    const previousSingerId = row.assignedSingerId;
    const previousSingerName = row.assignedSingerName;
    const inputText = String(e.target.value || "").trim();
    const matched = findSingerMemberByText(inputText, rowId);
    const nextSingerId = matched ? String(matched.id || "") : "";
    const usedSingerIds = new Set(getUsedSingerIds(rowId));

    if (nextSingerId && usedSingerIds.has(nextSingerId)) {
      e.target.value = previousSingerName || "";
      showToast("重复选择", "同一个成员不能在歌词分配中被重复选择。");
      return;
    }

    if (inputText && !matched) {
      e.target.value = previousSingerName || "";
      showToast("无效成员", "请先在左侧勾选演唱者，再在右侧分配；也可以直接输入已勾选成员的名字。");
      return;
    }

    originalRows = originalRows.map(item => {
      if (item.id !== rowId) return item;
      return {
        ...item,
        assignedSingerId: nextSingerId,
        assignedSingerName: matched ? matched.name : ""
      };
    });

    syncOriginalAssignedNames();
    renderSingerMembers();
    renderProducerMembers();
    renderOriginalRows();
  });

  originalRoleList.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action='delete']");
    if (!btn) return;
    const rowEl = e.target.closest(".originalRoleRow");
    if (!rowEl) return;

    const rowId = rowEl.dataset.rowId;

    originalRows = originalRows.map(item => (
      item.id === rowId
        ? { ...item, assignedSingerId: "", assignedSingerName: "" }
        : item
    ));

    syncOriginalAssignedNames();
    renderSingerMembers();
    renderProducerMembers();
    renderOriginalRows();
    updateRewardPreview();
  });

  enableLyricsLotteryBtn?.addEventListener("click", handleEnableLyricsLotteryClick);
  signupResetBtn.addEventListener("click", resetSignupForm);
  signupSubmitBtn.addEventListener("click", submitSignup);

  document.querySelectorAll("#panelSwitch .switchBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.page || "";
      if (!target || btn.classList.contains("active")) return;
      window.location.href = target;
    });
  });

  document.querySelectorAll(".navBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomKey = btn.dataset.room;

      if (roomKey === "manager") {
        const role = getCurrentRole();
        const page = role === "owner"
          ? "manager-owner.html"
          : role === "admin"
            ? "manager-admin.html"
            : role === "member"
              ? "manager-member.html"
              : "manager-visitor.html";
        window.location.href = page;
        return;
      }

      if (links[roomKey]) {
        window.location.href = links[roomKey];
      }
    });
  });

  document.addEventListener("click", (event) => {
    if (!event.target.closest("#siteNoticeWrap")) {
      toggleSiteNoticePanel(false);
    }
  });

  siteNoticeBtn?.addEventListener("click", (event) => {
    event.stopPropagation();
    renderSiteNotifications();
    toggleSiteNoticePanel();
  });

  document.getElementById("logoutBtn").addEventListener("click", handleLogout);

  bg.addEventListener("load", syncOverlayToImage);
  window.addEventListener("resize", syncOverlayToImage);
  window.addEventListener("orientationchange", syncOverlayToImage);
  window.addEventListener("load", syncTopUiLayout);

  if ("ResizeObserver" in window) {
    const ro = new ResizeObserver(syncOverlayToImage);
    ro.observe(room);
  }

  window.addEventListener("storage", async (e) => {
    if ([STORAGE_KEYS.loggedIn, STORAGE_KEYS.user, STORAGE_KEYS.role, STORAGE_KEYS.memberId].includes(e.key)) {
      const ok = await ensureAuthState();
      if (!ok) return;
      updateTopBarIdentity();
      renderSiteNotifications();
      await loadMembersFromSupabase();
      await loadProjectsFromSupabase();
    }
  });

  async function init() {
    updateTopBarIdentity();
    renderSiteNotifications();
    updateRewardPreview();
    syncOverlayToImage();

    const ok = await ensureAuthState();
    if (!ok) return;

    syncOverlayToImage();
    renderSiteNotifications();

    try {
      await loadMembersFromSupabase();
      await loadProjectsFromSupabase();
      projectAutoCodeEl.textContent = getNextProjectCode();
      singerQuotaInput.value = String(getSingerQuota());
      syncRowsToQuota();
      applyQuotaConstraints(false);
    } catch (error) {
      console.error(error);
      showToast("初始化失败", error.message || "页面初始化失败，请检查数据库连接。");
    }
  }

  init();
</script>
</body>
</html>
