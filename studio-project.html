<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜项目详情</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *{box-sizing:border-box;}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:linear-gradient(180deg,#e7dfd4 0%, #ddd4c8 100%);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  #room{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:linear-gradient(180deg,#e7dfd4 0%, #ddd4c8 100%);
  }

  #bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    display:block;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
  }

  #overlay{
    position:absolute;
    inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
    --nav-scale:1;
    --top-ui-scale:1;
    --topbar-left:28.2%;
    --topbar-top:8.15%;
    --topbar-width:65.4%;
    --topbar-gap:1.2%;
    --user-right:214px;
    --user-top:7.5%;
    --topbar-safe-gap:18px;
  }
  #overlay *{
    pointer-events:auto;
  }

  :root{
    --top-chip-bg:rgba(255,252,247,0.86);
    --top-chip-border:rgba(160,116,78,0.12);
    --top-chip-shadow:
      inset 0 1px 0 rgba(255,255,255,0.96),
      0 3px 10px rgba(110,84,58,0.08);
  }

  #topBar{
    position:absolute;
    left:var(--topbar-left);
    top:var(--topbar-top);
    width:var(--topbar-width);
    max-width:calc(100% - var(--topbar-left) - var(--topbar-safe-gap));
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    gap:var(--topbar-gap);
  }

  #navOuter{
    flex:1 1 auto;
    min-width:0;
    overflow:hidden;
  }

  #navScroll{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    scrollbar-width:none;
    -ms-overflow-style:none;
    padding-bottom:2px;
  }
  #navScroll::-webkit-scrollbar{
    display:none;
  }

  #roomNav{
    display:inline-flex;
    align-items:center;
    gap:calc(10px * var(--nav-scale));
    min-width:max-content;
    max-width:100%;
  }

  .navBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    height:calc(46px * var(--nav-scale));
    padding:0 calc(20px * var(--nav-scale));
    border-radius:calc(15px * var(--nav-scale));
    background:linear-gradient(180deg, #efd5ab 0%, #dfbd8a 100%);
    color:#704724;
    font-size:calc(16px * var(--nav-scale));
    font-weight:700;
    white-space:nowrap;
    box-shadow:
      inset 0 1px 0 rgba(255,247,230,0.95),
      inset 0 -2px 0 rgba(150,105,60,0.10),
      0 2px 8px rgba(112,83,52,0.12);
    border:1px solid rgba(159,114,69,0.18);
    transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
  }

  .navBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.04);
  }

  #topBarUserArea{
    position:absolute;
    right:var(--user-right);
    top:var(--user-top);
    transform:scale(var(--top-ui-scale));
    transform-origin:right top;
    display:flex;
    align-items:center;
    gap:6px;
    width:max-content;
    min-width:max-content;
    max-width:none;
    padding:6px;
    border-radius:20px;
    background:rgba(255,248,239,0.9);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.86);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    text-align:center;
    z-index:65;
  }

  #currentUserBadge{
    order:1;
    flex:1 1 auto;
    min-width:clamp(116px, 8.6vw, 142px);
    min-height:clamp(34px, 3vw, 38px);
    padding:0 clamp(12px, 1vw, 16px);
    border-radius:999px;
    background:var(--top-chip-bg);
    color:#6c4523;
    font-size:clamp(13px, 0.95vw, 15px);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    box-shadow:var(--top-chip-shadow);
    border:1px solid var(--top-chip-border);
    white-space:nowrap;
  }

  #currentUserBadge .roleDot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:#d9a364;
    box-shadow:0 0 0 3px rgba(217,163,100,0.16);
    flex:0 0 auto;
  }

  #currentUserBadge .identityText{
    flex:0 1 auto;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:center;
  }

  #logoutBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    flex:0 0 auto;
    min-width:clamp(52px, 3.8vw, 64px);
    height:clamp(34px, 3vw, 38px);
    padding:0 clamp(12px, 1.1vw, 16px);
    border-radius:999px;
    background:var(--top-chip-bg);
    color:#67401f;
    font-size:clamp(12px, 0.82vw, 14px);
    font-weight:800;
    box-shadow:var(--top-chip-shadow);
    border:1px solid var(--top-chip-border);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    order:3;
    align-self:center;
  }

  #logoutBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

  #siteNoticeWrap{
    position:relative;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    order:2;
  }

  #siteNoticeBtn{
    position:relative;
    width:clamp(34px, 3vw, 38px);
    min-width:clamp(34px, 3vw, 38px);
    height:clamp(34px, 3vw, 38px);
    padding:0;
    border:none;
    cursor:pointer;
    border-radius:999px;
    background:var(--top-chip-bg);
    color:#6c4523;
    font-size:clamp(14px, 1vw, 16px);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--top-chip-shadow);
    border:1px solid var(--top-chip-border);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
  }

  #siteNoticeBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

  #siteNoticeIcon{display:block;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,0.55));}
  #siteNoticeText{display:none;}
  #siteNoticeCount{
    position:absolute;
    right:-2px;
    top:-2px;
    min-width:18px;
    height:18px;
    padding:0 5px;
    border-radius:999px;
    background:#c98c4f;
    color:#fff9f1;
    font-size:10px;
    font-weight:900;
    display:none;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 8px rgba(116,86,54,0.16);
  }
  #siteNoticeBtn.hasNotice #siteNoticeCount{display:flex;}

  #siteNoticePanel{
    position:absolute;
    top:calc(100% + 12px);
    right:0;
    left:auto;
    width:min(320px, 70vw);
    max-height:320px;
    overflow:auto;
    padding:12px;
    border-radius:16px;
    background:rgba(255,249,241,0.98);
    border:1px solid rgba(203,167,123,0.28);
    box-shadow:0 16px 36px rgba(85,58,34,0.16);
    display:none;
    z-index:80;
    text-align:left;
  }

  #siteNoticePanel.show{display:block;}
  .siteNoticeTitle{color:#6f4726;font-size:14px;font-weight:800;margin-bottom:8px;}
  .siteNoticeEmpty{color:#8b6947;font-size:12px;line-height:1.6;padding:4px 2px;}
  .siteNoticeList{display:flex;flex-direction:column;gap:8px;}
  .siteNoticeItem{padding:10px 10px 11px;border-radius:12px;background:rgba(255,252,247,0.72);box-shadow:inset 0 1px 0 rgba(255,255,255,0.88),0 2px 8px rgba(120,92,63,0.05);}
  .siteNoticeItemTitle{color:#6f4726;font-size:12px;font-weight:800;line-height:1.45;}
  .siteNoticeItemDesc{color:#8b6947;font-size:11px;line-height:1.55;margin-top:3px;}

  #taskPanel{
    position:absolute;
    left:43%;
    top:22.3%;
    transform:translateX(-50%);
    width:68%;
    height:70.6%;
    min-height:360px;
    border-radius:30px;
    background:rgba(255,255,255,0.34);
    border:1px solid rgba(255,255,255,0.52);
    box-shadow:
      0 16px 42px rgba(122,96,68,0.10),
      inset 0 1px 0 rgba(255,255,255,0.62),
      inset 0 -1px 0 rgba(255,255,255,0.20);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    overflow:visible;
  }

  #taskPanel::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.22);
    pointer-events:none;
  }

  #panelSwitch{
    position:absolute;
    right:-194px;
    top:26%;
    transform:translateY(-50%);
    width:170px;
    padding:18px 14px;
    border-radius:20px;
    background:rgba(255,248,239,0.9);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.86);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:30;
  }

  .switchBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:100%;
    min-height:40px;
    padding:8px 12px;
    border-radius:13px;
    background:rgba(231,214,185,0.92);
    color:#744b25;
    font-size:14px;
    font-weight:700;
    line-height:1.2;
    text-align:center;
    box-shadow:
      inset 0 1px 0 rgba(255,247,233,0.95),
      0 2px 6px rgba(116,86,54,0.08);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
  }

  .switchBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .switchBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
    box-shadow:
      inset 0 1px 0 rgba(255,224,188,0.55),
      0 4px 10px rgba(116,86,54,0.14);
  }

  #taskView{
    position:absolute;
    inset:0;
    padding:0;
  }

  #browsePanelInner{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:26.5% 73.5%;
    min-width:0;
  }

  #browseListPane{
    padding:16px 10px 14px 14px;
    border-right:1px solid rgba(255,255,255,0.20);
    display:flex;
    flex-direction:column;
    min-height:0;
    background:transparent;
    min-width:0;
  }

  #browseListTitleTask{
    display:none;
  }

  .taskFilterRow{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin:0 0 8px;
    padding-right:4px;
  }

  .taskFilterBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    min-width:52px;
    height:28px;
    padding:0 10px;
    border-radius:9px;
    background:rgba(255,252,247,0.62);
    color:#6a4120;
    font-size:11px;
    font-weight:700;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 2px 6px rgba(116,86,54,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
    white-space:nowrap;
  }

  .taskFilterBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .taskFilterBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
  }

  .searchWrap{
    flex:0 0 auto;
    margin:0 0 8px;
    padding-right:4px;
  }

  .searchInput{
    width:100%;
    height:36px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:0 12px;
    background:rgba(255,252,247,0.62);
    color:#5f3b1d;
    font-size:12px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      0 2px 8px rgba(120,92,63,0.05);
  }

  .searchInput::placeholder{
    color:#9a7b5b;
  }

  #browseListTask{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:rgba(175,135,98,0.55) transparent;
  }

  #browseListTask::-webkit-scrollbar{
    width:8px;
  }
  #browseListTask::-webkit-scrollbar-track{
    background:transparent;
  }
  #browseListTask::-webkit-scrollbar-thumb{
    background:rgba(175,135,98,0.55);
    border-radius:999px;
  }

  .taskItem{
    width:100%;
    appearance:none;
    border:none;
    cursor:pointer;
    text-align:left;
    padding:9px 10px;
    margin:0 0 6px;
    border-radius:13px;
    background:rgba(255,252,247,0.34);
    color:#6c4523;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.52),
      0 3px 10px rgba(120,92,63,0.05);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    position:relative;
    min-width:0;
    overflow:hidden;
    isolation:isolate;
  }

  .taskItem:hover{
    transform:translateY(-1px);
    background:rgba(255,252,247,0.52);
  }

  .taskItem.active{
    background:linear-gradient(180deg, rgba(240,219,185,0.98) 0%, rgba(230,200,157,0.98) 100%);
    color:#5c3819;
    border:1px solid rgba(217,163,100,0.90);
    box-shadow:
      inset 0 0 0 1px rgba(255,247,229,0.96),
      0 0 0 2px rgba(217,163,100,0.22),
      0 6px 14px rgba(120,92,63,0.12);
  }

  .taskItem.active::after{
    content:"";
    position:absolute;
    inset:2px;
    border-radius:11px;
    pointer-events:none;
    background:
      linear-gradient(115deg,
        rgba(255,255,255,0) 18%,
        rgba(255,251,241,0.18) 34%,
        rgba(255,255,255,0.62) 50%,
        rgba(255,244,221,0.20) 64%,
        rgba(255,255,255,0) 82%);
    background-size:220% 100%;
    mix-blend-mode:screen;
    opacity:.92;
    animation:taskActiveShine 2.8s linear infinite;
    z-index:0;
  }

  .taskItem.active.unsubmittedWarn{
    background:linear-gradient(180deg, rgba(240,219,185,0.98) 0%, rgba(230,200,157,0.98) 100%);
    border:1px solid rgba(217,163,100,0.90);
    box-shadow:
      inset 0 0 0 1px rgba(255,247,229,0.96),
      0 0 0 2px rgba(217,163,100,0.22),
      0 6px 14px rgba(120,92,63,0.12);
  }

  .taskItem.unsubmittedWarn{
    box-shadow:
      inset 0 0 0 1px rgba(211,119,54,0.22),
      0 3px 10px rgba(120,92,63,0.05);
    background:rgba(255,245,235,0.72);
  }
  @keyframes taskActiveShine{
    0%{background-position:160% 0;}
    100%{background-position:-60% 0;}
  }

  .taskTitleLine{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:6px;
    position:relative;
    z-index:1;
  }

  .taskItemName{
    display:flex;
    align-items:center;
    flex-wrap:nowrap;
    gap:5px;
    min-width:0;
    width:100%;
    font-size:13px;
    font-weight:800;
    line-height:1.35;
    color:inherit;
  }

  .taskNameText{
    flex:1 1 auto;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .taskBadgeLine{
    display:flex;
    align-items:center;
    gap:5px;
    flex-wrap:nowrap;
    margin-top:5px;
    min-height:18px;
    position:relative;
    z-index:1;
    overflow:hidden;
  }

  .taskBadgeLine:empty{
    display:none;
  }

  .taskTypeMini{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:18px;
    padding:1px 6px;
    border-radius:999px;
    font-size:10px;
    font-weight:700;
    line-height:1;
    background:rgba(255,248,238,0.88);
    color:#8a5b30;
    border:1px solid rgba(194,151,108,0.22);
    flex:0 0 auto;
  }

  .taskMiniBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:18px;
    padding:1px 6px;
    border-radius:999px;
    font-size:10px;
    font-weight:700;
    line-height:1;
    flex:0 0 auto;
    white-space:nowrap;
  }

  .taskMiniBadge.mine{
    background:linear-gradient(180deg,#ffcf8a 0%, #f5a95e 100%);
    color:#5a3515;
  }

  .taskMiniBadge.warn{
    background:linear-gradient(180deg,#ffb18c 0%, #ec7e54 100%);
    color:#fff7f1;
  }

  .taskMiniBadge.onlyme{
    background:linear-gradient(180deg,#f1ca79 0%, #d8a33c 100%);
    color:#fff9f1;
  }

  .taskItemInfo{
    display:block;
    margin-top:4px;
    position:relative;
    z-index:1;
    font-size:10px;
    font-weight:600;
    line-height:1.4;
    color:#8b6947;
    word-break:break-word;
  }

  .taskEmpty{
    padding:16px 12px;
    border-radius:15px;
    background:rgba(255,252,247,0.28);
    color:#8b6947;
    font-size:12px;
    line-height:1.6;
    text-align:center;
  }

  #browseDetailPane{
    padding:12px 12px 8px;
    min-width:0;
    display:flex;
    flex-direction:column;
    min-height:0;
    background:transparent;
  }

  #browseDetailHeader{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }

  .detailTitleWrap{
    min-width:0;
  }

  #browseDetailTitleTask{
    color:#6f4726;
    font-size:19px;
    font-weight:900;
    line-height:1.2;
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:wrap;
  }

  .detailTitleType{
    font-size:11px;
    font-weight:700;
    color:#8a6644;
  }

  #browseDetailStatusTask{
    flex:0 0 auto;
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,252,247,0.52);
    color:#7a5231;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }

  #browseDetailBody{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:rgba(175,135,98,0.55) transparent;
  }

  #browseDetailBody::-webkit-scrollbar{
    width:8px;
  }
  #browseDetailBody::-webkit-scrollbar-track{
    background:transparent;
  }
  #browseDetailBody::-webkit-scrollbar-thumb{
    background:rgba(175,135,98,0.55);
    border-radius:999px;
  }

  .detailTopGrid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    margin-bottom:10px;
  }

  .detailMetaCard{
    padding:9px 10px;
    border-radius:16px;
    background:rgba(255,248,240,0.72);
    border:1px solid rgba(214,186,149,0.28);
    box-shadow:0 4px 12px rgba(118,86,54,0.04);
    min-width:0;
  }

  .detailMetaLabel{
    color:#8a6644;
    font-size:11px;
    font-weight:800;
    margin-bottom:6px;
  }

  .detailMetaValue{
    color:#5f3b1d;
    font-size:15px;
    font-weight:900;
    word-break:break-word;
    line-height:1.3;
  }

  .sectionCard{
    padding:8px 9px 8px;
    border-radius:18px;
    background:rgba(255,250,244,0.60);
    border:1px solid rgba(214,186,149,0.32);
    box-shadow:0 4px 14px rgba(118,86,54,0.05);
    margin-bottom:14px;
    min-width:0;
  }

  .sectionHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding-bottom:5px;
    margin-bottom:6px;
    border-bottom:1px solid rgba(188,154,117,0.18);
  }

  .sectionTitle{
    color:#6f4726;
    font-size:14px;
    font-weight:900;
    line-height:1.2;
    margin:0;
  }

  .sectionMeta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:flex-end;
  }

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");

      authState.nickname = String(user.nickname || safeNickname).trim();
      authState.role = String(user.role || "member").toLowerCase();
      authState.memberId = String(user.member_id || "");
      authState.initialized = true;

      localStorage.setItem(STORAGE_KEYS.loggedIn, "true");
      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      localStorage.setItem(STORAGE_KEYS.memberId, authState.memberId);

      return { ok: true, user };
    } catch (err) {
      console.error("KEY 登录异常：", err);
      return { ok: false, message: err?.message || "登录失败，请稍后再试" };
    }
  }

  window.loginWithKey = loginWithKey;

  function handleLogout() {
    localStorage.removeItem(STORAGE_KEYS.loggedIn);
    localStorage.removeItem(STORAGE_KEYS.user);
    localStorage.removeItem(STORAGE_KEYS.role);
    localStorage.removeItem(STORAGE_KEYS.memberId);

  function showToast(title, message) {
    toastTitle.textContent = title || "提示";
    toastMessage.textContent = message || "";
    toastMask.classList.add("show");
    toastMask.setAttribute("aria-hidden", "false");

  toastMask.addEventListener("click", (e) => {

  function splitGold(totalGold) {
    const total = Math.max(0, Math.floor(Number(totalGold) || 0));
    const submit = Math.floor(total * TASK_PAYOUT.onSubmitRatio);
    const publish = total - submit;
    return { total, submit, publish };
  }

  function normalizeSingerCount(value) {
    return Math.max(1, Math.floor(Number(value) || 1));
  }

  function getSingerRewardByRule(singerQuota) {
    const count = normalizeSingerCount(singerQuota);

    if (SINGING_REWARD_TABLE[count] != null) {
      return SINGING_REWARD_TABLE[count];
    }

    return Math.max(12, Math.floor(17 - 0.5 * (count - 17)));
  }

  function getProducerRewardByRule(taskType, singerQuota) {
    const count = normalizeSingerCount(singerQuota);

    if (String(taskType || "") === "游戏") return 0;

    return Math.min(48 + Math.min(count - 1, 12), 60);
  }

  function extractNumberFromValue(value) {
    const str = String(value ?? "");
    const match = str.match(/\d+/);
    return match ? parseInt(match[0], 10) : Number.POSITIVE_INFINITY;
  }

  function getMemberOrderNumber(memberRaw) {
    const candidates = [
      memberRaw.display_order,
      memberRaw.member_order,
      memberRaw.order_no,
      memberRaw.member_no,
      memberRaw.member_number,
      memberRaw.no,
      memberRaw.code,
      memberRaw.member_code,
      memberRaw.invite_code,
      memberRaw.key_code,
      memberRaw.nickname,
      memberRaw.name
    ];

    for (const item of candidates) {
      const num = extractNumberFromValue(item);
      if (Number.isFinite(num)) return num;
    }
    return Number.POSITIVE_INFINITY;
  }

  function normalizeMemberName(memberRaw, index) {
    return memberRaw.nickname || memberRaw.name || `成员${index + 1}`;
  }

  function normalizeMembers(data) {
    return (data || [])
      .map((item, index) => {
        const orderNumber = getMemberOrderNumber(item);
        return {
          id: String(item.id ?? index),
          name: item.name || normalizeMemberName(item, index),
          nickname: item.nickname || item.name || normalizeMemberName(item, index),
          skills: item.skills || "",
          orderNumber
        };
      })
      .sort((a, b) => {
        if (a.orderNumber !== b.orderNumber) return a.orderNumber - b.orderNumber;
        return a.name.localeCompare(b.name, "zh-CN");
      });
  }

  function rebuildMemberOrderMap() {
    memberOrderMap = new Map();
    members.forEach((member, index) => {
      memberOrderMap.set(String(member.id), {
        orderNumber: Number.isFinite(member.orderNumber) ? member.orderNumber : (999999 + index),
        name: member.name || ""
      });
    });
  }

  function rebuildMemberDirectoryMap() {
    memberDirectoryMap = new Map();
    members.forEach(member => {
      memberDirectoryMap.set(String(member.id), {
        id: String(member.id),
        name: member.name || "",
        nickname: member.nickname || member.name || "",
        skills: member.skills || "",
        orderNumber: Number.isFinite(member.orderNumber) ? member.orderNumber : Number.POSITIVE_INFINITY
      });
    });
  }

  function getMemberDisplayNameById(memberId, fallback = "") {
    const hit = memberDirectoryMap.get(String(memberId || ""));
    return hit?.nickname || hit?.name || fallback || "";
  }

  function hydrateTaskNamesFromDirectory(taskList) {
    (taskList || []).forEach(task => {
      task.producer_name = getMemberDisplayNameById(task.producer_member_id, task.producer_name || "");

      (task.parts || []).forEach(part => {
        part.assigned_member_name = getMemberDisplayNameById(part.assigned_member_id, part.assigned_member_name || "");
      });

      (task.singers || []).forEach(singer => {
        singer.member_name = getMemberDisplayNameById(singer.member_id, singer.member_name || "");
      });
    });
  }

  function getSortInfoByMemberId(memberId, fallbackName = "") {
    const info = memberOrderMap.get(String(memberId));
    return {
      orderNumber: info?.orderNumber ?? Number.POSITIVE_INFINITY,
      name: info?.name || fallbackName || ""
    };
  }

  function sortSingersByMemberOrder(singers) {
    return [...(singers || [])].sort((a, b) => {
      const aInfo = getSortInfoByMemberId(a.member_id, a.member_name);
      const bInfo = getSortInfoByMemberId(b.member_id, b.member_name);
      if (aInfo.orderNumber !== bInfo.orderNumber) return aInfo.orderNumber - bInfo.orderNumber;
      return String(a.member_name || "").localeCompare(String(b.member_name || ""), "zh-CN");
    });
  }

  function makeDisplayTaskName(taskCode, taskName) {
    const code = safeText(taskCode, "");
    const name = safeText(taskName, "");
    if (!code) return name;
    if (!name) return code;
    return `${code}.${name}`;
  }

  function uniqueAssignedIds(parts) {
    return [...new Set((parts || []).map(part => part.assigned_member_id).filter(Boolean).map(String))];
  }

  function getSubmittedCount(task) {
    return (task.singers || []).filter(item => !!item.is_submitted).length;
  }

  function getProgressText(task) {
    const total = Math.max(1, Number(task.singer_quota) || 1);
    return `${getSubmittedCount(task)}/${total}`;
  }

  function getSingerPendingNoticeText(task) {
    const total = Math.max(1, Number(task.singer_quota) || 1);
    const submitted = getSubmittedCount(task);
    if (submitted === total - 1 && isOnlyWaitingMe(task)) {
      return `当前进度 ${getProgressText(task)}，只剩你未交音`;
    }
    return `当前进度 ${getProgressText(task)}，你还有演唱部分未交音。`;
  }

  function getProducerPendingNoticeText(task) {
    const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
    return allSingersDone
      ? "你是本项目混音负责人，请开始后期"
      : "你是本项目混音负责人，等待交音中";
  }

  function getPartsForMember(task, memberId) {
    return (task.parts || [])
      .filter(part => String(part.assigned_member_id || "") === String(memberId))
      .map(part => String(part.original_name || "").trim())
      .filter(Boolean);
  }

  function isMyProject(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const isSinger = (task.singers || []).some(item => String(item.member_id) === String(currentUserId));
    const isProducer = String(task.producer_member_id || "") === String(currentUserId);
    return isSinger || isProducer;
  }

  function isMySingerPending(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const singer = (task.singers || []).find(item => String(item.member_id) === String(currentUserId));
    if (!singer) return false;
    return !singer.is_submitted;
  }

  function isMyProducerPending(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;
    if (String(task.producer_member_id || "") !== String(currentUserId)) return false;

    const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
    if (!allSingersDone) return true;
    return !task.producer_completed;
  }

  function isMyUnsubmitted(task) {
    return isMySingerPending(task) || isMyProducerPending(task);
  }

  function isOnlyWaitingMe(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const mySinger = (task.singers || []).find(item => String(item.member_id) === String(currentUserId));
    const isProducer = String(task.producer_member_id || "") === String(currentUserId);

    if (mySinger && !mySinger.is_submitted) {
      const otherSingersDone = (task.singers || [])
        .filter(item => String(item.member_id) !== String(currentUserId))
        .every(item => !!item.is_submitted);
      return otherSingersDone;
    }

    if (isProducer) {
      const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
      return allSingersDone && !task.producer_completed;
    }

    return false;
  }

  function canEditSingerRecord(singerRecord, task) {
    const role = getCurrentRole();
    if (isManagerRole(role)) return true;

    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    if (String(task.created_by || "") === String(currentUserId)) return true;
    return String(singerRecord.member_id) === String(currentUserId);
  }

  function canEditProducerTask(task) {
    const role = getCurrentRole();
    if (isManagerRole(role)) return true;

    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    if (String(task.created_by || "") === String(currentUserId)) return true;
    return String(task.producer_member_id || "") === String(currentUserId);
  }

  function getComputedTaskStatus(task) {
    const stored = String(task.status || "").trim();
    const singerQuota = Math.max(1, Number(task.singer_quota) || 1);
    const singerCount = (task.singers || []).length;
    const assignedIds = uniqueAssignedIds(task.parts || []);
    const hasPartText = (task.parts || []).some(part => String(part.original_name || "").trim());
    const hasTone = !!String(task.project_tone || "").trim();
    const allSubmitted = singerCount > 0 && (task.singers || []).every(item => !!item.is_submitted);

    if (stored === "已发布") return "已发布";
    if (stored === "待发布") return "待发布";
    if (singerCount < singerQuota) return "待认领";
    if (!hasTone) return "未定调";
    if (!hasPartText || assignedIds.length < singerCount) return "未分词";
    if (allSubmitted && !task.producer_member_id) return "缺后期";
    return "制作中";
  }

  function buildShortInfo(task) {
    const parts = [];
    parts.push(task.task_type || "未分类");
    if (task.release_date) parts.push(`预计 ${formatDate(task.release_date)}`);
    else parts.push("预计未定");
    return parts.join("｜");
  }

  function transformProjectsToTasks(projectRows, partsRows, singersRows) {
    const partMap = new Map();
    const singerMap = new Map();

    (partsRows || []).forEach(part => {
      const key = String(part.project_id);
      if (!partMap.has(key)) partMap.set(key, []);
      partMap.get(key).push({
        id: part.id,
        part_order: part.part_order,
        original_name: part.original_name,
        assigned_member_id: part.assigned_member_id,
        assigned_member_name: part.members?.nickname || part.members?.name || ""
      });
    });

    (singersRows || []).forEach(singer => {
      const key = String(singer.project_id);
      if (!singerMap.has(key)) singerMap.set(key, []);
      singerMap.get(key).push({
        id: singer.id,
        member_id: singer.member_id,
        member_name: singer.members?.nickname || singer.members?.name || "",
        is_submitted: !!singer.is_submitted,
        submitted_at: singer.submitted_at || null
      });
    });

    return (projectRows || []).map(project => {
      const id = String(project.id);
      const parts = (partMap.get(id) || []).sort((a, b) => (a.part_order || 0) - (b.part_order || 0));
      const singers = sortSingersByMemberOrder(singerMap.get(id) || []);
      const producerName = project.producer_member?.nickname || project.producer_member?.name || "";

      const computedSingerBonus = getSingerRewardByRule(project.singer_quota);
      const computedProducerBonus = getProducerRewardByRule(project.task_type, project.singer_quota);

      return {
        id,
        task_code: project.task_code || "",
        task_name: project.task_name || "",
        displayName: makeDisplayTaskName(project.task_code, project.task_name),
        task_type: project.task_type || "",
        status: project.status || "",
        singer_quota: project.singer_quota ?? 1,
        singer_bonus: computedSingerBonus,
        producer_bonus: computedProducerBonus,
        producer_member_id: project.producer_member_id || null,
        producer_name: producerName,
        producer_completed: !!project.producer_completed,
        producer_completed_at: project.producer_completed_at || null,
        release_date: project.release_date || null,
        display_link: project.display_link || "",
        project_tone: project.project_tone || "",
        created_by: project.created_by || null,
        created_at: project.created_at || null,
        parts,
        singers
      };
    }).map(task => {
      task.computedStatus = getComputedTaskStatus(task);
      task.shortInfo = buildShortInfo(task);
      return task;
    }).filter(task => task.computedStatus === "制作中")
      .sort((a, b) => {
        const aCode = parseInt(String(a.task_code).match(/\d+/)?.[0] || "0", 10);
        const bCode = parseInt(String(b.task_code).match(/\d+/)?.[0] || "0", 10);
        return aCode - bCode;
      });
  }

  async function loadMembersFromSupabase() {
    try {
      let data = [];
      let error = null;

      const rpcResult = await supabaseClient.rpc("get_member_directory_for_app");
      if (!rpcResult.error && Array.isArray(rpcResult.data)) {
        data = rpcResult.data;
      } else {
        error = rpcResult.error || null;
        const fallbackResult = await supabaseClient
          .from("members")
          .select("id, nickname, name, skills");

        if (!fallbackResult.error && Array.isArray(fallbackResult.data)) {
          data = fallbackResult.data;
          error = null;
        } else {
          error = fallbackResult.error || error;
        }
      }

      if (error && !data.length) {
        console.error("读取成员目录失败：", error);
      }

      members = normalizeMembers(data || []);
      rebuildMemberOrderMap();
      rebuildMemberDirectoryMap();
    } catch (err) {
      members = [];
      rebuildMemberOrderMap();
      rebuildMemberDirectoryMap();
      console.error("成员目录读取失败：", err);
    }
  }

  async function loadProjectsFromSupabase() {
    const detailList = document.getElementById("browseListTask");
    detailList.innerHTML = '<div class="loadingText">正在读取任务...</div>';

    try {
      const { data: projectsData, error: projectsError } = await supabaseClient
        .from("projects")
        .select(`
          *,
          producer_member:members!projects_producer_member_id_fkey (
            id,
            nickname,
            name
          )
        `);

      if (projectsError) throw projectsError;

      const projectIds = (projectsData || []).map(item => item.id);

      let partsData = [];
      let singersData = [];

      if (projectIds.length) {
        const { data: partRows, error: partsError } = await supabaseClient
          .from("project_parts")
          .select(`
            id,
            project_id,
            part_order,
            original_name,
            assigned_member_id,
            members!project_parts_assigned_member_id_fkey (
              id,
              nickname,
              name
            )
          `)
          .in("project_id", projectIds)
          .order("part_order", { ascending: true });

        if (partsError) throw partsError;
        partsData = partRows || [];

        const { data: singerRows, error: singersError } = await supabaseClient
          .from("project_singers")
          .select(`
            id,
            project_id,
            member_id,
            is_submitted,
            submitted_at,
            members!project_singers_member_id_fkey (
              id,
              nickname,
              name
            )
          `)
          .in("project_id", projectIds);

        if (singersError) throw singersError;
        singersData = singerRows || [];
      }

      tasks = transformProjectsToTasks(projectsData || [], partsData, singersData);
      hydrateTaskNamesFromDirectory(tasks);

      const detailTasks = getFilteredTasks(detailSearchKeyword);
      if (!detailTasks.some(task => task.id === activeDetailTaskId)) {
        activeDetailTaskId = detailTasks.length ? detailTasks[0].id : "";
      }

      renderBrowseList();
      renderBrowseDetail();
    } catch (err) {
      console.error("读取 projects 失败：", err);
      detailList.innerHTML = '<div class="taskEmpty">任务读取失败，请检查表结构或权限</div>';
      setBrowseDetailEmpty("任务读取失败");
    }
  }

  function syncOverlayToImage() {
    const roomRect = room.getBoundingClientRect();
    const roomW = roomRect.width;
    const roomH = roomRect.height;

    const naturalW = bg.naturalWidth || 1600;
    const naturalH = bg.naturalHeight || 900;

    const imgRatio = naturalW / naturalH;
    const roomRatio = roomW / roomH;

    let drawW, drawH, drawLeft, drawTop;

    if (roomRatio > imgRatio) {
      drawH = roomH;
      drawW = drawH * imgRatio;
      drawLeft = (roomW - drawW) / 2;
      drawTop = 0;
    } else {
      drawW = roomW;
      drawH = drawW / imgRatio;
      drawLeft = 0;
      drawTop = (roomH - drawH) / 2;
    }

    overlay.style.left = drawLeft + "px";
    overlay.style.top = drawTop + "px";
    overlay.style.width = drawW + "px";
    overlay.style.height = drawH + "px";

    const BASE_SCREEN_W = 1600;
    const BASE_SCREEN_H = 900;
    const BASE_TOPBAR_LEFT = 28.2;
    const BASE_TOPBAR_TOP = 8.15;
    const BASE_TOPBAR_WIDTH = 65.4;
    const BASE_TOPBAR_GAP = 1.2;

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
    const fitW = drawW / BASE_SCREEN_W;
    const fitH = drawH / BASE_SCREEN_H;
    const fit = Math.min(fitW, fitH);

    let navScale = clamp(fit, 0.52, 1.18);
    let topUiScale = clamp(fit * 0.96, 0.72, 1.06);

    const smallerDelta = Math.max(0, 1 - fit);
    let topbarLeft = BASE_TOPBAR_LEFT - smallerDelta * 1.1;
    const topbarTop = BASE_TOPBAR_TOP;
    const topbarGap = clamp(BASE_TOPBAR_GAP * (0.92 + fit * 0.08), 0.82, 1.2);
    const safeGapPx = clamp(12, drawW * 0.012, 24);
    const overlayStyles = window.getComputedStyle(overlay);
    const userRight = parseFloat(overlayStyles.getPropertyValue("--user-right")) || 180;

    overlay.style.setProperty("--top-ui-scale", topUiScale.toFixed(4));
    overlay.style.setProperty("--topbar-left", `${topbarLeft.toFixed(3)}%`);
    overlay.style.setProperty("--topbar-top", `${topbarTop.toFixed(3)}%`);
    overlay.style.setProperty("--topbar-gap", `${topbarGap.toFixed(3)}%`);
    overlay.style.setProperty("--topbar-safe-gap", `${safeGapPx.toFixed(2)}px`);
    overlay.style.setProperty("--nav-scale", navScale.toFixed(4));

    const leftPx = drawW * (topbarLeft / 100);
    const userBoxWidth = topBarUserArea ? topBarUserArea.offsetWidth * topUiScale : 0;
    const availableWidthPx = Math.max(180, drawW - leftPx - userRight - userBoxWidth - safeGapPx);
    const desiredTopbarWidthPx = drawW * (BASE_TOPBAR_WIDTH / 100);
    const topbarWidthPx = Math.min(desiredTopbarWidthPx, availableWidthPx);
    overlay.style.setProperty("--topbar-width", `${(topbarWidthPx / drawW * 100).toFixed(3)}%`);

    requestAnimationFrame(() => {
      if (!navOuter || !roomNav) return;
      const navVisible = Math.max(160, navOuter.clientWidth - 2);
      let navNeeded = roomNav.scrollWidth;
      const minNavScale = 0.40;
      if (navNeeded > navVisible) {
        let ratio = navVisible / navNeeded;
        navScale = clamp(navScale * ratio * 0.985, minNavScale, 1.18);
        overlay.style.setProperty("--nav-scale", navScale.toFixed(4));
        requestAnimationFrame(() => {
          navNeeded = roomNav.scrollWidth;
          if (navNeeded > navVisible) {
            ratio = navVisible / navNeeded;
            navScale = clamp(navScale * ratio * 0.992, minNavScale, 1.18);
            overlay.style.setProperty("--nav-scale", navScale.toFixed(4));
          }
        });
      }
    });
  }

  function normalizeSearchQuery(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[｜|,，/]/g, " ")
      .trim()
      .split(/\s+/)
      .filter(Boolean);
  }

  function getFilteredTasks(keyword) {
    const tokens = normalizeSearchQuery(keyword);

    return tasks.filter(task => {
      if (taskFilterMode === "mine" && !isMyProject(task)) return false;
      if (taskFilterMode === "unsubmitted" && !isMyUnsubmitted(task)) return false;
      if (taskFilterMode === "onlyme" && !isOnlyWaitingMe(task)) return false;

      if (!tokens.length) return true;

      const partText = (task.parts || [])
        .map(item => `${item.original_name || ""} ${item.assigned_member_name || ""}`)
        .join(" ");

      const singerText = (task.singers || [])
        .map(item => item.member_name || "")
        .join(" ");

      const haystack = [
        task.displayName,
        task.task_name,
        task.task_code,
        task.task_type,
        task.producer_name,
        task.project_tone,
        task.release_date ? formatDate(task.release_date) : "",
        singerText,
        partText
      ].join(" ").toLowerCase();

      return tokens.every(token => haystack.includes(token));
    });
  }

  function renderBrowseList() {
    const list = document.getElementById("browseListTask");
    const listData = getFilteredTasks(detailSearchKeyword);
    const activeId = activeDetailTaskId;

    list.innerHTML = "";

    if (!listData.length) {
      list.innerHTML = `<div class="taskEmpty">暂无制作中项目</div>`;
      return;
    }

    listData.forEach(task => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "taskItem" + (task.id === activeId ? " active" : "");

      if (isMyProject(task)) btn.classList.add("myProject");
      if (isMyUnsubmitted(task)) btn.classList.add("unsubmittedWarn");

      const singerText = task.singers.length ? task.singers.map(s => s.member_name).join("、") : "暂无";

      const badgeHtml = [
        isMyProject(task) ? `<span class="taskMiniBadge mine">我参与</span>` : ``,
        isMyUnsubmitted(task) ? `<span class="taskMiniBadge warn">未交音</span>` : ``,
        isOnlyWaitingMe(task) ? `<span class="taskMiniBadge onlyme">只等我</span>` : ``
      ].filter(Boolean).join("");

      btn.innerHTML = `
        <div class="taskTitleLine">
          <span class="taskItemName">
            <span class="taskNameText">${escapeHtml(task.displayName)}</span>
            <span class="taskTypeMini">${escapeHtml(task.task_type || "未分类")}</span>
          </span>
        </div>
        <div class="taskBadgeLine">${badgeHtml}</div>
        <span class="taskItemInfo">演唱者：${escapeHtml(singerText)}</span>
      `;

      btn.addEventListener("click", () => {
        activeDetailTaskId = task.id;
        renderBrowseList();
        renderBrowseDetail();
      });

      list.appendChild(btn);
    });
  }

  function setBrowseDetailEmpty(message = "暂无任务") {
    document.getElementById("browseDetailTitleTask").textContent = message;
    document.getElementById("browseDetailStatusTask").textContent = "";
    document.getElementById("browseDetailContentTask").innerHTML = `<div class="taskEmpty">${escapeHtml(message)}</div>`;
    if (browseEditBtnTask) {
      browseEditBtnTask.style.display = "none";
      browseEditBtnTask.disabled = true;
    }
  }

  function buildSingerCardHtml(item, task) {
    const canEdit = canEditSingerRecord(item, task);
    const isMe = String(item.member_id) === String(getCurrentMemberId());
    const isPending = !item.is_submitted;
    const parts = getPartsForMember(task, item.member_id);
    const partText = parts.length ? parts.join(" / ") : "未分配部分";

    return `
      <div class="assignmentCompactRow ${isMe ? "mineCard" : ""} ${isPending ? "warn" : ""}">
        <div class="assignmentNameInline">
          <span class="assignmentNameText">${escapeHtml(item.member_name || "未命名成员")}</span>
        </div>
        <div class="assignmentPartText">${escapeHtml(partText)}</div>
        ${
          canEdit
            ? `<button class="tinyActionBtn ${item.is_submitted ? "done" : ""}" data-singer-record-id="${escapeHtml(item.id)}" data-current="${item.is_submitted ? "1" : "0"}">${item.is_submitted ? "撤回" : "交音"}</button>`
            : `<button class="tinyActionBtn readonly" type="button" disabled>${item.is_submitted ? "已交音" : "未交音"}</button>`
        }
      </div>
    `;
  }

  function buildProducerCardHtml(task) {
    if (!task.producer_member_id) {
      return `
        <div class="producerCard">
          <div class="producerNameInline">暂无负责人</div>
        </div>
      `;
    }

    const canEdit = canEditProducerTask(task);
    const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);

    let buttonHtml = "";

    if (!allSingersDone) {
      buttonHtml = `<button class="tinyActionBtn waiting" type="button" disabled>等待交音</button>`;
    } else if (task.producer_completed) {
      buttonHtml = canEdit
        ? `<button class="tinyActionBtn done" data-project-id="${escapeHtml(task.id)}" data-current="1">撤回</button>`
        : `<button class="tinyActionBtn readonly" type="button" disabled>已交付</button>`;
    } else {
      buttonHtml = canEdit
        ? `<button class="tinyActionBtn" data-project-id="${escapeHtml(task.id)}" data-current="0">交付</button>`
        : `<button class="tinyActionBtn readonly" type="button" disabled>未交付</button>`;
    }

    return `
      <div class="producerCard">
        <div class="producerNameInline">${escapeHtml(task.producer_name || "未命名成员")}</div>
        <div class="producerRight">
          ${buttonHtml}
        </div>
      </div>
    `;
  }


  function canEditTaskFromDetail(task) {
    const role = getCurrentRole();
    if (isManagerRole(role)) return true;

    const currentUserId = getCurrentMemberId();
    if (!currentUserId || !task) return false;

    if (String(task.created_by || "") === String(currentUserId)) return true;
    if (String(task.producer_member_id || "") === String(currentUserId)) return true;
    return (task.singers || []).some(item => String(item.member_id) === String(currentUserId));
  }

  function getTaskById(taskId) {
    return tasks.find(item => String(item.id) === String(taskId)) || null;
  }

  function getTaskDisplayName(task) {
    return task?.displayName || makeDisplayTaskName(task?.task_code, task?.task_name);
  }

  function getTaskTypeOptions(currentValue = "") {
    const fixed = ["披4", "披哥", "其他", "游戏"];
    const current = String(currentValue || "").trim();
    return current && !fixed.includes(current) ? [current, ...fixed] : fixed;
  }

  function formatDateForInput(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return "";
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function getEditableSingerIds() {
    return Array.from(editSingerMemberList.querySelectorAll('input[type="checkbox"]:checked')).map(input => input.value);
  }

  function buildMemberSelectOptions(selectedId = "", singerIdPool = null, includeEmpty = true) {
    const selected = String(selectedId || "");
    const allowed = singerIdPool ? new Set(singerIdPool.map(String)) : null;

    const optionHtml = members
      .filter(member => !allowed || allowed.has(String(member.id)))
      .map(member => `<option value="${escapeHtml(member.id)}" ${String(member.id) === selected ? "selected" : ""}>${escapeHtml(member.name)}</option>`)
      .join("");

    return `${includeEmpty ? `<option value="">未分配</option>` : ""}${optionHtml}`;
  }

  function renderEditSingerMemberList(selectedIds = []) {
    const selectedSet = new Set((selectedIds || []).map(String));
    editSingerMemberList.innerHTML = members.map(member => `
      <label class="memberCheckItem">
        <input type="checkbox" value="${escapeHtml(member.id)}" ${selectedSet.has(String(member.id)) ? "checked" : ""} />
        <span>${escapeHtml(member.name)}</span>
      </label>
    `).join("");
  }

  function getCurrentPartDraftFromDom() {
    return Array.from(editPartRows.querySelectorAll(".taskEditRow")).map((row, index) => ({
      original_name: String(row.querySelector('[data-field="original_name"]')?.value || "").trim(),
      assigned_member_id: String(row.querySelector('[data-field="assigned_member_id"]')?.value || "").trim(),
      part_order: index + 1
    }));
  }

  function renderEditPartRows() {
    const singerIds = getEditableSingerIds();

    editPartRows.innerHTML = editPartDraftRows.map((row, index) => {
      const assignedId = singerIds.includes(String(row.assigned_member_id || "")) ? String(row.assigned_member_id || "") : "";
      return `
        <div class="taskEditRow" data-row-index="${index}">
          <label class="taskEditField">
            <span class="taskEditLabel">原唱 / 部分 ${index + 1}</span>
            <input class="taskEditInput" data-field="original_name" type="text" value="${escapeHtml(row.original_name || "")}" placeholder="填写原唱或部分名" />
          </label>
          <label class="taskEditField">
            <span class="taskEditLabel">演唱成员</span>
            <select class="taskEditSelect" data-field="assigned_member_id">
              ${buildMemberSelectOptions(assignedId, singerIds, true)}
            </select>
          </label>
          <button class="taskEditTinyBtn taskEditRemoveBtn" type="button" data-remove-part-row="${index}">删除</button>
        </div>
      `;
    }).join("");

    if (!editPartDraftRows.length) {
      editPartRows.innerHTML = `<div class="taskEmpty">暂无歌词分配行，请先增加一行。</div>`;
    }
  }

  function syncEditPartDraftFromDomAndRender() {
    const currentRows = getCurrentPartDraftFromDom();
    if (currentRows.length) {
      editPartDraftRows = currentRows;
    }
    renderEditPartRows();
    bindEditPartRowButtons();
  }

  function bindEditPartRowButtons() {
    editPartRows.querySelectorAll("[data-remove-part-row]").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = Number(btn.dataset.removePartRow);
        const domRows = getCurrentPartDraftFromDom();
        editPartDraftRows = domRows.filter((_, i) => i !== idx);
        renderEditPartRows();
        bindEditPartRowButtons();
      });
    });

    editPartRows.querySelectorAll('[data-field="assigned_member_id"]').forEach(select => {
      select.addEventListener("change", () => {
        editPartDraftRows = getCurrentPartDraftFromDom();
      });
    });

    editPartRows.querySelectorAll('[data-field="original_name"]').forEach(input => {
      input.addEventListener("input", () => {
        editPartDraftRows = getCurrentPartDraftFromDom();
      });
    });
  }

  function populateTaskTypeSelect(currentValue) {
    const options = getTaskTypeOptions(currentValue);
    editTaskType.innerHTML = options.map(item => `<option value="${escapeHtml(item)}" ${item === currentValue ? "selected" : ""}>${escapeHtml(item)}</option>`).join("");
  }

  function populateProducerSelect(selectedId = "") {
    editProducerMemberId.innerHTML = `<option value="">未分配</option>` + members.map(member => `
      <option value="${escapeHtml(member.id)}" ${String(member.id) === String(selectedId || "") ? "selected" : ""}>${escapeHtml(member.name)}</option>
    `).join("");
  }

  function openTaskEditModal(taskId = activeDetailTaskId) {
    const task = getTaskById(taskId);
    if (!task) {
      showToast("无法编辑", "当前未找到可编辑的项目。");
      return;
    }

    if (!canEditTaskFromDetail(task)) {
      showToast("暂无权限", "当前账号不能修改这个项目。");
      return;
    }

    currentEditingTaskId = String(task.id);
    taskEditTitle.textContent = `编辑｜${getTaskDisplayName(task)}`;
    taskEditSubtitle.textContent = "保存后会自动按最新数据重新归类状态";
    editTaskCode.value = task.task_code || "";
    editTaskName.value = task.task_name || "";
    populateTaskTypeSelect(task.task_type || "其他");
    editSingerQuota.value = String(Math.max(1, Number(task.singer_quota) || 1));
    editProjectTone.value = task.project_tone || "";
    editReleaseDate.value = formatDateForInput(task.release_date);
    populateProducerSelect(task.producer_member_id || "");

    renderEditSingerMemberList((task.singers || []).map(item => item.member_id));
    editPartDraftRows = (task.parts || []).length
      ? (task.parts || []).map((part, index) => ({
          original_name: part.original_name || "",
          assigned_member_id: part.assigned_member_id || "",
          part_order: index + 1
        }))
      : Array.from({ length: Math.max(1, Number(task.singer_quota) || 1) }, (_, index) => ({
          original_name: "",
          assigned_member_id: "",
          part_order: index + 1
        }));

    renderEditPartRows();
    bindEditPartRowButtons();

    taskEditMask.classList.add("show");
    taskEditMask.setAttribute("aria-hidden", "false");
  }

  function closeTaskEditModal() {
    taskEditMask.classList.remove("show");
    taskEditMask.setAttribute("aria-hidden", "true");
    currentEditingTaskId = "";
    editPartDraftRows = [];
  }

  function collectTaskEditPayload() {
    const task = getTaskById(currentEditingTaskId);
    const singerQuota = Math.max(1, Math.floor(Number(editSingerQuota.value) || 1));
    const selectedSingerIds = getEditableSingerIds();

    if (!task) {
      throw new Error("未找到正在编辑的项目。");
    }

    if (!String(editTaskName.value || "").trim()) {
      throw new Error("请先填写歌名。");
    }

    if (selectedSingerIds.length > singerQuota) {
      throw new Error("已勾选的演唱者人数不能超过“演唱人数”。");
    }

    const partRows = getCurrentPartDraftFromDom()
      .map((row, index) => ({
        original_name: String(row.original_name || "").trim(),
        assigned_member_id: String(row.assigned_member_id || "").trim() || null,
        part_order: index + 1
      }))
      .filter(row => row.original_name || row.assigned_member_id);

    return {
      projectId: task.id,
      projectPayload: {
        task_name: String(editTaskName.value || "").trim(),
        task_type: String(editTaskType.value || "").trim() || "其他",
        singer_quota: singerQuota,
        project_tone: String(editProjectTone.value || "").trim() || null,
        release_date: editReleaseDate.value || null,
        producer_member_id: String(editProducerMemberId.value || "").trim() || null
      },
      selectedSingerIds,
      existingSingerRecords: task.singers || [],
      partRows
    };
  }

  async function saveTaskEditModal() {
    try {
      const payload = collectTaskEditPayload();

      taskEditSaveBtn.disabled = true;
      taskEditSaveBtn.textContent = "保存中...";

      const { error: projectError } = await supabaseClient
        .from("projects")
        .update(payload.projectPayload)
        .eq("id", payload.projectId);

      if (projectError) throw projectError;

      const existingSingerMap = new Map((payload.existingSingerRecords || []).map(item => [String(item.member_id), item]));
      const selectedSet = new Set(payload.selectedSingerIds.map(String));

      const removeSingerRecordIds = (payload.existingSingerRecords || [])
        .filter(item => !selectedSet.has(String(item.member_id)))
        .map(item => item.id);

      if (removeSingerRecordIds.length) {
        const { error: deleteSingerError } = await supabaseClient
          .from("project_singers")
          .delete()
          .in("id", removeSingerRecordIds);

        if (deleteSingerError) throw deleteSingerError;
      }

      const insertSingerRows = payload.selectedSingerIds
        .filter(memberId => !existingSingerMap.has(String(memberId)))
        .map(memberId => ({
          project_id: payload.projectId,
          member_id: memberId,
          is_submitted: false,
          submitted_at: null
        }));

      if (insertSingerRows.length) {
        const { error: insertSingerError } = await supabaseClient
          .from("project_singers")
          .insert(insertSingerRows);

        if (insertSingerError) throw insertSingerError;
      }

      const { error: deletePartsError } = await supabaseClient
        .from("project_parts")
        .delete()
        .eq("project_id", payload.projectId);

      if (deletePartsError) throw deletePartsError;

      if (payload.partRows.length) {
        const insertPartRows = payload.partRows.map(row => ({
          project_id: payload.projectId,
          part_order: row.part_order,
          original_name: row.original_name || null,
          assigned_member_id: row.assigned_member_id || null
        }));

        const { error: insertPartsError } = await supabaseClient
          .from("project_parts")
          .insert(insertPartRows);

        if (insertPartsError) throw insertPartsError;
      }

      const editedProjectId = payload.projectId;
      closeTaskEditModal();
      await loadProjectsFromSupabase();
      renderSiteNotifications();

      if (tasks.some(item => String(item.id) === String(editedProjectId))) {
        activeDetailTaskId = editedProjectId;
        renderBrowseDetail();
        showToast("保存成功", "项目内容已更新。");
      } else {
        showToast("保存成功", "项目已更新，但根据最新填写内容，它已不再属于“制作中”，会自动移回待处理。");
      }
    } catch (err) {
      console.error("保存编辑弹窗失败：", err);
      showToast("保存失败", err?.message || "保存时出现问题。");
    } finally {
      taskEditSaveBtn.disabled = false;
      taskEditSaveBtn.textContent = "保存";
    }
  }


  function buildTaskDetailHtml(task) {
    const singerSplit = splitGold(task.singer_bonus || 0);
    const producerSplit = splitGold(task.producer_bonus || 0);

    const singersHtml = (task.singers || []).length
      ? sortSingersByMemberOrder(task.singers).map(item => buildSingerCardHtml(item, task)).join("")
      : `<div class="taskEmpty">暂无演唱分配</div>`;

    return `
      <div class="sectionCard">
        <div class="sectionHeader">
          <h3 class="sectionTitle">演唱分配</h3>
          <div class="sectionMeta">
            <span class="sectionMetaText">调：${escapeHtml(task.project_tone || "未定调")}</span>
            <span class="sectionMetaText">演唱进度：${escapeHtml(getProgressText(task))}</span>
          </div>
        </div>
        <div class="assignmentList">${singersHtml}</div>
      </div>

      <div class="bottomGrid">
        <div class="sectionCard">
          <div class="sectionHeader">
            <h3 class="sectionTitle">混音负责人</h3>
          </div>
          ${buildProducerCardHtml(task)}
        </div>

        <div class="sectionCard">
          <div class="sectionHeader">
            <h3 class="sectionTitle">奖金</h3>
          </div>
          <div class="goldGrid">
            <div class="goldCard">
              <div class="goldLabel">演唱</div>
              <div class="goldMain">${escapeHtml(String(singerSplit.total))} 金币</div>
              <div class="goldSub">
                <span>交音 ${escapeHtml(String(singerSplit.submit))}</span>
                <span>发布 ${escapeHtml(String(singerSplit.publish))}</span>
              </div>
            </div>

            <div class="goldCard">
              <div class="goldLabel">混音</div>
              <div class="goldMain">${escapeHtml(String(producerSplit.total))} 金币</div>
              <div class="goldSub">
                <span>交付 ${escapeHtml(String(producerSplit.submit))}</span>
                <span>发布 ${escapeHtml(String(producerSplit.publish))}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function bindTaskDetailActionButtons() {
    const currentTask = getTaskById(activeDetailTaskId);

    if (browseEditBtnTask) {
      const canEdit = !!currentTask && canEditTaskFromDetail(currentTask);
      browseEditBtnTask.disabled = !canEdit;
      browseEditBtnTask.style.display = currentTask ? "" : "none";
      browseEditBtnTask.textContent = canEdit ? "编辑" : "不可编辑";
    }

    document.querySelectorAll("[data-singer-record-id]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const singerRecordId = btn.dataset.singerRecordId;
        const current = btn.dataset.current === "1";
        await toggleSingerSubmitted(singerRecordId, current);
      });
    });

    document.querySelectorAll("[data-project-id]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const projectId = btn.dataset.projectId;
        const current = btn.dataset.current === "1";
        await toggleProducerCompleted(projectId, current);
      });
    });
  }

  function renderBrowseDetail() {
    const listData = getFilteredTasks(detailSearchKeyword);
    const task = listData.find(item => item.id === activeDetailTaskId) || listData[0];

    if (!task) {
      setBrowseDetailEmpty("暂无制作中项目");
      return;
    }

    activeDetailTaskId = task.id;
    document.getElementById("browseDetailTitleTask").innerHTML = `
      ${escapeHtml(task.displayName)}
      <span class="detailTitleType">${escapeHtml(task.task_type || "")}</span>
    `;
    document.getElementById("browseDetailStatusTask").textContent = task.release_date ? `预计发布：${formatDate(task.release_date)}` : "预计发布：未定";
    document.getElementById("browseDetailContentTask").innerHTML = buildTaskDetailHtml(task);
    bindTaskDetailActionButtons();
    renderBrowseList();
  }

  function updateTaskFilterButtons() {
    document.querySelectorAll(".taskFilterBtn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.taskFilter === taskFilterMode);
    });
  }

  async function toggleSingerSubmitted(singerRecordId, currentValue) {
    try {
      const payload = currentValue
        ? { is_submitted: false, submitted_at: null }
        : { is_submitted: true, submitted_at: new Date().toISOString() };

      const { error } = await supabaseClient
        .from("project_singers")
        .update(payload)
        .eq("id", singerRecordId);

      if (error) throw error;

      await loadProjectsFromSupabase();
    } catch (err) {
      console.error("更新交音状态失败：", err);
      showToast("操作失败", err?.message || "更新交音状态失败");
    }
  }

  async function toggleProducerCompleted(projectId, currentValue) {
    try {
      const task = tasks.find(item => String(item.id) === String(projectId));
      const allSingersDone = task && (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);

      if (!allSingersDone && !currentValue) {
        showToast("暂不能交付", "演唱尚未全部交音，暂时不能交付混音。");
        return;
      }

      const payload = currentValue
        ? { producer_completed: false, producer_completed_at: null }
        : { producer_completed: true, producer_completed_at: new Date().toISOString() };

      const { error } = await supabaseClient
        .from("projects")
        .update(payload)
        .eq("id", projectId);

      if (error) throw error;

      await loadProjectsFromSupabase();
    } catch (err) {
      console.error("更新混音状态失败：", err);
      showToast("操作失败", err?.message || "更新混音状态失败");
    }
  }


  if (browseEditBtnTask) {
    browseEditBtnTask.addEventListener("click", () => {
      openTaskEditModal(activeDetailTaskId);
    });
  }

  taskEditCloseBtn.addEventListener("click", closeTaskEditModal);
  taskEditCancelBtn.addEventListener("click", closeTaskEditModal);
  taskEditMask.addEventListener("click", (event) => {
    if (event.target === taskEditMask) closeTaskEditModal();
  });
  taskEditSaveBtn.addEventListener("click", saveTaskEditModal);

  editAddPartRowBtn.addEventListener("click", () => {
    editPartDraftRows = getCurrentPartDraftFromDom();
    editPartDraftRows.push({
      original_name: "",
      assigned_member_id: "",
      part_order: editPartDraftRows.length + 1
    });
    renderEditPartRows();
    bindEditPartRowButtons();
  });

  editSingerQuota.addEventListener("change", () => {
    const quota = Math.max(1, Math.floor(Number(editSingerQuota.value) || 1));
    editSingerQuota.value = String(quota);
  });

  editSingerMemberList.addEventListener("change", (event) => {
    if (event.target.matches('input[type="checkbox"]')) {
      const checkedIds = getEditableSingerIds();
      const quota = Math.max(1, Math.floor(Number(editSingerQuota.value) || 1));

      if (checkedIds.length > quota) {
        event.target.checked = false;
        showToast("人数超出", "勾选的演唱者人数不能超过“演唱人数”。");
        return;
      }

      syncEditPartDraftFromDomAndRender();
    }
  });


  document.getElementById("browsePrimaryBtnTask").addEventListener("click", async () => {
    await loadProjectsFromSupabase();
  });

  detailSearchInput.addEventListener("input", (e) => {
    detailSearchKeyword = e.target.value;
    const filtered = getFilteredTasks(detailSearchKeyword);
    if (!filtered.some(task => task.id === activeDetailTaskId)) {
      activeDetailTaskId = filtered.length ? filtered[0].id : "";
    }
    renderBrowseList();
    renderBrowseDetail();
  });

  document.querySelectorAll(".taskFilterBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      taskFilterMode = btn.dataset.taskFilter;
      updateTaskFilterButtons();
      const filtered = getFilteredTasks(detailSearchKeyword);
      if (!filtered.some(task => task.id === activeDetailTaskId)) {
        activeDetailTaskId = filtered.length ? filtered[0].id : "";
      }
      renderBrowseList();
      renderBrowseDetail();
    });
  });

  document.getElementById("goClaimBtn").addEventListener("click", () => {
    window.location.href = PAGE_LINKS.studioSubmit;
  });

document.getElementById("goProjectBtn").addEventListener("click", () => {
  window.location.href = PAGE_LINKS.studioProject;
});

document.getElementById("goTaskBtn").addEventListener("click", () => {
  window.location.href = PAGE_LINKS.studioTodo;
});

  document.querySelectorAll(".navBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomKey = btn.dataset.room;

      if (roomKey === "manager") {
        const role = getCurrentRole();
        const page =
          role === "owner" ? PAGE_LINKS.managerOwner :
          role === "admin" ? PAGE_LINKS.managerAdmin :
          role === "member" ? PAGE_LINKS.managerMember :
          PAGE_LINKS.managerVisitor;

        window.location.href = page;
        return;
      }

      if (PAGE_LINKS[roomKey]) {
        window.location.href = PAGE_LINKS[roomKey];
      }
    });
  });

  document.getElementById("logoutBtn").addEventListener("click", handleLogout);

  bg.addEventListener("load", syncOverlayToImage);

  window.addEventListener("storage", async (e) => {
    if ([STORAGE_KEYS.loggedIn, STORAGE_KEYS.user, STORAGE_KEYS.role, STORAGE_KEYS.memberId].includes(e.key)) {
      const ok = await ensureAuthState();
      if (!ok) return;
      updateTopBarIdentity();
      await loadProjectsFromSupabase();
      renderSiteNotifications();
    }
  });

  document.addEventListener("click", (event) => {
    if (!event.target.closest("#siteNoticeWrap")) {
      toggleSiteNoticePanel(false);
    }
  });

  siteNoticeBtn?.addEventListener("click", (event) => {
    event.stopPropagation();
    renderSiteNotifications();
    toggleSiteNoticePanel();
  });

  window.addEventListener("load", async () => {
    const ok = await ensureAuthState();
    if (!ok) return;
    updateTopBarIdentity();
    syncOverlayToImage();
    updateTaskFilterButtons();
    await loadMembersFromSupabase();
    await loadProjectsFromSupabase();
    renderSiteNotifications();
  });

  window.addEventListener("resize", syncOverlayToImage);

  if ("ResizeObserver" in window) {
    const ro = new ResizeObserver(syncOverlayToImage);
    ro.observe(room);
  }
</script>
</body>
</html>
