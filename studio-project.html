<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜任务详情</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *{box-sizing:border-box;}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:linear-gradient(180deg,#e7dfd4 0%, #ddd4c8 100%);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  #room{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:linear-gradient(180deg,#e7dfd4 0%, #ddd4c8 100%);
  }

  #bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    display:block;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
  }

  #overlay{
    position:absolute;
    inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
    --overlay-ui-scale:1;
    --project-panel-scale:1;
    --project-radius-lg:calc(30px * var(--project-panel-scale));
    --project-radius-md:calc(20px * var(--project-panel-scale));
    --project-radius-sm:calc(14px * var(--project-panel-scale));
    --project-gap-xs:calc(5px * var(--project-panel-scale));
    --project-gap-sm:calc(8px * var(--project-panel-scale));
    --project-gap-md:calc(12px * var(--project-panel-scale));
    --project-gap-lg:calc(16px * var(--project-panel-scale));
    --project-pad-xs:calc(8px * var(--project-panel-scale));
    --project-pad-sm:calc(10px * var(--project-panel-scale));
    --project-pad-md:calc(12px * var(--project-panel-scale));
    --project-pad-lg:calc(14px * var(--project-panel-scale));
    --project-pad-xl:calc(18px * var(--project-panel-scale));
    --project-font-xs:calc(12px * var(--project-panel-scale));
    --project-font-sm:calc(13px * var(--project-panel-scale));
    --project-font-md:calc(14px * var(--project-panel-scale));
    --project-font-base:calc(15px * var(--project-panel-scale));
    --project-font-lg:calc(17px * var(--project-panel-scale));
    --project-font-xl:calc(20px * var(--project-panel-scale));
    --project-font-hero:calc(22px * var(--project-panel-scale));
    --project-btn-h:calc(40px * var(--project-panel-scale));
    --project-assignment-min-h:calc(96px * var(--project-panel-scale));
  }
  #overlay *{
    pointer-events:auto;
  }

  :root{
    --top-chip-bg: rgba(255,252,247,0.86);
    --top-chip-border: rgba(160,116,78,0.12);
    --top-chip-shadow:
      inset 0 1px 0 rgba(255,255,255,0.96),
      0 3px 10px rgba(110,84,58,0.08);
  }

  #topBar{
    position:absolute;
    left:28.2%;
    top:8.15%;
    width:65.4%;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    z-index:40;
    overflow:visible;
  }

  #navOuter{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
  }

  #navScroll{
    width:100%;
    overflow:hidden;
    overflow-y:hidden;
    white-space:nowrap;
    scrollbar-width:none;
    -ms-overflow-style:none;
    padding-bottom:2px;
  }
  #navScroll::-webkit-scrollbar{
    display:none;
  }

  #roomNav{
    display:inline-flex;
    align-items:center;
    gap:var(--nav-gap, 10px);
    min-width:max-content;
    max-width:none;
    transform-origin:left top;
    will-change:transform;
  }

.navBtn{
  appearance:none;
  border:none;
  cursor:pointer;
  height:var(--nav-btn-height, 42px);
  padding:0 var(--nav-btn-px, 18px);
  border-radius:var(--nav-btn-radius, 14px);
  background:linear-gradient(180deg, #efd5ab 0%, #dfbd8a 100%);
  color:#704724;
  font-size:var(--nav-btn-font, 15px);
  font-weight:700;
  white-space:nowrap;
  box-shadow:
    inset 0 1px 0 rgba(255,247,230,0.95),
    inset 0 -2px 0 rgba(150,105,60,0.10),
    0 2px 8px rgba(112,83,52,0.12);
  border:1px solid rgba(159,114,69,0.18);
  transition:filter .18s ease, box-shadow .18s ease;
  flex:0 0 auto;
}

.navBtn:hover{
  transform:none;
  filter:brightness(1.04);
  box-shadow:
    inset 0 1px 0 rgba(255,247,230,0.98),
    inset 0 -2px 0 rgba(150,105,60,0.12),
    0 4px 10px rgba(112,83,52,0.16);
}

/* =========================================================
   身份组件：恢复 todo 奶油半透明标准样式
========================================================= */
#logoutBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:34px;
    min-width:34px;
    flex:0 0 34px;
    height:auto;
    min-height:auto;
    padding:0;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#67401f;
    font-size:var(--identity-logout-font, 10px);
    font-weight:800;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    order:3;
    align-self:stretch;
    overflow:hidden;
    line-height:1;
  }

#logoutBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

#topBarUserAnchor{
    position:absolute;
    right:7.35%;
    left:auto;
    top:8%;
    width:clamp(158px, 12.6vw, 196px);
    height:clamp(31px, 4.5vh, 38px);
    z-index:65;
    pointer-events:none;
  }

#topBarUserArea{
    --identity-font:calc(23px * var(--bg-ui-scale, 1));
    --identity-icon-font:calc(22px * var(--bg-ui-scale, 1));
    --identity-logout-font:calc(18px * var(--bg-ui-scale, 1));

    position:absolute;
    right:0;
    left:auto;
    top:0;
    display:inline-flex;
    align-items:stretch;
    justify-content:flex-end;
    gap:5px;
    width:max-content;
    min-width:100%;
    max-width:calc(100vw - 18px);
    height:100%;
    min-height:0;
    max-height:none;
    padding:4px 5px;
    border-radius:13px;
    background:rgba(255,248,239,0.92);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    text-align:center;
    pointer-events:auto;
    box-sizing:border-box;
    overflow:visible;
    transform:none;
    white-space:nowrap;
  }

#currentUserBadge{
    order:1;
    flex:0 0 auto;
    width:auto;
    min-width:max-content;
    height:auto;
    min-height:auto;
    padding:0 8px;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#6c4523;
    font-size:var(--identity-font);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    white-space:nowrap;
    overflow:visible;
    box-sizing:border-box;
    align-self:stretch;
  }

#currentUserBadge .identityText{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
    text-overflow:clip;
    text-align:left;
    white-space:nowrap;
    line-height:1;
    font-size:inherit;
  }

#siteNoticeWrap{
    position:relative;
    width:28px;
    height:auto;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    order:2;
    align-self:stretch;
    overflow:visible;
    flex:0 0 28px;
  }

#siteNoticeBtn{
    position:relative;
    width:100%;
    min-width:0;
    height:100%;
    padding:0;
    border:none;
    cursor:pointer;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#6c4523;
    font-size:var(--identity-icon-font, 11px);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    overflow:visible;
    box-sizing:border-box;
  }

#siteNoticeBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }

#siteNoticeIcon{
    display:block;
    line-height:1;
    filter:drop-shadow(0 1px 0 rgba(255,255,255,0.55));
  }

#siteNoticeText{
    display:none;
  }

#siteNoticeCount{
    position:absolute;
    right:-6px;
    top:-6px;
    min-width:20px;
    height:20px;
    padding:0 6px;
    border-radius:999px;
    background:#c98c4f;
    color:#fff9f1;
    font-size:10px;
    font-weight:900;
    line-height:1;
    display:none;
    align-items:center;
    justify-content:center;
    border:2px solid rgba(255,248,239,0.98);
    box-sizing:border-box;
    box-shadow:0 2px 8px rgba(116,86,54,0.16);
    z-index:3;
  }

#siteNoticeBtn.hasNotice #siteNoticeCount{
    display:flex;
  }

#siteNoticePanel{
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    width:min(360px, 72vw);
    max-height:540px;
    overflow:auto;
    padding:12px;
    border-radius:16px;
    background:rgba(255,249,241,0.98);
    border:1px solid rgba(203,167,123,0.28);
    box-shadow:0 16px 36px rgba(85,58,34,0.16);
    display:none;
    z-index:80;
    text-align:left;
  }

  #siteNoticePanel.show{display:block;}
  .siteNoticeTitle{color:#6f4726;font-size:13px;font-weight:900;margin-bottom:calc(10px * var(--ui-scale));}
  .siteNoticeEmpty{color:#8a6644;font-size:12px;line-height:1.6;padding:6px 2px 2px;}
  .siteNoticeList{display:flex;flex-direction:column;gap:8px;}
  .siteNoticeItem{padding:10px;border-radius:12px;background:rgba(255,252,247,0.82);box-shadow:inset 0 1px 0 rgba(255,255,255,0.92), 0 2px 8px rgba(120,92,63,0.05);}
  .siteNoticeItemTitle{color:#6f4726;font-size:12px;font-weight:800;line-height:1.5;margin-bottom:4px;}
  .siteNoticeItemDesc{color:#8a6644;font-size:11px;line-height:1.55;margin-bottom:calc(10px * var(--ui-scale));}
  .siteNoticeAction{appearance:none;border:none;cursor:pointer;min-height:calc(31px * var(--ui-scale));padding:0 12px;border-radius:10px;background:linear-gradient(180deg,#efd5ab 0%, #dfbd8a 100%);color:#6a4120;font-size:11px;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,247,230,0.95), 0 4px 12px rgba(112,83,52,0.10);}

  #taskPanel{
    position:absolute;
    left:43%;
    top:18%;
    transform:translateX(-50%);
    transform-origin:top center;
    width:69.5%;
    height:70%;
    min-height:360px;
    border-radius:var(--project-radius-lg);
    background:rgba(255,255,255,0.34);
    border:1px solid rgba(255,255,255,0.52);
    box-shadow:
      0 16px 42px rgba(122,96,68,0.10),
      inset 0 1px 0 rgba(255,255,255,0.62),
      inset 0 -1px 0 rgba(255,255,255,0.20);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    overflow:visible;
  }

  #taskPanel::before{
    content:"";
    position:absolute;
    inset:calc(10px * var(--project-panel-scale));
    border-radius:calc(22px * var(--project-panel-scale));
    border:1px solid rgba(255,255,255,0.22);
    pointer-events:none;
  }

  #panelSwitch{
    position:absolute;
    right:calc(-194px * var(--project-panel-scale));
    top:24.6%;
    transform:translateY(-50%);
    transform-origin:top right;
    width:calc(170px * var(--project-panel-scale));
    padding:calc(18px * var(--project-panel-scale)) calc(14px * var(--project-panel-scale));
    border-radius:var(--project-radius-md);
    background:rgba(255,248,239,0.9);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.86);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:30;
  }

  .switchBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:100%;
    min-height:var(--project-btn-h);
    padding:calc(8px * var(--project-panel-scale)) calc(12px * var(--project-panel-scale));
    border-radius:calc(13px * var(--project-panel-scale));
    background:rgba(231,214,185,0.92);
    color:#744b25;
    font-size:var(--project-font-base);
    font-weight:700;
    line-height:1.2;
    text-align:center;
    box-shadow:
      inset 0 1px 0 rgba(255,247,233,0.95),
      0 2px 6px rgba(116,86,54,0.08);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
  }

  .switchBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .switchBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
    box-shadow:
      inset 0 1px 0 rgba(255,224,188,0.55),
      0 4px 10px rgba(116,86,54,0.14);
  }

  #browsePanelInner{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:26.5% 73.5%;
    min-width:0;
  }

  #browseListPane{
    padding:calc(16px * var(--project-panel-scale)) calc(10px * var(--project-panel-scale)) calc(14px * var(--project-panel-scale)) calc(14px * var(--project-panel-scale));
    border-right:1px solid rgba(255,255,255,0.20);
    display:flex;
    flex-direction:column;
    min-height:0;
    background:transparent;
    min-width:0;
  }

  #browseListTitleTask{
    display:none;
  }

  .taskFilterRow{
    display:flex;
    flex-wrap:wrap;
    gap:var(--project-gap-xs);
    margin:0 0 var(--project-gap-sm);
    padding-right:calc(4px * var(--project-panel-scale));
  }

  .taskFilterBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    min-width:calc(52px * var(--project-panel-scale));
    height:calc(28px * var(--project-panel-scale));
    padding:0 calc(10px * var(--project-panel-scale));
    border-radius:calc(9px * var(--project-panel-scale));
    background:rgba(255,252,247,0.62);
    color:#6a4120;
    font-size:var(--project-font-sm);
    font-weight:700;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 2px 6px rgba(116,86,54,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
    white-space:nowrap;
  }

  .taskFilterBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .taskFilterBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
  }

  .searchWrap{
    flex:0 0 auto;
    margin:0 0 var(--project-gap-sm);
    padding-right:calc(4px * var(--project-panel-scale));
  }

  .searchInput{
    width:100%;
    height:calc(36px * var(--project-panel-scale));
    border:none;
    outline:none;
    border-radius:calc(12px * var(--project-panel-scale));
    padding:0 calc(12px * var(--project-panel-scale));
    background:rgba(255,252,247,0.62);
    color:#5f3b1d;
    font-size:var(--project-font-md);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      0 2px 8px rgba(120,92,63,0.05);
  }

  .searchInput::placeholder{
    color:#9a7b5b;
  }

  #browseListTask{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:rgba(175,135,98,0.55) transparent;
  }

  #browseListTask::-webkit-scrollbar{
    width:8px;
  }
  #browseListTask::-webkit-scrollbar-track{
    background:transparent;
  }
  #browseListTask::-webkit-scrollbar-thumb{
    background:rgba(175,135,98,0.55);
    border-radius:999px;
  }

  .taskItem{
    width:100%;
    appearance:none;
    border:none;
    cursor:pointer;
    text-align:left;
    padding:calc(9px * var(--project-panel-scale)) calc(10px * var(--project-panel-scale));
    margin:0 0 calc(6px * var(--project-panel-scale));
    border-radius:calc(13px * var(--project-panel-scale));
    background:rgba(255,252,247,0.34);
    color:#6c4523;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.52),
      0 3px 10px rgba(120,92,63,0.05);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    position:relative;
    min-width:0;
    overflow:hidden;
    isolation:isolate;
  }

  .taskItem:hover{
    transform:translateY(-1px);
    background:rgba(255,252,247,0.52);
  }

  .taskItem.active:hover{
    transform:none;
  }

  .taskItem.active{
    background:linear-gradient(180deg, rgba(240,219,185,0.98) 0%, rgba(230,200,157,0.98) 100%);
    color:#5c3819;
    border:1px solid rgba(217,163,100,0.90);
    box-shadow:
      inset 0 0 0 1px rgba(255,247,229,0.96),
      0 0 0 2px rgba(217,163,100,0.22),
      0 6px 14px rgba(120,92,63,0.12);
  }

  .taskItem.active::after{
    content:"";
    position:absolute;
    inset:2px;
    border-radius:11px;
    pointer-events:none;
    background:
      linear-gradient(115deg,
        rgba(255,255,255,0) 18%,
        rgba(255,251,241,0.18) 34%,
        rgba(255,255,255,0.62) 50%,
        rgba(255,244,221,0.20) 64%,
        rgba(255,255,255,0) 82%);
    background-size:220% 100%;
    mix-blend-mode:screen;
    opacity:.92;
    animation:taskActiveShine 2.8s linear infinite;
    z-index:0;
  }

  .taskItem.active.unsubmittedWarn{
    background:linear-gradient(180deg, rgba(240,219,185,0.98) 0%, rgba(230,200,157,0.98) 100%);
    border:1px solid rgba(217,163,100,0.90);
    box-shadow:
      inset 0 0 0 1px rgba(255,247,229,0.96),
      0 0 0 2px rgba(217,163,100,0.22),
      0 6px 14px rgba(120,92,63,0.12);
  }

  .taskItem.unsubmittedWarn{
    box-shadow:
      inset 0 0 0 1px rgba(211,119,54,0.22),
      0 3px 10px rgba(120,92,63,0.05);
    background:rgba(255,245,235,0.72);
  }

  .taskItem.jumpFlash{
    animation:taskJumpFlash 1.8s ease;
  }

  @keyframes taskJumpFlash{
    0%{
      box-shadow:
        inset 0 0 0 1px rgba(244,198,121,0.96),
        0 0 0 3px rgba(244,198,121,0.38),
        0 8px 18px rgba(184,132,74,0.18);
      transform:translateY(-1px);
    }
    70%{
      box-shadow:
        inset 0 0 0 1px rgba(244,198,121,0.56),
        0 0 0 2px rgba(244,198,121,0.18),
        0 5px 12px rgba(184,132,74,0.10);
    }
    100%{
      box-shadow:inherit;
      transform:none;
    }
  }
  @keyframes taskActiveShine{
    0%{background-position:160% 0;}
    100%{background-position:-60% 0;}
  }

  .taskTitleLine{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:6px;
    position:relative;
    z-index:1;
  }

  .taskItemName{
    display:flex;
    align-items:center;
    flex-wrap:nowrap;
    gap:0;
    min-width:0;
    width:100%;
    font-size:var(--project-font-base);
    font-weight:800;
    line-height:1.35;
    color:inherit;
  }

  .taskNameText{
    flex:1 1 auto;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .taskBadgeLine{
    display:flex;
    align-items:center;
    gap:5px;
    flex-wrap:nowrap;
    margin-top:5px;
    min-height:22px;
    position:relative;
    z-index:1;
    overflow:hidden;
  }

  .taskBadgeLine:empty{
    display:none;
  }

  .taskTypeMini{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:20px;
    padding:2px 8px;
    border-radius:999px;
    font-size:10px;
    font-weight:500;
    line-height:1;
    flex:0 0 auto;
    white-space:nowrap;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function safeText(value, fallback = "未填写") {
    const text = String(value ?? "").trim();
    return text || fallback;
  }

  function formatDate(dateString) {
    if (!dateString) return "未定";
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return String(dateString);
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function isLoggedIn() {

  function getCurrentRole() {
    const role = String(localStorage.getItem(STORAGE_KEYS.role) || "visitor").toLowerCase();
    return ["owner", "admin", "member", "visitor", "applying"].includes(role) ? role : "visitor";
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));

  function isManagerRole(role) {
    return role === "owner" || role === "admin";
  }

  function getCurrentMemberId() {

  async function ensureAuthState() {
    authState.loggedIn = isLoggedIn();
    authState.nickname = String(localStorage.getItem(STORAGE_KEYS.user) || "").trim();
    authState.role = getCurrentRole();
    authState.memberId = localStorage.getItem(STORAGE_KEYS.memberId) || null;

    if (!authState.loggedIn || !authState.nickname || !authState.memberId) {
      handleLogout();
      return false;
    }

    try {
      let verifiedMember = null;

      const directResult = await supabaseClient
        .from("members")
        .select("id, nickname, role")
        .eq("id", authState.memberId)
        .maybeSingle();

      if (!directResult.error && directResult.data) {
        verifiedMember = directResult.data;
      } else {
        const rpcResult = await supabaseClient.rpc("get_member_directory_for_app");
        if (!rpcResult.error && Array.isArray(rpcResult.data)) {
          verifiedMember = rpcResult.data.find(item => String(item.id || "") === String(authState.memberId || "")) || null;
        }
      }

      const verifiedNickname = String(verifiedMember?.nickname || "").trim();
      const verifiedRole = String(verifiedMember?.role || authState.role || "visitor").toLowerCase();

      if (!verifiedMember || !verifiedNickname || verifiedNickname !== authState.nickname) {
        handleLogout();
        return false;
      }

      authState.nickname = verifiedNickname;
      authState.role = ["owner", "admin", "member", "visitor", "applying"].includes(verifiedRole)
        ? verifiedRole
        : authState.role;
      authState.initialized = true;

      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      localStorage.setItem(STORAGE_KEYS.memberId, String(authState.memberId));

      return true;
    } catch (err) {
      console.error("登录状态校验失败：", err);
      handleLogout();
      return false;
    }
  }

  async function loginWithKey(nickname, key) {
    const safeNickname = String(nickname || "").trim();
    const safeKey = String(key || "").trim();

    if (!safeNickname || !safeKey) {
      return { ok: false, message: "请输入昵称和KEY" };
    }

    try {
      const { data, error } = await supabaseClient.rpc("verify_member_login", {
        input_nickname: safeNickname,
        input_code: safeKey
      });

      if (error) {
        console.error("KEY 登录失败：", error);
        return { ok: false, message: error.message || "登录失败，请稍后再试" };
      }

      if (!Array.isArray(data) || !data.length) {
        return { ok: false, message: "昵称或KEY错误" };
      }

      const user = data[0];
      authState.loggedIn = true;
      authState.nickname = String(user.nickname || safeNickname).trim();
      authState.role = String(user.role || "member").toLowerCase();
      authState.memberId = String(user.member_id || "");
      authState.initialized = true;

      localStorage.setItem(STORAGE_KEYS.loggedIn, "true");
      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      localStorage.setItem(STORAGE_KEYS.memberId, authState.memberId);

      return { ok: true, user };
    } catch (err) {
      console.error("KEY 登录异常：", err);
      return { ok: false, message: err?.message || "登录失败，请稍后再试" };
    }
  }

  function splitGold(totalGold) {
    const total = Math.max(0, Math.floor(Number(totalGold) || 0));
    const submit = Math.floor(total * TASK_PAYOUT.onSubmitRatio);
    const publish = total - submit;
    return { total, submit, publish };
  }

  function normalizeSingerCount(value) {
    return Math.max(1, Math.floor(Number(value) || 1));
  }

  function getSingerRewardByRule(singerQuota, isSpecialTask = false) {
    const count = normalizeSingerCount(singerQuota);
    let base;

    if (SINGING_REWARD_TABLE[count] != null) {
      base = SINGING_REWARD_TABLE[count];
    } else {
      base = Math.max(12, Math.floor(17 - 0.5 * (count - 17)));
    }

    return base + (isSpecialTask ? 10 : 0);
  }

  function getProducerRewardByRule(taskType, singerQuota, isSpecialTask = false) {
    const count = normalizeSingerCount(singerQuota);

    if (String(taskType || "") === "游戏") return 0;

    const base = Math.min(48 + Math.min(count - 1, 12), 60);
    return base + (isSpecialTask ? 10 : 0);
  }

  function extractNumberFromValue(value) {
    const str = String(value ?? "");
    const match = str.match(/\d+/);
    return match ? parseInt(match[0], 10) : Number.POSITIVE_INFINITY;
  }

  function getMemberOrderNumber(memberRaw) {
    const candidates = [
      memberRaw.display_order,
      memberRaw.member_order,
      memberRaw.order_no,
      memberRaw.member_no,
      memberRaw.member_number,
      memberRaw.no,
      memberRaw.code,
      memberRaw.member_code,
      memberRaw.invite_code,
      memberRaw.key_code,
      memberRaw.nickname,
      memberRaw.name
    ];

    for (const item of candidates) {
      const num = extractNumberFromValue(item);
      if (Number.isFinite(num)) return num;
    }
    return Number.POSITIVE_INFINITY;
  }

  function normalizeMemberName(memberRaw, index) {
    return memberRaw.nickname || memberRaw.name || `成员${index + 1}`;
  }

  function normalizeMembers(data) {
    return (data || [])
      .map((item, index) => {
        const orderNumber = getMemberOrderNumber(item);
        return {
          id: String(item.id ?? index),
          name: item.name || normalizeMemberName(item, index),
          nickname: item.nickname || item.name || normalizeMemberName(item, index),
          skills: item.skills || "",
          orderNumber
        };
      })
      .sort((a, b) => {
        if (a.orderNumber !== b.orderNumber) return a.orderNumber - b.orderNumber;
        return a.name.localeCompare(b.name, "zh-CN");
      });
  }

  function rebuildMemberOrderMap() {
    memberOrderMap = new Map();
    members.forEach((member, index) => {
      memberOrderMap.set(String(member.id), {
        orderNumber: Number.isFinite(member.orderNumber) ? member.orderNumber : (999999 + index),
        name: member.name || ""
      });
    });
  }

  function rebuildMemberDirectoryMap() {
    memberDirectoryMap = new Map();
    members.forEach(member => {
      memberDirectoryMap.set(String(member.id), {
        id: String(member.id),
        name: member.name || "",
        nickname: member.nickname || member.name || "",
        skills: member.skills || "",
        orderNumber: Number.isFinite(member.orderNumber) ? member.orderNumber : Number.POSITIVE_INFINITY
      });
    });
  }

  function getMemberDisplayNameById(memberId, fallback = "") {
    const hit = memberDirectoryMap.get(String(memberId || ""));
    return hit?.nickname || hit?.name || fallback || "";
  }

  function hydrateTaskNamesFromDirectory(taskList) {
    (taskList || []).forEach(task => {
      task.producer_name = getMemberDisplayNameById(task.producer_member_id, task.producer_name || "");

      (task.parts || []).forEach(part => {
        part.assigned_member_name = getMemberDisplayNameById(part.assigned_member_id, part.assigned_member_name || "");
      });

      (task.singers || []).forEach(singer => {
        singer.member_name = getMemberDisplayNameById(singer.member_id, singer.member_name || "");
      });
    });
  }

  function getSortInfoByMemberId(memberId, fallbackName = "") {
    const info = memberOrderMap.get(String(memberId));
    return {
      orderNumber: info?.orderNumber ?? Number.POSITIVE_INFINITY,
      name: info?.name || fallbackName || ""
    };
  }

  function sortSingersByMemberOrder(singers) {
    return [...(singers || [])].sort((a, b) => {
      const aInfo = getSortInfoByMemberId(a.member_id, a.member_name);
      const bInfo = getSortInfoByMemberId(b.member_id, b.member_name);
      if (aInfo.orderNumber !== bInfo.orderNumber) return aInfo.orderNumber - bInfo.orderNumber;
      return String(a.member_name || "").localeCompare(String(b.member_name || ""), "zh-CN");
    });
  }

  function makeDisplayTaskName(taskCode, taskName) {
    const code = safeText(taskCode, "");
    const name = safeText(taskName, "");
    if (!code) return name;
    if (!name) return code;
    return `${code}.${name}`;
  }

  function uniqueAssignedIds(parts) {
    return [...new Set((parts || []).map(part => part.assigned_member_id).filter(Boolean).map(String))];
  }

  function getSubmittedCount(task) {
    return (task.singers || []).filter(item => !!item.is_submitted).length;
  }

  function getProgressText(task) {
    const total = Math.max(1, Number(task.participant_count) || 1);
    return `${getSubmittedCount(task)}/${total}`;
  }

  function getSingerPendingNoticeText(task) {
    const total = Math.max(1, Number(task.participant_count) || 1);
    const submitted = getSubmittedCount(task);
    if (submitted === total - 1 && isOnlyWaitingMe(task)) {
      return `当前进度 ${getProgressText(task)}，只剩你未交音`;
    }
    return `当前进度 ${getProgressText(task)}，你还有演唱部分未交音。`;
  }

  function getProducerPendingNoticeText(task) {
    const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
    return allSingersDone
      ? "你是本项目混音负责人，请开始后期"
      : "你是本项目混音负责人，等待交音中";
  }

  function getPartsForMember(task, memberId) {
    return (task.parts || [])
      .filter(part => String(part.assigned_member_id || "") === String(memberId))
      .map(part => String(part.original_name || "").trim())
      .filter(Boolean);
  }

  function isMyProject(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const isSinger = (task.singers || []).some(item => String(item.member_id) === String(currentUserId));
    const isProducer = String(task.producer_member_id || "") === String(currentUserId);
    return isSinger || isProducer;
  }

  function isMySingerPending(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const singer = (task.singers || []).find(item => String(item.member_id) === String(currentUserId));
    if (!singer) return false;
    return !singer.is_submitted;
  }

  function areAllSingersSubmitted(task) {
    return (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
  }

  function isMyProducerPending(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;
    if (String(task.producer_member_id || "") !== String(currentUserId)) return false;
    return !task.producer_completed;
  }

  function isMyProducerReadyToMix(task) {
    return isMyProducerPending(task) && areAllSingersSubmitted(task);
  }

  function isMyUnsubmitted(task) {
    return isMySingerPending(task) || isMyProducerReadyToMix(task);
  }

  function getMySingerRecord(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return null;
    return (task.singers || []).find(item => String(item.member_id) === String(currentUserId)) || null;
  }

  function getTaskPendingBadgeText(task) {
    if (isMySingerPending(task)) return "未交音";
    if (isMyProducerReadyToMix(task)) return "未混音";
    return "";
  }

  function isOnlyWaitingMe(task) {
    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    const mySinger = (task.singers || []).find(item => String(item.member_id) === String(currentUserId));
    const isProducer = String(task.producer_member_id || "") === String(currentUserId);

    if (mySinger && !mySinger.is_submitted) {
      const otherSingersDone = (task.singers || [])
        .filter(item => String(item.member_id) !== String(currentUserId))
        .every(item => !!item.is_submitted);
      return otherSingersDone;
    }

    if (isProducer) {
      const allSingersDone = (task.singers || []).length > 0 && (task.singers || []).every(item => !!item.is_submitted);
      return allSingersDone && !task.producer_completed;
    }

    return false;
  }

  function canEditSingerRecord(singerRecord, task) {
    const role = getCurrentRole();
    if (isManagerRole(role)) return true;

    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    if (String(task.created_by || "") === String(currentUserId)) return true;
    return String(singerRecord.member_id) === String(currentUserId);
  }

  function canEditProducerTask(task) {
    const role = getCurrentRole();
    if (isManagerRole(role)) return true;

    const currentUserId = getCurrentMemberId();
    if (!currentUserId) return false;

    if (String(task.created_by || "") === String(currentUserId)) return true;
    return String(task.producer_member_id || "") === String(currentUserId);
  }

  function getComputedTaskStatus(task) {
    const singerQuota = Math.max(1, Number(task.participant_count) || 1);
    const parts = Array.isArray(task.parts) ? task.parts : [];
    const singers = Array.isArray(task.singers) ? task.singers : [];
    const singerCount = singers.length;
    const assignedIds = uniqueAssignedIds(parts);
    const normalizedPartNames = parts.map(part => String(part?.original_name || "").trim());
    const filledPartNames = normalizedPartNames.filter(Boolean);
    const hasPartText = filledPartNames.length > 0;
    const hasEnoughPartRows = parts.length >= singerQuota;
    const hasPlaceholderPart = filledPartNames.some(name => /^(待分配|未分配)$/i.test(name));
    const hasIncompletePartRow = parts.some(part => {
      const originalName = String(part?.original_name || "").trim();
      const assignedId = String(part?.assigned_member_id || "").trim();
      return !originalName || !assignedId;
    });
    const hasTone = !!String(task.project_tone || "").trim();
    const hasProducer = !!String(task.producer_member_id || "").trim();
    const producerCompleted = !!task.producer_completed;
    const hasEffectiveProducer = hasProducer || producerCompleted;
    const hasReleaseDate = !!String(task.release_date || "").trim();
    const hasDisplayLink = !!String(task.display_link || "").trim();
    const allSubmitted = singerCount > 0 && singers.every(item => !!item.is_submitted);

    const readyForPublishedHide =
      hasDisplayLink &&
      singerCount >= singerQuota &&
      hasTone &&
      hasPartText &&
      hasEnoughPartRows &&
      !hasPlaceholderPart &&
      !hasIncompletePartRow &&
      assignedIds.length >= singerCount &&
      allSubmitted &&
      hasEffectiveProducer &&
      producerCompleted &&
      hasReleaseDate;

    // 只有链接 + 资料完整时，才视为真正已发布并从详情页移出
    if (readyForPublishedHide) return "已发布";

    // 前期条件未完成的一律归到 todo，不再出现在详情
    if (singerCount < singerQuota) return "待认领";
    if (!hasTone) return "未定调";
    if (!hasPartText || !hasEnoughPartRows || hasPlaceholderPart || hasIncompletePartRow || assignedIds.length < singerCount) return "未分词";

    // 前期完成后，录音阶段仍属正常推进，留在详情
    if (!allSubmitted) return "制作中";

    // 全部交音后，如果既没人负责后期、也没有后期交付，流程卡住，归到 todo
    if (!hasEffectiveProducer) return "缺后期";

    // 已有后期负责人或已视为后期处理，但后期未交付，仍属正常推进，留在详情
    if (!producerCompleted) return "制作中";

    // 后期已交付但发布信息未补齐，归到 todo
    if (!hasReleaseDate || !hasDisplayLink) return "待发布";

    return "制作中";
  }

  function buildShortInfo(task) {
    const parts = [];
    parts.push(task.project_type || "未分类");
    if (task.release_date) parts.push(`预计 ${formatDate(task.release_date)}`);
    else parts.push("预计未定");
    return parts.join("｜");
  }

  function transformProjectsToTasks(projectRows, partsRows, singersRows) {
    const partMap = new Map();
    const singerMap = new Map();

    (partsRows || []).forEach(part => {
      const key = String(part.project_id);
      if (!partMap.has(key)) partMap.set(key, []);
      partMap.get(key).push({
        id: part.id,
        part_order: part.part_order,
        original_name: part.original_name,
        assigned_member_id: part.assigned_member_id,
        assigned_member_name: part.members?.nickname || part.members?.name || ""
      });
    });

    (singersRows || []).forEach(singer => {
      const key = String(singer.project_id);
      if (!singerMap.has(key)) singerMap.set(key, []);
      singerMap.get(key).push({
        id: singer.id,
        member_id: singer.member_id,
        member_name: singer.members?.nickname || singer.members?.name || "",
        is_submitted: !!singer.is_submitted,
        submitted_at: singer.submitted_at || null
      });
    });

    return (projectRows || []).map(project => {
      const id = String(project.id);
      const parts = (partMap.get(id) || []).sort((a, b) => (a.part_order || 0) - (b.part_order || 0));
      const singers = sortSingersByMemberOrder(singerMap.get(id) || []);
      const producerName = project.producer_member?.nickname || project.producer_member?.name || "";

      const isSpecialTask = !!project.is_collective_task;
      const computedSingerBonus = getSingerRewardByRule(project.participant_count, isSpecialTask);
      const computedProducerBonus = getProducerRewardByRule(project.project_type, project.participant_count, isSpecialTask);

      return {
        id,
        project_code: project.project_code || "",
        project_name: project.project_name || "",
        displayName: makeDisplayTaskName(project.project_code, project.project_name),
        project_type: project.project_type || "",
        status: project.status || "",
        participant_count: project.participant_count ?? 1,
        singer_bonus: computedSingerBonus,
        producer_bonus: computedProducerBonus,
        producer_member_id: project.producer_member_id || null,
        producer_name: producerName,
        producer_completed: !!project.producer_completed,
        producer_completed_at: project.producer_completed_at || null,
        release_date: project.release_date || null,
        display_link: project.display_link || "",
        project_tone: project.project_tone || "",
        is_collective_task: !!project.is_collective_task,
        created_by: project.created_by || null,
        created_at: project.created_at || null,
        parts,
        singers
      };
    }).map(task => {
      task.computedStatus = getComputedTaskStatus(task);
      task.shortInfo = buildShortInfo(task);
      return task;
    }).filter(task => task.computedStatus === "制作中")
      .sort((a, b) => {
        const aCode = parseInt(String(a.project_code).match(/\d+/)?.[0] || "0", 10);
        const bCode = parseInt(String(b.project_code).match(/\d+/)?.[0] || "0", 10);
        return aCode - bCode;
      });
  }

  async function loadMembersFromSupabase() {
    try {
      let data = [];
      let error = null;

      const rpcResult = await supabaseClient.rpc("get_member_directory_for_app");
      if (!rpcResult.error && Array.isArray(rpcResult.data)) {
        data = rpcResult.data;
      } else {
        error = rpcResult.error || null;
        const fallbackResult = await supabaseClient
          .from("members")
          .select("id, nickname, name, skills");

        if (!fallbackResult.error && Array.isArray(fallbackResult.data)) {
          data = fallbackResult.data;
          error = null;
        } else {
          error = fallbackResult.error || error;
        }
      }

      if (error && !data.length) {
        console.error("读取成员目录失败：", error);
      }

      members = normalizeMembers(data || []);
      rebuildMemberOrderMap();
      rebuildMemberDirectoryMap();
    } catch (err) {
      members = [];
      rebuildMemberOrderMap();
      rebuildMemberDirectoryMap();
      console.error("成员目录读取失败：", err);
    }
  }

  async function loadProjectsFromSupabase() {
    const detailList = document.getElementById("browseListTask");
    detailList.innerHTML = '<div class="loadingText">正在读取任务...</div>';

    try {
      const { data: projectsData, error: projectsError } = await supabaseClient
        .from("projects")
        .select(`
          *,
          producer_member:members!projects_producer_member_id_fkey (
            id,
            nickname,
            name
          )
        `);

      if (projectsError) throw projectsError;

      const projectIds = (projectsData || []).map(item => item.id);

      let partsData = [];
      let singersData = [];

      if (projectIds.length) {
        const { data: partRows, error: partsError } = await supabaseClient
          .from("project_parts")
          .select(`
            id,
            project_id,
            part_order,
            original_name,
            assigned_member_id,
            members!project_parts_assigned_member_id_fkey (
              id,
              nickname,
              name
            )
          `)
          .in("project_id", projectIds)
          .order("part_order", { ascending: true });

        if (partsError) throw partsError;
        partsData = partRows || [];

        const { data: singerRows, error: singersError } = await supabaseClient
          .from("project_singers")
          .select(`
            id,
            project_id,
            member_id,
            is_submitted,
            submitted_at,
            members!project_singers_member_id_fkey (
              id,
              nickname,
              name
            )
          `)
          .in("project_id", projectIds);

        if (singersError) throw singersError;
        singersData = singerRows || [];
      }

      tasks = transformProjectsToTasks(projectsData || [], partsData, singersData);
      hydrateTaskNamesFromDirectory(tasks);

      const detailTasks = getFilteredTasks(detailSearchKeyword);
      if (!detailTasks.some(task => task.id === activeDetailTaskId)) {
        activeDetailTaskId = detailTasks.length ? detailTasks[0].id : "";
      }

      renderBrowseList();
      renderBrowseDetail();
      applyIncomingStudioJumpIntent();
    } catch (err) {
      console.error("读取 projects 失败：", err);
      detailList.innerHTML = '<div class="taskEmpty">任务读取失败，请检查表结构或权限</div>';
      setBrowseDetailEmpty("任务读取失败");
    }
  }

  function syncOverlayToImage() {
    const roomRect = room.getBoundingClientRect();
    const roomW = roomRect.width;
    const roomH = roomRect.height;

    const naturalW = bg.naturalWidth || 1600;
    const naturalH = bg.naturalHeight || 900;
    const imgRatio = naturalW / naturalH;
    const roomRatio = roomW / roomH;

    let drawW, drawH, drawLeft, drawTop;

    if (roomRatio > imgRatio) {
      drawH = roomH;
      drawW = drawH * imgRatio;
      drawLeft = (roomW - drawW) / 2;
      drawTop = 0;
    } else {
      drawW = roomW;
      drawH = drawW / imgRatio;
      drawLeft = 0;
      drawTop = (roomH - drawH) / 2;
    }

    overlay.style.left = `${drawLeft}px`;
    overlay.style.top = `${drawTop}px`;
    overlay.style.width = `${drawW}px`;
    overlay.style.height = `${drawH}px`;

    const DESIGN_W = 2440;
    const rawScale = drawW / DESIGN_W;
    const minWebScale = drawW >= 541 ? 0.42 : rawScale;
    const bgScale = Math.min(Math.max(rawScale, minWebScale), 1.24);

    overlay.style.setProperty("--bg-ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--overlay-ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--project-panel-scale", bgScale.toFixed(5));

    if (bgNoteLayer) {
      bgNoteLayer.style.left = `0px`;
      bgNoteLayer.style.top = `0px`;
      bgNoteLayer.style.width = `${drawW}px`;
      bgNoteLayer.style.height = `${drawH}px`;
    }

    requestAnimationFrame(syncTopUiLayout);
  }

      left: r.left - o.left,
      top: r.top - o.top,
      right: r.right - o.left,
      bottom: r.bottom - o.top,
      width: r.width,
      height: r.height

  function intersectsForbidden(x, y, size, forbidden) {
    const padding = 18;
    const left = x - padding;
    const top = y - padding;
    const right = x + size + padding;
    const bottom = y + size + padding;
    return forbidden.some(rect => !(right < rect.left || left > rect.right || bottom < rect.top || top > rect.bottom));
  }

  function spawnBackgroundNote() {
    if (!bgNoteLayer || !taskPanel) return;
    const w = bgNoteLayer.clientWidth;
    const h = bgNoteLayer.clientHeight;
    if (!w || !h) return;

    const panelRect = bgNoteLayer.getBoundingClientRect();
    const forbiddenSelectors = [
      '#browseListPane',
      '.detailHero',
      '.sectionCard',
      '.bottomGrid',
      '#browseDetailFooter',
      '.taskItem',
      '.searchWrap',
      '.taskFilterRow'
    ];
    const forbidden = forbiddenSelectors
      .flatMap(selector => Array.from(taskPanel.querySelectorAll(selector)))
      .map(el => {
        const rect = el.getBoundingClientRect();
        return {
          left: rect.left - panelRect.left,
          top: rect.top - panelRect.top,
          right: rect.right - panelRect.left,
          bottom: rect.bottom - panelRect.top
        };
      })
      .filter(rect => rect.right > 0 && rect.bottom > 0 && rect.left < w && rect.top < h);

    const glyphs = ['♪', '♫', '♩', '♬'];
    const colors = ['rgba(255, 194, 208, 0.46)', 'rgba(255, 214, 161, 0.46)', 'rgba(188, 223, 255, 0.44)', 'rgba(205, 237, 210, 0.44)', 'rgba(226, 205, 255, 0.44)'];
    const glyph = glyphs[Math.floor(Math.random() * glyphs.length)];
    const size = Math.round(16 + Math.random() * 24);
    let x = 0;
    let y = 0;
    let found = false;

    for (let i = 0; i < 70; i += 1) {
      x = 10 + Math.random() * Math.max(30, w - size - 20);
      y = 10 + Math.random() * Math.max(30, h - size - 20);
      if (!intersectsForbidden(x, y, size, forbidden)) {
        found = true;
        break;
      }
    }

    if (!found) return;

    const note = document.createElement('span');
    note.className = 'bgNote';
    note.textContent = glyph;
    note.style.left = `${x}px`;
    note.style.top = `${y}px`;
    note.style.fontSize = `${size}px`;
    note.style.setProperty('--note-color', colors[Math.floor(Math.random() * colors.length)]);
    note.style.setProperty('--note-duration', `${2.4 + Math.random() * 2.1}s`);
    note.style.setProperty('--note-drift-x', `${-22 + Math.random() * 44}px`);
    note.style.setProperty('--note-drift-y', `${-52 - Math.random() * 62}px`);
    note.style.setProperty('--note-rot-start', `${-14 + Math.random() * 16}deg`);
    note.style.setProperty('--note-rot-end', `${-10 + Math.random() * 22}deg`);
    note.style.setProperty('--note-scale', `${0.84 + Math.random() * 0.34}`);

    bgNoteLayer.appendChild(note);
    note.addEventListener('animationend', () => note.remove(), { once: true });
  }

  function scheduleBackgroundNote() {
    if (bgNoteTimer) window.clearTimeout(bgNoteTimer);
    const delay = 180 + Math.random() * 320;
    bgNoteTimer = window.setTimeout(() => {
      const burst = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < burst; i += 1) {
        window.setTimeout(() => spawnBackgroundNote(), i * 70);
      }
      scheduleBackgroundNote();
    }, delay);
  }

  function restartBackgroundNotes() {
    if (bgNoteLayer) bgNoteLayer.innerHTML = '';
    for (let i = 0; i < 10; i += 1) {
      window.setTimeout(() => spawnBackgroundNote(), i * 70);
    }
    scheduleBackgroundNote();
  }

  function normalizeSearchQuery(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[｜|,，/]/g, " ")

  }

  function getFilteredTasks(keyword) {
    const tokens = normalizeSearchQuery(keyword);

    return tasks.filter(task => {
      if (taskFilterMode === "mine" && !isMyProject(task)) return false;
      if (taskFilterMode === "unsubmitted" && !isMyUnsubmitted(task)) return false;
      if (taskFilterMode === "onlyme" && !isOnlyWaitingMe(task)) return false;

      if (!tokens.length) return true;

      const partText = (task.parts || [])
        .map(item => `${item.original_name || ""} ${item.assigned_member_name || ""}`)
        .join(" ");

      const singerText = (task.singers || [])
        .map(item => item.member_name || "")
        .join(" ");

      const haystack = [
        task.displayName,
        task.project_name,
        task.project_code,
        task.project_type,
        task.producer_name,
        task.project_tone,
        task.release_date ? formatDate(task.release_date) : "",
        singerText,
        partText
      ].join(" ").toLowerCase();

      return tokens.every(token => haystack.includes(token));
    });
  }

  function syncEditPartRowsToQuota(preserveCurrent = true) {
    const quota = Math.max(1, Math.floor(Number(editSingerQuota.value) || 1));
    const currentRows = preserveCurrent ? getCurrentPartDraftFromDom() : editPartDraftRows;
    const nextRows = [];
    for (let i = 0; i < quota; i++) {
      const source = currentRows[i] || editPartDraftRows[i] || {};
      nextRows.push({
        original_name: String(source.original_name || "").trim(),
        assigned_member_id: String(source.assigned_member_id || "").trim(),
        assigned_member_name: String(source.assigned_member_name || "").trim(),
        part_order: i + 1
      });
    }
    editPartDraftRows = nextRows;
  }

  function canResizePartRowsToQuota(nextQuota, { preserveCurrent = true } = {}) {
    const safeQuota = Math.max(1, Math.floor(Number(nextQuota) || 1));
    const currentRows = preserveCurrent ? getCurrentPartDraftFromDom() : editPartDraftRows;
    if ((currentRows || []).length <= safeQuota) return { ok: true };

    const trimmedRows = currentRows.slice(safeQuota);
    if (!hasMeaningfulPartContent(trimmedRows)) return { ok: true };

    return {
      ok: false,
      message: "减少演唱人数后，超出行里还有歌词分配内容，请先清空这些行再保存。"
    };
  }

    if (editPartRows.dataset.bound === "1") return;

    editPartRows.addEventListener("click", (event) => {
      const clearBtn = event.target.closest("[data-clear-part-member]");
      if (clearBtn) {
        event.preventDefault();
        event.stopPropagation();
        const idx = Number(clearBtn.dataset.clearPartMember);
        const domRows = getCurrentPartDraftFromDom();
        if (!Number.isFinite(idx) || !domRows[idx]) return;
        domRows[idx].assigned_member_id = "";
        domRows[idx].assigned_member_name = "";
        editPartDraftRows = domRows;
        const row = clearBtn.closest('.taskEditRow');
        const input = row?.querySelector('[data-field="assigned_member_id"]');
        if (input) {
          input.dataset.memberId = "";
          input.value = "";
        }
        renderEditPartRows();
        return;
      }

      const suggestItem = event.target.closest("[data-row-member-id]");
      if (suggestItem) {
        const row = suggestItem.closest(".taskEditRow");
        const input = row?.querySelector('[data-field="assigned_member_id"]');
        if (!row || !input) return;
        const memberId = String(suggestItem.dataset.rowMemberId || "");
        input.dataset.memberId = memberId;
        input.value = getMemberDisplayNameById(memberId, "");
        editPartDraftRows = getCurrentPartDraftFromDom().map(item => ({
          ...item,
          assigned_member_name: item.assigned_member_id ? getMemberDisplayNameById(item.assigned_member_id, item.assigned_member_name || "") : ""
        }));
        renderEditPartRows();
        return;
      }
    });

    editPartRows.addEventListener("input", (event) => {
      const field = event.target?.dataset?.field;
      if (field === "original_name") {
        editPartDraftRows = getCurrentPartDraftFromDom();
        return;

      if (field === "assigned_member_id") {
        const input = event.target;
        input.dataset.memberId = "";

        if (row) {
          renderPartSuggestForRow(row);

          renderPartSuggestForRow(row);
          row.querySelector('.memberSuggestBox')?.classList.add('show');

      const row = event.target.closest('.taskEditRow');

        if (!row.contains(document.activeElement)) {

          const input = row.querySelector('[data-field="assigned_member_id"]');
          const typed = String(input?.value || "").trim();

            assigned_member_name: item.assigned_member_id ? getMemberDisplayNameById(item.assigned_member_id, item.assigned_member_name || "") : ""
          }));

  function isEachSingGameProject(projectName, projectType) {
    const safeName = String(projectName || "").trim();
    const safeType = String(projectType || "").trim();
    return safeType === "游戏" && safeName.includes("各唱各");
  }

  function findDefaultYangProducerId() {
    const mixerMembers = getMixerEligibleMembers();
    const exact = mixerMembers.find(member => {
      const nickname = String(member?.nickname || "").trim();
      const name = String(member?.name || "").trim();
      return nickname === "扬" || name === "扬";
    });
    if (exact) return String(exact.id || "");

    const fuzzy = mixerMembers.find(member => {
      const nickname = String(member?.nickname || "").trim();
      const name = String(member?.name || "").trim();
      return nickname.includes("扬") || name.includes("扬");
    });
    return String(fuzzy?.id || "");
  }

  function syncProducerByEachSingRule({ force = false } = {}) {
    const isEachSing = isEachSingGameProject(editTaskName?.value, editTaskType?.value);
    if (!isEachSing) return false;
    const yangId = findDefaultYangProducerId();
    if (!yangId) return false;
    if (force || !String(currentEditingProducerMemberId || "").trim() || String(currentEditingProducerMemberId) !== String(yangId)) {
      currentEditingProducerMemberId = String(yangId);
      renderProducerPicker(currentEditingProducerMemberId);
      return true;
    }
    return false;
  }

  function getMeaningfulPartRows(rows) {
    return (rows || []).filter(row => String(row?.original_name || "").trim() || String(row?.assigned_member_id || "").trim());
  }

  function hasMeaningfulPartContent(rows) {
    return getMeaningfulPartRows(rows).length > 0;
  }

  function getRemovedSingerAssignments(selectedSingerIds, rows) {
    const selectedSet = new Set((selectedSingerIds || []).map(String));
    return (rows || []).filter(row => {
      const assignedId = String(row?.assigned_member_id || "").trim();
      return assignedId && !selectedSet.has(assignedId);
    });
  }

  function setTaskEditMode(isCollective) {
    const special = !!isCollective;
    if (editIsCollectiveTask) editIsCollectiveTask.value = special ? "1" : "0";
    if (editTaskModeNormalBtn) editTaskModeNormalBtn.classList.toggle("active", !special);
    if (editTaskModeSpecialBtn) editTaskModeSpecialBtn.classList.toggle("active", special);
  }

  function buildTaskEditSnapshot(task) {
    const safeTask = task || {};
    return {
      taskId: String(safeTask.id || ""),
      project_code: String(safeTask.project_code || ""),
      project_name: String(safeTask.project_name || ""),
      project_type: String(safeTask.project_type || "其他"),
      is_collective_task: !!safeTask.is_collective_task,
      participant_count: String(Math.max(1, Number(safeTask.participant_count) || 1)),
      project_tone: String(safeTask.project_tone || ""),
      release_date: formatDateForInput(safeTask.release_date),
      producer_member_id: String(safeTask.producer_member_id || ""),
      singer_ids: (safeTask.singers || []).map(item => String(item.member_id || "")).filter(Boolean),
      parts: (safeTask.parts || []).length
        ? (safeTask.parts || []).map((part, index) => ({
            original_name: String(part.original_name || ""),
            assigned_member_id: String(part.assigned_member_id || ""),
            assigned_member_name: String(part.assigned_member_name || ""),
            part_order: index + 1
          }))
        : []
    };
  }

  function applyTaskEditSnapshot(snapshot) {
    if (!snapshot) return;
    currentEditingTaskId = String(snapshot.taskId || "");
    editTaskCode.value = snapshot.project_code || "";
    editTaskName.value = snapshot.project_name || "";
    populateTaskTypeSelect(snapshot.project_type || "其他");
    setTaskEditMode(!!snapshot.is_collective_task);
    editSingerQuota.value = String(snapshot.participant_count || "1");
    editSingerQuota.dataset.prevQuota = String(snapshot.participant_count || "1");
    editProjectTone.value = snapshot.project_tone || "";
    editReleaseDate.value = snapshot.release_date || "";
    currentEditingProducerMemberId = String(snapshot.producer_member_id || "");
    renderProducerPicker(currentEditingProducerMemberId);
    syncProducerByEachSingRule({ force: isEachSingGameProject(snapshot.project_name, snapshot.project_type) });

    renderEditSingerMemberList((snapshot.singer_ids || []).map(String));
    editPartDraftRows = (snapshot.parts || []).map((part, index) => ({
      original_name: String(part.original_name || ""),
      assigned_member_id: String(part.assigned_member_id || ""),
      assigned_member_name: String(part.assigned_member_name || ""),
      part_order: index + 1
    }));

    syncEditPartRowsToQuota(false);
    renderEditPartRows();
    bindEditPartRowButtons();
  }

  function restoreTaskEditOriginalState() {
    if (!taskEditOriginalSnapshot) return;
    const snapshotClone = JSON.parse(JSON.stringify(taskEditOriginalSnapshot));
    applyTaskEditSnapshot(snapshotClone);
  }

  function syncTaskStoreFromEditSnapshot(snapshot) {
    if (!snapshot) return;
    const task = getTaskById(snapshot.taskId);
    if (!task) return;

    task.project_code = String(snapshot.project_code || "");
    task.project_name = String(snapshot.project_name || "");
    task.project_type = String(snapshot.project_type || "其他");
    task.is_collective_task = !!snapshot.is_collective_task;
    task.participant_count = Math.max(1, Number(snapshot.participant_count) || 1);
    task.project_tone = String(snapshot.project_tone || "") || null;
    task.release_date = snapshot.release_date || null;
    task.producer_member_id = String(snapshot.producer_member_id || "") || null;
    task.singers = (snapshot.singer_ids || []).map(memberId => ({ member_id: String(memberId || "") })).filter(item => item.member_id);
    task.parts = (snapshot.parts || []).map((part, index) => ({
      original_name: String(part.original_name || ""),
      assigned_member_id: String(part.assigned_member_id || "") || null,

function openTaskEditModal(taskId = activeDetailTaskId) {
    const task = getTaskById(taskId);
    if (!task) {
      showToast("无法编辑", "当前未找到可编辑的项目。");
      return;
    }

    if (!canEditTaskFromDetail(task)) {
      showToast("暂无权限", "当前账号不能修改这个项目。");
      return;
    }

    taskEditOriginalSnapshot = JSON.parse(JSON.stringify(buildTaskEditSnapshot(task)));

    taskEditSubtitle.textContent = "保存后会自动按最新数据重新归类状态";
    applyTaskEditSnapshot(taskEditOriginalSnapshot);

    taskEditMask.classList.add("show");
    taskEditMask.setAttribute("aria-hidden", "false");
  }

  function closeTaskEditModal(shouldRestore = false) {
    if (shouldRestore && taskEditOriginalSnapshot) {
      restoreTaskEditOriginalState();
    }

    taskEditMask.classList.remove("show");
    taskEditMask.setAttribute("aria-hidden", "true");

    currentEditingTaskId = "";
    currentEditingProducerMemberId = "";
    editPartDraftRows = [];

  function collectTaskEditPayload() {
    const task = getTaskById(currentEditingTaskId);
    const singerQuota = Math.max(1, Math.floor(Number(editSingerQuota.value) || 1));
    const selectedSingerIds = getEditableSingerIds();
    const projectName = String(editTaskName.value || "").trim();
    const projectType = String(editTaskType.value || "").trim() || "其他";
    const isSpecialTask = String(editIsCollectiveTask?.value || "0") === "1";
    const isEachSing = isEachSingGameProject(projectName, projectType);

    if (!task) {
      throw new Error("未找到正在编辑的项目。");
    }

    if (!projectName) {
      throw new Error("请先填写歌名。");
    }

    if (selectedSingerIds.length > singerQuota) {
      throw new Error("已勾选的演唱者人数不能超过“演唱人数”。");
    }

    const rawPartRows = getCurrentPartDraftFromDom()
      .map((row, index) => ({
        original_name: String(row.original_name || "").trim(),
        assigned_member_id: String(row.assigned_member_id || "").trim() || null,
        assigned_member_name: String(row.assigned_member_name || "").trim(),
        part_order: index + 1
      }));

    const removedSingerAssignments = getRemovedSingerAssignments(selectedSingerIds, rawPartRows);
    if (removedSingerAssignments.length) {
      throw new Error("你移除了仍在歌词分配中使用的演唱者，请先修改对应分配后再保存。");
    }

    const usedAssignedIds = rawPartRows.map(row => row.assigned_member_id).filter(Boolean);
    if (new Set(usedAssignedIds).size !== usedAssignedIds.length) {
      throw new Error("同一个项目里的歌词分配，演唱成员不能重复。");
    }

    const partRows = rawPartRows.filter(row => row.original_name || row.assigned_member_id);
    const duplicateNames = partRows
      .map(row => String(row.original_name || "").trim())
      .filter(Boolean)
      .filter((name, index, arr) => arr.indexOf(name) !== index);

    if (!isEachSing && duplicateNames.length) {
      throw new Error(`当前项目不是“各唱各”，歌词分配左侧不能重复：${[...new Set(duplicateNames)].join("、")}`);
    }

    const finalProducerId = isEachSing
      ? (findDefaultYangProducerId() || String(currentEditingProducerMemberId || "").trim() || null)
      : (String(currentEditingProducerMemberId || "").trim() || null);

    return {
      projectId: task.id,
      isEachSing,
      projectPayload: {
        project_name: projectName,
        project_type: projectType,
        is_collective_task: isSpecialTask,
        participant_count: singerQuota,
        singer_bonus: getSingerRewardByRule(singerQuota, isSpecialTask),
        producer_bonus: getProducerRewardByRule(projectType, singerQuota, isSpecialTask),
        project_tone: String(editProjectTone.value || "").trim() || null,
        release_date: editReleaseDate.value || null,
        producer_member_id: finalProducerId
      },
      selectedSingerIds,
      existingSingerRecords: task.singers || [],
      partRows,
      singerBonus: getSingerRewardByRule(singerQuota, isSpecialTask),
      producerBonus: getProducerRewardByRule(projectType, singerQuota, isSpecialTask)
    };
  }

  async function saveTaskEditModal() {
    try {
      const payload = collectTaskEditPayload();

      taskEditSaveBtn.disabled = true;
      taskEditSaveBtn.textContent = "保存中...";

      const { error: projectError } = await supabaseClient
        .from("projects")
        .update(payload.projectPayload)
        .eq("id", payload.projectId);

      if (projectError) throw projectError;

      const existingSingerMap = new Map((payload.existingSingerRecords || []).map(item => [String(item.member_id), item]));
      const selectedSet = new Set(payload.selectedSingerIds.map(String));

      const removeSingerRecordIds = (payload.existingSingerRecords || [])
        .filter(item => !selectedSet.has(String(item.member_id)))
        .map(item => item.id);

      if (removeSingerRecordIds.length) {
        const { error: deleteSingerError } = await supabaseClient
          .from("project_singers")
          .delete()
          .in("id", removeSingerRecordIds);

        if (deleteSingerError) throw deleteSingerError;
      }

      const insertSingerRows = payload.selectedSingerIds
        .filter(memberId => !existingSingerMap.has(String(memberId)))
        .map(memberId => ({
          project_id: payload.projectId,
          member_id: memberId,
          is_submitted: false,
          submitted_at: null
        }));

      if (insertSingerRows.length) {
        const { error: insertSingerError } = await supabaseClient
          .from("project_singers")
          .insert(insertSingerRows);

        if (insertSingerError) throw insertSingerError;
      }

      const { error: deletePartsError } = await supabaseClient
        .from("project_parts")
        .delete()
        .eq("project_id", payload.projectId);

      if (deletePartsError) throw deletePartsError;

      if (payload.partRows.length) {
        const insertPartRows = payload.partRows.map(row => ({
          project_id: payload.projectId,
          part_order: row.part_order,
          original_name: row.original_name || null,
          assigned_member_id: row.assigned_member_id || null
        }));

        const { error: insertPartsError } = await supabaseClient
          .from("project_parts")
          .insert(insertPartRows);

        if (insertPartsError) throw insertPartsError;
      }

      const editedProjectId = payload.projectId;
      closeTaskEditModal(false);
      await loadProjectsFromSupabase();
      renderSiteNotifications();

      if (tasks.some(item => String(item.id) === String(editedProjectId))) {
        activeDetailTaskId = editedProjectId;
        renderBrowseList();
        renderBrowseDetail();
        queueStudioJumpFlash(editedProjectId);
        showToast("保存成功", "项目内容已更新。");
      } else {
        writeStudioJumpIntent({
          page: PAGE_LINKS.studioTodo,
          taskId: editedProjectId,
          source: CURRENT_STUDIO_PAGE
        });
        window.location.href = PAGE_LINKS.studioTodo;
        return;
      }
    } catch (err) {
      console.error("保存编辑弹窗失败：", err);
      showToast("保存失败", err?.message || "保存时出现问题。");
    } finally {
      taskEditSaveBtn.disabled = false;
      taskEditSaveBtn.textContent = "保存";
    }
  }

  document.querySelectorAll(".navBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomKey = btn.dataset.room;

      if (roomKey === "manager") {
        const role = getCurrentRole();
        const page =
          role === "owner" ? PAGE_LINKS.managerOwner :
          role === "admin" ? PAGE_LINKS.managerAdmin :
          role === "member" ? PAGE_LINKS.managerMember :
          PAGE_LINKS.managerVisitor;

        window.location.href = page;
        return;
      }

      if (PAGE_LINKS[roomKey]) {
        window.location.href = PAGE_LINKS[roomKey];
      }
    });
  });

  document.getElementById("logoutBtn").addEventListener("click", handleLogout);

  bg.addEventListener("load", syncOverlayToImage);
  restartBackgroundNotes();

  window.addEventListener("storage", async (e) => {
    if (e.key === STORAGE_KEYS.studioJumpIntent) {
      pendingStudioJumpIntent = readStudioJumpIntent();
      applyIncomingStudioJumpIntent();
      return;
    }

    if ([STORAGE_KEYS.loggedIn, STORAGE_KEYS.user, STORAGE_KEYS.role, STORAGE_KEYS.memberId].includes(e.key)) {
      const ok = await ensureAuthState();
      if (!ok) return;
      updateTopBarIdentity();
      await loadProjectsFromSupabase();
      renderSiteNotifications();
    }
  });

  document.addEventListener("click", (event) => {
    if (!event.target.closest("#siteNoticeWrap")) {
      toggleSiteNoticePanel(false);
    }
  });

  siteNoticeBtn?.addEventListener("click", (event) => {
    event.stopPropagation();
    renderSiteNotifications();
    toggleSiteNoticePanel();
  });

  window.addEventListener("load", async () => {
    const ok = await ensureAuthState();
    if (!ok) return;
    updateTopBarIdentity();
    syncOverlayToImage();
    updateTaskFilterButtons();
    await loadMembersFromSupabase();
    await loadProjectsFromSupabase();
    renderSiteNotifications();
  });

  window.addEventListener("resize", syncOverlayToImage);
  window.addEventListener("orientationchange", syncOverlayToImage);
  window.addEventListener("load", syncTopUiLayout);

  if ("ResizeObserver" in window) {
    const ro = new ResizeObserver(syncOverlayToImage);
    ro.observe(room);
  }
</script>
</body>
</html>
