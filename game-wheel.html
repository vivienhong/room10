<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>十号房｜抢麦转盘</title>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
}

body{
  background:
    linear-gradient(rgba(255,248,240,0.12), rgba(255,248,240,0.12)),
    url("room-game.png") center / cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.page{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.panel{
  width:min(92vw, 780px);
  padding:28px;
  border-radius:28px;
  background:rgba(255,255,255,0.28);
  border:1.5px solid rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  text-align:center;
}

.title{
  font-size:32px;
  font-weight:800;
  color:#7a5030;
  margin-bottom:20px;
}

.wheel-wrap{
  position:relative;
  width:min(70vw, 380px);
  height:min(70vw, 380px);
  margin:0 auto 20px;
}

#wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  background:conic-gradient(
    #ffe5c2 0deg 60deg,
    #ffd6a5 60deg 120deg,
    #ffcad4 120deg 180deg,
    #cdb4db 180deg 240deg,
    #bde0fe 240deg 300deg,
    #caffbf 300deg 360deg
  );
  transition:transform 4s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
}

/* 指针 */
.pointer{
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:20px solid #ff7a5c;
}

/* 中心按钮 */
.spin-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:#fff6ea;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* 结果 */
.result{
  margin-top:10px;
  font-size:20px;
  color:#7a5030;
  font-weight:700;
}

/* 返回按钮 */
.back{
  margin-top:18px;
  display:inline-block;
  text-decoration:none;
  color:#8a6241;
  font-size:14px;
}
</style>
</head>

<body>
<div class="page">
  <div class="panel">
    <div class="title">抢麦转盘</div>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <div id="wheel"></div>
      <button class="spin-btn" onclick="spin()">开始</button>
    </div>

    <div class="result" id="result">点击开始</div>

    <a class="back" href="game.html">← 返回游戏房</a>
  </div>
</div>

<script>
const items = ["1号位","2号位","3号位","4号位","5号位","6号位"];

let currentRotation = 0;
let spinning = false;

function spin(){
  if(spinning) return;

  spinning = true;

  const randomIndex = Math.floor(Math.random() * items.length);
  const sliceDeg = 360 / items.length;

  const extraTurns = 5 * 360;
  const targetDeg = 360 - (randomIndex * sliceDeg) - sliceDeg/2;

  const finalDeg = extraTurns + targetDeg;

  currentRotation += finalDeg;

  const wheel = document.getElementById("wheel");
  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText = "结果：" + items[randomIndex];
    spinning = false;
  }, 4000);
}
</script>
</body>
</html>
