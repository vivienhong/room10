<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜称号页</title>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial, Helvetica, sans-serif;
  color:#5b4632;
}

body{
  min-height:100vh;
  min-height:100dvh;
  position:relative;
  overflow-x:hidden;
  background:
    linear-gradient(rgba(245,240,232,0.72), rgba(232,223,209,0.78)),
    url("room-titles.png") center center / cover no-repeat fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.14);
  pointer-events:none;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  width:min(1200px, 100%);
  margin:0 auto;
  padding:28px 18px 40px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:110px;
  height:42px;
  padding:0 18px;
  border:none;
  border-radius:999px;
  background:rgba(139,107,75,.92);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(91,70,50,.18);
  backdrop-filter:blur(4px);
}

.back-btn:hover{
  filter:brightness(1.05);
}

.title-wrap{
  flex:1;
  min-width:240px;
}

.page-title{
  margin:0;
  font-size:34px;
  line-height:1.2;
  color:#6a5038;
  text-shadow:0 1px 0 rgba(255,255,255,.45);
}

.page-subtitle{
  margin:8px 0 0;
  font-size:15px;
  color:#866a4e;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:14px;
  margin-bottom:24px;
}

.summary-card{
  background:rgba(255,250,243,.82);
  border:1px solid rgba(229,212,191,.9);
  border-radius:20px;
  padding:18px 18px 16px;
  box-shadow:0 8px 20px rgba(91,70,50,.08);
  backdrop-filter:blur(10px);
}

.summary-label{
  font-size:13px;
  color:#9b7d5c;
  margin-bottom:8px;
}

.summary-value{
  font-size:28px;
  font-weight:700;
  color:#6a5038;
}

.member-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:18px;
}

.member-card{
  background:rgba(255,249,240,.84);
  border:1px solid rgba(227,208,180,.95);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(91,70,50,.08);
  backdrop-filter:blur(10px);
}

.member-head{
  padding:18px 20px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(248,240,229,.72));
  border-bottom:1px solid #eadcc9;
}

.member-name{
  margin:0;
  font-size:24px;
  color:#6a5038;
}

.member-meta{
  margin-top:6px;
  font-size:14px;
  color:#937455;
}

.member-body{
  padding:18px 20px 20px;
}

.count-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:1px dashed #dfccb2;
}

.count-row span:first-child{
  color:#8b6c4e;
  font-size:14px;
}

.count-badge{
  min-width:54px;
  height:32px;
  padding:0 12px;
  border-radius:999px;
  background:#f2e5d4;
  color:#6a5038;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.title-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.title-tag{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  border:1px solid #e6d7c5;
  color:#6a5038;
  font-size:14px;
  line-height:1.2;
}

.empty{
  color:#a78a6a;
  font-size:14px;
}

/* 翻页按钮 */
.page-turn{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  z-index:20;
  width:clamp(42px, 5vw, 68px);
  height:clamp(42px, 5vw, 68px);
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.45);
  color:#6a5038;
  font-size:clamp(20px, 2.2vw, 32px);
  font-weight:700;
  cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:
    0 8px 18px rgba(91,70,50,.16),
    inset 0 1px 0 rgba(255,255,255,.55);
}

.page-turn.left{
  left:clamp(10px, 2vw, 24px);
}

.page-turn.right{
  right:clamp(10px, 2vw, 24px);
}

@media (max-width: 640px){
  .page-turn{
    top:auto;
    bottom:16px;
    transform:none;
  }
}
</style>
</head>

<body>

<!-- ✅ 已修正 -->
<button class="page-turn left" onclick="location.href='gallery.html'">‹</button>
<button class="page-turn right" onclick="location.href='achievements.html'">›</button>

<div class="page">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">返回</button>
    <div class="title-wrap">
      <h1 class="page-title">十号房｜称号页</h1>
      <p class="page-subtitle">暂时展示所有成员已获得称号数量与代表称号</p>
    </div>
  </div>

  <!-- 内容保持不变 -->
  <!-- （你原来的卡片内容全部保留） -->

</div>

</body>
</html>
