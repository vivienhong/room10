<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十号房入住申请表</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  color:#5b4632;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  overflow-y:auto;
  position:relative;
  background:
    linear-gradient(rgba(235,243,239,0.78), rgba(223,233,230,0.88)),
    radial-gradient(circle at center, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0) 62%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(to right, rgba(223,233,230,0.92) 0%, rgba(223,233,230,0.42) 18%, rgba(223,233,230,0.18) 50%, rgba(223,233,230,0.42) 82%, rgba(223,233,230,0.92) 100%),
    linear-gradient(to bottom, rgba(255,250,243,0.18) 0%, rgba(255,250,243,0.06) 35%, rgba(255,250,243,0.16) 100%);
  pointer-events:none;
  z-index:0;
}

.stage{
  position:relative;
  z-index:1;
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:0;
}

.sheet-wrap{
  position:relative;
  width:min(100vw, 1376px);
  margin:0 auto;
  flex:0 0 auto;
}

.sheet-image{
  display:block;
  width:100%;
  height:auto;
  filter:drop-shadow(0 18px 35px rgba(73, 56, 39, 0.18));
  user-select:none;
  pointer-events:none;
  -webkit-user-drag:none;
}

.sheet-form{
  position:absolute;
  left:50%;
  top:17.5%;
  width:54%;
  transform:translateX(-50%);
  transform-origin:top center;
  z-index:2;
  transition:width .22s ease, top .22s ease, height .22s ease;
}

.form-content{
  width:100%;
  transform-origin:top center;
  transition:transform .22s ease;
}

.topbar{
  display:grid;
  grid-template-columns:auto 1fr;
  align-items:center;
  gap:0.8vw;
  margin-bottom:0.9vw;
}

.back-btn{
  border:none;
  background:rgba(217,185,143,0.78);
  color:#4b3523;
  padding:0.62vw 1vw;
  border-radius:0.8vw;
  font-size:0.88vw;
  box-shadow:0 0.3vw 0.9vw rgba(91,70,50,0.06);
  transition:background .2s ease, transform .2s ease;
  cursor:pointer;
  justify-self:start;
}

.back-btn:hover{
  background:rgba(229,199,159,0.92);
  transform:translateY(-1px);
}

.top-desc{
  text-align:center;
  font-size:0.84vw;
  color:#7a6652;
  line-height:1.45;
  padding:0.2vw 2vw 0.2vw 0.6vw;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.62vw;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:0.32vw;
}

.form-group.full{
  grid-column:1 / -1;
}

label{
  font-size:0.82vw;
  font-weight:600;
  color:#6c5845;
}

input, select, textarea{
  width:100%;
  border:1px solid rgba(220,201,177,0.72);
  border-radius:0.72vw;
  padding:0.58vw 0.78vw;
  font-size:0.82vw;
  outline:none;
  background:rgba(255,255,255,0.66);
  color:#5b4632;
  transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
}

input:focus, select:focus, textarea:focus{
  border-color:#c89a62;
  box-shadow:0 0 0 3px rgba(200,154,98,0.12);
  background:rgba(255,255,255,0.86);
}

textarea{
  min-height:5.2vw;
  resize:vertical;
}

.actions{
  margin-top:0.8vw;
  display:flex;
  gap:0.55vw;
  flex-wrap:wrap;
}

.primary-btn, .secondary-btn{
  border:none;
  border-radius:0.72vw;
  padding:0.62vw 1.05vw;
  font-size:0.82vw;
  transition:background .2s ease, transform .2s ease;
  cursor:pointer;
}

.primary-btn{
  background:#c89a62;
  color:white;
}

.primary-btn:hover{
  background:#b88952;
  transform:translateY(-1px);
}

.primary-btn:disabled{
  background:#d8c0a2;
  cursor:not-allowed;
  transform:none;
}

.secondary-btn{
  background:rgba(238,226,208,0.86);
  color:#5a4632;
}

.secondary-btn:hover{
  background:rgba(229,213,191,0.95);
  transform:translateY(-1px);
}

.message{
  margin-top:0.7vw;
  min-height:1.1vw;
  font-size:0.82vw;
  font-weight:600;
}

.success{
  color:#4d7a43;
}

.error{
  color:#9a4f3e;
}

.field-hint{
  min-height:1.1em;
  font-size:0.72vw;
  line-height:1.35;
  color:#8a7560;
  padding-left:0.1vw;
}

.field-hint.error{
  color:#9a4f3e;
}

.field-hint.success{
  color:#4d7a43;
}

.skills-wrap{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:0.55vw;
}

.skill-item{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.42vw;
  background:rgba(255,255,255,0.48);
  border:1px solid rgba(220,201,177,0.56);
  border-radius:0.72vw;
  padding:0.5vw 0.68vw;
  white-space:nowrap;
}

.skill-item input{
  width:auto;
  margin:0;
  padding:0;
}

.custom-skill-row{
  display:grid;
  grid-template-columns:1fr;
  gap:0.55vw;
  align-items:center;
}

.avatar-preview{
  margin-top:0.35vw;
  width:4.6vw;
  height:4.6vw;
  border-radius:0.85vw;
  border:1px solid #dcc9b1;
  object-fit:cover;
  background:#f4ecdf;
  display:none;
}

.required-mark{
  color:#b24b3f;
  margin-left:0.15vw;
}

.field-error{
  border-color:#cf7d69 !important;
  box-shadow:0 0 0 3px rgba(207,125,105,0.16) !important;
  background:#fff7f4 !important;
}

.birthday-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0.55vw;
}

.mbti-grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:0.55vw;
}

.mbti-item{
  display:flex;
  align-items:center;
  gap:0.35vw;
  border-radius:0.72vw;
  padding:0.5vw 0.68vw;
  border:1px solid transparent;
  font-size:0.8vw;
  font-weight:600;
  user-select:none;
  background-clip:padding-box;
  cursor:pointer;
  white-space:nowrap;
}

.mbti-item input{
  width:auto;
  margin:0;
  padding:0;
}

.mbti-analyst{ background:#ece7ffcc; color:#5a47a8; border-color:#d4caf8; }
.mbti-diplomat{ background:#e8f8eccc; color:#36724a; border-color:#c9ebd2; }
.mbti-sentinel{ background:#e8f1ffcc; color:#3e648f; border-color:#cbdcf6; }
.mbti-explorer{ background:#fff1dfcc; color:#9a6632; border-color:#f1d4af; }

@media (max-width:1376px){
  .back-btn{
    font-size:max(12px, 0.88vw);
    padding:max(8px, 0.62vw) max(12px, 1vw);
    border-radius:max(10px, 0.8vw);
  }

  .top-desc{
    font-size:max(13px, 0.84vw);
    padding:max(3px, 0.2vw) max(24px, 2vw) max(3px, 0.2vw) max(8px, 0.6vw);
  }

  label,
  input,
  select,
  textarea,
  .primary-btn,
  .secondary-btn,
  .message{
    font-size:max(13px, 0.82vw);
  }

  .field-hint{
    font-size:max(12px, 0.72vw);
  }

  .mbti-item{
    font-size:max(12px, 0.8vw);
  }

  input, select, textarea{
    border-radius:max(10px, 0.72vw);
    padding:max(10px, 0.58vw) max(12px, 0.78vw);
  }

  .primary-btn, .secondary-btn{
    border-radius:max(10px, 0.72vw);
    padding:max(10px, 0.62vw) max(16px, 1.05vw);
  }

  .skill-item,
  .mbti-item{
    border-radius:max(10px, 0.72vw);
    padding:max(8px, 0.5vw) max(10px, 0.68vw);
  }

  .avatar-preview{
    width:max(60px, 4.6vw);
    height:max(60px, 4.6vw);
    border-radius:max(10px, 0.85vw);
  }

  textarea{
    min-height:max(92px, 5.2vw);
  }

  .topbar{
    margin-bottom:max(10px, 0.9vw);
    gap:max(8px, 0.8vw);
  }

  .form-grid,
  .actions,
  .skills-wrap,
  .birthday-row,
  .mbti-grid,
  .custom-skill-row{
    gap:max(8px, 0.55vw);
  }

  .form-group{
    gap:max(6px, 0.32vw);
  }

  .message{
    min-height:18px;
    margin-top:max(10px, 0.7vw);
  }

  .actions{
    margin-top:max(12px, 0.8vw);
  }
}

@media (max-width:1200px){
  .sheet-form{
    width:56%;
    top:17.4%;
  }
}

@media (max-width:1000px){
  .sheet-form{
    width:58%;
    top:17.3%;
  }
}

@media (max-width:900px){
  .sheet-form{
    width:70%;
    top:17.2%;
  }

  .skills-wrap{
    grid-template-columns:repeat(3, minmax(0,1fr));
  }

  .custom-skill-row{
    grid-template-columns:1fr;
  }

  .mbti-grid{
    grid-template-columns:repeat(4, minmax(0,1fr));
  }
}

@media (max-width:820px){
  .sheet-form{
    width:74%;
    top:17.05%;
  }

  .topbar{
    margin-bottom:8px;
  }

  .form-grid{
    gap:7px;
  }

  .form-group{
    gap:5px;
  }

  label,
  input,
  select,
  textarea,
  .primary-btn,
  .secondary-btn,
  .message{
    font-size:12.5px;
  }

  .field-hint{
    font-size:11.5px;
  }

  .mbti-item{
    font-size:11.5px;
    padding:7px 8px;
  }

  .skill-item{
    padding:7px 8px;
    font-size:12px;
  }

  input, select, textarea{
    padding:8px 10px;
  }

  .birthday-row,
  .skills-wrap,
  .mbti-grid{
    gap:7px;
  }

  .actions{
    margin-top:10px;
    gap:7px;
  }

  textarea{
    min-height:80px;
  }
}

@media (max-width:700px){
  .stage{
    padding:18px 10px 24px;
  }

  .sheet-wrap{
    width:100%;
  }

  .sheet-image{
    display:none;
  }

  .sheet-form{
    position:relative;
    left:auto;
    top:auto;
    transform:none !important;
    width:100%;
    height:auto !important;
  }

  .topbar{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }

  .top-desc{
    padding:0;
    text-align:center;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .birthday-row{
    grid-template-columns:1fr;
  }

  .actions{
    margin-top:18px;
  }

  .skills-wrap{
    grid-template-columns:repeat(3, minmax(0,1fr));
  }

  .custom-skill-row{
    grid-template-columns:1fr;
  }

  .mbti-grid{
    grid-template-columns:repeat(2, minmax(0,1fr));
  }

  .skill-item,
  .mbti-item{
    justify-content:flex-start;
  }
}
</style>
</head>
<body>

<div class="stage">
  <div class="sheet-wrap">
    <img src="room-checkin.png" alt="入住申请表底图" class="sheet-image">

    <div class="sheet-form" id="sheetForm">
      <div class="form-content" id="formContent">
        <div class="topbar">
          <button class="back-btn" type="button" onclick="goBackToSource()">返回上一页</button>
          <div class="top-desc">
            欢迎来到十号房~ 入住申请提交给宿管通过审核后，宿管会为你提供大门钥匙。登记完成，你就可以带着昵称和钥匙，正式搬进十号房啦。
          </div>
        </div>

        <div class="form-grid">

          <div class="form-group">
            <label for="inviteKey">钥匙<span class="required-mark">*</span></label>
            <input id="inviteKey" type="text" placeholder="请输入你的钥匙">
          </div>

          <div class="form-group">
            <label for="avatar">上传头像<span class="required-mark">*</span></label>
            <input id="avatar" type="file" accept="image/*">
            <img id="avatarPreview" class="avatar-preview" alt="头像预览">
          </div>

          <div class="form-group">
            <label for="name">圈名<span class="required-mark">*</span></label>
            <input id="name" type="text" placeholder="请输入圈名">
            <div id="nameHint" class="field-hint"></div>
          </div>

          <div class="form-group">
            <label for="nickname">昵称<span class="required-mark">*</span></label>
            <input id="nickname" type="text" placeholder="1个中文或1-4个英文字母（首字母大写）">
            <div id="nicknameHint" class="field-hint"></div>
          </div>

          <div class="form-group">
            <label for="joinedAt">登堂入室<span class="required-mark">*</span></label>
            <input id="joinedAt" type="date">
          </div>

          <div class="form-group">
            <label for="location">所在地<span class="required-mark">*</span></label>
            <input id="location" type="text" placeholder="中国地区请写省份；海外写地区或国家名">
            <div id="locationHint" class="field-hint"></div>
          </div>

          <div class="form-group full">
            <label>生日<span class="required-mark">*</span></label>
            <div class="birthday-row">
              <select id="birthdayYear">
                <option value="">年份（可选）</option>
              </select>
              <select id="birthdayMonth">
                <option value="">月份</option>
              </select>
              <select id="birthdayDay">
                <option value="">日期</option>
              </select>
            </div>
          </div>

          <div class="form-group full">
            <label>MBTI</label>
            <div class="mbti-grid">
              <label class="mbti-item mbti-analyst"><input type="radio" name="mbti" value="INTJ"> INTJ</label>
              <label class="mbti-item mbti-analyst"><input type="radio" name="mbti" value="INTP"> INTP</label>
              <label class="mbti-item mbti-analyst"><input type="radio" name="mbti" value="ENTJ"> ENTJ</label>
              <label class="mbti-item mbti-analyst"><input type="radio" name="mbti" value="ENTP"> ENTP</label>

              <label class="mbti-item mbti-diplomat"><input type="radio" name="mbti" value="INFJ"> INFJ</label>
              <label class="mbti-item mbti-diplomat"><input type="radio" name="mbti" value="INFP"> INFP</label>
              <label class="mbti-item mbti-diplomat"><input type="radio" name="mbti" value="ENFJ"> ENFJ</label>
              <label class="mbti-item mbti-diplomat"><input type="radio" name="mbti" value="ENFP"> ENFP</label>

              <label class="mbti-item mbti-sentinel"><input type="radio" name="mbti" value="ISTJ"> ISTJ</label>
              <label class="mbti-item mbti-sentinel"><input type="radio" name="mbti" value="ISFJ"> ISFJ</label>
              <label class="mbti-item mbti-sentinel"><input type="radio" name="mbti" value="ESTJ"> ESTJ</label>
              <label class="mbti-item mbti-sentinel"><input type="radio" name="mbti" value="ESFJ"> ESFJ</label>

              <label class="mbti-item mbti-explorer"><input type="radio" name="mbti" value="ISTP"> ISTP</label>
              <label class="mbti-item mbti-explorer"><input type="radio" name="mbti" value="ISFP"> ISFP</label>
              <label class="mbti-item mbti-explorer"><input type="radio" name="mbti" value="ESTP"> ESTP</label>
              <label class="mbti-item mbti-explorer"><input type="radio" name="mbti" value="ESFP"> ESFP</label>
            </div>
          </div>

          <div class="form-group full">
            <label>额外技能</label>
            <div class="skills-wrap">
              <label class="skill-item"><input type="checkbox" value="美工" class="skillCheck"> 美工</label>
              <label class="skill-item"><input type="checkbox" value="混音" class="skillCheck"> 混音</label>
              <label class="skill-item"><input type="checkbox" value="视频剪辑" class="skillCheck"> 视频剪辑</label>
            </div>
          </div>

          <div class="form-group full">
            <div class="custom-skill-row">
              <input id="customSkill" type="text" placeholder="其他技能可直接填写在这里（选填）">
            </div>
          </div>

          <div class="form-group">
            <label for="contactQq">QQ号<span class="required-mark">*</span></label>
            <input id="contactQq" type="text" placeholder="请输入QQ号，没有请填写无">
          </div>

          <div class="form-group">
            <label for="socialXhs">小红书 ID</label>
            <input id="socialXhs" type="text" placeholder="没有可留空">
          </div>

          <div class="form-group">
            <label for="socialDouyin">抖音 ID</label>
            <input id="socialDouyin" type="text" placeholder="没有可留空">
          </div>

          <div class="form-group">
            <label for="socialBilibili">B站 ID</label>
            <input id="socialBilibili" type="text" placeholder="没有可留空">
          </div>

          <div class="form-group">
            <label for="socialWeibo">微博 ID</label>
            <input id="socialWeibo" type="text" placeholder="没有可留空">
          </div>

          <div class="form-group full">
            <label for="publicMessage">随便说点啥</label>
            <textarea id="publicMessage" placeholder="这段内容会对外展示。"></textarea>
          </div>

        </div>

        <div class="actions">
          <button id="submitBtn" class="primary-btn" type="button" onclick="submitRegistration()">提交登记表</button>
          <button class="secondary-btn" type="button" onclick="clearForm()">清空内容</button>
        </div>

        <div id="formMessage" class="message"></div>
      </div>
    </div>
  </div>
</div>

<script>
const supabaseUrl = "https://tfevitwoqmxwaguvtyms.supabase.co";
const supabaseKey = "sb_publishable_0cFYhwx_9uEcrXnMJzzNMQ_cEng8xmI";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const avatarInput = document.getElementById("avatar");
const avatarPreview = document.getElementById("avatarPreview");
const sheetImage = document.querySelector(".sheet-image");
const sheetForm = document.getElementById("sheetForm");
const formContent = document.getElementById("formContent");

const nameInput = document.getElementById("name");
const nicknameInput = document.getElementById("nickname");
const locationInput = document.getElementById("location");

const REGISTER_RETURN_KEY = "room10RegisterReturn";
const ALLOWED_RETURN_PAGES = ["index.html", "manager.html"];

function normalizeReturnPage(raw){
  const value = String(raw || "").trim();
  return ALLOWED_RETURN_PAGES.includes(value) ? value : "";
}

function getReturnPage(){
  const params = new URLSearchParams(window.location.search);
  const fromQuery = normalizeReturnPage(params.get("from"));
  const fromSession = normalizeReturnPage(sessionStorage.getItem(REGISTER_RETURN_KEY));

  if(fromQuery){
    sessionStorage.setItem(REGISTER_RETURN_KEY, fromQuery);
    return fromQuery;
  }

  if(fromSession){
    return fromSession;
  }

  sessionStorage.setItem(REGISTER_RETURN_KEY, "index.html");
  return "index.html";
}

function goBackToSource(){
  window.location.href = getReturnPage();
}

function clearReturnPageCache(){
  sessionStorage.removeItem(REGISTER_RETURN_KEY);
}

avatarInput.addEventListener("change", () => {
  const file = avatarInput.files[0];
  if(!file){
    avatarPreview.style.display = "none";
    avatarPreview.removeAttribute("src");
    return;
  }
  const url = URL.createObjectURL(file);
  avatarPreview.src = url;
  avatarPreview.style.display = "block";
  requestAnimationFrame(fitFormToSheet);
});

function populateBirthdayOptions(){
  const yearSelect = document.getElementById("birthdayYear");
  const monthSelect = document.getElementById("birthdayMonth");
  const daySelect = document.getElementById("birthdayDay");

  const currentYear = new Date().getFullYear();

  for(let y = currentYear; y >= 1950; y--){
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y + "年";
    yearSelect.appendChild(opt);
  }

  for(let m = 1; m <= 12; m++){
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m + "月";
    monthSelect.appendChild(opt);
  }

  for(let d = 1; d <= 31; d++){
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d + "日";
    daySelect.appendChild(opt);
  }
}

function fitFormToSheet(){
  if(window.innerWidth <= 700){
    formContent.style.transform = "none";
    sheetForm.style.height = "auto";
    sheetForm.style.removeProperty("transform");
    return;
  }

  sheetForm.style.transform = "translateX(-50%)";
  sheetForm.style.height = "auto";
  formContent.style.transform = "scale(1)";
  formContent.style.transformOrigin = "top center";

  const imageRect = sheetImage.getBoundingClientRect();
  if(!imageRect.height) return;

  const sheetTopPercent = 17.5;
  const sheetBottomPercent = 73.5;
  const availableHeight = imageRect.height * ((sheetBottomPercent - sheetTopPercent) / 100);

  const naturalHeight = formContent.scrollHeight;
  const scale = Math.max(0.93, Math.min(1, availableHeight / naturalHeight));

  formContent.style.transform = `scale(${scale})`;
  sheetForm.style.height = `${naturalHeight * scale}px`;
}

function setMessage(text, type){
  const box = document.getElementById("formMessage");
  box.textContent = text;
  box.className = "message" + (type ? " " + type : "");
  requestAnimationFrame(fitFormToSheet);
}

function setFieldHint(id, text, type = ""){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = text;
  el.className = "field-hint" + (type ? " " + type : "");
  requestAnimationFrame(fitFormToSheet);
}

function getToday(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function calcCohort(dateStr){
  if(!dateStr) return "";

  const d = new Date(dateStr + "T00:00:00");
  const oneEnd = new Date("2025-04-04T23:59:59");
  const twoStart = new Date("2025-04-05T00:00:00");
  const twoEnd = new Date("2025-12-31T23:59:59");
  const threeStart = new Date("2026-01-01T00:00:00");

  if(d <= oneEnd) return "一期生";
  if(d >= twoStart && d <= twoEnd) return "二期生";
  if(d >= threeStart) return "三期生";

  return "待判定";
}

function clearFieldErrors(){
  document.querySelectorAll(".field-error").forEach(el => el.classList.remove("field-error"));
}

function markError(el){
  if(el){
    el.classList.add("field-error");
  }
}

function clearError(el){
  if(el){
    el.classList.remove("field-error");
  }
}

function focusElement(el){
  if(!el) return;
  if(typeof el.focus === "function"){
    el.focus();
  }
  if(typeof el.scrollIntoView === "function"){
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

function validateNickname(nickname){
  const nicknameRule = /^[\u4e00-\u9fa5]$|^[A-Z][a-z]{0,3}$/;
  return nicknameRule.test(nickname);
}

function validateKeyFormat(key){
  return /^A\d{2}$/.test(key);
}

function validateQq(value){
  return value === "无" || /^[1-9]\d{4,14}$/.test(value);
}

function validateLocation(value){
  const allowedLocations = [
    "北京","天津","上海","重庆",
    "河北","山西","辽宁","吉林","黑龙江",
    "江苏","浙江","安徽","福建","江西","山东",
    "河南","湖北","湖南","广东","海南",
    "四川","贵州","云南","陕西","甘肃","青海",
    "台湾","内蒙古","广西","西藏","宁夏","新疆",
    "香港","澳门",
    "美国","加拿大",
    "美东","美西","美中"
  ];
  return allowedLocations.includes(value);
}

function getMbtiValue(){
  const checked = document.querySelector('input[name="mbti"]:checked');
  return checked ? checked.value : "";
}

async function checkNameExists(name){
  const { data, error } = await client
    .from("members")
    .select("name")
    .eq("name", name)
    .limit(1);

  if(error){
    console.error("圈名查重失败：", error);
    return false;
  }

  return Array.isArray(data) && data.length > 0;
}

async function checkNicknameExists(nickname){
  const { data, error } = await client
    .from("members")
    .select("nickname")
    .eq("nickname", nickname)
    .limit(1);

  if(error){
    console.error("昵称查重失败：", error);
    return false;
  }

  return Array.isArray(data) && data.length > 0;
}

nameInput.addEventListener("blur", async () => {

  if(!value){

  }

  if(!validateNickname(value)){

locationInput.addEventListener("blur", () => {

function clearForm(){
  document.getElementById("inviteKey").value = "";
  document.getElementById("name").value = "";
  document.getElementById("nickname").value = "";
  document.getElementById("avatar").value = "";
  document.getElementById("contactQq").value = "";
  document.getElementById("location").value = "";
  document.querySelectorAll('input[name="mbti"]').forEach(el => el.checked = false);
  document.getElementById("birthdayYear").value = "";
  document.getElementById("birthdayMonth").value = "";
  document.getElementById("birthdayDay").value = "";
  document.getElementById("joinedAt").value = getToday();
  document.querySelectorAll(".skillCheck").forEach(el => el.checked = false);
  document.getElementById("customSkill").value = "";
  document.getElementById("socialXhs").value = "";
  document.getElementById("socialDouyin").value = "";
  document.getElementById("socialBilibili").value = "";
  document.getElementById("socialWeibo").value = "";
  document.getElementById("publicMessage").value = "";
  document.getElementById("formMessage").textContent = "";

}

async function uploadAvatar(file, keyCode){
  const ext = file.name.split(".").pop()?.toLowerCase() || "png";
  const safeExt = ext.replace(/[^a-z0-9]/g, "") || "png";
  const fileName = `${keyCode}-${Date.now()}.${safeExt}`;

  const { error } = await client.storage
    .from("avatars")
    .upload(fileName, file, {
      upsert: false,
      contentType: file.type || "image/png"
    });

  if(error){
    console.error("头像上传失败详情：", error);
    throw new Error(`头像搬家失败了：${error.message || "未知错误"}`);
  }

  const { data } = client.storage
    .from("avatars")
    .getPublicUrl(fileName);

  return data.publicUrl;
}

async function checkInviteKey(keyCode){
  const { data, error } = await client
    .from("invite_keys")
    .select("key_code,is_used")
    .eq("key_code", keyCode)
    .maybeSingle();

  if(error){
    console.error("钥匙校验失败详情：", error);
    throw new Error("钥匙校验失败");
  }

  return data;
}

async function markInviteKeyUsed(keyCode, nickname){
  const { error } = await client
    .from("invite_keys")
    .update({
      is_used: true,
      used_by_nickname: nickname
    })
    .eq("key_code", keyCode);

  if(error){
    console.error("钥匙状态更新失败详情：", error);
    throw new Error("钥匙状态更新失败");
  }
}

async function submitRegistration(){
  const submitBtn = document.getElementById("submitBtn");

  const inviteKey = document.getElementById("inviteKey").value.trim();
  const name = document.getElementById("name").value.trim();
  const nickname = document.getElementById("nickname").value.trim();
  const avatarFile = document.getElementById("avatar").files[0];
  const mbti = getMbtiValue();
  const location = document.getElementById("location").value.trim();
  const qq = document.getElementById("contactQq").value.trim();
  const birthdayYearValue = document.getElementById("birthdayYear").value.trim();
  const birthdayMonthValue = document.getElementById("birthdayMonth").value.trim();
  const birthdayDayValue = document.getElementById("birthdayDay").value.trim();
  const joinedAt = document.getElementById("joinedAt").value || getToday();
  const customSkill = document.getElementById("customSkill").value.trim();
  const socialXhs = document.getElementById("socialXhs").value.trim();
  const socialDouyin = document.getElementById("socialDouyin").value.trim();
  const socialBilibili = document.getElementById("socialBilibili").value.trim();
  const socialWeibo = document.getElementById("socialWeibo").value.trim();
  const publicMessage = document.getElementById("publicMessage").value.trim();

  const birthdayMonth = parseInt(birthdayMonthValue, 10);
  const birthdayDay = parseInt(birthdayDayValue, 10);
  const birthdayYear = birthdayYearValue ? parseInt(birthdayYearValue, 10) : null;

  const selectedSkills = [...document.querySelectorAll(".skillCheck:checked")].map(el => el.value);

  clearFieldErrors();
  setMessage("", "");

  if(!inviteKey){
    markError(document.getElementById("inviteKey"));
    setMessage("你还没把钥匙带上呢", "error");
    focusElement(document.getElementById("inviteKey"));
    return;
  }

  if(!validateKeyFormat(inviteKey)){
    markError(document.getElementById("inviteKey"));
    setMessage("拿错钥匙了", "error");
    focusElement(document.getElementById("inviteKey"));
    return;
  }

  const requiredFields = [
    { el: document.getElementById("avatar"), empty: !avatarFile },
    { el: document.getElementById("name"), empty: !name },
    { el: document.getElementById("nickname"), empty: !nickname },
    { el: document.getElementById("location"), empty: !location },
    { el: document.getElementById("contactQq"), empty: !qq },
    { el: document.getElementById("birthdayMonth"), empty: !birthdayMonthValue },
    { el: document.getElementById("birthdayDay"), empty: !birthdayDayValue },
    { el: document.getElementById("joinedAt"), empty: !joinedAt }
  ];

  const missingFields = requiredFields.filter(item => item.empty);

  if(missingFields.length > 0){
    missingFields.forEach(item => markError(item.el));
    setMessage("还没填写完整呢", "error");
    focusElement(missingFields[0].el);
    return;
  }

  if(!validateNickname(nickname)){
    markError(document.getElementById("nickname"));
    setFieldHint("nicknameHint", "昵称要么是1个中文，要么是1-4个英文字母，且首字母大写", "error");
    setMessage("昵称格式不对喔", "error");
    focusElement(document.getElementById("nickname"));
    return;
  }

  if(!validateLocation(location)){
    markError(document.getElementById("location"));
    setFieldHint("locationHint", "仅可填写省份、美东/美西/美中、美国或加拿大", "error");
    setMessage("所在地填写不符合要求", "error");
    focusElement(document.getElementById("location"));
    return;
  }

  if(!validateQq(qq)){
    markError(document.getElementById("contactQq"));
    setMessage("QQ号请填写正确的数字，若没有请填写“无”", "error");
    focusElement(document.getElementById("contactQq"));
    return;
  }

  if(isNaN(birthdayMonth) || birthdayMonth < 1 || birthdayMonth > 12){
    markError(document.getElementById("birthdayMonth"));
    setMessage("还没填写完整呢", "error");
    focusElement(document.getElementById("birthdayMonth"));
    return;
  }

  if(isNaN(birthdayDay) || birthdayDay < 1 || birthdayDay > 31){
    markError(document.getElementById("birthdayDay"));
    setMessage("还没填写完整呢", "error");
    focusElement(document.getElementById("birthdayDay"));
    return;
  }

  submitBtn.disabled = true;

  try{
    const nameExists = await checkNameExists(name);
    if(nameExists){
      markError(document.getElementById("name"));
      setFieldHint("nameHint", "这个圈名已经有人先住进去啦", "error");
      setMessage("圈名重复了", "error");
      focusElement(document.getElementById("name"));
      submitBtn.disabled = false;
      return;
    }

    const nicknameExists = await checkNicknameExists(nickname);
    if(nicknameExists){
      markError(document.getElementById("nickname"));
      setFieldHint("nicknameHint", "这个昵称已经被别人抢先用了", "error");
      setMessage("昵称重复了", "error");
      focusElement(document.getElementById("nickname"));
      submitBtn.disabled = false;
      return;
    }

    const inviteRow = await checkInviteKey(inviteKey);

    if(!inviteRow){
      markError(document.getElementById("inviteKey"));
      setMessage("拿错钥匙了", "error");
      focusElement(document.getElementById("inviteKey"));
      submitBtn.disabled = false;
      return;
    }

    if(inviteRow.is_used){
      markError(document.getElementById("inviteKey"));
      setMessage("这把钥匙是别人的喔", "error");
      focusElement(document.getElementById("inviteKey"));
      submitBtn.disabled = false;
      return;
    }

    setMessage("宿管正在翻登记本，稍等一下下……", "");

    const cohort = calcCohort(joinedAt);
    const avatarUrl = await uploadAvatar(avatarFile, inviteKey);

    const skillsValue = selectedSkills.length ? selectedSkills.join(",") : null;
    const customSkillValue = customSkill || null;

    const { error: insertError } = await client.from("members").insert([{
      member_code: inviteKey,
      name: name,
      nickname: nickname,
      avatar_url: avatarUrl,
      mbti: mbti || null,
      location: location || null,
      contact_qq: qq,
      birthday_year: birthdayYear,
      birthday_month: birthdayMonth,
      birthday_day: birthdayDay,
      skills: skillsValue,
      custom_skill: customSkillValue,
      social_xiaohongshu: socialXhs || null,
      social_douyin: socialDouyin || null,
      social_bilibili: socialBilibili || null,
      social_weibo: socialWeibo || null,
      joined_at: joinedAt,
      cohort: cohort,
      public_message: publicMessage || null
    }]);

    if(insertError){
      console.error("成员写入失败详情：", insertError);
      const msg = String(insertError.message || "");

      if(msg.includes("name")){
        markError(document.getElementById("name"));
        setFieldHint("nameHint", "这个圈名已经有人先住进去啦", "error");
        throw new Error("这个圈名已经有人先住进去啦");
      }

      if(msg.includes("nickname")){
        markError(document.getElementById("nickname"));
        setFieldHint("nicknameHint", "这个昵称已经被别人抢先用了", "error");
        throw new Error("这个昵称已经被别人抢先用了");
      }

      if(msg.includes("member_code")){
        markError(document.getElementById("inviteKey"));
        throw new Error("这把钥匙是别人的喔");
      }

      if(msg.includes("contact_qq")){
        markError(document.getElementById("contactQq"));
        throw new Error("QQ号写入失败，请检查数据库字段");
      }

      throw new Error("入住申请提交失败");
    }

    await markInviteKeyUsed(inviteKey, nickname);

    setMessage(`入住登记成功～你的钥匙是 ${inviteKey}，快带着它去十号房开门吧`, "success");

    const returnPage = getReturnPage();

    setTimeout(() => {
      clearReturnPageCache();
      window.location.href = returnPage;
    }, 1800);

  }catch(err){
    setMessage(err.message || "提交失败", "error");
  }finally{
    submitBtn.disabled = false;
  }
}

document.getElementById("joinedAt").value = getToday();
populateBirthdayOptions();
getReturnPage();

});

  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    requestAnimationFrame(fitFormToSheet);
  }, 60);
});

document.fonts?.ready?.then(() => {

});
</script>
