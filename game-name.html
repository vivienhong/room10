<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>十号房｜脸萌挑战</title>

<style>
*{box-sizing:border-box;}

:root{
  --bg1:#fff3e0;
  --bg2:#f8e3c8;
  --text:#5b3e28;
  --text2:#7d5c3c;
  --line:rgba(255,255,255,.78);
  --ok:#6fa463;
  --okBg:rgba(191,234,186,.52);
  --bad:#d86a6a;
  --badBg:rgba(255,193,193,.42);
  --zoneHover:rgba(255,145,40,.42);
  --zoneHoverStroke:#d96a00;
  --select:#f1b94f;
  --selectBg:rgba(255,218,120,.34);

  /* 小屏裁切参数：裁掉左侧空白，只保留右侧主体 */
  --cropScale:1.724137931;
  --cropShift:-72.4137931%;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:linear-gradient(to right, var(--bg1), var(--bg2));
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
}

#room{
  position:relative;
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#bgShade{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(
      circle at center,
      rgba(0,0,0,0) 56%,
      rgba(210,186,160,0.10) 72%,
      rgba(190,160,130,0.16) 86%,
      rgba(170,138,108,0.22) 100%
    );
}

#stage{
  position:relative;
  width:fit-content;
  height:fit-content;
  max-width:100vw;
  max-height:100vh;
  z-index:2;
}

#playArea{
  position:relative;
  width:fit-content;
  height:fit-content;
  line-height:0;
}

#viewport{
  position:relative;
  display:block;
  line-height:0;
}

#fullLayer{
  position:relative;
  display:block;
  line-height:0;
}

#bg{
  display:block;
  width:auto;
  height:auto;
  max-width:100vw;
  max-height:100vh;
  position:relative;
  z-index:0;
}

#map{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:4;
}

#labelLayer{
  position:absolute;
  inset:0;
  z-index:5;
  pointer-events:none;
}

/* 左侧主面板 */
#leftPanel{
  position:absolute;
  left:2.2%;
  top:3%;
  width:30%;
  min-width:330px;
  max-width:430px;
  height:94%;
  z-index:6;
  pointer-events:auto;
  background:
    linear-gradient(
      145deg,
      rgba(255,255,255,.42) 0%,
      rgba(255,255,255,.30) 45%,
      rgba(255,255,255,.18) 100%
    );
  backdrop-filter:blur(16px) saturate(120%);
  -webkit-backdrop-filter:blur(16px) saturate(120%);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:
    0 12px 34px rgba(92,63,37,.15),
    inset 0 1px 0 rgba(255,255,255,.92),
    inset 0 -2px 8px rgba(255,255,255,.12);
  display:flex;
  flex-direction:column;
  padding:14px 12px 12px;
  gap:10px;
}

#titleRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

#gameTitle{
  font-size:24px;
  font-weight:900;
  color:var(--text);
  line-height:1.1;
  margin:0;
}

#backBtnInline{
  flex:0 0 auto;
  min-width:38px;
  height:38px;
  border:none;
  border-radius:999px;
  background:rgba(255,244,225,.96);
  color:#6a4b2f;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:
    0 6px 18px rgba(92,63,37,.18),
    inset 0 1px 0 rgba(255,255,255,.82);
}

#backBtnInline:hover{
  background:rgba(255,249,240,.99);
}

#gameSub{
  font-size:11px;
  line-height:1.5;
  color:var(--text2);
  margin:0;
}

#layoutHint{
  display:none;
}

/* 名字区 */
#nameListWrap{
  flex:1;
  min-height:0;
  overflow:auto;
  padding-right:2px;
}

#nameListWrap::-webkit-scrollbar{
  width:7px;
}
#nameListWrap::-webkit-scrollbar-thumb{
  background:rgba(131,96,63,.28);
  border-radius:999px;
}

#nameList{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:6px;
}

.nameCard{
  user-select:none;
  cursor:grab;
  padding:6px 4px;
  border-radius:10px;
  font-size:11px;
  font-weight:800;
  color:#6a4b2f;
  text-align:center;
  line-height:1.15;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  background:rgba(255,249,240,.94);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:
    0 4px 12px rgba(92,63,37,.12),
    inset 0 1px 0 rgba(255,255,255,.88);
  transition:
    transform .15s ease,
    box-shadow .15s ease,
    opacity .15s ease,
    background .15s ease,
    border-color .15s ease;
}

.nameCard:hover{
  transform:translateY(-1px);
  box-shadow:
    0 6px 16px rgba(92,63,37,.16),
    inset 0 1px 0 rgba(255,255,255,.9);
}

.nameCard:active{
  cursor:grabbing;
}

.nameCard.correct{
  background:rgba(233,248,231,.96);
  color:#4c7d45;
  opacity:.82;
  cursor:default;
}

.nameCard.dragging{
  opacity:.55;
}

.nameCard.selected{
  background:rgba(255,249,232,.98);
  border-color:rgba(241,185,79,.95);
  box-shadow:
    0 0 0 2px rgba(241,185,79,.45),
    0 6px 16px rgba(92,63,37,.16),
    inset 0 1px 0 rgba(255,255,255,.92);
  transform:translateY(-1px);
}

@keyframes flashBad{
  0%{box-shadow:0 0 0 rgba(216,106,106,0);}
  50%{box-shadow:0 0 0 3px rgba(216,106,106,.35);}
  100%{box-shadow:0 0 0 rgba(216,106,106,0);}
}
.nameCard.bad{
  animation:flashBad .45s ease;
}

/* 底部信息框 */
#infoBox{
  flex:0 0 auto;
  padding:10px 10px 10px;
  background:rgba(255,250,242,.76);
  border:1px solid rgba(255,255,255,.86);
  border-radius:16px;
  color:var(--text);
  box-shadow:
    0 6px 16px rgba(92,63,37,.10),
    inset 0 1px 0 rgba(255,255,255,.9);
}

.statusRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  font-size:12px;
  line-height:1.5;
}

.statusRow b{
  color:var(--text);
}

#resultText{
  margin-top:7px;
  font-size:13px;
  font-weight:800;
  color:var(--text);
  min-height:19px;
}

#bottomBtns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.ctrlBtn{
  flex:1;
  height:38px;
  border:none;
  border-radius:999px;
  background:rgba(255,246,232,.96);
  color:#6a4b2f;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  box-shadow:
    0 6px 18px rgba(92,63,37,.16),
    inset 0 1px 0 rgba(255,255,255,.88);
  transition:transform .18s ease, background .18s ease;
}

.ctrlBtn:hover{
  transform:translateY(-1px);
  background:rgba(255,250,242,.99);
}

/* 热区 */
.dropZone{
  fill:rgba(255,176,72,.18);
  stroke:rgba(235,120,20,.55);
  stroke-width:.55;
  stroke-dasharray:1.4 1.1;
  rx:1.2;
  ry:1.2;
  transition:.18s;
  cursor:pointer;
}

.dropZone.hover{
  fill:var(--zoneHover);
  stroke:var(--zoneHoverStroke);
  stroke-width:.8;
}

.dropZone.correct{
  fill:var(--okBg);
  stroke:var(--ok);
  stroke-width:.8;
}

.dropZone.wrong{
  fill:var(--badBg);
  stroke:var(--bad);
  stroke-width:.84;
}

.dropZone.selected{
  fill:var(--selectBg);
  stroke:var(--select);
  stroke-width:1.05;
  stroke-dasharray:none;
}

/* 人名标签 */
.nameLabel{
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  background:rgba(255,248,238,.96);
  border:1px solid rgba(255,255,255,.95);
  border-radius:999px;
  box-shadow:
    0 2px 6px rgba(92,63,37,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
  color:#4f3a29;
  font-weight:900;
  line-height:1;
  padding:0 .2em;
}

@keyframes shakeZone{
  0%{transform:translateX(0);}
  20%{transform:translateX(-1.1px);}
  40%{transform:translateX(1.1px);}
  60%{transform:translateX(-1px);}
  80%{transform:translateX(.9px);}
  100%{transform:translateX(0);}
}
.shake{
  animation:shakeZone .36s ease;
}

/* 常规中屏左右 */
@media (max-width:1100px){
  #leftPanel{
    width:32%;
    min-width:280px;
  }
}

@media (max-width:900px){
  body{
    overflow:auto;
  }

  #room{
    min-height:100vh;
    min-height:100dvh;
    align-items:flex-start;
    padding:10px 0;
  }

  #stage{
    max-width:100vw;
    max-height:none;
  }

  #bg{
    width:100vw;
    height:auto;
    max-width:none;
    max-height:none;
  }

  #leftPanel{
    left:2%;
    top:2%;
    width:34%;
    min-width:220px;
    max-width:none;
    height:94%;
    padding:10px 8px 8px;
    gap:8px;
  }

  #gameTitle{
    font-size:18px;
  }

  #gameSub{
    font-size:10px;
    line-height:1.42;
  }

  #nameList{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:5px;
  }

  .nameCard{
    font-size:10px;
    padding:5px 4px;
    white-space:normal;
    overflow:visible;
    text-overflow:clip;
    word-break:break-all;
    min-height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .statusRow{
    font-size:11px;
  }

  #resultText{
    font-size:12px;
    min-height:18px;
  }

  .ctrlBtn{
    font-size:12px;
    height:34px;
  }

  #backBtnInline{
    min-width:34px;
    height:34px;
    font-size:18px;
  }
}

/* 上下结构 */
body.stack-layout{
  overflow:hidden;
  align-items:stretch;
}

body.stack-layout #room{
  align-items:stretch;
  justify-content:flex-start;
  overflow:hidden;
  padding:0;
}

body.stack-layout #stage{
  width:100vw;
  height:100vh;
  height:100dvh;
  max-width:none;
  max-height:none;
  display:flex;
  flex-direction:column;
}

body.stack-layout #playArea{
  width:100%;
  height:auto;
  flex:0 0 40%;
  min-height:235px;
  max-height:42vh;
  padding:8px 8px 0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

body.stack-layout #viewport{
  position:relative;
  width:min(100%, calc(100% - 16px), calc(42vh * 965 / 936));
  height:100%;
  aspect-ratio:965 / 936;
  overflow:hidden;
  border-radius:18px;
  box-shadow:
    0 8px 24px rgba(92,63,37,.10),
    inset 0 1px 0 rgba(255,255,255,.65);
  background:rgba(255,248,238,.35);
}

body.stack-layout #fullLayer{
  position:absolute;
  left:var(--cropShift);
  top:0;
  width:calc(var(--cropScale) * 100%);
  height:100%;
}

body.stack-layout #bg{
  width:100%;
  height:100%;
  max-width:none;
  max-height:none;
  object-fit:fill;
  display:block;
}

body.stack-layout #map,
body.stack-layout #labelLayer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

body.stack-layout #leftPanel{
  position:relative;
  left:auto;
  top:auto;
  width:100%;
  min-width:0;
  max-width:none;
  height:auto;
  flex:1 1 auto;
  min-height:0;
  border-radius:22px 22px 0 0;
  padding:9px 8px 10px;
  gap:7px;
  background:
    linear-gradient(
      145deg,
      rgba(255,255,255,.52) 0%,
      rgba(255,255,255,.40) 45%,
      rgba(255,255,255,.26) 100%
    );
  border-left:none;
  border-right:none;
  border-bottom:none;
  box-shadow:
    0 -8px 28px rgba(92,63,37,.10),
    inset 0 1px 0 rgba(255,255,255,.92);
}

body.stack-layout #gameTitle{
  font-size:17px;
}

body.stack-layout #backBtnInline{
  min-width:32px;
  height:32px;
  font-size:17px;
}

body.stack-layout #gameSub{
  font-size:9px;
  line-height:1.38;
}

body.stack-layout #layoutHint{
  display:block;
  font-size:9px;
  color:#8a6847;
  margin-top:-2px;
  margin-bottom:2px;
  line-height:1.35;
}

body.stack-layout #nameList{
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:5px;
}

body.stack-layout .nameCard{
  font-size:9.5px;
  min-height:30px;
  padding:5px 3px;
  white-space:normal;
  overflow:visible;
  text-overflow:clip;
  word-break:break-all;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.15;
}

body.stack-layout #infoBox{
  padding:8px 8px;
  border-radius:14px;
}

body.stack-layout .statusRow{
  font-size:9px;
  line-height:1.35;
}

body.stack-layout #resultText{
  font-size:10px;
  min-height:15px;
}

body.stack-layout #bottomBtns{
  margin-top:7px;
  gap:6px;
}

body.stack-layout .ctrlBtn{
  height:30px;
  font-size:10px;
}

@media (max-width:560px){
  body.stack-layout #playArea{
    flex-basis:38%;
    min-height:210px;
    max-height:40vh;
  }

  body.stack-layout #viewport{
    width:min(100%, calc(40vh * 965 / 936));
  }

  body.stack-layout #nameList{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }

  body.stack-layout .nameCard{
    font-size:9px;
    min-height:28px;
  }

  body.stack-layout #gameTitle{
    font-size:16px;
  }

  body.stack-layout #gameSub,
  body.stack-layout #layoutHint{
    font-size:8.5px;
  }

  body.stack-layout .statusRow{
    font-size:8.5px;
  }

  body.stack-layout #resultText{
    font-size:9px;
  }

  body.stack-layout .ctrlBtn{
    font-size:9px;
    height:28px;
  }
}
</style>
</head>

<body>
<div id="room">
  <div id="bgShade"></div>

  <div id="stage">
    <div id="playArea">
      <div id="viewport">
        <div id="fullLayer">
          <img id="bg" src="game-name.png" alt="脸萌挑战题图">
          <svg id="map" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
          <div id="labelLayer"></div>
        </div>
      </div>
    </div>

    <div id="leftPanel">
      <div id="titleRow">
        <h1 id="gameTitle">脸萌挑战</h1>
        <button id="backBtnInline" onclick="window.location.href='game.html'" title="返回上一层">‹</button>
      </div>

      <p id="gameSub">支持两种方式：拖拽匹配，或先点名字再点框，也可以先点框再点名字。</p>
      <div id="layoutHint">小屏会切成上下结构，并裁掉左侧空白，只显示右侧大合照区域，热区会跟着一起裁切，不会漂移。</div>

      <div id="nameListWrap">
        <div id="nameList"></div>
      </div>

      <div id="infoBox">
        <div class="statusRow"><span>已完成</span><b id="doneCount">0 / 34</b></div>
        <div class="statusRow"><span>错误次数</span><b id="wrongCount">0</b></div>
        <div class="statusRow"><span>罚时</span><b id="penaltyText">0 秒</b></div>
        <div class="statusRow"><span>计时</span><b id="timerText">00:00</b></div>
        <div class="statusRow"><span>总用时</span><b id="totalTimeText">00:00</b></div>
        <div id="resultText">请开始匹配</div>

        <div id="bottomBtns">
          <button class="ctrlBtn" onclick="clearPlacedNames()">清空</button>
          <button class="ctrlBtn" onclick="resetGame()">重新开始</button>
        </div>
      </div>
    </div>
  </div>
</div>

  { code:"N-03", x:52.0, y:55.0, w:5, h:4 },
  { code:"N-27", x:57.5, y:54.0, w:5, h:4 },
  { code:"N-13", x:63.0, y:54.0, w:5, h:4 },
  { code:"N-01", x:69.0, y:54.0, w:5, h:4 },
  { code:"N-04", x:75.0, y:56.0, w:5, h:4 },
  { code:"N-21", x:81.0, y:55.0, w:5, h:4 },
  { code:"N-15", x:85.4, y:54.0, w:5, h:4 },
  { code:"N-24", x:91.0, y:54.0, w:5, h:4 },

  { code:"N-30", x:45.0, y:78.0, w:5, h:4 },
  { code:"N-31", x:51.5, y:77.0, w:5, h:4 },
  { code:"N-32", x:57.6, y:75.0, w:5, h:4 },
  { code:"N-33", x:64.5, y:75.0, w:5, h:4 },
  { code:"N-23", x:71.0, y:74.0, w:5, h:4 },
  { code:"N-20", x:77.0, y:74.0, w:5, h:4 },
  { code:"N-29", x:83.0, y:80.0, w:5, h:4 },
  { code:"N-07", x:88.0, y:73.0, w:5, h:4 },
  { code:"N-34", x:93.0, y:78.0, w:5, h:4 }
];

const codeToItem = Object.fromEntries(peopleData.map(item => [item.code, item]));
const placedCorrect = new Set();

let wrongCount = 0;
let penaltySeconds = 0;
let timerStarted = false;
let finished = false;
let timerHandle = null;
let startTimestamp = 0;
let finalRawSeconds = 0;

let selectedCardCode = null;
let selectedZoneCode = null;
let resizeTimer = null;

const bodyEl = document.body;
const bg = document.getElementById("bg");
const map = document.getElementById("map");
const labelLayer = document.getElementById("labelLayer");
const nameList = document.getElementById("nameList");
const doneCountEl = document.getElementById("doneCount");
const wrongCountEl = document.getElementById("wrongCount");
const penaltyTextEl = document.getElementById("penaltyText");
const timerTextEl = document.getElementById("timerText");
const totalTimeTextEl = document.getElementById("totalTimeText");
const resultTextEl = document.getElementById("resultText");

function shouldUseStackLayout(){
  const w = window.innerWidth;
  const h = window.innerHeight;
  const ratio = w / h;

  return (
    w < 760 ||
    h < 620 ||
    ratio < 1.18
  );
}

function applyLayoutMode(){
  bodyEl.classList.toggle("stack-layout", shouldUseStackLayout());
  clearCurrentSelection();
  requestAnimationFrame(() => {
    fitAllLabels();
  });
}

function formatTime(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

function getElapsedSeconds(){
  if(!timerStarted) return 0;
  if(finished) return finalRawSeconds;
  return Math.floor((Date.now() - startTimestamp) / 1000);
}

function updateStatus(){
  const raw = getElapsedSeconds();
  const total = raw + penaltySeconds;
  doneCountEl.textContent = `${placedCorrect.size} / ${peopleData.length}`;
  wrongCountEl.textContent = String(wrongCount);
  penaltyTextEl.textContent = `${penaltySeconds} 秒`;
  timerTextEl.textContent = formatTime(raw);
  totalTimeTextEl.textContent = formatTime(total);
}

function setResult(text, color){
  resultTextEl.textContent = text;
  resultTextEl.style.color = color || "#5b3e28";
}

function startTimerIfNeeded(){
  if(timerStarted) return;
  timerStarted = true;
  startTimestamp = Date.now();
  timerHandle = setInterval(updateStatus, 200);
}

function stopTimer(){
  if(timerHandle){
    clearInterval(timerHandle);
    timerHandle = null;
  }
}

function finishGame(){
  if(finished) return;
  finished = true;
  finalRawSeconds = Math.floor((Date.now() - startTimestamp) / 1000);
  stopTimer();
  clearCurrentSelection();
  updateStatus();
  const total = finalRawSeconds + penaltySeconds;
  setResult(`完成！原始用时 ${formatTime(finalRawSeconds)}，罚时 ${penaltySeconds} 秒，总用时 ${formatTime(total)}`, "#4c7d45");
}

function triggerWrong(zoneRect, cardEl){
  wrongCount += 1;
  penaltySeconds += 3;
  updateStatus();
  setResult("错误，已加 3 秒罚时", "#b85a5a");

  zoneRect.classList.remove("correct");
  zoneRect.classList.add("wrong", "shake");
  cardEl.classList.add("bad");

  setTimeout(() => zoneRect.classList.remove("wrong"), 520);
  setTimeout(() => zoneRect.classList.remove("shake"), 420);
  setTimeout(() => cardEl.classList.remove("bad"), 420);
}

function fitLabelText(el){
  if(!el || !el.textContent.trim()) return;

  const width = el.clientWidth;
  const height = el.clientHeight;
  let fontSize = Math.max(8, Math.min(16, width * 0.22, height * 0.68));
  el.style.fontSize = fontSize + "px";

  while ((el.scrollWidth > el.clientWidth - 4 || el.scrollHeight > el.clientHeight - 2) && fontSize > 7.5){
    fontSize -= 0.5;
    el.style.fontSize = fontSize + "px";
  }
}

function fitAllLabels(){
  document.querySelectorAll(".nameLabel").forEach(el => {
    if(el.textContent.trim()){
      fitLabelText(el);
    }
  });
}

function clearCurrentSelection(){
  selectedCardCode = null;
  selectedZoneCode = null;

  document.querySelectorAll(".nameCard.selected").forEach(el => {
    el.classList.remove("selected");
  });

  document.querySelectorAll(".dropZone.selected").forEach(el => {
    el.classList.remove("selected");
  });
}

function updateCardSelectionUI(){
  document.querySelectorAll(".nameCard").forEach(el => {
    el.classList.toggle("selected", el.dataset.code === selectedCardCode);
  });
}

function updateZoneSelectionUI(){
  document.querySelectorAll(".dropZone").forEach(el => {
    el.classList.toggle("selected", el.dataset.code === selectedZoneCode);
  });
}

function selectCard(code){
  if(finished || placedCorrect.has(code)) return;
  selectedCardCode = (selectedCardCode === code) ? null : code;
  updateCardSelectionUI();
  tryResolveSelection();
}

function selectZone(code){
  if(finished || placedCorrect.has(code)) return;
  selectedZoneCode = (selectedZoneCode === code) ? null : code;
  updateZoneSelectionUI();
  tryResolveSelection();
}

function tryResolveSelection(){
  if(!selectedCardCode || !selectedZoneCode) return;

  startTimerIfNeeded();

  const draggedCode = selectedCardCode;
  const zoneCode = selectedZoneCode;

  const draggedItem = codeToItem[draggedCode];
  const cardEl = document.getElementById(`card-${draggedCode}`);
  const zoneRect = document.getElementById(`zone-${zoneCode}`);
  const placedTextEl = document.getElementById(`placed-${zoneCode}`);

  if(!draggedItem || !cardEl || !zoneRect || !placedTextEl){
    clearCurrentSelection();
    return;
  }

  if(draggedCode === zoneCode){
    triggerCorrect(zoneRect, placedTextEl, cardEl, draggedItem);
  }else{
    triggerWrong(zoneRect, cardEl);
  }

  clearCurrentSelection();
}

function triggerCorrect(zoneRect, placedTextEl, cardEl, item){
  zoneRect.classList.remove("wrong", "selected");
  zoneRect.classList.add("correct");

  placedTextEl.textContent = item.name;
  fitLabelText(placedTextEl);

  cardEl.classList.remove("selected");
  cardEl.classList.add("correct");
  cardEl.draggable = false;

  placedCorrect.add(item.code);

  updateStatus();
  setResult(`正确：${item.name}（${item.animal}）`, "#4c7d45");

  if(placedCorrect.size === peopleData.length){
    finishGame();
  }
}

function renderNameCards(){
  nameList.innerHTML = "";

  peopleData.forEach(item => {
    const div = document.createElement("div");
    div.className = "nameCard";
    div.id = `card-${item.code}`;
    div.draggable = true;
    div.textContent = item.name;
    div.dataset.code = item.code;

    div.addEventListener("dragstart", e => {
      if(finished || placedCorrect.has(item.code)){
        e.preventDefault();
        return;
      }
      startTimerIfNeeded();
      div.classList.add("dragging");
      e.dataTransfer.setData("text/plain", item.code);
      e.dataTransfer.effectAllowed = "move";
      clearCurrentSelection();
    });

    div.addEventListener("dragend", () => {
      div.classList.remove("dragging");
    });

    div.addEventListener("click", () => {
      if(finished || placedCorrect.has(item.code)) return;
      selectCard(item.code);
    });

    nameList.appendChild(div);
  });
}

function createZoneElements(){
  map.innerHTML = "";
  labelLayer.innerHTML = "";

  zoneLayout.forEach(zone => {
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("class", "dropZone");
    rect.setAttribute("id", `zone-${zone.code}`);
    rect.setAttribute("data-code", zone.code);
    rect.setAttribute("x", zone.x);
    rect.setAttribute("y", zone.y);
    rect.setAttribute("width", zone.w);
    rect.setAttribute("height", zone.h);

    const label = document.createElement("div");
    label.className = "nameLabel";
    label.id = `placed-${zone.code}`;
    label.style.left = `${zone.x + zone.w * 0.05}%`;
    label.style.top = `${zone.y + zone.h * 0.24}%`;
    label.style.width = `${zone.w * 0.90}%`;
    label.style.height = `${zone.h * 0.52}%`;

    rect.addEventListener("dragover", e => {
      if(finished) return;
      e.preventDefault();
      rect.classList.add("hover");
    });

    rect.addEventListener("dragleave", () => {
      rect.classList.remove("hover");
    });

    rect.addEventListener("drop", e => {
      if(finished) return;
      e.preventDefault();
      rect.classList.remove("hover");
      startTimerIfNeeded();

      const draggedCode = e.dataTransfer.getData("text/plain");
      if(!draggedCode || placedCorrect.has(draggedCode)) return;

      const draggedItem = codeToItem[draggedCode];
      const cardEl = document.getElementById(`card-${draggedCode}`);
      const placedTextEl = document.getElementById(`placed-${zone.code}`);

      if(!draggedItem || !cardEl || !placedTextEl) return;

      if(draggedCode === zone.code){
        triggerCorrect(rect, placedTextEl, cardEl, draggedItem);
      }else{
        triggerWrong(rect, cardEl);
      }

      clearCurrentSelection();
    });

    rect.addEventListener("click", () => {
      if(finished || placedCorrect.has(zone.code)) return;
      selectZone(zone.code);
    });

    map.appendChild(rect);
    labelLayer.appendChild(label);
  });

  requestAnimationFrame(fitAllLabels);
}

function clearPlacedNames(){
  if(finished) return;

  placedCorrect.clear();
  clearCurrentSelection();

  document.querySelectorAll(".nameLabel").forEach(el => {
    el.textContent = "";
    el.style.fontSize = "";
  });

  document.querySelectorAll(".dropZone").forEach(el => {
    el.classList.remove("correct", "wrong", "hover", "shake", "selected");
  });

  document.querySelectorAll(".nameCard").forEach(el => {
    el.classList.remove("correct", "bad", "dragging", "selected");
    el.draggable = true;
  });

  updateStatus();
  setResult("已清空当前填写", "#5b3e28");
}

function resetGame(){
  placedCorrect.clear();
  wrongCount = 0;
  penaltySeconds = 0;
  timerStarted = false;
  finished = false;
  finalRawSeconds = 0;
  startTimestamp = 0;
  stopTimer();
  clearCurrentSelection();

  renderNameCards();
  createZoneElements();
  updateStatus();
  setResult("请开始匹配", "#5b3e28");
}

function handleResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    applyLayoutMode();
    fitAllLabels();
  }, 50);
}

window.addEventListener("resize", handleResize);
bg.addEventListener("load", () => {
  applyLayoutMode();
  fitAllLabels();
});

renderNameCards();
createZoneElements();
updateStatus();
applyLayoutMode();
setResult("请开始匹配");
</script>
</body>
</html>
