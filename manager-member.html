<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十号房｜宿管室</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;}

:root{
  --text:#5b4632;
  --title:#6a5038;
  --line:#d8c2a3;
  --line2:#e3d0b4;
  --panel:rgba(255,249,240,.92);
  --panel2:rgba(255,252,245,.92);
  --btn:#c98e56;
  --btn-hover:#b97d45;
  --sub:#e7d3b7;
  --sub-hover:#dcc29e;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --radius:16px;
  --green:#5f7d3a;
  --red:#a14f3f;
  --muted:#8e7c68;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#f3ecdf;
  color:var(--text);
}

/* ===== 舞台 ===== */
#managerPage{
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#managerStage{
  position:relative;
  width:min(100vw, calc(100dvh * 1.6));
  aspect-ratio:1440 / 900;
  max-width:100vw;
  max-height:100dvh;
}

#managerBg{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
}

#managerUI{
  position:absolute;
  inset:0;
}

/* ===== 面板通用 ===== */
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(3px);
}

.hidden{
  display:none !important;
}

/* ===== 右上角登出 ===== */
#topActions{
  position:absolute;
  right:11.5%;
  top:15%;
  z-index:5;
  display:flex;
  justify-content:flex-end;
}

.top-btn{
  height:40px;
  min-width:92px;
  padding:0 16px;
  border:none;
  border-radius:12px;
  background:rgba(255,248,236,.94);
  color:var(--text);
  font-size:clamp(12px, .82vw, 15px);
  cursor:pointer;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
  font-weight:700;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}

.top-btn:hover{
  background:#f2e0c4;
}

/* ===== 左侧栏 ===== */
#sidebar{
  position:absolute;
  left:4.3%;
  top:21.8%;
  width:14.2%;
  padding:12px;
  z-index:2;
}

.nav-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav-btn{
  border:none;
  border-radius:12px;
  padding:10px 8px;
  font-size:clamp(13px, .95vw, 18px);
  background:#ead9bc;
  cursor:pointer;
  text-align:center;
  color:var(--text);
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
  font-weight:600;
  line-height:1.2;
}

.nav-btn:hover{ background:#e2ccaa; }

#statusBox{
  margin-top:10px;
  padding:10px 8px;
  text-align:center;
  background:rgba(255,255,255,.45);
  border-radius:12px;
  overflow:hidden;
}

.status-name{
  margin:0 0 6px 0;
  font-size:clamp(12px, .86vw, 16px);
  font-weight:700;
  line-height:1.3;
  color:var(--title);
  word-break:break-word;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
}

.status-role{
  margin:0;
  font-size:clamp(13px, .95vw, 17px);
  font-weight:600;
  line-height:1.3;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
}

/* ===== 中栏内容区 ===== */
#contentArea{
  position:absolute;
  left:25.7%;
  top:10.1%;
  width:50%;
  height:79.2%;
  z-index:2;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:8px;
  scrollbar-width:thin;
  scrollbar-color:#cfad82 rgba(255,255,255,.35);
}

#contentArea::-webkit-scrollbar{
  width:8px;
}
#contentArea::-webkit-scrollbar-track{
  background:rgba(255,255,255,.35);
  border-radius:999px;
}
#contentArea::-webkit-scrollbar-thumb{
  background:#cfad82;
  border-radius:999px;
}

.card{
  position:relative;
  padding:14px 16px;
  margin-bottom:10px;
}

.section-title{
  margin:0 0 10px 0;
  font-size:clamp(16px, 1.05vw, 22px);
  font-weight:700;
  color:var(--title);
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
  line-height:1.2;
}

/* ===== 室友页主卡 ===== */
.member-main-card{
  min-height:100%;
  display:flex;
  flex-direction:column;
}

.manager-apply-box{
  background:rgba(255,252,246,.92);
  border:1px solid var(--line2);
  border-radius:14px;
  padding:14px;
}

.manager-apply-box p{
  margin:0 0 12px 0;
  font-size:clamp(12px, .78vw, 15px);
  line-height:1.5;
  color:#6b5a45;
}

.manager-apply-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.inline-btn{
  height:40px;
  padding:0 18px;
  min-width:96px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  color:#fff;
  font-size:clamp(13px, .82vw, 16px);
  cursor:pointer;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
  font-weight:600;
  white-space:nowrap;
  flex:0 0 auto;
}

.inline-btn:hover{ background:var(--btn-hover); }

.sub-btn{
  height:40px;
  padding:0 14px;
  border:none;
  border-radius:10px;
  background:var(--sub);
  color:var(--text);
  font-size:clamp(12px, .8vw, 15px);
  cursor:pointer;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC",sans-serif;
  font-weight:600;
  white-space:nowrap;
  flex:0 0 auto;
}

.sub-btn:hover{ background:var(--sub-hover); }

.inline-btn:disabled,
.sub-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

#managerApplyHint{
  min-height:20px;
  margin-top:10px;
  font-size:clamp(11px, .74vw, 14px);
  line-height:1.35;
  color:#8b5b34;
}

.member-note{
  margin-top:10px;
  padding:12px 14px;
  border-radius:14px;
  background:rgba(255,252,246,.92);
  border:1px solid var(--line2);
}

.member-note p{
  margin:4px 0;
  font-size:clamp(12px, .76vw, 15px);
  line-height:1.45;
  color:#6b5a45;
}

/* ===== 中等尺寸 ===== */
@media (max-width: 1180px){
  #sidebar{
    left:3.6%;
    top:20.8%;
    width:15.8%;
    padding:10px;
  }

  #contentArea{
    left:23.8%;
    top:9.3%;
    width:47%;

  }

/* ===== 中小屏 / 矮屏 ===== */
@media (max-width: 900px), (max-height: 760px){

  #contentArea{

  .card{

  }
}

/* ===== 过渡屏：保留背景图舞台感，不切小屏 ===== */
@media (min-width: 561px) and (max-width: 680px){
  body{
    overflow:hidden;
  }

  #managerPage{

  }

  #managerStage{

  }

  #managerBg{

  }

  }

  .top-btn{

  }

  #sidebar{

    width:16.2%;

  }

  .nav-group{
    gap:6px;
  }

  .nav-btn{
    min-height:31px;
    padding:5px 4px;

  }

  #statusBox{
    margin-top:7px;

  }

  .status-name{
    font-size:10px;
    margin-bottom:4px;

  }

  .status-role{
    font-size:10px;
    line-height:1.2;
    white-space:nowrap;
    word-break:normal;
    overflow-wrap:normal;
  }

  #contentArea{
    left:22.8%;
    top:8.7%;
    width:54.6%;
    height:80.2%;
    max-height:80.2%;
    overflow-y:auto;
    overflow-x:hidden;
    padding-right:6px;
  }

  .card{
    padding:10px 11px;
    margin-bottom:8px;
    border-radius:13px;
  }

  .section-title{
    font-size:13px !important;
    margin-bottom:6px;
  }

  .manager-apply-box,
  .member-note{

  }

  .manager-apply-box p,

  }

  .manager-apply-actions{

/* ===== 真正小屏 ===== */
@media (max-width: 560px){
  html,body{
    width:100%;
    max-width:100%;
    overflow-x:hidden;
  }

  body{
    overflow-x:hidden;
    overflow-y:auto;
    display:block;
    background:#f3ecdf;
  }

  #managerPage{
    width:100%;
    max-width:100%;

  #managerStage{
    width:100%;
    max-width:100%;

    padding:10px 12px 14px;
    position:relative;

  #managerStage::before{

  }

  .status-name{
    font-size:12px;
    line-height:1.25;

  }

  .status-role{
    font-size:12px;
    line-height:1.25;
  }

  #contentArea{

    gap:10px;
  }

  .card{
    padding:10px 12px;
    margin-bottom:0;
    border-radius:12px;
  }

  .section-title{
    font-size:14px !important;
    margin-bottom:6px;
  }

  .manager-apply-box,

<body>
<div id="managerPage">
  <div id="managerStage">
    <img id="managerBg" src="room-manager.png" alt="宿管室背景">

    <div id="managerUI">

      <div id="topActions">
        <button id="logoutBtn" class="top-btn hidden" type="button" onclick="logout()">登出</button>
      </div>

      <aside id="sidebar" class="panel">
        <div class="nav-group">
          <button class="nav-btn" onclick="location.href='index.html'">大堂</button>
          <button class="nav-btn" onclick="location.href='honor.html'">荣誉墙</button>
          <button class="nav-btn" onclick="location.href='game.html'">游戏房</button>
          <button class="nav-btn" onclick="goNeedLogin('studio.html')">工作间</button>
          <button class="nav-btn" onclick="goNeedLogin('living.html')">客厅</button>
          <button class="nav-btn" onclick="goNeedLogin('dorm.html')">宿舍</button>
        </div>

        <div id="statusBox">
          <p class="status-name" id="currentUserText">当前：未登录</p>
          <p class="status-role">身份：<span id="identityText">室友</span></p>
        </div>
      </aside>

      <main id="contentArea">
        <section class="card panel member-main-card" id="memberMainCard">
          <h2 class="section-title">宿管申请</h2>

          <div class="manager-apply-box">
            <p>如果你想协助宿管处理日常事务，可以在这提交申请。</p>

            <div class="manager-apply-actions">
              <button id="managerApplyBtn" class="inline-btn" type="button" onclick="submitManagerApplication()">我想做宿管！</button>
              <button id="managerCancelBtn" class="sub-btn" type="button" onclick="cancelManagerApplication()">取消申请</button>
            </div>

            <div id="managerApplyHint"></div>
          </div>

          <div class="member-note">
            <p>说明：</p>
            <p>① 室友身份才可以提交宿管申请。</p>
            <p>② 提交后会进入管理员投票流程。</p>
            <p>③ 在结果未出前，你可以取消自己的申请。</p>
          </div>
        </section>
      </main>

    </div>
  </div>
</div>

<script>
const supabaseUrl = "https://tfevitwoqmxwaguvtyms.supabase.co";
const supabaseKey = "sb_publishable_0cFYhwx_9uEcrXnMJzzNMQ_cEng8xmI";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const currentUserText = document.getElementById("currentUserText");
const identityText = document.getElementById("identityText");
const logoutBtn = document.getElementById("logoutBtn");
const managerApplyHint = document.getElementById("managerApplyHint");
const managerApplyBtn = document.getElementById("managerApplyBtn");
const managerCancelBtn = document.getElementById("managerCancelBtn");
const img = document.getElementById("managerBg");

function isTinyFlowScreen(){
  return window.innerWidth <= 560;
}

function isMediumScrollScreen(){
  return !isTinyFlowScreen() && (window.innerWidth <= 900 || window.innerHeight <= 760);
}

function isLoggedIn(){
  return localStorage.getItem("room10LoggedIn") === "true";
}

function getRole(){
  return localStorage.getItem("room10Role") || "";
}

function getCurrentUser(){
  return localStorage.getItem("room10User") || "";
}

function updateStatusUserUI(){
  if(isLoggedIn()){
    const user = getCurrentUser();
    currentUserText.textContent = `当前：${user || "已登录室友"}`;
    logoutBtn.classList.remove("hidden");
  }else{
    currentUserText.textContent = "当前：未登录";
    logoutBtn.classList.add("hidden");
  }
}

function goNeedLogin(page){
  if(!isLoggedIn()){
    window.location.href = "manager-visitor.html";
    return;
  }
  window.location.href = page;
}

async function logout(){
  localStorage.removeItem("room10LoggedIn");
  localStorage.removeItem("room10User");
  localStorage.removeItem("room10Role");
  window.location.href = "manager-visitor.html";
}

async function getCurrentMemberRecord(){
  const nickname = getCurrentUser();
  if(!nickname) return null;

  const result = await client
    .from("members")
    .select("id, nickname, role")
    .eq("nickname", nickname)
    .maybeSingle();

  if(result.error){
    console.error("读取当前成员失败：", result.error);
    return null;
  }

  return result.data || null;
}

async function getLatestAdminApplication(memberId){
  if(!memberId) return null;

  const result = await client
    .from("admin_applications")
    .select("id, member_id, nickname, status, created_at, updated_at")
    .eq("member_id", memberId)
    .order("created_at", { ascending: false })
    .limit(1);

  if(result.error){
    console.error("读取最新宿管申请失败：", result.error);
    return null;
  }

  return (result.data || [])[0] || null;
}

async function getPendingAdminApplication(memberId){
  if(!memberId) return null;

  const result = await client
    .from("admin_applications")
    .select("id, member_id, nickname, status, created_at, updated_at")
    .eq("member_id", memberId)
    .eq("status", "pending")
    .order("created_at", { ascending: false })
    .limit(1);

  if(result.error){
    console.error("读取 pending 宿管申请失败：", result.error);
    return null;
  }

  return (result.data || [])[0] || null;
}

function setManagerApplyButtons({
  applyDisabled = false,
  applyText = "我想做宿管！",
  cancelDisabled = true
} = {}){
  managerApplyBtn.disabled = applyDisabled;
  managerApplyBtn.textContent = applyText;
  managerApplyBtn.style.opacity = applyDisabled ? ".72" : "1";
  managerApplyBtn.style.cursor = applyDisabled ? "not-allowed" : "pointer";

  managerCancelBtn.disabled = cancelDisabled;
  managerCancelBtn.style.opacity = cancelDisabled ? ".55" : "1";
  managerCancelBtn.style.cursor = cancelDisabled ? "not-allowed" : "pointer";
}

async function refreshManagerApplyUIFromDB(){
  const role = getRole();

  if(role !== "member"){
    return;
  }

  const member = await getCurrentMemberRecord();
  if(!member){
    setManagerApplyButtons({
      applyDisabled:false,
      applyText:"我想做宿管！",
      cancelDisabled:true
    });
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "未读取到当前成员资料。";
    return;
  }

  const data = await getLatestAdminApplication(member.id);

  if(!data || data.status === "cancelled" || data.status === "rejected"){
    setManagerApplyButtons({
      applyDisabled:false,
      applyText:"我想做宿管！",
      cancelDisabled:true
    });
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = data?.status === "rejected"
      ? "你的上一份宿管申请未通过，如需再次申请可重新提交。"
      : "点击按钮后将提交宿管申请。";
    return;
  }

  if(data.status === "pending"){
    setManagerApplyButtons({
      applyDisabled:true,
      applyText:"已提交",
      cancelDisabled:false
    });
    managerApplyHint.style.color = "#5f7d3a";
    managerApplyHint.textContent = "你的宿管申请已提交，正在等待所有管理员投票。";
    return;
  }

  if(data.status === "approved"){
    setManagerApplyButtons({
      applyDisabled:true,
      applyText:"已通过",
      cancelDisabled:true
    });
    managerApplyHint.style.color = "#5f7d3a";
    managerApplyHint.textContent = "你的宿管申请已通过。";
  }
}

async function submitManagerApplication(){
  const role = getRole();
  const nickname = getCurrentUser();

  if(role !== "member"){
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "只有室友身份可以提交宿管申请。";
    return;
  }

  if(!nickname){
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "未读取到当前成员信息，请重新登录。";
    return;
  }

  managerApplyHint.style.color = "#8b5b34";
  managerApplyHint.textContent = "正在提交宿管申请…";

  try{
    const member = await getCurrentMemberRecord();

    if(!member){
      managerApplyHint.textContent = "提交失败，未找到当前成员资料。";
      return;
    }

    const latest = await getLatestAdminApplication(member.id);
    if(latest && (latest.status === "pending" || latest.status === "approved")){
      if(latest.status === "pending"){
        managerApplyHint.style.color = "#5f7d3a";
        managerApplyHint.textContent = "你的宿管申请已经在等待处理中。";
      }else{
        managerApplyHint.style.color = "#5f7d3a";
        managerApplyHint.textContent = "你的宿管申请已经通过。";
      }
      await refreshManagerApplyUIFromDB();
      return;
    }

    const insertResult = await client
      .from("admin_applications")
      .insert([{
        member_id: member.id,
        nickname: nickname,
        status: "pending"
      }])
      .select()
      .single();

    if(insertResult.error){
      console.error("宿管申请提交失败：", insertResult.error);
      managerApplyHint.textContent = "宿管申请提交失败，请稍后再试。";
      return;
    }

    const verify = await getPendingAdminApplication(member.id);
    if(!verify){
      managerApplyHint.textContent = "宿管申请写入后未读取到记录，请检查数据库表结构。";
      return;
    }

    await refreshManagerApplyUIFromDB();
    managerApplyHint.style.color = "#5f7d3a";
    managerApplyHint.textContent = "宿管申请已提交，正在等待所有管理员投票。";

  }catch(err){
    console.error("submitManagerApplication() 异常：", err);
    managerApplyHint.textContent = "宿管申请提交失败，请稍后再试。";
  }
}

async function cancelManagerApplication(){
  const role = getRole();
  const nickname = getCurrentUser();

  if(role !== "member"){
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "当前身份不能取消宿管申请。";
    return;
  }

  if(!nickname){
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "未读取到当前成员信息，请重新登录。";
    return;
  }

  managerApplyHint.style.color = "#8b5b34";
  managerApplyHint.textContent = "正在取消宿管申请…";

  try{
    const member = await getCurrentMemberRecord();

    if(!member){
      managerApplyHint.textContent = "取消失败，未找到当前成员资料。";
      return;
    }

    const pending = await getPendingAdminApplication(member.id);

    if(!pending){
      managerApplyHint.style.color = "#8b5b34";
      managerApplyHint.textContent = "当前没有可取消的宿管申请。";
      await refreshManagerApplyUIFromDB();
      return;
    }

    const updateResult = await client
      .from("admin_applications")
      .update({ status: "cancelled" })
      .eq("id", pending.id)
      .eq("member_id", member.id)
      .eq("status", "pending")
      .select("id, status");

    if(!updateResult.error){
      const updatedRow = (updateResult.data || [])[0] || null;
      if(updatedRow && updatedRow.status === "cancelled"){
        await refreshManagerApplyUIFromDB();
        managerApplyHint.style.color = "#8b5b34";
        managerApplyHint.textContent = "已取消宿管申请。";
        return;
      }
    }else{
      console.warn("update 取消失败，准备尝试删除方案：", updateResult.error);
    }

    const deleteVotesResult = await client
      .from("admin_application_votes")
      .delete()
      .eq("application_id", pending.id);

    if(deleteVotesResult.error){
      console.warn("删除宿管申请投票失败：", deleteVotesResult.error);
    }

    const deleteAppResult = await client
      .from("admin_applications")
      .delete()
      .eq("id", pending.id)
      .eq("member_id", member.id)
      .eq("status", "pending")
      .select("id");

    if(deleteAppResult.error){
      console.error("删除宿管申请失败：", deleteAppResult.error);
      managerApplyHint.textContent = "取消失败，请检查数据库是否允许更新或删除宿管申请。";
      return;
    }

    const deletedRow = (deleteAppResult.data || [])[0] || null;
    if(!deletedRow){
      managerApplyHint.textContent = "取消失败，请检查数据库是否允许更新或删除宿管申请。";
      return;
    }

    await refreshManagerApplyUIFromDB();
    managerApplyHint.style.color = "#8b5b34";
    managerApplyHint.textContent = "已取消宿管申请。";

  }catch(err){
    console.error("cancelManagerApplication() 异常：", err);
    managerApplyHint.textContent = "取消失败，请稍后再试。";
  }
}

async function ensureMemberPage(){
  if(!isLoggedIn()){
    window.location.href = "manager-visitor.html";
    return;
  }

  const role = getRole();

  if(role === "owner"){
    window.location.href = "manager-owner.html";
    return;
  }

  if(role === "admin"){
    window.location.href = "manager-admin.html";
    return;
  }

  if(role === "applying"){
    window.location.href = "manager-visitor.html";
    return;
  }

  if(role !== "member"){
    window.location.href = "manager-visitor.html";
    return;
  }

  identityText.textContent = "室友";
  updateStatusUserUI();
  await refreshManagerApplyUIFromDB();
}

img.onload = function(){
  if(isMediumScrollScreen() || isTinyFlowScreen()) return;

  try{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const sampleWidth = Math.min(50, canvas.width);
    const data = ctx.getImageData(0, 0, sampleWidth, canvas.height).data;

    let r = 0, g = 0, b = 0, count = 0;

    for(let i = 0; i < data.length; i += 4){
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      count++;
    }

    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);

    document.body.style.background = `rgb(${r},${g},${b})`;
  }catch(err){
    console.warn("背景采样失败：", err);
  }
};

if(img.complete && img.naturalWidth){
  img.onload();
}

ensureMemberPage();

window.addEventListener("storage", async (e) => {
  if(
    e.key === "room10LoggedIn" ||
    e.key === "room10User" ||
    e.key === "room10Role"
  ){
    await ensureMemberPage();
  }
});

window.addEventListener("resize", () => {
  if(!isMediumScrollScreen() && !isTinyFlowScreen()){
    img.onload();
  }else{
    document.body.style.background = "#f3ecdf";
  }
});
</script>
