<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜作品展览页</title>
<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial, Helvetica, sans-serif;
  color:#5b4632;
}

body{
  min-height:100vh;
  min-height:100dvh;
  position:relative;
  overflow-x:hidden;
  padding:28px 18px 40px;
  background:
    linear-gradient(rgba(245,240,232,0.72), rgba(232,223,209,0.78)),
    url("room-titles.png") center center / cover no-repeat fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.14);
  pointer-events:none;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  width:min(1380px, 100%);
  margin:0 auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:110px;
  height:42px;
  padding:0 18px;
  border:none;
  border-radius:999px;
  background:rgba(139,107,75,.92);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(91,70,50,.18);
  backdrop-filter:blur(4px);
}

.back-btn:hover{
  filter:brightness(1.05);
}

.title-wrap{
  flex:1;
  min-width:240px;
}

.page-title{
  margin:0;
  font-size:34px;
  line-height:1.2;
  color:#6a5038;
}

.page-subtitle{
  margin:8px 0 0;
  font-size:15px;
  color:#866a4e;
}

.gallery-layout{
  display:grid;
  grid-template-columns: 400px minmax(0, 1fr);
  gap:18px;
  align-items:start;
}

/* 左侧 */
.left-panel{
  background:rgba(255,249,240,.84);
  border:1px solid rgba(227,208,180,.95);
  border-radius:24px;
  box-shadow:0 10px 24px rgba(91,70,50,.08);
  backdrop-filter:blur(10px);
  overflow:hidden;
}

.panel-head{
  padding:18px 18px 14px;
  border-bottom:1px solid #ebdecc;
  background:linear-gradient(180deg, rgba(255,255,255,.6), rgba(248,240,229,.8));
}

.panel-title{
  margin:0;
  font-size:22px;
  color:#6a5038;
}

.panel-subtitle{
  margin:8px 0 0;
  font-size:13px;
  color:#8c6e50;
  line-height:1.5;
}

.search-area{
  padding:14px 18px 12px;
  border-bottom:1px solid rgba(227,208,180,.8);
}

.search-input{
  width:100%;
  height:42px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:0 14px;
  font-size:14px;
  color:#5b4632;
  background:rgba(255,255,255,.92);
  border:1px solid #eadcc9;
}

.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.filter-btn{
  height:34px;
  padding:0 14px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.88);
  border:1px solid #e6d7c5;
  color:#6a5038;
  font-size:13px;
  cursor:pointer;
  transition:.18s ease;
}

.filter-btn:hover{
  background:rgba(255,255,255,1);
}

.filter-btn.active{
  background:#8b6b4b;
  border-color:#8b6b4b;
  color:#fff;
}

.list-wrap{
  padding:12px;
  max-height:70vh;
  overflow:auto;
}

.work-item{
  width:100%;
  text-align:left;
  border:none;
  cursor:pointer;
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:18px;
  background:rgba(255,255,255,.7);
  border:1px solid #eadcc9;
  color:#5b4632;
  transition:.18s ease;
}

.work-item:hover{
  background:rgba(255,255,255,.94);
  transform:translateY(-1px);
}

.work-item.active{
  background:rgba(243,231,215,.96);
  border-color:#cfa878;
  box-shadow:0 6px 16px rgba(91,70,50,.08);
}

.work-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:8px;
}

.work-no{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:62px;
  padding:6px 10px;
  border-radius:999px;
  background:#f3e6d6;
  color:#7a5a3b;
  font-size:12px;
  font-weight:700;
}

.work-type{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:54px;
  padding:6px 10px;
  border-radius:999px;
  background:#fff;
  border:1px solid #eadcc9;
  color:#8b6c4e;
  font-size:12px;
}

.work-title{
  margin:0 0 6px;
  font-size:18px;
  color:#6a5038;
  line-height:1.35;
}

.work-meta{
  font-size:13px;
  color:#8e7154;
  line-height:1.55;
}

.empty-state{
  padding:28px 14px;
  text-align:center;
  color:#9e8060;
  font-size:14px;
  line-height:1.7;
}

/* 右侧 */
.right-panel{
  background:rgba(255,249,240,.84);
  border:1px solid rgba(227,208,180,.95);
  border-radius:24px;
  box-shadow:0 10px 24px rgba(91,70,50,.08);
  backdrop-filter:blur(10px);
  overflow:hidden;
}

.player-head{
  padding:18px 20px 14px;
  border-bottom:1px solid #ebdecc;
  background:linear-gradient(180deg, rgba(255,255,255,.6), rgba(248,240,229,.8));
}

.player-title{
  margin:0;
  font-size:22px;
  color:#6a5038;
}

.player-subtitle{
  margin:8px 0 0;
  font-size:13px;
  color:#8c6e50;
  line-height:1.5;
}

.player-body{
  padding:18px;
}

.video-shell{
  width:100%;
  aspect-ratio:16 / 9;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,.72);
  border:1px solid #eadcc9;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
}

.video-shell iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
}

.placeholder{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-align:center;
  color:#9a7b5b;
  padding:24px;
}

.placeholder-icon{
  width:68px;
  height:68px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:rgba(255,255,255,.75);
  border:1px solid #eadcc9;
}

.info-card{
  margin-top:16px;
  background:rgba(255,255,255,.7);
  border:1px solid #eadcc9;
  border-radius:18px;
  padding:16px;
}

.info-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.info-title{
  margin:0;
  font-size:24px;
  color:#6a5038;
  line-height:1.35;
}

.info-type{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:64px;
  padding:7px 12px;
  border-radius:999px;
  background:#f3e6d6;
  color:#7a5a3b;
  font-size:12px;
  font-weight:700;
}

.info-meta{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px 14px;
  margin-top:8px;
}

.meta-item{
  background:rgba(255,255,255,.78);
  border:1px solid #eadcc9;
  border-radius:14px;
  padding:10px 12px;
}

.meta-label{
  font-size:12px;
  color:#a08262;
  margin-bottom:6px;
}

.meta-value{
  font-size:14px;
  color:#6a5038;
  line-height:1.5;
  word-break:break-word;
}

.tip{
  margin-top:14px;
  font-size:13px;
  color:#9a7b5b;
  line-height:1.6;
}

/* 翻页按钮 */
.page-turn{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  z-index:20;
  width:clamp(42px, 5vw, 68px);
  height:clamp(42px, 5vw, 68px);
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.45);
  color:#6a5038;
  font-size:clamp(20px, 2.2vw, 32px);
  font-weight:700;
  cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:
    0 8px 18px rgba(91,70,50,.16),
    inset 0 1px 0 rgba(255,255,255,.55);
  transition:transform .18s ease, background .18s ease;
}

.page-turn:hover{
  background:rgba(255,255,255,.62);
  transform:translateY(-50%) scale(1.05);
}

.page-turn.left{
  left:clamp(10px, 2vw, 24px);
}

.page-turn.right{
  right:clamp(10px, 2vw, 24px);
}

@media (max-width: 1100px){
  .gallery-layout{
    grid-template-columns:1fr;
  }
  .list-wrap{
    max-height:420px;
  }
}

@media (max-width: 640px){
  body{
    padding:20px 12px 30px;
  }
  .page-title{
    font-size:28px;
  }
  .panel-title,.player-title{
    font-size:20px;
  }
  .work-title{
    font-size:17px;
  }
  .info-title{
    font-size:22px;
  }
  .info-meta{
    grid-template-columns:1fr;
  }
  .page-turn{
    top:auto;
    bottom:16px;
    transform:none;
  }
  .page-turn:hover{
    transform:scale(1.05);
  }
  .page-turn.left{left:16px;}
  .page-turn.right{right:16px;}
}
</style>
</head>
<body>

<!-- 四页循环：honor → titles → achievements → gallery → honor -->
<button class="page-turn left" onclick="location.href='achievements.html'" aria-label="上一页">‹</button>
<button class="page-turn right" onclick="location.href='honor.html'" aria-label="下一页">›</button>

<div class="page">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">返回</button>
    <div class="title-wrap">
      <h1 class="page-title">十号房｜作品展览页</h1>
      <p class="page-subtitle">左侧选择作品，右侧播放对应视频。支持分类筛选与关键词搜索。</p>
    </div>
  </div>

  <div class="gallery-layout">
    <!-- 左侧列表 -->
    <section class="left-panel">
      <div class="panel-head">
        <h2 class="panel-title">作品列表</h2>
        <p class="panel-subtitle">可按分类筛选，也可搜索歌名、演唱者或编号。</p>
      </div>

      <div class="search-area">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="搜索作品（歌名 / 演唱者 / 编号）"
        />

        <div class="filter-row">
          <button class="filter-btn active" data-type="全部">全部</button>
          <button class="filter-btn" data-type="披4">披4</button>
          <button class="filter-btn" data-type="披哥">披哥</button>
          <button class="filter-btn" data-type="其他">其他</button>
          <button class="filter-btn" data-type="游戏">游戏</button>
        </div>
      </div>

      <div id="workList" class="list-wrap"></div>
    </section>

    <!-- 右侧播放器 -->
    <section class="right-panel">
      <div class="player-head">
        <h2 class="player-title">播放器</h2>
        <p class="player-subtitle">默认不自动播放，点击左侧任意作品后才会载入视频。</p>
      </div>

      <div class="player-body">
        <div class="video-shell" id="videoShell">
          <div class="placeholder">
            <div class="placeholder-icon">▶</div>
            <div>请选择左侧作品开始播放</div>
          </div>
        </div>

        <div class="info-card" id="infoCard">
          <div class="info-top">
            <h3 class="info-title">尚未选择作品</h3>
            <span class="info-type">待选择</span>
          </div>

          <div class="info-meta">
            <div class="meta-item">
              <div class="meta-label">编号</div>
              <div class="meta-value">—</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">分类</div>
              <div class="meta-value">—</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">演唱者</div>
              <div class="meta-value">—</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">备注</div>
              <div class="meta-value">点击左侧作品后显示</div>
            </div>
          </div>

          <div class="tip">
            提示：建议这里填写 B 站嵌入播放器链接，格式最稳定。
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
/*
  你以后只需要改这里：
  1. no = 编号
  2. type = 分类（披4 / 披哥 / 其他 / 游戏）
  3. title = 歌名
  4. singers = 演唱者
  5. note = 备注（可留空）
  6. embedUrl = B站嵌入播放器链接

  推荐 embedUrl 格式：
  https://player.bilibili.com/player.html?bvid=BVxxxxxxxxxx&page=1

  如果你只有普通视频链接，不是嵌入链接，
  建议先换成上面的 player 链接再填进来。
*/
const WORKS = [
  {
    no: "001",
    type: "披4",
    title: "示例作品一",
    singers: "扬 / 夏 / 桃",
    note: "这里可以写作品备注",
    embedUrl: "https://player.bilibili.com/player.html?bvid=BV1xx411c7mD&page=1"
  },
  {
    no: "002",
    type: "披哥",
    title: "示例作品二",
    singers: "罐 / 糖",
    note: "这里可以写作品备注",
    embedUrl: "https://player.bilibili.com/player.html?bvid=BV1xx411c7mD&page=1"
  },
  {
    no: "003",
    type: "其他",
    title: "示例作品三",
    singers: "屿 / 桃",
    note: "这里可以写作品备注",
    embedUrl: "https://player.bilibili.com/player.html?bvid=BV1xx411c7mD&page=1"
  },
  {
    no: "004",
    type: "游戏",
    title: "示例作品四",
    singers: "扬 / 糖 / 屿",
    note: "这里可以写作品备注",
    embedUrl: "https://player.bilibili.com/player.html?bvid=BV1xx411c7mD&page=1"
  }
];

const workList = document.getElementById("workList");
const searchInput = document.getElementById("searchInput");
const filterButtons = document.querySelectorAll(".filter-btn");
const videoShell = document.getElementById("videoShell");
const infoCard = document.getElementById("infoCard");

let currentType = "全部";
let currentKeyword = "";
let currentSelectedNo = null;

function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getFilteredWorks(){
  return WORKS.filter(work => {
    const matchType = currentType === "全部" || work.type === currentType;

    const keyword = currentKeyword.trim().toLowerCase();
    const combined = `${work.no} ${work.type} ${work.title} ${work.singers} ${work.note || ""}`.toLowerCase();
    const matchKeyword = !keyword || combined.includes(keyword);

    return matchType && matchKeyword;
  });
}

function renderList(){
  const works = getFilteredWorks();

  if(!works.length){
    workList.innerHTML = `
      <div class="empty-state">
        没有找到符合条件的作品。<br>
        可以换个关键词，或切换分类试试。
      </div>
    `;
    return;
  }

  workList.innerHTML = works.map(work => `
    <button class="work-item ${work.no === currentSelectedNo ? "active" : ""}" data-no="${escapeHtml(work.no)}">
      <div class="work-top">
        <span class="work-no">#${escapeHtml(work.no)}</span>
        <span class="work-type">${escapeHtml(work.type)}</span>
      </div>
      <h3 class="work-title">${escapeHtml(work.title)}</h3>
      <div class="work-meta">
        演唱者：${escapeHtml(work.singers)}
      </div>
    </button>
  `).join("");

  document.querySelectorAll(".work-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const no = btn.dataset.no;
      const work = WORKS.find(item => item.no === no);
      if(work) selectWork(work);
    });
  });
}

function selectWork(work){
  currentSelectedNo = work.no;

  videoShell.innerHTML = `
    <iframe
      src="${escapeHtml(work.embedUrl)}"
      scrolling="no"
      frameborder="0"
      allowfullscreen="true">
    </iframe>
  `;

  infoCard.innerHTML = `
    <div class="info-top">
      <h3 class="info-title">${escapeHtml(work.title)}</h3>
      <span class="info-type">${escapeHtml(work.type)}</span>
    </div>

    <div class="info-meta">
      <div class="meta-item">
        <div class="meta-label">编号</div>
        <div class="meta-value">#${escapeHtml(work.no)}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">分类</div>
        <div class="meta-value">${escapeHtml(work.type)}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">演唱者</div>
        <div class="meta-value">${escapeHtml(work.singers)}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">备注</div>
        <div class="meta-value">${escapeHtml(work.note || "—")}</div>
      </div>
    </div>

    <div class="tip">
      当前为手动点击播放模式，不会默认自动载入首个作品。
    </div>
  `;

  renderList();
}

searchInput.addEventListener("input", (e) => {
  currentKeyword = e.target.value || "";
  renderList();
});

filterButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    filterButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.type;
    renderList();
  });
});

renderList();
</script>
</body>
</html>
