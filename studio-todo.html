<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>十号房｜工作间任务</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;}
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--bg-side-left) 82%, white 18%) 0%, transparent 36%),
      radial-gradient(circle at top right, color-mix(in srgb, var(--bg-side-right) 80%, white 20%) 0%, transparent 38%),
      linear-gradient(180deg,var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
  }
body{
    display:flex;
    justify-content:center;
    align-items:center;
  }
#room{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:#e7dfd4;
  }
#bgFrame{
    position:absolute;
    inset:0;
    z-index:0;
    overflow:hidden;
    background:none;
  }
#bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    display:block;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
    opacity:1;
    transition:none;
  }
#overlay{
    position:absolute;
    inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
    --ui-scale:1;
    --overlay-ui-scale:var(--ui-scale);
    --project-radius-md:calc(20px * var(--ui-scale));
    --project-font-base:calc(13px * var(--ui-scale));
    --project-btn-h:calc(40px * var(--ui-scale));
  }
#overlay *{
    pointer-events:auto;
  }
:root{
    --top-chip-bg: rgba(255,252,247,0.86);
    --top-chip-border: rgba(160,116,78,0.12);
    --top-chip-shadow:
      inset 0 1px 0 rgba(255,255,255,0.96),
      0 3px 10px rgba(110,84,58,0.08);
  }
#topBar{
    position:absolute;
    left:28.2%;
    top:8.2%;
    width:41.0%;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    z-index:40;
    overflow:visible;
  }
#navOuter{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
  }
#navScroll{
    width:100%;
    overflow:visible;
    overflow-y:visible;
    white-space:nowrap;
    scrollbar-width:none;
    -ms-overflow-style:none;
    padding:6px;
    margin:-6px;
  }
#navScroll::-webkit-scrollbar{
    display:none;
  }
#roomNav{
    display:inline-flex;
    align-items:center;
    gap:var(--nav-gap, 10px);
    min-width:max-content;
    max-width:none;
    transform-origin:left top;
    will-change:auto;
  }
@keyframes navInnerGlowSweep{
    0%{
      transform:translateX(-130%) skewX(-18deg);
      opacity:0;
    }
    20%{
      opacity:.78;
    }
    62%{
      opacity:.36;
    }
    100%{
      transform:translateX(245%) skewX(-18deg);
      opacity:0;
    }
  }
.navBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    height:var(--nav-btn-height, 42px);
    padding:0 var(--nav-btn-px, 18px);
    border-radius:var(--nav-btn-radius, 14px);
    background:linear-gradient(180deg, #efd6ad 0%, #dfbd8a 100%);
    color:#704724;
    font-size:var(--nav-btn-font, 15px);
    font-weight:800;
    white-space:nowrap;
    border:1px solid rgba(142,95,50,0.30);
    box-shadow:
      inset 0 1px 0 rgba(255,250,235,0.95),
      inset 0 -2px 0 rgba(122,83,45,0.12),
      inset 0 0 0 1px rgba(255,255,255,0.18),
      0 2px 7px rgba(112,83,52,0.12);
    transition:filter .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    flex:0 0 auto;
    position:relative;
    overflow:hidden;
    isolation:isolate;
  }
.navBtn::before{
    content:"";
    position:absolute;
    top:-28%;
    bottom:-28%;
    left:-52%;
    width:42%;
    border-radius:999px;
    background:linear-gradient(90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.28) 35%,
      rgba(255,247,219,0.72) 50%,
      rgba(255,255,255,0.26) 65%,
      rgba(255,255,255,0) 100%
    );
    opacity:0;
    pointer-events:none;
    z-index:0;
  }
.navBtn::after{
    content:"";
    position:absolute;
    inset:3px;
    border-radius:max(8px, calc(var(--nav-btn-radius, 14px) - 3px));
    border:1px solid rgba(255,255,255,0.42);
    box-shadow:inset 0 0 10px rgba(255,255,255,0.15);
    opacity:.72;
    pointer-events:none;
    z-index:1;
    transition:opacity .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
.navBtn:hover,
.navBtn:focus-visible{
    transform:none;
    filter:brightness(1.055);
    border-color:rgba(172,111,52,0.58);
    box-shadow:
      inset 0 1px 0 rgba(255,250,235,0.98),
      inset 0 -2px 0 rgba(122,83,45,0.13),
      inset 0 0 0 2px rgba(255,242,213,0.50),
      inset 0 0 15px rgba(255,238,199,0.34),
      0 3px 9px rgba(112,83,52,0.13);
  }
.navBtn:hover::before,
.navBtn:focus-visible::before{
    animation:navInnerGlowSweep 1.2s ease-out;
  }
.navBtn:hover::after,
.navBtn:focus-visible::after{
    opacity:.96;
    border-color:rgba(255,255,255,0.86);
    box-shadow:
      inset 0 0 12px rgba(255,255,255,0.34),
      inset 0 0 0 1px rgba(255,232,190,0.30);
  }
.navBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
    border-color:rgba(255,239,210,0.76);
    box-shadow:
      inset 0 1px 0 rgba(255,224,188,0.64),
      inset 0 -2px 0 rgba(112,73,35,0.16),
      inset 0 0 0 2px rgba(255,247,226,0.34),
      inset 0 0 16px rgba(255,235,194,0.40),
      0 4px 12px rgba(116,86,54,0.18);
  }
.navBtn.active::before{
    animation:navInnerGlowSweep 3.2s ease-in-out infinite;
  }
.navBtn.active::after{
    inset:3px;
    border-color:rgba(255,250,235,0.90);
    box-shadow:
      inset 0 0 12px rgba(255,249,231,0.42),
      inset 0 -5px 10px rgba(255,225,170,0.24);
    opacity:1;
  }
#logoutBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:34px;
    min-width:34px;
    flex:0 0 34px;
    height:auto;
    min-height:auto;
    padding:0;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#67401f;
    font-size:var(--identity-logout-font, 10px);
    font-weight:800;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    order:3;
    align-self:stretch;
    overflow:hidden;
    line-height:1;
  }
#logoutBtn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.94);
  }
#topBarUserAnchor{
    position:absolute;
    right:7.35%;
    left:auto;
    top:8%;
    width:clamp(158px, 12.6vw, 196px);
    height:clamp(31px, 4.5vh, 38px);
    z-index:65;
    pointer-events:none;
  }
#topBarUserArea{
    --identity-font:calc(23px * var(--bg-ui-scale, 1));
    --identity-icon-font:calc(22px * var(--bg-ui-scale, 1));
    --identity-logout-font:calc(18px * var(--bg-ui-scale, 1));
    position:absolute;
    right:0;
    left:auto;
    top:0;
    display:inline-flex;
    align-items:stretch;
    justify-content:flex-end;
    gap:5px;
    width:max-content;
    min-width:100%;
    max-width:calc(100vw - 18px);
    height:100%;
    min-height:0;
    max-height:none;
    padding:4px 5px;
    border-radius:13px;
    background:rgba(255,248,239,0.92);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    text-align:center;
    pointer-events:auto;
    box-sizing:border-box;
    overflow:visible;
    transform:none;
    white-space:nowrap;
  }
#currentUserBadge{
    order:1;
    flex:0 0 auto;
    width:auto;
    min-width:max-content;
    height:auto;
    min-height:auto;
    padding:0 8px;
    border-radius:9px;
    background:rgba(255,252,247,0.96);
    color:#6c4523;
    font-size:var(--identity-font);
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 1px 4px rgba(112,83,52,0.05);
    border:1px solid rgba(160,116,78,0.12);
    white-space:nowrap;
    overflow:visible;
    box-sizing:border-box;
    align-self:stretch;
  }
#currentUserBadge .identityText{
    flex:0 0 auto;
    min-width:0;
    overflow:visible;
    text-overflow:clip;
    text-align:left;
    white-space:nowrap;
    line-height:1;
    font-size:inherit;
  }
#taskPanel{
    --task-panel-left:9.2%;
    --task-panel-top:18%;
    --task-panel-right:22.4%;
    --task-panel-bottom:12%;
    position:absolute;
    left:var(--task-panel-left);
    right:var(--task-panel-right);
    top:var(--task-panel-top);
    bottom:var(--task-panel-bottom);
    transform:none;
    transform-origin:top left;
    width:auto;
    height:auto;
    min-width:0;
    min-height:0;
    border-radius:30px;
    background:rgba(255,255,255,0.34);
    border:1px solid rgba(255,255,255,0.52);
    box-shadow:
      0 16px 42px rgba(122,96,68,0.10),
      inset 0 1px 0 rgba(255,255,255,0.62),
      inset 0 -1px 0 rgba(255,255,255,0.20);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    overflow:visible;
  }
@media (min-width:1600px){
  #taskPanel{
    --task-panel-left:9.1%;
  }
}
#taskPanel::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.22);
    pointer-events:none;
  }
#panelSwitch{
    position:absolute;
    left:104.9%;
    top:10.9%;
    width:16.55%;
    height:27.15%;
    box-sizing:border-box;
    padding:calc(14px * var(--ui-scale)) calc(12px * var(--ui-scale));
    border-radius:var(--project-radius-md);
    background:rgba(255,248,239,0.9);
    border:1px solid rgba(186,146,103,0.24);
    box-shadow:
      0 10px 24px rgba(116,86,54,0.12),
      inset 0 1px 0 rgba(255,255,255,0.86);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:calc(8px * var(--ui-scale));
    z-index:30;
  }
.switchBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:100%;
    min-height:var(--project-btn-h);
    padding:calc(8px * var(--ui-scale)) calc(12px * var(--ui-scale));
    border-radius:calc(13px * var(--ui-scale));
    background:rgba(231,214,185,0.92);
    color:#744b25;
    font-size:var(--project-font-base);
    font-weight:700;
    line-height:1.2;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
      inset 0 1px 0 rgba(255,247,233,0.95),
      0 2px 6px rgba(116,86,54,0.08);
    transition:transform .18s ease, filter .18s ease, background .18s ease;
  }
.switchBtn:hover{
    transform:none;
    filter:brightness(1.03);
  }
.switchBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
    box-shadow:
      inset 0 1px 0 rgba(255,224,188,0.55),
      0 4px 10px rgba(116,86,54,0.14);
  }
.panelView{
    position:absolute;
    inset:0;
    padding:0;
  }
#browsePanelInner{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:26.5% 73.5%;
  }
#browseListPane{
    padding:16px 10px 14px 14px;
    border-right:1px solid rgba(255,255,255,0.20);
    display:flex;
    flex-direction:column;
    min-height:0;
    background:transparent;
  }
#musicNotesLayer{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
.musicNote{
    position:absolute;
    left:0;
    top:0;
    pointer-events:none;
    user-select:none;
    opacity:0;
    color:rgba(165,115,66,0.34);
    text-shadow:0 2px 10px rgba(255,255,255,0.22);
    animation:musicFloat linear forwards;
    will-change:transform, opacity;
  }
@keyframes musicFloat{
    0%{
      transform:translate3d(0, 16px, 0) scale(.82) rotate(0deg);
      opacity:0;
    }
    12%{
      opacity:.85;
    }
    72%{
      opacity:.42;
    }
    100%{
      transform:translate3d(var(--float-x, 36px), calc(-1 * var(--float-y, 180px)), 0) scale(1.18) rotate(var(--float-rotate, 14deg));
      opacity:0;
    }
  }
.filterTagsWrap{
    flex:0 0 auto;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:0 0 10px;
    padding-right:4px;
    overflow:visible;
    scrollbar-width:none;
    -ms-overflow-style:none;
    align-items:center;
  }
.filterTagsWrap::-webkit-scrollbar{
    display:none;
  }
.filterTagBtn{
    appearance:none;
    border:none;
    cursor:pointer;
    flex:0 0 auto;
    min-width:56px;
    height:28px;
    padding:0 10px;
    border-radius:10px;
    background:rgba(255,252,247,0.9);
    color:#7c4d25;
    font-size:11px;
    font-weight:800;
    white-space:nowrap;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      0 2px 6px rgba(112,83,52,0.06);
    transition:transform .18s ease, filter .18s ease, background .18s ease, color .18s ease;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    vertical-align:middle;
  }
.filterTagBtn:hover{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }
.filterTagBtn.active{
    background:linear-gradient(180deg,#d9a364 0%, #c98c4f 100%);
    color:#fff9f1;
    box-shadow:
      inset 0 1px 0 rgba(255,224,188,0.55),
      0 4px 10px rgba(116,86,54,0.14);
  }
.filterTagBtn.altToggle{
    background:rgba(255,252,247,0.42);
    border:1.5px dashed rgba(188,144,99,0.72);
    box-shadow:none;
    color:#8a5b30;
  }
.filterTagBtn.altToggle:hover{
    background:rgba(255,252,247,0.62);
  }
.filterTagBtn.altToggle.active{
    background:rgba(217,163,100,0.18);
    color:#8a5b30;
    border:1.5px dashed rgba(201,140,79,0.95);
    box-shadow:0 0 0 2px rgba(217,163,100,0.12) inset;
  }
.taskItem{
    width:100%;
    text-align:left;
    padding:8px 10px;
    margin:0 0 6px;
    border-radius:13px;
    background:rgba(255,252,247,0.34);
    color:#6c4523;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.52),
      0 3px 10px rgba(120,92,63,0.05);
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    position:relative;
    border:1px solid transparent;
    isolation:isolate;
    overflow:hidden;
  }
.taskItem.active{
  border-color:rgba(233,193,139,0.32);
  background:linear-gradient(180deg, rgba(252,242,223,0.98) 0%, rgba(246,229,202,0.98) 100%);
  color:#5c3819;
  box-shadow:
    inset 0 0 0 1px rgba(231,190,132,0.18),
    inset 0 2px 6px rgba(255,255,255,0.65),
    0 6px 14px rgba(120,92,63,0.06);
}
.taskItem.active::after{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:30%;
  height:100%;
  background:linear-gradient(90deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.25) 40%,
    rgba(255,255,255,0.55) 50%,
    rgba(255,255,255,0.25) 60%,
    rgba(255,255,255,0) 100%
  );
  transform:skewX(-18deg);
  filter:blur(0.8px);
  pointer-events:none;
  animation:flowSweep 4.5s ease-in-out infinite;
  z-index:1;
}
.taskItem.active::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:13px;
  box-shadow:
    inset 0 0 12px rgba(255,210,150,0.35);
  pointer-events:none;
  z-index:0;
}
@keyframes flowSweep{
  0%{
    left:-40%;
    opacity:0;
  }
  20%{
    opacity:.6;
  }
  60%{
    left:120%;
    opacity:.15;
  }
  100%{
    left:120%;
    opacity:0;
  }
}
.taskItem.active .taskNameText{
    text-shadow:none;
  }
.taskItem.active .taskTypeMini{
    box-shadow:none;
  }
.bonusValue{
    font-size:18px;
    letter-spacing:0;
  }
.bonusValue small{
    font-size:.64em;
  }
.searchWrap{
    flex:0 0 auto;
    margin:0 0 8px;
    padding-right:4px;
  }
.searchInput{
    width:100%;
    height:34px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:0 12px;
    background:rgba(255,252,247,0.62);
    color:#5f3b1d;
    font-size:12px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      0 2px 8px rgba(120,92,63,0.05);
  }
.searchInput::placeholder{
    color:#9a7b5b;
  }
#browseList{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:4px;
  scrollbar-width:thin;
  scrollbar-color:rgba(175,135,98,0.55) transparent;
}
#browseList::-webkit-scrollbar{
    width:8px;
  }
#browseList::-webkit-scrollbar-track{
    background:transparent;
  }
#browseList::-webkit-scrollbar-thumb{
    background:rgba(175,135,98,0.55);
    border-radius:999px;
  }
.taskItem:hover{
    transform:translateY(-1px);
    background:rgba(255,252,247,0.52);
  }
.taskItem.active:hover{
    transform:none;
    background:linear-gradient(180deg, rgba(250,238,217,0.98) 0%, rgba(244,224,194,0.98) 100%);
  }
.taskItem.jumpFlash{
    animation:taskJumpFlash 1.8s ease;
  }
@keyframes taskJumpFlash{
    0%{
      box-shadow:
        inset 0 0 0 1px rgba(244,198,121,0.96),
        0 0 0 3px rgba(244,198,121,0.38),
        0 8px 18px rgba(184,132,74,0.18);
      transform:translateY(-1px);
    }
    70%{
      box-shadow:
        inset 0 0 0 1px rgba(244,198,121,0.56),
        0 0 0 2px rgba(244,198,121,0.18),
        0 5px 12px rgba(184,132,74,0.10);
    }
    100%{
      box-shadow:inherit;
      transform:none;
    }
  }
.taskItemCardBtn{
    all:unset;
    display:block;
    width:100%;
    cursor:pointer;
  }
.taskItemName{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    min-width:0;
    font-size:13px;
    font-weight:800;
    line-height:1.3;
    color:inherit;
  }
.taskItemTitleMain{
    min-width:0;
    display:flex;
    align-items:flex-start;
    gap:5px;
    flex-wrap:wrap;
    flex:1 1 auto;
  }
.taskItemHeadActions{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:6px;
  }
.taskNameText{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:normal;
    line-height:1.35;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    word-break:break-word;
  }
.taskTypeMini{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:17px;
    padding:0 5px;
    border-radius:999px;
    font-size:10px;
    font-weight:700;
    line-height:1;
    background:rgba(255,248,238,0.88);

.navBtn{
  appearance:none;
  border:none;
  cursor:pointer;
  position:relative;
  flex:0 0 auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:var(--nav-btn-height, 40px);
  padding:0 var(--nav-btn-px, 16px);
  border-radius:var(--nav-btn-radius, 13px);
  color:#6e4827;
  font-size:var(--nav-btn-font, 14px);
  font-weight:900;
  line-height:1;
  white-space:nowrap;
  overflow:visible;
  isolation:isolate;
  background:
    linear-gradient(180deg, rgba(249,232,203,.90) 0%, rgba(226,195,152,.86) 100%);
  border:1px solid rgba(145,98,56,.34);
  box-shadow:
    0 1px 1px rgba(255,255,255,.48) inset,
    0 2px 5px rgba(91,68,45,.13);
  text-shadow:0 1px 0 rgba(255,255,255,.42);
  transition:
    background .18s ease,
    border-color .18s ease,
    box-shadow .18s ease,
    color .18s ease,
    filter .18s ease;
}
.navBtn::before,
.navBtn::after{
  position:absolute;
  pointer-events:none;
  opacity:0;
  z-index:3;
  border:0;
  box-shadow:none;
  background:none;
  inset:auto;

.navBtn:focus-visible{

    0 3px 8px rgba(92,63,38,.18);
}

    authState.memberCode = String(localStorage.getItem(STORAGE_KEYS.memberCode) || "").trim();

    if (!authState.loggedIn || !authState.nickname) {
      handleLogout();
      return false;
    }

    try {
      let query = supabaseClient
        .from("members")
        .select("id, nickname, role, member_code");

      if (authState.memberId) {
        query = query.eq("id", authState.memberId);
      } else {
        query = query.eq("nickname", authState.nickname);
      }

      const { data, error } = await query.maybeSingle();

      if (error || !data) {
        handleLogout();
        return false;
      }

      authState.memberId = String(data.id || authState.memberId || "");
      authState.nickname = String(data.nickname || authState.nickname || "").trim();
      authState.role = String(data.role || authState.role || "member").toLowerCase();
      authState.memberCode = String(data.member_code || authState.memberCode || "").trim();

      localStorage.setItem(STORAGE_KEYS.user, authState.nickname);
      localStorage.setItem(STORAGE_KEYS.memberId, authState.memberId);
      localStorage.setItem(STORAGE_KEYS.role, authState.role);
      if (authState.memberCode) {
        localStorage.setItem(STORAGE_KEYS.memberCode, authState.memberCode);
      }

      authState.initialized = true;
      updateTopBarIdentity();
      return true;
    } catch (err) {
      console.error("同步登录状态失败：", err);
      handleLogout();
      return false;
    }
  }

  async function handleLogout() {
    if (hasPendingLocalChanges) {
      await saveCurrentTaskEdits("manual");
    }
    localStorage.removeItem(STORAGE_KEYS.loggedIn);
    localStorage.removeItem(STORAGE_KEYS.user);
    localStorage.removeItem(STORAGE_KEYS.role);
    localStorage.removeItem(STORAGE_KEYS.memberId);
    localStorage.removeItem(STORAGE_KEYS.memberCode);
    window.location.href = "index.html";
  }

  function showToast(title, message) {
    toastMode = "alert";
    toastResolve = null;
    toastTitle.textContent = title || "提示";
    toastMessage.textContent = message || "";
    toastCloseBtn.textContent = "知道了";
    toastCloseBtn.hidden = false;
    toastConfirmBtn.hidden = true;
    toastMask.classList.add("show");
    toastMask.setAttribute("aria-hidden", "false");
  }

  function showConfirmToast(title, message, confirmText = "确认", cancelText = "取消") {
    return new Promise(resolve => {
      toastMode = "confirm";
      toastResolve = resolve;
      toastTitle.textContent = title || "请确认";
      toastMessage.textContent = message || "";
      toastCloseBtn.textContent = cancelText;
      toastCloseBtn.hidden = false;
      toastConfirmBtn.textContent = confirmText;
      toastConfirmBtn.hidden = false;
      toastMask.classList.add("show");
      toastMask.setAttribute("aria-hidden", "false");
    });
  }

  function closeToast(result = false) {
    toastMask.classList.remove("show");
    toastMask.setAttribute("aria-hidden", "true");
    if (toastMode === "confirm" && toastResolve) {
      const resolve = toastResolve;
      toastResolve = null;
      toastMode = "alert";
      resolve(!!result);
      return;
    }
    toastResolve = null;
    toastMode = "alert";
  }

  function showMiniNotice(message, duration = 1800) {
    if (!miniNotice) return;
    clearTimeout(miniNoticeTimer);
    miniNotice.textContent = String(message || "");
    miniNotice.classList.add("show");
    miniNotice.setAttribute("aria-hidden", "false");
    miniNoticeTimer = setTimeout(() => {
      miniNotice.classList.remove("show");
      miniNotice.setAttribute("aria-hidden", "true");
    }, duration);
  }

  function buildWheelToolUrl(taskId = activeClaimTaskId) {
    const params = new URLSearchParams();
    if (taskId) params.set('task_id', String(taskId));
    if (getCurrentMemberId()) params.set('member_id', getCurrentMemberId());
    params.set('embed', '1');
    return `studio-wheel.html${params.toString() ? `?${params.toString()}` : ''}`;
  }

  function openWheelToolModal(taskId = activeClaimTaskId) {
    const task = getCurrentTaskSafe(taskId);
    const isCollective = document.getElementById("editIsCollectiveBtn")?.classList.contains("special")
      || String(document.getElementById("editIsCollective")?.value || "") === "1";
    if (!task || !isCollective) return;

    const wheelUrl = buildWheelToolUrl(task.id);

    if (IS_FILE_PROTOCOL) {
      window.location.href = wheelUrl;
      return;
    }

    if (!wheelModalMask || !wheelModalFrame) return;
    wheelModalFrame.src = wheelUrl;
    wheelModalMask.classList.add('show');
    wheelModalMask.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeWheelToolModal() {
    if (!wheelModalMask || !wheelModalFrame) return;
    wheelModalMask.classList.remove('show');
    wheelModalMask.setAttribute('aria-hidden', 'true');
    wheelModalFrame.src = 'about:blank';
    document.body.style.overflow = '';
  }

  toastCloseBtn.addEventListener("click", () => closeToast(false));
  toastConfirmBtn.addEventListener("click", () => closeToast(true));
  toastMask.addEventListener("click", (e) => {
    if (e.target === toastMask) closeToast(false);
  });

  if (wheelModalCloseBtn) {
    wheelModalCloseBtn.addEventListener("click", closeWheelToolModal);
  }
  if (wheelModalMask) {
    wheelModalMask.addEventListener("click", (e) => {
      if (e.target === wheelModalMask) closeWheelToolModal();
    });
  }

  function setAutoSaveStatus(type, text) {
    autoSaveStatus.className = "autoSaveBadge";
    if (type) autoSaveStatus.classList.add(type);
    autoSaveStatus.textContent = text;
  }

  function makeDisplayTaskName(taskCode, taskName) {
    const code = String(taskCode || "").trim();
    const name = String(taskName || "").trim();
    if (!code) return name;
    if (!name) return code;
    return `${code}.${name}`;
  }

  function normalizeNameForLookup(text) {
    return String(text || "").trim().toLowerCase();
  }

  function findMemberByName(name) {
    const key = normalizeNameForLookup(name);
    if (!key) return null;
    return membersCache.find(member => {
      return normalizeNameForLookup(member.display) === key
        || normalizeNameForLookup(member.nickname) === key
        || normalizeNameForLookup(member.name) === key;
    }) || null;
  }

  function findMixerByName(name) {
    const key = normalizeNameForLookup(name);
    if (!key) return null;
    return mixerMembersCache.find(member => {
      return normalizeNameForLookup(member.display) === key
        || normalizeNameForLookup(member.nickname) === key
        || normalizeNameForLookup(member.name) === key;
    }) || null;
  }

  function uniqueAssignedIds(parts) {
    return [...new Set((parts || []).map(part => part.assigned_member_id).filter(Boolean).map(String))];
  }

  function getParticipantSingerIds(task) {
    const partIds = uniqueAssignedIds(task.parts || []);
    const singerIds = (task.singers || []).map(item => String(item.member_id || "").trim()).filter(Boolean);
    return [...new Set([...partIds, ...singerIds])];
  }

  function getUniqueAssignedSingerCount(task) {
    return (task.singers || []).length;
  }

  function isCurrentUserInTask(task) {
    const currentId = getCurrentMemberId();
    if (!currentId) return false;
    const isSinger = getParticipantSingerIds(task).includes(currentId);
    const isProducer = String(task.producer_member_id || "").trim() === currentId;
    return isSinger || isProducer;
  }

  function isCurrentUserSingerInTask(task) {
    const currentId = getCurrentMemberId();
    if (!currentId) return false;
    return (task.singers || []).some(item => String(item.member_id || "").trim() === currentId)
      || (task.parts || []).some(row => String(row.assigned_member_id || "").trim() === currentId);
  }

  function getCurrentTaskSafe(taskId = activeClaimTaskId) {
    const task = tasks.find(item => String(item.id) === String(taskId || ""));
    return task || null;
  }

  function isActiveTaskRendered(task) {
    return !!task
      && !!document.getElementById("browseDetailContentClaim")
      && String(task.id || "") === String(activeClaimTaskId || "")
      && !!document.getElementById("partRows");
  }

  function getLivePartsFromDom(task) {
    if (!isActiveTaskRendered(task)) return Array.isArray(task?.parts) ? task.parts : [];
    return [...document.querySelectorAll(".partRow")].map((row, index) => {
      const roleName = String(row.querySelector(".partNameInput")?.value || "").trim();
      const memberName = String(row.querySelector(".partMemberInput")?.value || "").trim();
      const matched = findMemberByName(memberName);
      return {
        id: String(row.dataset.partId || "").trim(),
        part_order: index + 1,
        original_name: roleName,
        assigned_member_id: matched?.id ? String(matched.id) : "",
        assigned_member_name: memberName
      };
    });
  }

  function getTaskForLiveUi(task) {
    if (!task) return null;
    if (!isActiveTaskRendered(task)) return task;
    const specialValue = String(document.getElementById("editIsCollective")?.value || "").trim();
    const singerQuotaValue = Math.max(1, parseInt(String(document.getElementById("editSingerQuota")?.value || task.participant_count || 1), 10) || 1);
    return {
      ...task,
      is_collective_task: specialValue === "1",
      participant_count: singerQuotaValue,
      parts: getLivePartsFromDom(task)
    };
  }

  function getUnassignedRoleRows(task) {
    const liveTask = getTaskForLiveUi(task);
    if (!liveTask || !Array.isArray(liveTask.parts)) return [];
    return liveTask.parts.filter(row => {
      const roleName = String(row.original_name || "").trim();
      const assignedId = String(row.assigned_member_id || "").trim();
      return !!roleName && !assignedId;
    });
  }

  function getAssignedRoleRowsForMember(task, memberId) {
    const liveTask = getTaskForLiveUi(task);
    const id = String(memberId || "").trim();
    if (!liveTask || !Array.isArray(liveTask.parts) || !id) return [];
    return liveTask.parts.filter(row => String(row.assigned_member_id || "").trim() === id);
  }

  function getCurrentUserUnassignedLotteryState(task) {
    const currentId = getCurrentMemberId();
    const liveTask = getTaskForLiveUi(task);
    const result = {
      task: liveTask,
      currentId,
      isSinger: false,
      assignedRows: [],
      assignedRoleName: '',
      unassignedRows: [],
      unassignedSingerIds: [],
      eligible: false,
      needsLottery: false
    };

    if (!liveTask || !currentId) return result;

    const singerIds = [...new Set((liveTask.singers || []).map(item => String(item.member_id || '').trim()).filter(Boolean))];
    result.isSinger = singerIds.includes(currentId);
    if (!result.isSinger) return result;

    result.assignedRows = getAssignedRoleRowsForMember(liveTask, currentId);
    result.assignedRoleName = String(result.assignedRows[0]?.original_name || '').trim();
    if (result.assignedRows.length) return result;

    result.unassignedRows = getUnassignedRoleRows(liveTask);
    result.unassignedSingerIds = singerIds.filter(memberId => getAssignedRoleRowsForMember(liveTask, memberId).length === 0);
    result.eligible = result.unassignedRows.length > 0 && result.unassignedSingerIds.includes(currentId);
    result.needsLottery = result.eligible && result.unassignedRows.length >= 2 && result.unassignedSingerIds.length >= 2;
    return result;
  }

  function canCurrentUserUseLottery(task) {
    return getCurrentUserUnassignedLotteryState(task).needsLottery;
  }

  function shouldCurrentUserDrawNow(task) {
    return getCurrentUserUnassignedLotteryState(task).needsLottery;
  }

  function getPersonalLotteryButtonText(task) {
    return '开始抽签';
  }

  function shouldRemindCurrentUserForLottery(task) {
    const state = getCurrentUserUnassignedLotteryState(task);
    if (!state.needsLottery) return false;
    return (state.task?.parts || []).some(row => {
      const assignedId = String(row?.assigned_member_id || '').trim();
      return assignedId && assignedId !== state.currentId;
    });
  }

async function setLyricsLotteryEnabled(taskId, enabled) {
    const memberName = getCurrentMemberName();
    const memberCode = getCurrentMemberCode();
    const currentMemberId = getCurrentMemberId();

    if (!memberName || !memberCode || !currentMemberId) {
      throw new Error("当前登录信息不完整，请重新登录后再试。");
    }

    const { error } = await supabaseClient.rpc("secure_set_lyrics_lottery_enabled", {
      p_nickname: memberName,
      p_member_code: memberCode,
      p_project_id: taskId,
      p_enabled: !!enabled
    });
    if (error) throw error;
  }

  async function assignRandomRoleToCurrentMember(task) {
    const currentMemberId = getCurrentMemberId();
    const currentMemberName = getCurrentMemberName();
    const currentMemberCode = getCurrentMemberCode();

    if (!currentMemberId || !currentMemberName || !currentMemberCode) {
      showToast("无法抽签", "当前登录信息不完整，请重新登录后再试。");
      return false;
    }

    if (!isCurrentUserSingerInTask(task)) {
      showToast("无法抽签", "只有参与这首歌演唱的成员才可以抽签。");
      return false;
    }

    autoFillLastRemainingSinger();
    refreshCandidateRowState();

    const alreadyAssigned = getAssignedRoleRowsForMember(task, currentMemberId);
    if (alreadyAssigned.length) {
      const firstRoleName = String(alreadyAssigned[0]?.original_name || "").trim();
      showToast("你已经抽过签了", firstRoleName ? `你抽到的是：${firstRoleName}` : "你已经分到角色了。");
      return false;
    }

    const latestTask = getCurrentTaskSafe(task.id) || task;
    const unassignedRows = getUnassignedRoleRows(latestTask).filter(row => String(row.id || "").trim());
    if (!unassignedRows.length) {
      showToast("无需抽签", "当前已经没有可抽取的角色了。");
      return false;
    }

    pushUndoSnapshot();
    setAutoSaveStatus("saving", "抽签中.");

    const { data, error } = await supabaseClient.rpc("secure_assign_random_role_for_current_member", {
      p_nickname: currentMemberName,
      p_member_code: currentMemberCode,
      p_project_id: task.id
    });
    if (error) throw error;

    await loadProjectsFromSupabase({ keepSelection: true });

    let picked = Array.isArray(data) ? data[0] || null : data || null;
    let pickedRoleName = String(
      picked?.picked_role_name ||
      picked?.role_name ||
      picked?.original_name ||
      ""
    ).trim();

    if (!pickedRoleName) {
      const refreshedTask = getCurrentTaskSafe(task.id) || task;
      const assignedRows = getAssignedRoleRowsForMember(refreshedTask, currentMemberId);
      pickedRoleName = String(assignedRows[0]?.original_name || '').trim();
    }

    setAutoSaveStatus("saved", "已同步");
    showToast("抽签成功", pickedRoleName ? `你抽到了：${pickedRoleName}` : "你已经完成分配。");
    return true;
  }

  async function ensureLotteryRowsPersisted(taskId = activeClaimTaskId) {
    const task = getCurrentTaskSafe(taskId);
    if (!task) return null;

    const pendingRowsWithoutId = [...document.querySelectorAll(".partRow")].filter(row => {
      const roleName = String(row.querySelector(".partNameInput")?.value || "").trim();
      const partId = String(row.dataset.partId || "").trim();
      return !!roleName && !partId;
    });

    if (!pendingRowsWithoutId.length) return task;

    await saveCurrentTaskEdits("manual");
    await loadProjectsFromSupabase({ keepSelection: true });
    return getCurrentTaskSafe(taskId);
  }

  async function handlePersonalLotteryClick(taskId = activeClaimTaskId) {
    if (personalLotteryInFlight) return;

    autoFillLastRemainingSinger();
    const autoFillState = getAutoFillLastSingerState();
    if (autoFillState.shouldAutoFill) {
      refreshCandidateRowState();
      scheduleAutoSave();
      return;
    }

    const task = getCurrentTaskSafe(taskId);
    if (!task) {
      showToast("错误", "当前任务未加载，请重新选择任务后再试。");
      return;
    }

    const liveTask = getTaskForLiveUi(task) || task;
    const lotteryState = getCurrentUserUnassignedLotteryState(liveTask);
    if (!lotteryState.isSinger) {
      showToast("无法抽签", "只有参与这首歌演唱的成员才可以抽签。");
      return;
    }
    if (lotteryState.assignedRoleName) {
      showToast("无需抽签", `你当前对应的是：${lotteryState.assignedRoleName}`);
      return;
    }
    if (!lotteryState.needsLottery) {
      showToast("无需抽签", "当前不是需要随机抽签的情况。");
      return;
    }

    personalLotteryInFlight = true;
    try {
      const persistedTask = await ensureLotteryRowsPersisted(task.id);
      const latestTask = persistedTask || getCurrentTaskSafe(task.id) || task;
      if (!latestTask.lyrics_lottery_enabled) {
        setAutoSaveStatus("saving", "准备抽签中...");
        await setLyricsLotteryEnabled(latestTask.id, true);
        await loadProjectsFromSupabase({ keepSelection: true });
      }
      const workingTask = getCurrentTaskSafe(task.id) || latestTask;
      await assignRandomRoleToCurrentMember(workingTask);
    } catch (err) {
      console.error("个人抽签失败：", err);
      setAutoSaveStatus("error", "抽签失败");
      const detail = String(err?.message || err?.details || err?.hint || "").trim();
      showToast("抽签失败", detail ? `抽签失败：${detail}` : "请检查 projects / project_parts 的更新权限，以及是否有其他人同时抽中了该角色。");
    } finally {
      personalLotteryInFlight = false;
    }
  }

  function readStudioJumpIntent() {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.studioJumpIntent);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return null;
      return parsed;
    } catch (err) {
      console.error('读取跳转意图失败：', err);
      return null;
    }
  }

  function clearStudioJumpIntent() {
    pendingStudioJumpIntent = null;
    try {
      localStorage.removeItem(STORAGE_KEYS.studioJumpIntent);
    } catch (err) {
      console.error('清除跳转意图失败：', err);
    }
  }

  function queueStudioJumpFlash(taskId) {
    const normalizedId = String(taskId || '').trim();
    if (!normalizedId) return;
    requestAnimationFrame(() => {
      const itemEl = document.querySelector(`#browseList .taskItem[data-task-id="${normalizedId}"]`);
      if (!itemEl) return;
      itemEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      itemEl.classList.remove('jumpFlash');
      void itemEl.offsetWidth;
      itemEl.classList.add('jumpFlash');
      if (jumpFlashTimer) window.clearTimeout(jumpFlashTimer);
      jumpFlashTimer = window.setTimeout(() => {
        itemEl.classList.remove('jumpFlash');
      }, 1800);
    });
  }

  function focusTaskInTodoView(taskId, { flash = true } = {}) {
    const normalizedId = String(taskId || '').trim();
    if (!normalizedId) return false;
    const targetTask = tasks.find(task => String(task.id || '') === normalizedId);
    if (!targetTask) return false;

    const targetFilter = String(targetTask.supplementTags?.[0] || '').trim();
    if (targetFilter) {
      activeMainFilter = targetFilter;
      activeSecondaryFilter = '';
    }

    pinActiveTaskInCurrentView(normalizedId, 'jump');
    activeClaimTaskId = normalizedId;
    syncFilterButtons();
    renderBrowseList();
    renderBrowseDetail();
    renderSiteNotifications();
    if (flash) queueStudioJumpFlash(normalizedId);
    return true;
  }

  function applyIncomingStudioJumpIntent() {
    const intent = pendingStudioJumpIntent || readStudioJumpIntent();
    if (!intent) return false;
    if (String(intent.page || '').trim() !== CURRENT_STUDIO_PAGE) return false;

    const applied = focusTaskInTodoView(intent.taskId, { flash: true });
    if (applied) {
      clearStudioJumpIntent();
      return true;
    }

    clearStudioJumpIntent();
    return false;
  }

  function getPendingPersonalLotteryTasks() {
    return tasks.filter(task => shouldRemindCurrentUserForLottery(task));
  }

  function getSiteNotificationItems() {
    return getPendingPersonalLotteryTasks().map(task => ({
      id: `lottery:${task.id}`,
      type: 'lottery',
      taskId: task.id,
      title: task.displayName || task.project_name || '未命名任务',
      desc: '这首歌的歌词分配已经开始，且你还没有完成分配，请尽快来抽签。'
    }));
  }

function renderSiteNotifications() {
    if (!siteNoticeBtn || !siteNoticeBody || !siteNoticeText || !siteNoticeCount || !siteNoticePanel) return;

    const items = getSiteNotificationItems();
    const count = items.length;
    siteNoticeBtn.classList.toggle('hasNotice', count > 0);
    siteNoticeText.textContent = count ? `站内通知（${count}）` : '站内通知';
    siteNoticeCount.textContent = String(count);

    if (!count) {
      siteNoticeBody.className = 'siteNoticeEmpty';
      siteNoticeBody.innerHTML = '暂无提醒';
      return;
    }

    siteNoticeBody.className = 'siteNoticeList';
    siteNoticeBody.innerHTML = items.map(item => `
      <div class="siteNoticeItem">
        <div class="siteNoticeItemTitle">${escapeHtml(item.title)}</div>
        <div class="siteNoticeItemDesc">${escapeHtml(item.desc)}</div>
        <button type="button" class="siteNoticeAction" data-task-id="${escapeHtml(item.taskId)}">前往处理</button>
      </div>
    `).join('');

    siteNoticeBody.querySelectorAll('.siteNoticeAction').forEach(btn => {
      btn.addEventListener('click', async (event) => {
        event.stopPropagation();
        const taskId = String(btn.dataset.taskId || '').trim();
        if (!taskId) return;
        await switchActiveTask(taskId);
        queueStudioJumpFlash(taskId);
        toggleSiteNoticePanel(false);
      });
    });
  }

  function toggleSiteNoticePanel(force) {
    if (!siteNoticePanel || !siteNoticeBtn) return;
    const shouldShow = typeof force === 'boolean' ? force : !siteNoticePanel.classList.contains('show');
    siteNoticePanel.classList.toggle('show', shouldShow);
    siteNoticePanel.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
    siteNoticeBtn.setAttribute('aria-expanded', shouldShow ? 'true' : 'false');
  }

  async function saveBeforeContextSwitch() {
    if (!hasPendingLocalChanges) return true;
    await saveCurrentTaskEdits('manual');
    return !hasPendingLocalChanges;
  }

  async function switchActiveTask(taskId) {
    const nextId = String(taskId || '').trim();
    if (!nextId || nextId === String(activeClaimTaskId || '').trim()) return;
    const ok = await saveBeforeContextSwitch();
    if (!ok) return;
    clearPinnedTaskInCurrentView();
    activeClaimTaskId = nextId;
    setAutoSaveStatus('saved', '已同步');
    renderBrowseList();
    renderBrowseDetail();
    renderSiteNotifications();
  }

  async function applyFilterAndRefresh(nextFilter) {
    const ok = await saveBeforeContextSwitch();
    if (!ok) return;
    clearPinnedTaskInCurrentView();
    updateFilterState(nextFilter);
    const filtered = getFilteredTasks(claimSearchKeyword);
    if (!filtered.some(task => task.id === activeClaimTaskId)) {
      activeClaimTaskId = filtered.length ? filtered[0].id : '';
    }
    renderBrowseList();
    renderBrowseDetail();
    renderSiteNotifications();
  }

  function maybeShowLotteryReminder() {
    const currentMemberId = getCurrentMemberId();
    if (!currentMemberId || personalLotteryInFlight) return;

    const pendingTasks = getPendingPersonalLotteryTasks().filter(task => {
      if (String(activeClaimTaskId || '') === String(task.id || '') && isActiveTaskRendered(task)) return false;
      return true;
    });

    renderSiteNotifications();

    const nextKey = pendingTasks.map(task => String(task.id)).sort().join('|');
    if (!nextKey) {
      lastLotteryReminderKey = '';
      return;
    }
    if (nextKey === lastLotteryReminderKey) return;

    lastLotteryReminderKey = nextKey;
    const names = pendingTasks.map(task => task.displayName).slice(0, 3).join('、');
    const suffix = pendingTasks.length > 3 ? ' 等任务' : '';
    showToast('抽签提醒', `有需要你本人抽签的未完成项目，请尽早处理。
${names}${suffix}`);
  }

  function hasFilledPartText(task) {
    return (task.parts || []).some(row => String(row.original_name || "").trim());
  }

  function getCandidatePool(task) {
    const liveTask = getTaskForLiveUi(task);
    const assignedIds = uniqueAssignedIds(liveTask?.parts || []);
    return (liveTask?.singers || []).filter(item => {
      const memberId = String(item.member_id || "").trim();
      return memberId && !assignedIds.includes(memberId);
    });
  }

  function canCurrentUserJoinTask(task) {
    const currentId = getCurrentMemberId();
    if (!currentId) return false;
    if (isCurrentUserSingerInTask(task)) return true;

    const singerQuota = Math.max(1, Number(task.participant_count) || 1);
    const assignedCount = getUniqueAssignedSingerCount(task);
    return assignedCount < singerQuota;
  }

  function isAllSingersSubmitted(task) {
    const singers = task.singers || [];
    return singers.length > 0 && singers.every(item => !!item.is_submitted);
  }

  function isPendingPublishTask(task) {
    if (!task) return false;
    if (Array.isArray(task.supplementTags) && task.supplementTags.includes("待发布")) return true;
    return getTodoStage(task)?.tag === "待发布";
  }

  function hasEffectiveProducer(task) {
    return !!String(task?.producer_member_id || "").trim() || !!task?.producer_completed;
  }

  function isGameTask(task) {
    return String(task?.project_type || task?.task_type || "").trim() === "游戏";
  }

  function isEachSingOwnGameTask(task) {
    if (!isGameTask(task)) return false;
    const rows = Array.isArray(task?.parts) ? task.parts : [];
    return rows.some(row => String(row?.original_name || "").trim() === "各唱各");
  }

  function doesTaskRequireTone(task) {
    if (!isGameTask(task)) return true;
    return isEachSingOwnGameTask(task);
  }

  function isTaskInfoComplete(task) {
    const rows = Array.isArray(task?.parts) ? task.parts : [];
    const singerQuota = Math.max(1, Number(task?.participant_count) || 1);
    const assignedSingerCount = getUniqueAssignedSingerCount(task);
    const hasProducer = hasEffectiveProducer(task);
    const toneRequired = doesTaskRequireTone(task);
    const hasTone = !!String(task?.project_tone || "").trim();

    const allRowsComplete = rows.length >= singerQuota && rows.every(row => {
      const partText = String(row?.original_name || "").trim();
      const assignedId = String(row?.assigned_member_id || "").trim();
      return !!partText && !!assignedId && partText !== "待分配" && partText !== "未分配";
    });

    return assignedSingerCount >= singerQuota && hasProducer && (!toneRequired || hasTone) && allRowsComplete;
  }

  function isTaskPublishedComplete(task) {
    if (!isTaskInfoComplete(task)) return false;
    if (!isAllSingersSubmitted(task)) return false;
    if (!task?.producer_completed) return false;
    if (!String(task?.release_date || "").trim()) return false;
    if (!String(task?.display_link || "").trim()) return false;
    return true;
  }

  function isReadyForHonorShow(task) {
    return isTaskPublishedComplete(task);
  }

  function getClaimPendingState(task) {
    const singerQuota = Math.max(1, Number(task.participant_count) || 1);
    const hasProducer = hasEffectiveProducer(task);
    const uniqueAssignedCount = getUniqueAssignedSingerCount(task);
    return uniqueAssignedCount < singerQuota || !hasProducer;
  }

  function getLyricsAssignmentState(task) {
    const rows = Array.isArray(task?.parts) ? task.parts : [];
    const singerQuota = Math.max(1, Number(task?.participant_count) || 1);
    const rowsShort = rows.length < singerQuota;
    const noRowsYet = rows.length === 0;
    const hasIncompleteRow = rows.some(row => {
      const partText = String(row?.original_name || "").trim();
      const assignedId = String(row?.assigned_member_id || "").trim();
      return !partText || !assignedId;
    });
    return {
      noRowsYet,
      rowsShort,
      hasIncompleteRow,
      complete: !(noRowsYet || rowsShort || hasIncompleteRow)
    };
  }

  function getTodoStage(task) {
    const singerQuota = Math.max(1, Number(task?.participant_count) || 1);
    const assignedSingerCount = getUniqueAssignedSingerCount(task);
    const hasProducer = hasEffectiveProducer(task);
    const toneRequired = doesTaskRequireTone(task);
    const hasTone = !!String(task?.project_tone || "").trim();
    const hasVideoLink = !!String(task?.display_link || "").trim();
    const hasReleaseDate = !!String(task?.release_date || "").trim();
    const lyricState = getLyricsAssignmentState(task);
    const allSubmitted = isAllSingersSubmitted(task);
    const producerCompleted = !!task?.producer_completed;

    if (isTaskPublishedComplete(task)) return null;

    if (assignedSingerCount < singerQuota) {
      return { tag: "待认领", statusText: "待认领" };
    }

    if (toneRequired && !hasTone) {
      return { tag: "待定调", statusText: "待定调" };
    }

    if (!lyricState.complete) {
      return { tag: "待分词", statusText: "待分词" };
    }

    if (!allSubmitted) {
      return null;
    }

    if (!hasProducer) {
      return { tag: "待认领", statusText: "缺后期负责人" };
    }

    if (!producerCompleted) {
      return null;
    }

    if (!hasReleaseDate || !hasVideoLink) {
      return { tag: "待发布", statusText: "待发布" };
    }

    return null;
  }

  function getSupplementTags(task) {
    const stage = getTodoStage(task);
    return stage ? [stage.tag] : [];
  }

  function getSkillText(row) {
    const keys = [
      "skill","skills","extra_skill","extra_skills","custom_skill","custom_skills",
      "other_skill","other_skills","specialty","specialties","ability","abilities"
    ];
    return keys.map(key => String(row?.[key] || "")).join(" | ");
  }

  function isMixerMember(row) {
    const skillText = getSkillText(row);
    return /混音|后期|mix|mixer|mixing/i.test(skillText);
  }

  function transformProjectsToTasks(projectRows, partsRows, singersRows) {
    const partMap = new Map();
    const singerMap = new Map();

    (partsRows || []).forEach(part => {
      const key = String(part.project_id);
      if (!partMap.has(key)) partMap.set(key, []);
      partMap.get(key).push({
        id: part.id,
        part_order: part.part_order,
        original_name: part.original_name,
        assigned_member_id: part.assigned_member_id ? String(part.assigned_member_id) : "",
        assigned_member_name: part.members?.nickname || part.members?.name || ""
      });
    });

    (singersRows || []).forEach(singer => {
      const key = String(singer.project_id);
      if (!singerMap.has(key)) singerMap.set(key, []);
      singerMap.get(key).push({
        id: singer.id,
        member_id: singer.member_id ? String(singer.member_id) : "",
        member_name: singer.members?.nickname || singer.members?.name || "",
        is_submitted: !!singer.is_submitted,
        submitted_at: singer.submitted_at || null
      });
    });

    return (projectRows || [])
      .map(project => {
        const id = String(project.id);
        const parts = (partMap.get(id) || []).sort((a, b) => (a.part_order || 0) - (b.part_order || 0));
        const singers = singerMap.get(id) || [];
        const producerName = project.producer_member?.nickname || project.producer_member?.name || "";

        const task = {
          ...project,
          id,
          project_code: project.project_code || "",
          project_name: project.project_name || "",
          displayName: makeDisplayTaskName(project.project_code, project.project_name),
          project_type: project.project_type || "",
          status: project.status || "",
          participant_count: project.participant_count ?? 1,
          singer_bonus: getSingerRewardByRule(project.participant_count, !!project.is_collective_task),
          producer_bonus: getProducerRewardByRule(project.project_type, project.participant_count, !!project.is_collective_task),
          producer_member_id: project.producer_member_id ? String(project.producer_member_id) : "",
          producer_name: producerName,
          producer_completed: !!project.producer_completed,
          producer_completed_at: project.producer_completed_at || null,
          release_date: project.release_date || null,
          display_link: project.display_link || "",
          project_tone: project.project_tone || "",
          is_collective_task: !!project.is_collective_task,
          created_by: project.created_by || null,
          created_at: project.created_at || null,
          parts,
          singers
        };

        task.supplementTags = getSupplementTags(task);
        task.readyForHonorShow = isReadyForHonorShow(task);
        const todoStage = getTodoStage(task);
        task.computedStatus = todoStage ? todoStage.statusText : "";
        return task;
      })
      .filter(task => task.supplementTags.length > 0)
      .sort((a, b) => {
        const aCode = parseInt(String(a.project_code).match(/\d+/)?.[0] || "0", 10);
        const bCode = parseInt(String(b.project_code).match(/\d+/)?.[0] || "0", 10);
        return aCode - bCode;
      });
  }

  function extractNumberFromValue(value) {
    const raw = String(value ?? "").trim();
    if (!raw) return Number.POSITIVE_INFINITY;
    const match = raw.match(/\d+/);
    return match ? parseInt(match[0], 10) : Number.POSITIVE_INFINITY;
  }

  function getMemberPrimaryKeyCode(member) {
    const keyCandidates = [
      member?.member_code,
      member?.memberCode,
      member?.key_code,
      member?.keyCode,
      member?.invite_key,
      member?.inviteKey,
      member?.invite_code,
      member?.inviteCode,
      member?.code
    ];

    for (const item of keyCandidates) {
      const raw = String(item ?? "").trim();
      if (raw) return raw;
    }

    return "";
  }

  function getMemberOrderNumber(member) {
    const primaryCode = getMemberPrimaryKeyCode(member);
    const primaryNum = extractNumberFromValue(primaryCode);
    if (Number.isFinite(primaryNum)) return primaryNum;

    const orderCandidates = [
      member?.sort_order_num,
      member?.display_order,
      member?.member_order,
      member?.order_no,
      member?.member_no,
      member?.member_number,
      member?.no,
      member?.memberOrderNo
    ];

    for (const item of orderCandidates) {
      const num = extractNumberFromValue(item);
      if (Number.isFinite(num)) return num;
    }

    return Number.POSITIVE_INFINITY;
  }

  function parseMemberKeyForSort(member) {
    const rawCode = getMemberPrimaryKeyCode(member).toUpperCase();
    const match = rawCode.match(/^([A-Z]+)?\s*(\d+)(.*)$/);
    if (match) {
      return {
        hasCode: true,
        prefix: String(match[1] || ""),
        number: parseInt(match[2], 10),
        suffix: String(match[3] || "")
      };
    }

    return {
      hasCode: false,
      prefix: "",
      number: getMemberOrderNumber(member),
      suffix: rawCode
    };
  }

  function sortMembersByKey(list) {
    return (list || []).slice().sort((a, b) => {
      const keyA = parseMemberKeyForSort(a);
      const keyB = parseMemberKeyForSort(b);

      if (keyA.hasCode !== keyB.hasCode) {
        return keyA.hasCode ? -1 : 1;
      }

      if (keyA.prefix !== keyB.prefix) {
        return keyA.prefix.localeCompare(keyB.prefix, 'en', { sensitivity: 'base' });
      }

      if (keyA.number !== keyB.number) {
        return keyA.number - keyB.number;
      }

      if (keyA.suffix !== keyB.suffix) {
        return keyA.suffix.localeCompare(keyB.suffix, 'en', { numeric: true, sensitivity: 'base' });
      }

      const nameA = String(a?.display || a?.name || a?.nickname || '').trim();
      const nameB = String(b?.display || b?.name || b?.nickname || '').trim();
      return nameA.localeCompare(nameB, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' });
    });
  }

  async function loadMembersList() {
    try {
      const [{ data, error }, memberTableResult] = await Promise.all([
        supabaseClient.rpc(MEMBER_DIRECTORY_RPC),
        supabaseClient.from("members").select("id, nickname, role, skills, member_code")
      ]);

      if (error) throw error;

      const memberTableMap = new Map(
        ((memberTableResult && memberTableResult.data) || []).map(row => [String(row.id || "").trim(), row])
      );

      membersCache = sortMembersByKey(
        (data || [])
          .map((item, index) => {
            const id = String(item.member_id || item.id || "").trim();
            const extra = memberTableMap.get(id) || {};
            const nickname = String(item.nickname || extra.nickname || "").trim();
            const displayName = String(item.display_name || item.nickname || extra.nickname || "未命名成员").trim();
            const role = String(item.role || extra.role || "").trim();
            const skills = String(item.skills || extra.skills || "").trim();
            const memberCode = getMemberPrimaryKeyCode({ ...extra, ...item });

            return {
              ...extra,
              ...item,
              id,
              nickname,
              name: displayName,
              display: displayName,
              role,
              skills,
              member_code: memberCode,
              memberCode,
              key_code: String(item.key_code || item.keyCode || extra.key_code || "").trim(),
              invite_key: String(item.invite_key || item.inviteKey || extra.invite_key || "").trim(),
              invite_code: String(item.invite_code || item.inviteCode || extra.invite_code || "").trim(),
              memberOrderNo: (() => {
                const orderNo = getMemberOrderNumber({ ...extra, ...item, member_code: memberCode, memberCode });
                return Number.isFinite(orderNo) ? orderNo : index;
              })()
            };
          })
          .filter(item => item.id && item.display)
      );

      mixerMembersCache = sortMembersByKey(membersCache.filter(isMixerMember));

      document.getElementById("memberOptionsAll").innerHTML = membersCache
        .map(member => `<option value="${escapeHtml(member.display)}"></option>`)
        .join("");

      console.log("membersCache count:", membersCache.length, membersCache);
      console.log("mixerMembersCache count:", mixerMembersCache.length, mixerMembersCache);
    } catch (err) {
      console.error("读取成员目录失败：", err);
      membersCache = [];
      mixerMembersCache = [];
      document.getElementById("memberOptionsAll").innerHTML = "";
      showToast("读取失败", "成员目录读取失败，请先执行本页配套 SQL。\n演唱者和混音备选池需要依赖安全目录函数。");
    }
  }

  async function loadProjectsFromSupabase({keepSelection = true} = {}) {
    const claimList = document.getElementById("browseList");
    claimList.innerHTML = '<div class="loadingText">正在读取任务...</div>';

    try {
      const { data: projectsData, error: projectsError } = await supabaseClient
        .from("projects")
        .select("id, project_code, project_name, project_type, status, participant_count, singer_bonus, producer_bonus, producer_member_id, producer_completed, producer_completed_at, release_date, display_link, project_tone, is_collective_task, created_by, created_at, lyrics_lottery_enabled, lyrics_lottery_opened_at, lyrics_lottery_opened_by");

      if (projectsError) throw projectsError;

      const projectIds = (projectsData || []).map(item => item.id);

      let partsData = [];
      let singersData = [];
      let memberIds = new Set();

      (projectsData || []).forEach(project => {
        if (project?.producer_member_id) memberIds.add(String(project.producer_member_id));
      });

      if (projectIds.length) {
        const { data: partRows, error: partsError } = await supabaseClient
          .from("project_parts")
          .select("id, project_id, part_order, original_name, assigned_member_id")
          .in("project_id", projectIds)
          .order("part_order", { ascending: true });

        if (partsError) throw partsError;
        partsData = partRows || [];
        partsData.forEach(row => {
          if (row?.assigned_member_id) memberIds.add(String(row.assigned_member_id));
        });

        const { data: singerRows, error: singersError } = await supabaseClient
          .from("project_singers")
          .select("id, project_id, member_id, is_submitted, submitted_at")
          .in("project_id", projectIds);

        if (singersError) throw singersError;
        singersData = singerRows || [];
        singersData.forEach(row => {
          if (row?.member_id) memberIds.add(String(row.member_id));
        });
      }

      const memberIdList = [...memberIds];
      let memberMap = new Map();
      if (memberIdList.length) {
        const memberRows = membersCache.filter(row => memberIdList.includes(String(row.id || "")));
        memberMap = new Map((memberRows || []).map(row => [String(row.id), row]));
      }

      const normalizedProjects = (projectsData || []).map(project => ({
        ...project,
        producer_member: project?.producer_member_id ? memberMap.get(String(project.producer_member_id)) || null : null
      }));

      const normalizedParts = (partsData || []).map(row => ({
        ...row,
        members: row?.assigned_member_id ? memberMap.get(String(row.assigned_member_id)) || null : null
      }));

      const normalizedSingers = (singersData || []).map(row => ({
        ...row,
        members: row?.member_id ? memberMap.get(String(row.member_id)) || null : null
      }));

      tasks = transformProjectsToTasks(normalizedProjects, normalizedParts, normalizedSingers);

      const filtered = getFilteredTasks(claimSearchKeyword);
      if (!keepSelection || !filtered.some(task => task.id === activeClaimTaskId)) {
        activeClaimTaskId = filtered.length ? filtered[0].id : "";
      }

      syncFilterButtons();
      renderBrowseList();
      renderBrowseDetail();
      applyIncomingStudioJumpIntent();
      maybeShowLotteryReminder();
    } catch (err) {
      console.error("读取 projects 失败：", err);
      claimList.innerHTML = '<div class="taskEmpty">任务读取失败，请检查表结构、字段名或 RLS 权限</div>';
      setBrowseDetailEmpty("任务读取失败");
      setAutoSaveStatus("error", "读取失败");
      const detail = String(err?.message || err?.details || err?.hint || "").trim();
      showToast("读取失败", detail ? `任务读取失败：${detail}` : "任务读取失败，请检查 projects / project_parts / project_singers / members 四张表的读取权限。");
    }
  }

  function syncOverlayToImage() {
    const roomRect = room.getBoundingClientRect();
    const roomW = roomRect.width;
    const roomH = roomRect.height;

    const naturalW = bg.naturalWidth || 1600;
    const naturalH = bg.naturalHeight || 900;
    const imgRatio = naturalW / naturalH;
    const roomRatio = roomW / roomH;

    let drawW, drawH, drawLeft, drawTop;

    if (roomRatio > imgRatio) {
      drawH = roomH;
      drawW = drawH * imgRatio;
      drawLeft = (roomW - drawW) / 2;
      drawTop = 0;
    } else {
      drawW = roomW;
      drawH = drawW / imgRatio;
      drawLeft = 0;
      drawTop = (roomH - drawH) / 2;
    }

    overlay.style.left = drawLeft + "px";
    overlay.style.top = drawTop + "px";
    overlay.style.width = drawW + "px";
    overlay.style.height = drawH + "px";

    /* 2440px 为网页版母版。541px 以上只允许按底图比例缩放；540px 以下交给手机版布局。 */
    const DESIGN_W = 2440;
    const rawScale = drawW / DESIGN_W;
    const minWebScale = drawW >= 541 ? 0.42 : rawScale;
    const bgScale = Math.min(Math.max(rawScale, minWebScale), 1.24);

    overlay.style.setProperty("--bg-ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--ui-scale", bgScale.toFixed(5));
    overlay.style.setProperty("--overlay-ui-scale", bgScale.toFixed(5));

    requestAnimationFrame(syncTopUiLayout);
  }

  function clampValue(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function fitTopBarIdentityContent() {
    if (!topBarUserArea || !currentUserBadge) return;

    const textEl = currentUserBadge.querySelector(".identityText");
    if (!textEl) return;

    currentUserBadge.classList.remove("identityStacked");
    textEl.style.fontSize = "";
    textEl.style.lineHeight = "1";
    textEl.style.whiteSpace = "nowrap";

    /*
      字号不再用 badge 高度二次压缩。
      2440px 母版字号由 syncTopUiLayout() 写入 --identity-font，
      其他分辨率只跟随底图等比例缩放。
    */
  }

  function ensureRoomNavNotes() {

        const a = document.createElement("span");

  function syncTopUiLayout() {
    if (!overlay || !topBar || !navOuter || !navScroll || !roomNav || !panelSwitch || !topBarUserAnchor || !topBarUserArea) return;

    ensureRoomNavNotes();

    const overlayRect = overlay.getBoundingClientRect();
    const scale = parseFloat(getComputedStyle(overlay).getPropertyValue("--bg-ui-scale")) || 1;
    const taskPanel = document.getElementById("taskPanel");

    /* 2440px 母版坐标：所有网页版组件都绑定在底图坐标上。 */
    const sideLeft = overlayRect.width * 0.8260;
    const sideRight = overlayRect.width * 0.9602;
    const sideWidth = Math.max(24 * scale, sideRight - sideLeft);

    let identityH = 60 * scale;
    let identityInnerScale = scale;

    let identityGap = 5.2 * identityInnerScale;
    let identityPadX = 5.8 * identityInnerScale;
    let identityPadY = 6.2 * identityInnerScale;
    let identityRadius = 18 * scale;
    let identityChipRadius = 12.5 * identityInnerScale;
    let identityBadgePx = 7.2 * identityInnerScale;
    let identityTextGap = 4.2 * identityInnerScale;
    let identityIconW = 34 * identityInnerScale;
    let identityLogoutW = 38 * identityInnerScale;
    let identityFont = 23 * identityInnerScale;
    let identityIconFont = 22 * identityInnerScale;
    let identityLogoutFont = 18 * identityInnerScale;

    if (overlayRect.width < 854) {
      /*
        854px 以下：外层宽度和位置不变；身份信息允许上下两行显示，
        因此不再硬压铃铛/登出按钮。右侧按钮保留可读宽度，名字和身份换行承接空间不足。
      */
      const smallRatio = clampValue(overlayRect.width / 854, 0.62, 1);
      const sideUnit = sideWidth / 100;

      /*
        两行身份信息需要比单行状态更高的外框。
        只在 854px 以下加高身份组件，不改变外层宽度和左右位置。
      */
      identityH = clampValue(sideWidth * 0.34, 30, 38);

      identityGap = clampValue(3.0 * smallRatio, 1.4, 3.0);
      identityPadX = clampValue(3.2 * smallRatio, 1.6, 3.2);
      identityPadY = clampValue(3.2 * smallRatio, 1.6, 3.2);
      identityRadius = Math.max(10 * smallRatio, 8);
      identityChipRadius = Math.max(8.5 * smallRatio, 6.5);
      identityBadgePx = clampValue(4.4 * smallRatio, 2.2, 4.4);
      identityTextGap = 0;

      identityIconW = clampValue(sideUnit * 20.5, 16, 24);
      identityLogoutW = clampValue(sideUnit * 25.5, 19, 30);
      identityFont = clampValue(sideUnit * 7.1, 5.8, 8.8);
      identityIconFont = clampValue(sideUnit * 8.8, 7.8, 11.2);
      identityLogoutFont = clampValue(sideUnit * 6.6, 5.8, 8.8);
    }
    /* 房间切换：位置和尺寸只按底图缩放，不再按断点重写。 */
    const taskLeftPct = overlayRect.width >= 1600 ? 9.1 : 9.2;
    const taskRightPct = 22.4;

  function applyDefaultBackgroundBlend() {
    const root = document.documentElement;
    root.style.setProperty('--bg-top', '#e7dfd4');
    root.style.setProperty('--bg-mid', '#e2d8cb');
    root.style.setProperty('--bg-bottom', '#ddd4c8');
    root.style.setProperty('--bg-side-left', '#e5ddd1');
    root.style.setProperty('--bg-side-right', '#e1d7ca');
  }

  function markBackgroundReady() {
    room?.classList.remove('bg-failed');
  }

  function markBackgroundFailed() {
    room?.classList.add('bg-failed');
  }

  function tryLoadNextBackground() {
    if (!bg) return;
    bgPathIndex += 1;
    if (bgPathIndex >= BG_CANDIDATE_PATHS.length) {
      markBackgroundFailed();
      applyDefaultBackgroundBlend();
      syncOverlayToImage();
      return;
    }
    bg.src = BG_CANDIDATE_PATHS[bgPathIndex];
  }

  function syncBackgroundBlendFromImage() {
    if (!bg?.naturalWidth || !bg?.naturalHeight) {
      applyDefaultBackgroundBlend();
      return;
    }

    if (IS_FILE_PROTOCOL) {
      applyDefaultBackgroundBlend();
      return;
    }

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently:true });
      if (!ctx) {
        applyDefaultBackgroundBlend();
        return;
      }
      const sampleW = 48;
      const sampleH = 48;
      canvas.width = sampleW;
      canvas.height = sampleH;
      ctx.drawImage(bg, 0, 0, sampleW, sampleH);

      let data;
      try {
        data = ctx.getImageData(0, 0, sampleW, sampleH).data;
      } catch (err) {
        applyDefaultBackgroundBlend();
        return;
      }

      function avgColor(points) {
        let r = 0, g = 0, b = 0, count = 0;
        for (const [x, y] of points) {
          const i = (y * sampleW + x) * 4;
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count += 1;
        }
        if (!count) return 'rgb(226,216,203)';
        return `rgb(${Math.round(r / count)}, ${Math.round(g / count)}, ${Math.round(b / count)})`;
      }

      const topPoints = [];
      const bottomPoints = [];
      const leftPoints = [];
      const rightPoints = [];
      for (let x = 4; x < sampleW - 4; x += 2) {
        topPoints.push([x, 4], [x, 6]);
        bottomPoints.push([x, sampleH - 5], [x, sampleH - 7]);
      }
      for (let y = 6; y < sampleH - 6; y += 2) {
        leftPoints.push([4, y], [6, y]);
        rightPoints.push([sampleW - 5, y], [sampleW - 7, y]);
      }

      const root = document.documentElement;
      root.style.setProperty('--bg-top', avgColor(topPoints));
      root.style.setProperty('--bg-bottom', avgColor(bottomPoints));
      root.style.setProperty('--bg-side-left', avgColor(leftPoints));
      root.style.setProperty('--bg-side-right', avgColor(rightPoints));
      root.style.setProperty('--bg-mid', avgColor([...topPoints.slice(0, 10), ...bottomPoints.slice(0, 10), [24, 24], [22, 24], [26, 24]]));
    } catch (err) {
      applyDefaultBackgroundBlend();
    }
  }

  function normalizeSearchQuery(text) {
    return String(text || "")
      .toLowerCase()
      .replace(/[｜|,，/]/g, " ")
      .trim()
      .split(/\s+/)
      .filter(Boolean);
  }

  function getCurrentMainFilter() {
    return String(activeMainFilter || "").trim();
  }

  function shouldShowNoMeFilter() {
    return getCurrentMainFilter() === "待认领";
  }

  function shouldShowHasMeFilter() {
    return ["待分词", "待定调", "待发布"].includes(getCurrentMainFilter());
  }

  function syncFilterButtons() {
    document.querySelectorAll(".primaryFilterBtn").forEach(btn => {
      btn.classList.toggle("active", String(btn.dataset.filter || "").trim() === getCurrentMainFilter());
    });

    const noMeBtn = document.getElementById("filterNoMeBtn");
    const hasMeBtn = document.getElementById("filterHasMeBtn");

    if (noMeBtn) {
      const visible = shouldShowNoMeFilter();
      noMeBtn.hidden = !visible;
      noMeBtn.style.display = visible ? "inline-flex" : "none";
      noMeBtn.classList.toggle("active", visible && activeSecondaryFilter === "没有我");
    }

    if (hasMeBtn) {
      const visible = shouldShowHasMeFilter();
      hasMeBtn.hidden = !visible;
      hasMeBtn.style.display = visible ? "inline-flex" : "none";
      hasMeBtn.classList.toggle("active", visible && activeSecondaryFilter === "有我在");
    }
  }

  function updateFilterState(nextFilter) {
    const normalized = String(nextFilter || "").trim();
    if (!normalized) return;

    if (normalized === "没有我") {
      if (!shouldShowNoMeFilter()) return;
      activeSecondaryFilter = activeSecondaryFilter === "没有我" ? "" : "没有我";
    } else if (normalized === "有我在") {
      if (!shouldShowHasMeFilter()) return;
      activeSecondaryFilter = activeSecondaryFilter === "有我在" ? "" : "有我在";
    } else {
      if (activeMainFilter === normalized) {
        activeMainFilter = "";
        activeSecondaryFilter = "";
      } else {
        activeMainFilter = normalized;
        activeSecondaryFilter = "";
      }
    }

    syncFilterButtons();
  }

  function pinActiveTaskInCurrentView(taskId, reason = "") {
    const normalizedId = String(taskId || "").trim();
    stickyTaskIdInCurrentView = normalizedId;
    stickyTaskReason = normalizedId ? String(reason || "").trim() : "";
  }

  function clearPinnedTaskInCurrentView(taskId = "") {
    const normalizedId = String(taskId || "").trim();
    if (!normalizedId || normalizedId === String(stickyTaskIdInCurrentView || "").trim()) {
      stickyTaskIdInCurrentView = "";
      stickyTaskReason = "";
    }
  }

  function getFilteredTasks(keyword) {
    const tokens = normalizeSearchQuery(keyword);
    const currentFilter = getCurrentMainFilter();

    return tasks.filter(task => {
      const isPinnedTask = String(task.id || "") === String(stickyTaskIdInCurrentView || "");
      const isActiveTask = preserveActiveTaskInCurrentView && String(task.id || "") === String(activeClaimTaskId || "");
      const matchesMainFilter = !currentFilter || (task.supplementTags || []).includes(currentFilter);
      const matchesSecondaryFilter = activeSecondaryFilter === "没有我"
        ? !isCurrentUserInTask(task)
        : activeSecondaryFilter === "有我在"
          ? isCurrentUserInTask(task)
          : true;
      const haystack = [
        task.displayName,
        task.project_name,
        task.project_code
      ].join(" ").toLowerCase();

      const hitSearch = tokens.every(token => haystack.includes(token));
      if (!hitSearch) {
        return false;
      }

      if (matchesMainFilter && matchesSecondaryFilter) {
        return true;
      }

      const canKeepTemporarily = !currentFilter && (isActiveTask || isPinnedTask);
      return canKeepTemporarily;
    });
  }

  function getToneDisplayValue(raw) {
    const text = String(raw || "").trim();
    if (!text) return "";
    if (text === "原调") return "原调";
    if (/^[+-]\d+$/.test(text)) return text;
    if (text === "+" || text === "-") return text;
    return text;
  }

  function splitGold(totalGold) {
    const total = Math.max(0, Math.floor(Number(totalGold) || 0));
    const submit = Math.floor(total * TASK_PAYOUT.onSubmitRatio);
    const publish = total - submit;
    return { total, submit, publish };
  }

  function normalizeSingerCount(value) {
    const num = Math.floor(Number(value) || 1);
    return Math.min(99, Math.max(1, num));
  }

  function getSingerRewardByCount(singerCount) {
    const count = normalizeSingerCount(singerCount);
    if (SINGING_REWARD_TABLE[count] != null) {
      return SINGING_REWARD_TABLE[count];
    }
    return Math.max(12, Math.floor(17 - 0.5 * (count - 17)));
  }

  function getSingerRewardByRule(rawQuota, isSpecialTask = false) {
    const base = getSingerRewardByCount(rawQuota);
    return base + (isSpecialTask ? 10 : 0);
  }

  function getProducerRewardByRule(taskType, rawQuota, isSpecialTask = false) {
    const count = normalizeSingerCount(rawQuota);
    if (String(taskType || "").trim() === "游戏") return 0;
    const base = Math.min(48 + Math.min(count - 1, 12), 60);
    return base + (isSpecialTask ? 10 : 0);
  }

  function getBonusValue(task, keys) {
    if (keys.includes("singer_bonus") || keys.includes("vocal_bonus") || keys.includes("singer_reward") || keys.includes("vocal_reward")) {
      return String(getSingerRewardByRule(task.participant_count, !!task.is_collective_task));
    }
    if (keys.includes("producer_bonus") || keys.includes("mix_bonus") || keys.includes("mixing_bonus") || keys.includes("producer_reward")) {
      return String(getProducerRewardByRule(task.project_type, task.participant_count, !!task.is_collective_task));
    }
    for (const key of keys) {
      if (task[key] !== undefined && task[key] !== null && String(task[key]).trim() !== "") {
        return String(task[key]);
      }
    }
    return "--";
  }

  function buildBonusBreakdownText(totalValue, breakdownValue) {
    const total = Number(totalValue);
    if (!Number.isFinite(total) || total < 0) return "";
    if (total === 0) return "游戏混音不发金币，仅记称号进度";
    const breakdown = String(breakdownValue || "").trim();
    if (breakdown && breakdown !== "--") return breakdown;
    const split = splitGold(total);
    return `交音 ${split.submit} / 发布 ${split.publish}`;
  }

          <button type="button" class="rowDeleteBtn deletePartRowBtn${buttonClass}" title="${escapeHtml(buttonTitle)}" ${isDisabled ? "disabled" : ""}>${escapeHtml(buttonText)}</button>
        </div>
      `;
    }).join("");

    return `
      <div class="rowList" id="partRows">${rows}</div>
    `;
  }

        <div class="editBlock">

              <div class="bonusHint" id="detailSingerBonusHint">${escapeHtml(singerBreakdown)}</div>
            </div>
            <div class="bonusCard">
              <div class="bonusLabel">混音</div>
              <div class="bonusValue" id="detailMixerBonusValue">${formatBonusValueHtml(mixerBonus)}</div>

  function renderBrowseDetail() {
    const listData = getFilteredTasks(claimSearchKeyword);

    if (!task) {
      setBrowseDetailEmpty("暂无任务");
      return;
    }

    selectedCandidateName = "";

    document.getElementById("browseDetailTitle").innerHTML = `
      <span class="detailTitleText">${escapeHtml(task.displayName)}</span>
      <span class="detailTitleMetaRow">
        <button id="editIsCollectiveBtn" class="miniBtn taskModeToggleBtn ${task.is_collective_task ? "special" : ""}" type="button" title="${task.is_collective_task ? "特殊任务，每人额外+10金币" : "普通任务"}" ${titleTaskModeDisabledAttr}>${task.is_collective_task ? "特" : "普"}</button>

    bindDetailEditorEvents();
