  function getToneDisplayValue(raw) {
    const text = String(raw || "").trim();
    if (!text) return "";
    if (text === "原调") return "原调";
    if (/^[+-]\d+$/.test(text)) return text;
    if (text === "+" || text === "-") return text;
    return text;
  }

  function splitGold(totalGold) {
    const total = Math.max(0, Math.floor(Number(totalGold) || 0));
    const submit = Math.floor(total * TASK_PAYOUT.onSubmitRatio);
    const publish = total - submit;
    return { total, submit, publish };
  }

  function normalizeSingerCount(value) {
    const num = Math.floor(Number(value) || 1);
    return Math.min(99, Math.max(1, num));
  }

  function getSingerRewardByCount(singerCount) {
    const count = normalizeSingerCount(singerCount);
    if (SINGING_REWARD_TABLE[count] != null) {
      return SINGING_REWARD_TABLE[count];
    }
    return Math.max(12, Math.floor(17 - 0.5 * (count - 17)));
  }

  function getSingerRewardByRule(rawQuota, isSpecialTask = false) {
    const base = getSingerRewardByCount(rawQuota);
    return base + (isSpecialTask ? 10 : 0);
  }

  function getProducerRewardByRule(taskType, rawQuota, isSpecialTask = false) {
    const count = normalizeSingerCount(rawQuota);
    if (String(taskType || "").trim() === "游戏") return 0;
    const base = Math.min(48 + Math.min(count - 1, 12), 60);
    return base + (isSpecialTask ? 10 : 0);
  }

  function getBonusValue(task, keys) {
    if (keys.includes("singer_bonus") || keys.includes("vocal_bonus") || keys.includes("singer_reward") || keys.includes("vocal_reward")) {
      return String(getSingerRewardByRule(task.singer_quota, !!task.is_collective_task));
    }
    if (keys.includes("producer_bonus") || keys.includes("mix_bonus") || keys.includes("mixing_bonus") || keys.includes("producer_reward")) {
      return String(getProducerRewardByRule(task.task_type, task.singer_quota, !!task.is_collective_task));
    }
    for (const key of keys) {
      if (task[key] !== undefined && task[key] !== null && String(task[key]).trim() !== "") {
        return String(task[key]);
      }
    }
    return "--";
  }

  function buildBonusBreakdownText(totalValue, breakdownValue) {
    const total = Number(totalValue);
    if (!Number.isFinite(total) || total < 0) return "";
    if (total === 0) return "游戏混音不发金币，仅记称号进度";
    const breakdown = String(breakdownValue || "").trim();
    if (breakdown && breakdown !== "--") return breakdown;
    const split = splitGold(total);
    return `交音 ${split.submit} / 发布 ${split.publish}`;
  }

  function updateRewardPreviewFromDom() {
    const singerValueEl = document.getElementById("detailSingerBonusValue");
    const singerHintEl = document.getElementById("detailSingerBonusHint");
    const producerValueEl = document.getElementById("detailMixerBonusValue");
    const producerHintEl = document.getElementById("detailMixerBonusHint");
    if (!singerValueEl || !singerHintEl || !producerValueEl || !producerHintEl) return;

    const singerQuota = getValidSingerQuotaValue();
    const taskType = String(document.getElementById("editTaskType")?.value || "").trim();
    const isSpecialTask = document.getElementById("editIsCollectiveBtn")?.classList.contains("special");
    const singerTotal = getSingerRewardByRule(singerQuota, isSpecialTask);
    const producerTotal = getProducerRewardByRule(taskType, singerQuota, isSpecialTask);

    singerValueEl.textContent = `${singerTotal} 金币`;
    singerHintEl.textContent = buildBonusBreakdownText(singerTotal, "");
    producerValueEl.textContent = `${producerTotal} 金币`;
    producerHintEl.textContent = buildBonusBreakdownText(producerTotal, "");
  }

    const normalized = String(currentType || "").trim();

    const existingRows = (task.parts || []).slice().sort((a, b) => (a.part_order || 0) - (b.part_order || 0));

    const normalizedRows = existingRows.slice(0, singerQuota);

    const rows = normalizedRows.map((item, index) => {

      const rowOpenTarget = originalName && !assignedName ? "openTarget candidateTargetRow" : "";

    return [...document.querySelectorAll(".partRow")].flatMap(row => {
      if (excludeRow && row === excludeRow) return [];
      const name = String(row.querySelector(".partMemberInput")?.value || "").trim();
      return name ? [name] : [];
    });
  }

  function getAvailableSingerNamesForRow(row) {
    const selectedSingerNames = [...new Set(getSelectedSingerNamesFromDom().filter(Boolean))];
    const currentName = String(row?.querySelector('.partMemberInput')?.value || '').trim();
    const assignedElsewhere = new Set(getAssignedMemberNamesFromRows(row));
    const available = selectedSingerNames.filter(name => !assignedElsewhere.has(name));
    if (currentName && !available.includes(currentName)) available.unshift(currentName);
    return [...new Set(available.filter(Boolean))];
  }

  function getMemberSuggestBox(row) {
    return row?.querySelector('.memberSuggestBox') || null;
  }

  function hidePartMemberSuggestions(row) {
    const box = getMemberSuggestBox(row);
    if (!box) return;
    box.classList.remove('show');
    box.innerHTML = '';
    row?.classList?.remove('suggestOpen');
  }

  function hideAllPartMemberSuggestions(exceptRow = null) {
    document.querySelectorAll('.partRow').forEach(row => {
      if (exceptRow && row === exceptRow) return;
      hidePartMemberSuggestions(row);
    });
  }

  function applyPartMemberSelection(row, memberName) {
    const input = row?.querySelector('.partMemberInput');
    if (!row || !input) return;
    const nextName = String(memberName || '').trim();
    const prevName = String(input.dataset.prevMemberName || input.value || '').trim();

    if (prevName && prevName !== nextName) {
      clearSingerIfUnused(prevName, row);
    }

    input.value = nextName;
    input.dataset.prevMemberName = nextName;
    if (nextName) {
      toggleSingerButtonByName(nextName, true);
    }
    syncSingerPickerFromRows();
    updateSingerPickerDisabledState();
    updatePartMemberOptionsForRow(row, true);
    updatePartMemberOptionsFromSelectedSingers();
    refreshCandidateRowState();
    scheduleAutoSave();
  }

  function updatePartMemberOptionsForRow(row, forceShow = false) {
    const targetRow = row || document.activeElement?.closest?.('.partRow') || document.querySelector('.partRow');
    if (!targetRow) return;
    const input = targetRow.querySelector('.partMemberInput');
    const box = getMemberSuggestBox(targetRow);
    if (!input || !box) return;

    const keyword = String(input.value || '').trim().toLowerCase();
    const names = getAvailableSingerNamesForRow(targetRow).filter(name => {
      if (!keyword) return true;
      return String(name || '').trim().toLowerCase().includes(keyword);
    });

    hideAllPartMemberSuggestions(targetRow);

    if (!names.length) {
      box.innerHTML = forceShow ? '<div class="memberSuggestEmpty">暂无可选成员</div>' : '';
      box.classList.toggle('show', !!forceShow);
      targetRow.classList.toggle('suggestOpen', !!forceShow);
      return;
    }

    box.innerHTML = names.map(name => `
      <button type="button" class="memberSuggestItem" data-member-name="${escapeHtml(name)}">${escapeHtml(name)}</button>
    `).join('');

    box.querySelectorAll('.memberSuggestItem').forEach(btn => {
      btn.addEventListener('mousedown', (event) => {
        event.preventDefault();
        applyPartMemberSelection(targetRow, String(btn.dataset.memberName || '').trim());
        hidePartMemberSuggestions(targetRow);
        input.focus();
      });
    });

    targetRow.classList.add('suggestOpen');
    box.classList.add('show');
  }

  function bindPartMemberOptionEvents() {
    document.querySelectorAll('.partMemberInput').forEach(input => {
      if (input.dataset.optionBound === '1') return;
      input.dataset.optionBound = '1';
      const row = input.closest('.partRow');
      const showHandler = () => window.setTimeout(() => updatePartMemberOptionsForRow(row, true), 0);
      const blurHandler = () => window.setTimeout(() => {
        if (!row?.contains(document.activeElement)) hidePartMemberSuggestions(row);
      }, 140);

      input.addEventListener('focus', showHandler);
      input.addEventListener('click', showHandler);
      input.addEventListener('mousedown', showHandler);
      input.addEventListener('input', showHandler);
      input.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          showHandler();
          const first = getMemberSuggestBox(row)?.querySelector('.memberSuggestItem');
          first?.focus();
          return;
        }
        if (event.key === 'Escape') {
          hidePartMemberSuggestions(row);
        }
      });
      input.addEventListener('blur', blurHandler);
    });
  }

  function updatePartMemberOptionsFromSelectedSingers() {
    const activeInput = document.activeElement?.classList?.contains('partMemberInput')
      ? document.activeElement
      : null;
    const row = activeInput?.closest('.partRow') || null;
    if (row) {
      updatePartMemberOptionsForRow(row, true);
    } else {
      hideAllPartMemberSuggestions();
    }
  }

  function autoFillLastRemainingSinger() {
    const selectedSingerNames = [...new Set(getSelectedSingerNamesFromDom().filter(Boolean))];
    if (!selectedSingerNames.length) return false;

    const rows = [...document.querySelectorAll(".partRow")];
    const assignedNames = rows
      .map(row => String(row.querySelector(".partMemberInput")?.value || "").trim())
      .filter(Boolean);

    const pendingRows = rows.filter(row => {
      const roleName = String(row.querySelector(".partNameInput")?.value || "").trim();
      const memberName = String(row.querySelector(".partMemberInput")?.value || "").trim();
      return !!roleName && !memberName;
    });

    const remainingNames = selectedSingerNames.filter(name => !assignedNames.includes(name));
    if (remainingNames.length !== 1 || pendingRows.length !== 1) return false;

    const targetRow = pendingRows[0];
    const memberInput = targetRow.querySelector(".partMemberInput");
    if (!memberInput) return false;

    const finalName = remainingNames[0];
    memberInput.value = finalName;
    memberInput.dataset.prevMemberName = finalName;
    toggleSingerButtonByName(finalName, true);
    return true;
  }

  function getAutoFillLastSingerState() {
    const selectedSingerNames = [...new Set(getSelectedSingerNamesFromDom().filter(Boolean))];
    const rows = [...document.querySelectorAll('.partRow')];
    const assignedNames = rows
      .map(row => String(row.querySelector('.partMemberInput')?.value || '').trim())
      .filter(Boolean);
    const pendingRows = rows.filter(row => {
      const roleName = String(row.querySelector('.partNameInput')?.value || '').trim();
      const memberName = String(row.querySelector('.partMemberInput')?.value || '').trim();
      return !!roleName && !memberName;
    });
    const remainingNames = selectedSingerNames.filter(name => !assignedNames.includes(name));
    return {
      shouldAutoFill: remainingNames.length === 1 && pendingRows.length === 1,
      remainingNames,
      pendingRows
    };
  }

  function applyDeferredLastRemainingSingerFill() {
    const state = getAutoFillLastSingerState();
    if (!state.shouldAutoFill) return false;
    const targetRow = state.pendingRows[0] || null;
    const finalName = state.remainingNames[0] || '';
    const memberInput = targetRow?.querySelector('.partMemberInput') || null;
    if (!memberInput || !finalName) return false;

    memberInput.value = finalName;
    memberInput.dataset.prevMemberName = finalName;
    toggleSingerButtonByName(finalName, true);
    hidePartMemberSuggestions(targetRow);
    return true;
  }

  function getOrderedSelectedSingerIds(task, singerQuota) {
    const rowIds = (task.parts || [])
      .map(row => String(row.assigned_member_id || "").trim())
      .filter(Boolean);

    const singerIds = (task.singers || [])
      .map(item => String(item.member_id || "").trim())
      .filter(Boolean);

    const result = [];
    [...rowIds, ...singerIds].forEach(id => {
      if (id && !result.includes(id) && result.length < singerQuota) {
        result.push(id);
      }
    });
    return result;
  }

  function updateSingerPickerDisabledState() {
    const quota = getValidSingerQuotaValue();
    const selectedCount = getSelectedSingerIdsFromDom().length;
    getSingerPickerButtons().forEach(btn => {
      if (btn.classList.contains("active")) {
        btn.disabled = false;
      } else {
        btn.disabled = selectedCount >= quota;
      }
    });
  }

  function syncSingerPickerFromRowMembers() {
    const memberNames = [...document.querySelectorAll(".partRow .partMemberInput")]
      .map(input => String(input.value || "").trim())
      .filter(Boolean);

    getSingerPickerButtons().forEach(btn => {
      const memberName = String(btn.dataset.memberName || "").trim();
      if (memberNames.includes(memberName)) {
        btn.classList.add("active");
      }
    });

    trimSelectedSingersToQuota();
    updateSingerPickerDisabledState();
  }

  function getUnusedSelectedSingerNames() {
    const selectedNames = getSelectedSingerNamesFromDom();
    const rowNames = [...document.querySelectorAll(".partRow .partMemberInput")]
      .map(input => String(input.value || "").trim())
      .filter(Boolean);

    return selectedNames.filter(name => !rowNames.includes(name));
  }

  function findFirstReusableBlankRow() {
    return [...document.querySelectorAll(".partRow")].find(row => {
      const partText = String(row.querySelector(".partNameInput")?.value || "").trim();
      const memberText = String(row.querySelector(".partMemberInput")?.value || "").trim();
      return !memberText && !partText;
    }) || null;
  }

  function appendPartRow(partName = "", memberName = "") {
    const partWrap = document.getElementById("partRows");
    if (!partWrap) return null;
    const nextIndex = partWrap.querySelectorAll(".partRow").length;
    const temp = document.createElement("div");
    temp.innerHTML = createPartRowHtml(partName, memberName, nextIndex);
    const row = temp.firstElementChild;
    partWrap.appendChild(row);
    bindAutoSaveEventsToDetail();
    bindPartRowDeleteEvents();
    bindPartMemberOptionEvents();
    refreshCandidateRowState();
    return row;
  }

  function trimRowsToQuota() {
    const partWrap = document.getElementById("partRows");
    const quota = getValidSingerQuotaValue();
    if (!partWrap) return;
    let rows = [...partWrap.querySelectorAll(".partRow")];
    while (rows.length > quota) {
      rows[rows.length - 1].remove();
      rows = [...partWrap.querySelectorAll(".partRow")];
    }
    reindexPartRows();
    syncSingerPickerFromRows();
  }

  function trimSelectedSingersToQuota() {
    const quota = getValidSingerQuotaValue();
    const selectedButtons = getSelectedSingerButtons();
    if (selectedButtons.length <= quota) return;

    const removableNames = getUnusedSelectedSingerNames();
    const removableSet = new Set(removableNames);
    for (const btn of selectedButtons) {
      if (getSelectedSingerButtons().length <= quota) break;
      const name = String(btn.dataset.memberName || "").trim();
      if (removableSet.has(name)) {
        btn.classList.remove("active");
      }
    }

    const selectedAgain = getSelectedSingerButtons();
    while (selectedAgain.length > quota) {
      selectedAgain[selectedAgain.length - 1].classList.remove("active");
      selectedAgain.pop();
    }
    syncSingerPickerFromRows();
  }

  function ensurePartRowsMatchQuota() {
    const partWrap = document.getElementById("partRows");
    if (!partWrap) return;

    trimRowsToQuota();

    const quota = getValidSingerQuotaValue();
    let rows = [...partWrap.querySelectorAll(".partRow")];

    while (rows.length < quota) {
      const temp = document.createElement("div");
      temp.innerHTML = createPartRowHtml("", "", rows.length);
      const row = temp.firstElementChild;
      partWrap.appendChild(row);
      rows = [...partWrap.querySelectorAll(".partRow")];
    }

    reindexPartRows();
    syncSingerPickerFromRows();
    bindAutoSaveEventsToDetail();
    bindPartRowDeleteEvents();
  }

  function enforceQuotaLimitFromInput() {
    trimRowsToQuota();
    ensurePartRowsMatchQuota();
    trimSelectedSingersToQuota();
    updateSingerPickerDisabledState();
    refreshCandidateRowState();
  }

  function getRowMemberUsageCount(memberName, excludingRow = null) {
    const target = String(memberName || "").trim();
    if (!target) return 0;
    return [...document.querySelectorAll(".partRow")]
      .filter(row => row !== excludingRow)
      .filter(row => String(row.querySelector(".partMemberInput")?.value || "").trim() === target)
      .length;
  }

  function toggleSingerButtonByName(memberName, active) {
    const target = String(memberName || "").trim();
    getSingerPickerButtons().forEach(btn => {
      if (String(btn.dataset.memberName || "").trim() === target) {
        btn.classList.toggle("active", !!active);
      }
    });
    updateSingerPickerDisabledState();
  }

  function clearSingerIfUnused(memberName, excludingRow = null) {
    const target = String(memberName || "").trim();
    if (!target) return;
    const stillUsed = getRowMemberUsageCount(target, excludingRow) > 0;
    if (!stillUsed) {
      toggleSingerButtonByName(target, false);
    }
    updateSingerPickerDisabledState();
    updatePartMemberOptionsFromSelectedSingers();
  }

  function syncSingerPickerFromRows() {
    const rowNames = [...document.querySelectorAll(".partRow .partMemberInput")]
      .map(input => String(input.value || "").trim())
      .filter(Boolean);
    const rowNameSet = new Set(rowNames);

    getSingerPickerButtons().forEach(btn => {
      const memberName = String(btn.dataset.memberName || "").trim();
      if (rowNameSet.has(memberName)) {
        btn.classList.add("active");
      }
    });

    trimSelectedSingersToQuota();
    updateSingerPickerDisabledState();
    updatePartMemberOptionsFromSelectedSingers();
  }

  function fillSingerIntoRows(memberName) {
    const targetName = String(memberName || "").trim();
    if (!targetName) return false;

    const existingRows = [...document.querySelectorAll(".partRow")];
    if (existingRows.some(row => String(row.querySelector(".partMemberInput")?.value || "").trim() === targetName)) {
      return true;
    }

    let targetRow = findFirstReusableBlankRow();
    if (!targetRow) {
      const quota = getValidSingerQuotaValue();
      if (existingRows.length >= quota) return false;
      targetRow = appendPartRow("", "");
    }

    const memberInput = targetRow?.querySelector(".partMemberInput");
    if (!memberInput) return false;
    memberInput.value = targetName;
    refreshCandidateRowState();
    return true;
  }

  function removeSingerFromRows(memberName) {
    const target = String(memberName || "").trim();
    if (!target) return;

    const rows = [...document.querySelectorAll(".partRow")];
    rows.forEach(row => {
      const memberInput = row.querySelector(".partMemberInput");
      if (!memberInput || String(memberInput.value || "").trim() !== target) return;
      memberInput.value = "";
      memberInput.dataset.prevMemberName = "";
    });

    ensurePartRowsMatchQuota();
    refreshCandidateRowState();
  }

  function reindexPartRows() {
    document.querySelectorAll(".partRow").forEach((row, index) => {
      row.dataset.rowIndex = String(index);
    });
  }

  function captureDetailSnapshot() {
    const task = getCurrentTaskSafe();
    if (!task || !document.getElementById("browseDetailContentClaim")) return null;
    const singerButtons = getSingerPickerButtons();
    return {
      taskId: String(task.id || ""),
      taskCode: String(document.getElementById("editTaskCode")?.value || ""),
      taskName: String(document.getElementById("editSongName")?.value || ""),
      releaseDate: String(document.getElementById("editReleaseDate")?.value || ""),
      videoLink: String(document.getElementById("editVideoLink")?.value || ""),
      taskType: String(document.getElementById("editTaskType")?.value || ""),
      singerQuota: String(document.getElementById("editSingerQuota")?.value || ""),
      tone: String(document.getElementById("editTone")?.value || ""),
      producerName: String(document.getElementById("editProducerName")?.value || ""),
      selectedSingerIds: singerButtons.filter(btn => btn.classList.contains("active")).map(btn => String(btn.dataset.memberId || "").trim()).filter(Boolean),
      rows: [...document.querySelectorAll(".partRow")].map((row, index) => ({
        partId: String(row.dataset.partId || "").trim(),
        rowIndex: index,
        partName: String(row.querySelector(".partNameInput")?.value || ""),
        memberName: String(row.querySelector(".partMemberInput")?.value || "")
      }))
    };
  }

  function updateUndoButtonState() {
    if (!undoBtn) return;
    undoBtn.disabled = !detailUndoStack.length;
  }

  function pushUndoSnapshot() {
    if (isApplyingUndoSnapshot) return;
    const snapshot = captureDetailSnapshot();
    if (!snapshot) return;
    const serialized = JSON.stringify(snapshot);
    const lastSerialized = detailUndoStack.length ? JSON.stringify(detailUndoStack[detailUndoStack.length - 1]) : "";
    if (serialized === lastSerialized) return;
    detailUndoStack.push(snapshot);
    if (detailUndoStack.length > 40) detailUndoStack.shift();
    updateUndoButtonState();
  }

  function clearUndoSnapshots() {
    detailUndoStack = [];
    updateUndoButtonState();
  }

  function applyDetailSnapshot(snapshot) {
    if (!snapshot || String(snapshot.taskId || "") !== String(activeClaimTaskId || "")) return;
    isApplyingUndoSnapshot = true;
    try {
      const setValue = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.value = value ?? "";
      };
      setValue("editTaskCode", snapshot.taskCode || "");
      setValue("editSongName", snapshot.taskName || "");
      setValue("editReleaseDate", snapshot.releaseDate || "");
      setValue("editVideoLink", snapshot.videoLink || "");
      setValue("editTaskType", snapshot.taskType || "");
      setValue("editSingerQuota", snapshot.singerQuota || "");
      setValue("editTone", snapshot.tone || "");
      setValue("editProducerName", snapshot.producerName || "");

      const partWrap = document.getElementById("partRows");
      if (partWrap) {
        partWrap.innerHTML = (snapshot.rows || []).map((row, index) => {
          const temp = document.createElement("div");
          temp.innerHTML = createPartRowHtml(row.partName || "", row.memberName || "", index);
          const node = temp.firstElementChild;
          if (node) node.dataset.partId = String(row.partId || "");
          return node ? node.outerHTML : "";
        }).join("");
      }

      getSingerPickerButtons().forEach(btn => {
        const memberId = String(btn.dataset.memberId || "").trim();
        btn.classList.toggle("active", (snapshot.selectedSingerIds || []).includes(memberId));
      });

      bindAutoSaveEventsToDetail();
      bindPartRowDeleteEvents();
      bindSingerPickerEvents();
      bindMixerPickerEvents();

      document.querySelectorAll(".partMemberInput").forEach(input => {
        input.dataset.prevMemberName = String(input.value || "").trim();
      });

      enforceQuotaLimitFromInput();
      syncSingerPickerFromRows();
      refreshCandidateRowState();
      updateSingerPickerDisabledState();
      updatePartMemberOptionsFromSelectedSingers();
      updateRewardPreviewFromDom();

      const currentTask = getCurrentTaskSafe();
      if (currentTask) {
        const previewTask = buildTaskFromDom(currentTask).task;
        topStatus.textContent = "";
      }
      setAutoSaveStatus("saved", "已撤回");
    } finally {
      isApplyingUndoSnapshot = false;
    }
  }

  function undoLastDetailChange() {
    const snapshot = detailUndoStack.pop();
    updateUndoButtonState();
    if (!snapshot) return;
    applyDetailSnapshot(snapshot);
  }


  function buildTaskFromDom(existingTask) {
    const taskCode = String(document.getElementById("editTaskCode")?.value || "").trim();
    const songName = String(document.getElementById("editSongName")?.value || "").trim();
    const releaseDate = String(document.getElementById("editReleaseDate")?.value || "").trim();
    const videoLink = String(document.getElementById("editVideoLink")?.value || "").trim();
    const taskType = String(document.getElementById("editTaskType")?.value || "").trim();
    const gameType = taskType === "游戏" ? String(document.getElementById("editGameType")?.value || "").trim() : "";
    const isCollectiveTask = String(document.getElementById("editIsCollective")?.value || "") === "1";
    const toneRaw = String(document.getElementById("editTone")?.value || "").trim();
    const producerName = String(document.getElementById("editProducerName")?.value || "").trim();
    const singerQuota = getValidSingerQuotaValue();

    const toneResult = validateToneInput(toneRaw);
    const partResult = collectPartPayload(existingTask);
    const singerPayload = buildSingerPayloadFromParts(existingTask, partResult.payload);

    const nextTask = {
      ...existingTask,
      task_code: taskCode || null,
      task_name: songName || null,
      displayName: makeDisplayTaskName(taskCode, songName),
      release_date: releaseDate || null,
      display_link: videoLink || null,
      task_type: taskType || null,
      is_collective_task: isCollectiveTask,
      project_tone: toneResult.value,
      singer_quota: singerQuota,
      producer_name: producerName,
      producer_member_id: (findMixerByName(producerName) || findMemberByName(producerName) || {}).id ? String((findMixerByName(producerName) || findMemberByName(producerName)).id) : "",
      singer_bonus: getSingerRewardByRule(singerQuota, isCollectiveTask),
      producer_bonus: getProducerRewardByRule(taskType, singerQuota, isCollectiveTask),
      parts: partResult.payload.map(item => ({
        id: item.id || "",
        part_order: item.part_order,
        original_name: item.original_name,
        assigned_member_id: item.assigned_member_id ? String(item.assigned_member_id) : "",
        assigned_member_name: item.assigned_member_name || ""
      })),
      singers: singerPayload.map(item => {
        const matched = membersCache.find(member => String(member.id) === String(item.member_id));
        return {
          id: item.id || "",
          member_id: String(item.member_id || ""),
          member_name: matched?.display || "",
          is_submitted: !!item.is_submitted,
          submitted_at: item.submitted_at || null
        };
      })
    };

    nextTask.supplementTags = getSupplementTags(nextTask);
    nextTask.readyForHonorShow = isReadyForHonorShow(nextTask);
    const nextTodoStage = getTodoStage(nextTask);
    nextTask.computedStatus = nextTodoStage ? nextTodoStage.statusText : "";
    return { task: nextTask, partResult, singerPayload, toneResult, taskCode, songName, releaseDate, videoLink, taskType, gameType, isCollectiveTask, producerName, singerQuota };
  }

  function patchTaskInMemory(nextTask) {
    tasks = tasks
      .map(item => item.id === nextTask.id ? nextTask : item)
      .sort((a, b) => {
        const aCode = parseInt(String(a.task_code).match(/\d+/)?.[0] || "0", 10);
        const bCode = parseInt(String(b.task_code).match(/\d+/)?.[0] || "0", 10);
        return aCode - bCode;
      });
  }

    roleSetupMask.setAttribute("aria-hidden", "true");
    roleSetupContext = null;

  function prepareRoleSetupContext() {
    const rows = [...document.querySelectorAll('.partRow')];
    const selectedSingerNames = getSelectedSingerNamesFromDom().filter(Boolean);

    const fixedRows = [];
    const editableRows = [];

    rows.forEach((row, index) => {
      const roleName = String(row.querySelector('.partNameInput')?.value || '').trim();
      const memberName = String(row.querySelector('.partMemberInput')?.value || '').trim();

      if (roleName && memberName) {
        fixedRows.push({ row, index, roleName, memberName });
        return;
      }

      if (roleName && !memberName) {
        editableRows.push({ row, index, roleName, memberName: '' });
      }
    });

    return { rows: editableRows, fixedRows, selectedSingerNames };
  }

  function applyRoleSetupAndRun(type) {
    if (!roleSetupContext) return;
    const setupRows = [...roleSetupRows.querySelectorAll('.roleSetupRow')];
    const chosenSingerNames = [...roleSetupSingerPicker.querySelectorAll('.roleSetupSingerBtn.active')]
      .map(btn => String(btn.dataset.memberName || '').trim())
      .filter(Boolean);

    const normalizedRows = roleSetupContext.rows.map((item, index) => ({
      ...item,
      roleName: String(setupRows[index]?.querySelector('.roleSetupPartInput')?.value || '').trim()
    }));

    if (!normalizedRows.some(item => item.roleName)) {
      showToast('无法创建', '请至少填写一行原唱 / 部分。');
      return;
    }

    const missingNamedRows = normalizedRows.filter(item => !item.roleName);
    if (missingNamedRows.length) {
      showToast('无法创建', '还有空白的原唱 / 部分，请先补全后再随机。');
      return;
    }

    const fixedNames = roleSetupContext.fixedRows.map(item => item.memberName).filter(Boolean);
    const memberFixedInRows = normalizedRows.map(item => item.memberName).filter(Boolean);
    const usedNames = new Set([...fixedNames, ...memberFixedInRows]);
    const pendingRows = normalizedRows.filter(item => !item.memberName);
    const availableSingerNames = chosenSingerNames.filter(name => !usedNames.has(name));

    if (pendingRows.length && !availableSingerNames.length) {
      showToast('无法创建', '请先选择参与随机的演唱者。');
      return;
    }

    const assignCount = Math.min(pendingRows.length, availableSingerNames.length);
    let assignments = [];

    if (type === 'lottery') {
      const shuffled = shuffleArray(availableSingerNames).slice(0, assignCount);
      assignments = pendingRows.slice(0, assignCount).map((item, index) => ({ row: item.row, roleName: item.roleName, memberName: shuffled[index] }));
    } else if (type === 'dice') {
      const pool = [...availableSingerNames];
      assignments = pendingRows.slice(0, assignCount).map(item => {
        const diceNo = Math.floor(Math.random() * pool.length);
        const memberName = pool.splice(diceNo, 1)[0];
        return { row: item.row, roleName: item.roleName, memberName, diceNo: diceNo + 1 };
      });
    } else {
      const previews = shuffleArray(availableSingerNames);
      let tick = 0;
      const total = Math.max(10, previews.length * 3);
      setAutoSaveStatus('saving', '转盘转动中...');
      const timer = setInterval(() => {
        const preview = previews[tick % previews.length] || previews[0] || '';
        setAutoSaveStatus('saving', `转盘转动中：${preview}`);
        tick += 1;
        if (tick >= total) {
          clearInterval(timer);
          const shuffled = shuffleArray(availableSingerNames).slice(0, assignCount);
          const result = pendingRows.slice(0, assignCount).map((item, index) => ({ row: item.row, roleName: item.roleName, memberName: shuffled[index] }));
          normalizedRows.forEach(item => {
            const input = item.row?.querySelector('.partNameInput');
            if (input) input.value = item.roleName;
          });
          chosenSingerNames.forEach(name => toggleSingerButtonByName(name, true));
          applyRoleAssignments(result);
          setAutoSaveStatus('saved', '已同步');
          const lines = result.map(item => `${item.roleName}：${item.memberName}`).join('\n');
          showToast('角色转盘', lines ? `已完成角色转盘\n\n${lines}` : '已更新原唱内容。');
        }
      }, 90);
      closeRoleSetupModal();
      return;
    }

    normalizedRows.forEach(item => {
      const partInput = item.row?.querySelector('.partNameInput');
      const memberInput = item.row?.querySelector('.partMemberInput');
      if (partInput) partInput.value = item.roleName;
      if (memberInput && item.memberName) {
        memberInput.value = item.memberName;
        memberInput.dataset.prevMemberName = item.memberName;
      }
    });

    getSingerPickerButtons().forEach(btn => btn.classList.remove('active'));
    chosenSingerNames.forEach(name => toggleSingerButtonByName(name, true));

    if (assignments.length) applyRoleAssignments(assignments);
    else {
      syncSingerPickerFromRows();
      refreshCandidateRowState();
      scheduleAutoSave();
    }

    closeRoleSetupModal();

    const lines = assignments.map(item => `${item.roleName}：${item.memberName}${item.diceNo ? `（骰子 ${item.diceNo}）` : ''}`).join('\n');
    const title = type === 'dice' ? '角色骰子' : '角色抽签';
    showToast(title, lines ? `已完成${title}\n\n${lines}` : '已更新原唱内容。');
  }

  function shuffleArray(list) {
    const arr = [...list];
    for (let i = arr.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

        el.dataset.undoFocusBound = "1";
        el.addEventListener("focus", () => {
          pushUndoSnapshot();
        });
      }

      if (eventName !== "change") {

            el.blur();

          scheduleAutoSave();
        });

  function collectPartPayload(existingTask) {
    const rows = [...document.querySelectorAll(".partRow")];
    const unresolved = [];
    const singerQuota = getValidSingerQuotaValue();
    const selectedSingerIds = new Set(getSelectedSingerIdsFromDom());

    if (rows.length > singerQuota) {
      return { payload: [], unresolved, validationError: "歌词分配行数不能超过演唱人数" };
    }

    const payload = rows.map((row, index) => {
      const originalName = String(row.querySelector(".partNameInput")?.value || "").trim();
      const typedName = String(row.querySelector(".partMemberInput")?.value || "").trim();

      let assignedMemberId = null;
      let assignedMemberName = "";

      if (typedName) {
        const matched = findMemberByName(typedName);
        if (!matched) {
          unresolved.push(typedName);
        } else {
          assignedMemberId = matched.id;
          assignedMemberName = matched.display;
        }
      }

      return {
        id: String(row.dataset.partId || "").trim(),
        project_id: existingTask.id,
        part_order: index + 1,
        original_name: originalName,
        assigned_member_id: assignedMemberId,
        assigned_member_name: assignedMemberName
      };
    }).filter(item => item.original_name || item.assigned_member_id);

    for (const item of payload) {
      if (item.assigned_member_id && !selectedSingerIds.has(String(item.assigned_member_id))) {
        return { payload, unresolved, validationError: "歌词分配中的成员必须来自已勾选的演唱者" };
      }
    }

    const seenMemberIds = new Set();
    for (const item of payload) {
      const memberId = String(item.assigned_member_id || "").trim();
      if (!memberId) continue;
      if (seenMemberIds.has(memberId)) {
        return { payload, unresolved, validationError: "同一成员不能在同一项目里占多个歌词分配行" };
      }
      seenMemberIds.add(memberId);
    }

    const seenRoleNames = new Set();
    for (const item of payload) {
      const roleName = String(item.original_name || "").trim().toLowerCase();
      if (!roleName) continue;
      if (seenRoleNames.has(roleName)) {
        return { payload, unresolved, validationError: "同一个原唱在同一个项目里不能重复出现" };
      }
      seenRoleNames.add(roleName);
    }

    return { payload, unresolved, validationError: "" };
  }

  function validateToneInput(raw) {
    const text = String(raw || "").trim();
    if (!text) return { ok: true, value: null };
    if (text === "原调") return { ok: true, value: "原调" };
    if (/^[+-]\d+$/.test(text)) return { ok: true, value: text };
    if (text === "+" || text === "-") return { ok: true, value: text };
    return { ok: false, value: text };
  }

  function buildSingerPayloadFromParts(existingTask, partPayload) {

          String(item.member_id),
          {
            is_submitted: !!item.is_submitted,
            submitted_at: item.submitted_at || null
          }
        ])
    );

    const uniqueMemberIds = [...new Set(getSelectedSingerIdsFromDom().filter(Boolean).map(String))];

    return uniqueMemberIds.map(memberId => {
      const prev = existingSingerState.get(memberId) || { is_submitted: false, submitted_at: null };
      return {
        project_id: existingTask.id,
        member_id: memberId,
        is_submitted: prev.is_submitted,
        submitted_at: prev.submitted_at
      };
    });
  }

  async function saveProjectSingersDirectly(taskId, singerPayload, existingTask) {
    const normalizedPayload = [...new Set((singerPayload || []).map(item => String(item.member_id || "").trim()).filter(Boolean))].map(memberId => {
      const existing = (existingTask?.singers || []).find(row => String(row.member_id || "").trim() === memberId) || {};
      return {
        project_id: taskId,
        member_id: memberId,
        is_submitted: !!existing.is_submitted,
        submitted_at: existing.submitted_at || null
      };
    });

    const existingRows = (existingTask?.singers || []).map(row => ({
      id: String(row.id || "").trim(),
      member_id: String(row.member_id || "").trim(),
      is_submitted: !!row.is_submitted,
      submitted_at: row.submitted_at || null
    })).filter(row => row.member_id);

    const existingIdByMember = new Map(existingRows.map(row => [row.member_id, row]));
    const nextIds = new Set(normalizedPayload.map(row => row.member_id));

    const removedRowIds = existingRows
      .filter(row => row.id && !nextIds.has(row.member_id))
      .map(row => row.id);

    if (removedRowIds.length) {
      const { error: deleteError } = await supabaseClient
        .from("project_singers")
        .delete()
        .in("id", removedRowIds);
      if (deleteError) throw deleteError;
    }

    const rowsToInsert = normalizedPayload.filter(row => !existingIdByMember.has(row.member_id));
    if (rowsToInsert.length) {
      const { error: insertError } = await supabaseClient
        .from("project_singers")
        .insert(rowsToInsert);
      if (insertError) throw insertError;
    }

    for (const row of normalizedPayload) {
      const existing = existingIdByMember.get(row.member_id);
      if (!existing?.id) continue;
      const { error: updateError } = await supabaseClient
        .from("project_singers")
        .update({
          is_submitted: row.is_submitted,
          submitted_at: row.submitted_at
        })
        .eq("id", existing.id);
      if (updateError) throw updateError;
    }
  }

  async function saveProjectPartsDirectly(taskId, partResult) {
    const { error: deletePartError } = await supabaseClient
      .from("project_parts")
      .delete()
      .eq("project_id", taskId);
    if (deletePartError) throw deletePartError;

    if (partResult.payload.length) {
      const insertRows = partResult.payload.map(({ assigned_member_name, id, ...rest }) => rest);
      const { error: insertPartError } = await supabaseClient
        .from("project_parts")
        .insert(insertRows);
      if (insertPartError) throw insertPartError;
    }
  }

  function shouldFallbackFromRpcError(err) {
    const detail = String(err?.message || err?.details || err?.hint || err?.code || "").toLowerCase();
    return detail.includes("save_project_bundle")
      || detail.includes("pgrst202")
      || detail.includes("404")
      || detail.includes("400")
      || detail.includes("does not exist")
      || detail.includes("could not find")
      || detail.includes("not find");
  }

  async function saveProjectPayloadDirectly(projectId, projectPayload) {
    const preferredKeys = [
      "task_code",
      "task_name",
      "release_date",
      "task_type",
      "is_collective_task",
      "project_tone",
      "producer_member_id",
      "singer_quota",
      "singer_bonus",
      "producer_bonus"
    ];

    const payload = {};
    preferredKeys.forEach(key => {
      if (Object.prototype.hasOwnProperty.call(projectPayload, key)) {
        payload[key] = projectPayload[key];
      }
    });

    let { error } = await supabaseClient
      .from("projects")
      .update(payload)
      .eq("id", projectId);

    if (!error) return;

    const detail = String(error?.message || error?.details || error?.hint || "").toLowerCase();
    const relaxedPayload = { ...payload };
    delete relaxedPayload.singer_bonus;
    delete relaxedPayload.producer_bonus;
    if (detail.includes("is_collective_task")) {
      delete relaxedPayload.is_collective_task;
    }

    ({ error } = await supabaseClient
      .from("projects")
      .update(relaxedPayload)
      .eq("id", projectId));

    if (error) throw error;
  }

  async function saveTaskBundleWithRpc(task, snapshot, projectPayload, partResult, singerPayload) {
    try {
      await secureUpdateProjectViaRpc(task, snapshot, projectPayload);
      await secureReplaceProjectSingersViaRpc(task.id, singerPayload.map(item => item.member_id));
      await saveProjectPartsDirectly(task.id, partResult);
    } catch (err) {
      if (!shouldFallbackFromRpcError(err)) throw err;
      await saveProjectPayloadDirectly(task.id, projectPayload);
      await saveProjectSingersDirectly(task.id, singerPayload, task);
      await saveProjectPartsDirectly(task.id, partResult);
    }
  }

  function scheduleAutoSave(mode = "auto") {
    if (suppressAutoSave || !canEditCurrentPage()) return;
    clearTimeout(autoSaveTimer);
    pendingSaveMode = mode;
    hasPendingLocalChanges = true;
    if (mode === "manual") {
      setAutoSaveStatus("saving", "保存中...");
      saveCurrentTaskEdits(mode);
      return;
    }
    setAutoSaveStatus("", "有未保存修改");
  }

  async function saveCurrentTaskEdits(mode = "auto") {
    if (!canEditCurrentPage()) return;
    const task = tasks.find(item => item.id === activeClaimTaskId);
    if (!task) return;

    applyDeferredLastRemainingSingerFill();

    if (saveInFlight) {
      pendingSaveAfterCurrent = true;
      pendingSaveMode = mode === "manual" ? "manual" : pendingSaveMode;
      return;
    }

    const snapshot = buildTaskFromDom(task);
    const { task: nextTask, partResult, singerPayload, toneResult, taskCode, songName, releaseDate, videoLink, taskType, isCollectiveTask, producerName, singerQuota } = snapshot;

    if (!toneResult.ok) {
      setAutoSaveStatus("error", "调只能填 -2 / 原调 / +6 这种格式");
      return;
    }

    if (partResult.validationError) {
      setAutoSaveStatus("error", partResult.validationError);
      return;
    }
    if (partResult.unresolved.length) {
      setAutoSaveStatus("error", `成员未匹配：${partResult.unresolved[0]}`);
      return;
    }

    const selectedSingerIds = new Set(getSelectedSingerIdsFromDom().filter(Boolean).map(String));
    if (selectedSingerIds.size > singerQuota) {
      setAutoSaveStatus("error", "演唱者数量不能超过演唱人数");
      return;
    }

    let producerMemberId = null;
    if (producerName) {
      const mixerMatched = findMixerByName(producerName) || findMemberByName(producerName);
      if (!mixerMatched) {
        setAutoSaveStatus("error", `混音负责人未匹配：${producerName}`);
        return;
      }
      producerMemberId = mixerMatched.id;
      nextTask.producer_member_id = String(mixerMatched.id);
    }

    const projectPayload = {
      task_code: taskCode || null,
      task_name: songName || null,
      release_date: releaseDate || null,
      display_link: videoLink || null,
      task_type: taskType || null,
      is_collective_task: isCollectiveTask,
      project_tone: toneResult.value,
      producer_member_id: producerMemberId,
      singer_quota: singerQuota,
      singer_bonus: getSingerRewardByRule(singerQuota, isCollectiveTask),
      producer_bonus: getProducerRewardByRule(taskType, singerQuota, isCollectiveTask)
    };

    saveInFlight = true;
    try {
      setAutoSaveStatus("saving", mode === "manual" ? "保存中..." : "自动保存中...");

      await saveTaskBundleWithRpc(task, snapshot, projectPayload, partResult, singerPayload);

      await loadProjectsFromSupabase({ keepSelection: true });
      hasPendingLocalChanges = false;
      setAutoSaveStatus("saved", mode === "manual" ? "已保存" : "已同步");
      renderBrowseList();
      renderBrowseDetail();
    } catch (err) {
      console.error("保存失败：", err);
      const detail = String(err?.message || err?.details || err?.hint || "").trim();
      setAutoSaveStatus("error", detail || "保存失败");
      if (mode === "manual") {
        showToast("保存失败", detail ? `保存失败：${detail}` : "保存失败，请检查数据库约束、RLS 或保存函数。");
      }
    } finally {
      saveInFlight = false;
      if (pendingSaveAfterCurrent) {
        const nextMode = pendingSaveMode;
        pendingSaveAfterCurrent = false;
        pendingSaveMode = "auto";
        scheduleAutoSave(nextMode);
      }
    }
  }

  async function handleLeaveTask(taskId) {
    const task = tasks.find(item => item.id === taskId);
    if (!task) return;

    const currentMemberId = getCurrentMemberId();
    if (!currentMemberId) {
      showToast("无法退出", "当前登录信息不完整，请重新登录后再试。");
      return;
    }

    if (!isCurrentUserSingerInTask(task)) return;

    const ok = await showConfirmToast("确认退出", "确定要取消加入这个任务吗？", "确认退出", "取消");
    if (!ok) return;

    try {
      setAutoSaveStatus("saving", "退出中...");

      const remainingSingerIds = (task.singers || [])
        .map(row => String(row.member_id || "").trim())
        .filter(id => id && id !== currentMemberId);
      try {
        await secureReplaceProjectSingersViaRpc(task.id, remainingSingerIds);
      } catch (err) {
        if (!shouldFallbackFromRpcError(err)) throw err;
        await saveProjectSingersDirectly(task.id, remainingSingerIds.map(member_id => ({ member_id })), task);
      }

      const assignedRows = (task.parts || []).filter(row => String(row.assigned_member_id || "").trim() === currentMemberId);
      for (const row of assignedRows) {
        if (!row.id) continue;
        const keepOriginal = !!String(row.original_name || "").trim();
        const payload = keepOriginal
          ? { assigned_member_id: null }
          : { assigned_member_id: null, original_name: null };
        const { error: clearPartError } = await supabaseClient
          .from("project_parts")
          .update(payload)
          .eq("id", row.id);
        if (clearPartError) throw clearPartError;
      }

      await loadProjectsFromSupabase({keepSelection:true});

      const latestTask = tasks.find(item => item.id === taskId);
      if (latestTask) {
        activeClaimTaskId = latestTask.id;
        renderBrowseList();
        renderBrowseDetail();
      }

      setAutoSaveStatus("saved", "已退出");
    } catch (err) {
      console.error("退出任务失败：", err);
      setAutoSaveStatus("error", "退出失败");
      const detail = String(err?.message || err?.details || err?.hint || "").trim();
      showToast("退出失败", detail ? `退出失败：${detail}` : "退出失败，请检查安全保存函数与 project_parts 权限。");
    }
  }

  async function handleJoinTask(taskId) {
    const task = tasks.find(item => item.id === taskId);
    if (!task) return;

    const currentMemberId = getCurrentMemberId();
    const currentMemberName = getCurrentMemberName();

    if (!currentMemberId || !currentMemberName) {
      showToast("无法加入", "当前登录信息不完整，请重新登录后再试。");
      return;
    }

    if (!canCurrentUserJoinTask(task)) return;

    try {
      setAutoSaveStatus("saving", "加入中...");

      const nextSingerIds = [...new Set([...(task.singers || []).map(row => String(row.member_id || "").trim()).filter(Boolean), currentMemberId])];
      try {
        await secureReplaceProjectSingersViaRpc(task.id, nextSingerIds);
      } catch (err) {
        if (!shouldFallbackFromRpcError(err)) throw err;
        await saveProjectSingersDirectly(task.id, nextSingerIds.map(member_id => ({ member_id })), task);
      }

      await loadProjectsFromSupabase({keepSelection:true});

      const joinedTask = tasks.find(item => item.id === taskId);
      if (joinedTask) {
        activeClaimTaskId = joinedTask.id;
        renderBrowseList();
        renderBrowseDetail();
      }

      setAutoSaveStatus("saved", "已加入");
    } catch (err) {
      console.error("加入任务失败：", err);
      setAutoSaveStatus("error", "加入失败");
      const detail = String(err?.message || err?.details || err?.hint || "").trim();
      showToast("加入失败", detail ? `加入失败：${detail}` : "加入失败，请检查安全保存函数是否已创建。");
    }
  }

  async function deleteCurrentTask() {
    showToast("暂不支持", "当前安全模式下，删除任务还没有接入专用安全函数，先不要在这个页面直接删除。");
  }

  const CURRENT_STUDIO_PAGE = "studio-todo.html";

  function syncPanelSwitchActive() {
    document.querySelectorAll("#panelSwitch .switchBtn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.page === CURRENT_STUDIO_PAGE);
    });
  }

  async function goStudioPage(page) {
    if (!page) return;
    if (page === CURRENT_STUDIO_PAGE) return;
    if (hasPendingLocalChanges) {
      await saveCurrentTaskEdits("manual");
    }
    window.location.href = page;
  }

  claimSearchInput.addEventListener("input", (e) => {
    claimSearchKeyword = e.target.value;
    const filtered = getFilteredTasks(claimSearchKeyword);
    if (!filtered.some(task => task.id === activeClaimTaskId)) {
      activeClaimTaskId = filtered.length ? filtered[0].id : "";
    }
    renderBrowseList();
    renderBrowseDetail();
    renderSiteNotifications();
  });

  
  document.querySelectorAll(".primaryFilterBtn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const filterKey = String(btn.dataset.filter || "").trim();
      if (!filterKey) return;
      await applyFilterAndRefresh(filterKey);
    });
  });

  document.getElementById("filterNoMeBtn")?.addEventListener("click", async () => {
    await applyFilterAndRefresh("没有我");
  });

  document.getElementById("filterHasMeBtn")?.addEventListener("click", async () => {
    await applyFilterAndRefresh("有我在");
  });

  document.querySelectorAll("#panelSwitch .switchBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      goStudioPage(btn.dataset.page);
    });
  });

  document.querySelectorAll(".navBtn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const roomKey = btn.dataset.room;

      if (roomKey === "manager") {
        const role = getCurrentRole();
        const page = role === "owner"
          ? "manager-owner.html"
          : role === "admin"
            ? "manager-admin.html"
            : "manager.html";
        await goStudioPage(page);
        return;
      }

      if (links[roomKey]) {
        await goStudioPage(links[roomKey]);
      }
    });
  });

  document.addEventListener('click', (event) => {
    if (!event.target.closest('.partMemberField')) {
      hideAllPartMemberSuggestions();
    }
    if (!event.target.closest('#siteNoticeWrap')) {
      toggleSiteNoticePanel(false);
    }
  });

  siteNoticeBtn?.addEventListener('click', (event) => {
    event.stopPropagation();
    renderSiteNotifications();
    toggleSiteNoticePanel();
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => { await handleLogout(); });
  if (undoBtn) undoBtn.addEventListener("click", undoLastDetailChange);

  if (saveNowBtn) {
    saveNowBtn.addEventListener("click", () => {
      clearTimeout(autoSaveTimer);
      scheduleAutoSave("manual");
    });
  }

  window.addEventListener("pagehide", () => {
    preserveActiveTaskInCurrentView = false;
    if (!hasPendingLocalChanges) return;
    try {
      saveCurrentTaskEdits("manual");
    } catch (err) {
      console.error("离页保存失败：", err);
    }
  });

  roleSetupCancelBtn?.addEventListener("click", closeRoleSetupModal);
  roleSetupConfirmBtn?.addEventListener("click", () => applyRoleSetupAndRun(activeRoleToolType));
  roleSetupMask?.addEventListener("click", (e) => {
    if (e.target === roleSetupMask) closeRoleSetupModal();
  });

  function resetTransientUiState() {
    hideAllPartMemberSuggestions();
    toggleSiteNoticePanel(false);
    const activeEl = document.activeElement;
    if (activeEl?.classList?.contains('partMemberInput')) {
      try { activeEl.blur(); } catch (err) {}
    }
  }

  if (bg) {
    bg.addEventListener("load", () => {
      bgLoaded = true;
      markBackgroundReady();
      syncOverlayToImage();
      syncBackgroundBlendFromImage();
    });

    bg.addEventListener("error", () => {
      bgLoaded = false;
      tryLoadNextBackground();
    });

    if (!bg.getAttribute('src')) {
      bg.src = BG_CANDIDATE_PATHS[0];
    }
  }

  window.addEventListener("resize", syncOverlayToImage);
  window.addEventListener("orientationchange", syncOverlayToImage);
  window.addEventListener("load", syncTopUiLayout);
  window.addEventListener("pageshow", () => {
    resetTransientUiState();
  });

  function spawnMusicNote() {
    if (!musicNotesLayer) return;
    if (document.hidden) return;

    const note = document.createElement('span');
    const symbols = ['♪','♫','♩','♬','♭','♮'];
    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
    const layerWidth = musicNotesLayer.clientWidth || window.innerWidth || 1200;
    const layerHeight = musicNotesLayer.clientHeight || window.innerHeight || 800;
    const startX = Math.random() * layerWidth;
    const startY = Math.max(layerHeight * 0.45, Math.random() * layerHeight);
    const size = 14 + Math.random() * 24;
    const driftX = (Math.random() * 180 - 90).toFixed(0) + 'px';
    const floatY = (160 + Math.random() * 260).toFixed(0) + 'px';
    const rotate = (Math.random() * 32 - 16).toFixed(0) + 'deg';
    const duration = (5.2 + Math.random() * 4.2).toFixed(2) + 's';

    note.className = 'musicNote';
    note.textContent = symbol;
    note.style.left = `${startX}px`;
    note.style.top = `${startY}px`;
    note.style.fontSize = `${size}px`;
    note.style.animationDuration = duration;
    note.style.setProperty('--float-x', driftX);
    note.style.setProperty('--float-y', floatY);
    note.style.setProperty('--float-rotate', rotate);

    musicNotesLayer.appendChild(note);
    note.addEventListener('animationend', () => note.remove(), { once: true });
  }

  function startMusicNotes() {
    if (!musicNotesLayer) return;
    for (let i = 0; i < 12; i += 1) {
      window.setTimeout(spawnMusicNote, i * 180);
    }
    window.setInterval(() => {
      if (musicNotesLayer.childElementCount > 42) return;
      spawnMusicNote();
    }, 260);
  }

  (async function init() {
    applyDefaultBackgroundBlend();
    syncOverlayToImage();
    syncPanelSwitchActive();
    syncFilterButtons();
    startMusicNotes();

    const ok = await ensureAuthState();
    if (!ok) return;

    updateTopBarIdentity();
    await loadMembersList();
    await loadProjectsFromSupabase({keepSelection:false});
    renderSiteNotifications();
    setAutoSaveStatus("saved", "已同步");
  })();
</script>
